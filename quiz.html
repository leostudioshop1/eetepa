<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz: Operadores Lógicos</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --primary: #3f51b5;
            --secondary: #f50057;
            --bg: #f4f4f9;
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; }
        #quiz-container, #leaderboard { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 600px; margin-bottom: 20px; }
        .question { font-size: 1.2rem; margin-bottom: 1.5rem; font-weight: bold; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 12px; cursor: pointer; border: 1px solid #ddd; border-radius: 6px; background: white; transition: 0.3s; }
        button:hover { background: #e0e0e0; }
        .btn-submit { background: var(--primary); color: white; border: none; margin-top: 20px; width: 100%; }
        .btn-submit:disabled { background: #ccc; }
        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { text-align: left; padding: 8px; border-bottom: 1px solid #eee; }
        h2 { color: var(--primary); }
    </style>
</head>
<body>

    <div id="setup">
        <h2>Bem-vindo ao Quiz Lógico</h2>
        <input type="text" id="username" placeholder="Digite seu nome" style="padding: 10px; width: 80%;">
        <button class="btn-submit" onclick="startQuiz()">Começar</button>
    </div>

    <div id="quiz-container" class="hidden">
        <div id="progress">Questão 1 de 10</div>
        <div class="question" id="question-text"></div>
        <div class="options" id="options-container"></div>
        <button id="next-btn" class="btn-submit" onclick="nextQuestion()" disabled>Próxima</button>
    </div>

    <div id="leaderboard">
        <h2>Ranking em Tempo Real</h2>
        <table>
            <thead><tr><th>Nome</th><th>Pontos</th></tr></thead>
            <tbody id="ranking-body"></tbody>
        </table>
    </div>

<script>
    // Configuração Supabase
    const SUPABASE_URL = "https://osofdmgokrxdzsxozsrf.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zb2ZkbWdva3J4ZHpzeG96c3JmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMzk4ODMsImV4cCI6MjA4ODYxNTg4M30.lALjkQ65DPLFiLboHNH4mKzwoNZPFyGjwRLW-IrMH4c";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let currentQuestion = 0;
    let score = 0;
    let user = "";

    const questions = [
        { q: "Qual o resultado de (true && false)?", o: ["true", "false"], a: 1 },
        { q: "Qual operador representa a negação?", o: ["&&", "||", "!"], a: 2 },
        { q: "O resultado de (true || false) é?", o: ["true", "false"], a: 0 },
        { q: "Em lógica, (5 > 3 && 2 < 1) retorna:", o: ["true", "false"], a: 1 },
        { q: "Qual o resultado de !(10 == 10)?", o: ["true", "false"], a: 1 },
        { q: "Qual operador é o 'OU' lógico?", o: ["&", "||", "AND"], a: 1 },
        { q: "(false || !false) resulta em:", o: ["true", "false"], a: 0 },
        { q: "O que o operador && exige para ser true?", o: ["Ambos true", "Apenas um true", "Nenhum true"], a: 0 },
        { q: "!(true && false) é igual a:", o: ["true", "false"], a: 0 },
        { q: "(5 != 5 || 1 == 1) é:", o: ["true", "false"], a: 0 }
    ];

    async function startQuiz() {
        user = document.getElementById('username').value;
        if(!user) return alert("Digite seu nome!");
        document.getElementById('setup').classList.add('hidden');
        document.getElementById('quiz-container').classList.remove('hidden');
        showQuestion();
        fetchRanking();
    }

    function showQuestion() {
        const q = questions[currentQuestion];
        document.getElementById('progress').innerText = `Questão ${currentQuestion + 1} de 10`;
        document.getElementById('question-text').innerText = q.q;
        const container = document.getElementById('options-container');
        container.innerHTML = "";
        q.o.forEach((opt, i) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.onclick = () => selectOption(i);
            container.appendChild(btn);
        });
    }

    function selectOption(index) {
        const q = questions[currentQuestion];
        if(index === q.a) score++;
        document.getElementById('next-btn').disabled = false;
        // Desabilitar botões após escolha
        Array.from(document.getElementById('options-container').children).forEach(b => b.disabled = true);
    }

    async function nextQuestion() {
        currentQuestion++;
        if(currentQuestion < questions.length) {
            document.getElementById('next-btn').disabled = true;
            showQuestion();
        } else {
            await finishQuiz();
        }
    }

    async function finishQuiz() {
        document.getElementById('quiz-container').innerHTML = `<h2>Fim! Você fez ${score} pontos.</h2>`;
        // Salvar no Supabase
        await _supabase.from('ranking').insert([{ username: user, score: score }]);
        fetchRanking();
    }

    async function fetchRanking() {
        const { data, error } = await _supabase
            .from('ranking')
            .select('*')
            .order('score', { ascending: false })
            .limit(10);
        
        if(data) {
            const body = document.getElementById('ranking-body');
            body.innerHTML = data.map(row => `<tr><td>${row.username}</td><td>${row.score}</td></tr>`).join('');
        }
    }

    // Atualização em tempo real (Realtime)
    _supabase.channel('ranking_updates')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'ranking' }, payload => {
        fetchRanking();
    }).subscribe();

    // Carregar ranking inicial
    fetchRanking();
</script>
</body>
</html>
