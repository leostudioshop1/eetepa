<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Lógica e Sistemas</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

h2{
color:#00f7ff;
}

#setup,#quiz-container,#leaderboard{
background:#020617;
border:1px solid #00f7ff44;
padding:25px;
border-radius:12px;
width:100%;
max-width:600px;
margin-bottom:20px;
box-shadow:0 0 20px #00f7ff33;
}

button{
padding:12px;
margin:5px;
border:none;
border-radius:6px;
background:#00f7ff;
color:black;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#22d3ee;
}

.hidden{
display:none;
}

.options button{
width:100%;
background:#111827;
color:white;
border:1px solid #00f7ff33;
}

.options button:hover{
background:#1f2937;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:10px;
border-bottom:1px solid #00f7ff33;
}

</style>
</head>

<body>

<div id="setup">

<h2>🎮 Quiz de Lógica</h2>

<input id="username" placeholder="Seu nome">

<button onclick="startQuiz()">Iniciar</button>

</div>

<div id="quiz-container" class="hidden">

<div id="progress"></div>

<div id="question-text"></div>

<div class="options" id="options-container"></div>

<button id="next-btn" onclick="nextQuestion()" disabled>Próxima</button>

</div>

<div id="leaderboard">

<h2>🏆 Ranking em Tempo Real</h2>

<table>

<thead>
<tr>
<th>Jogador</th>
<th>Pontos</th>
</tr>
</thead>

<tbody id="ranking-body">
<tr><td colspan="2">Carregando...</td></tr>
</tbody>

</table>

</div>

<script>

// SUPABASE
const SUPABASE_URL="https://osofdmgokrxdzsxozsrf.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zb2ZkbWdva3J4ZHpzeG96c3JmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMzk4ODMsImV4cCI6MjA4ODYxNTg4M30.lALjkQ65DPLFiLboHNH4mKzwoNZPFyGjwRLW-IrMH4c";


const db=supabase.createClient(SUPABASE_URL,SUPABASE_KEY)

// QUIZ

let currentQuestion=0
let score=0
let user=""
let playerId=null

const questions=[

{q:"true && false resulta em?",o:["true","false"],a:1},

{q:"Qual operador é NOT?",o:["!","||","&&"],a:0},

{q:"true || false é:",o:["true","false"],a:0},

{q:"!(true && false) retorna:",o:["true","false"],a:0},

{q:"5>3 && 2<1 retorna:",o:["true","false"],a:1},

{q:"Sistema que organiza arquivos:",o:["Sistema de arquivos","Kernel","RAM"],a:0},

{q:"NTFS é um:",o:["Sistema de arquivos","Processador","Driver"],a:0},

{q:"Linux usa muito:",o:["ext4","fat32","ntfs"],a:0},

{q:"false || !false resulta:",o:["true","false"],a:0},

{q:"&& significa:",o:["E lógico","OU lógico","NÃO"],a:0}

]

// INICIAR QUIZ

async function startQuiz(){

user=document.getElementById("username").value.trim()

if(!user) return alert("Digite seu nome")

document.getElementById("setup").classList.add("hidden")
document.getElementById("quiz-container").classList.remove("hidden")

// cria jogador no banco

const {data,error}=await db
.from("ranking")
.insert([{username:user,score:0}])
.select()

if(data) playerId=data[0].id

showQuestion()

}

// MOSTRAR PERGUNTA

function showQuestion(){

const q=questions[currentQuestion]

document.getElementById("progress").innerText=
`Pergunta ${currentQuestion+1} de ${questions.length}`

document.getElementById("question-text").innerText=q.q

const container=document.getElementById("options-container")
container.innerHTML=""

q.o.forEach((opt,i)=>{

const btn=document.createElement("button")
btn.innerText=opt

btn.onclick=()=>selectOption(i)

container.appendChild(btn)

})

document.getElementById("next-btn").disabled=true

}

// ESCOLHER

async function selectOption(index){

const q=questions[currentQuestion]

if(index===q.a){

score++

await updateScore()

}

document.getElementById("next-btn").disabled=false

}

// ATUALIZA SCORE EM TEMPO REAL

async function updateScore(){

if(!playerId) return

await db
.from("ranking")
.update({score:score})
.eq("id",playerId)

}

// PROXIMA PERGUNTA

function nextQuestion(){

currentQuestion++

if(currentQuestion<questions.length){

showQuestion()

}else{

finishQuiz()

}

}

// FINAL

function finishQuiz(){

document.getElementById("quiz-container").innerHTML=`

<h2>Quiz finalizado</h2>

<p>Você fez ${score} pontos</p>

<button onclick="location.reload()">Jogar novamente</button>

`

}

// RANKING

async function fetchRanking(){

const {data}=await db
.from("ranking")
.select("username,score")
.order("score",{ascending:false})
.limit(10)

const body=document.getElementById("ranking-body")

body.innerHTML=data.map(r=>

`<tr>
<td>${r.username}</td>
<td>${r.score}</td>
</tr>`

).join("")

}

// atualiza ranking a cada 1 segundo

setInterval(fetchRanking,1000)

fetchRanking()

</script>

</body>
</html>
