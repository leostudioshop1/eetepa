<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Folha de Ponto</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f9;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .form {
            display: flex;
            gap: 12px;
            margin: 25px 0;
        }
        input {
            flex: 1;
            padding: 15px;
            font-size: 17px;
            border: 2px solid #ddd;
            border-radius: 10px;
        }
        .btn {
            padding: 15px 25px;
            font-size: 16px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
        .btn-primary { background: #3498db; color: white; }
        .btn-success { background: #27ae60; color: white; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th {
            background: #34495e;
            color: white;
        }
        .qr-btn {
            background: #27ae60;
            color: white;
            padding: 10px 16px;
        }
        .link {
            color: #3498db;
            text-decoration: none;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👨‍💼 Administração - Folha de Ponto</h1>
        <p style="text-align:center; color:#7f8c8d;">Cadastre funcionários e gere QR Codes</p>

        <div class="form">
            <input type="text" id="nome" placeholder="Nome completo do funcionário">
            <button class="btn btn-primary" onclick="cadastrar()">Cadastrar</button>
        </div>

        <table id="tabela">
            <thead>
                <tr>
                    <th>Nome do Funcionário</th>
                    <th>ID Único</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

        <div style="text-align:center; margin-top: 30px;">
            <a href="ponto.html" target="_blank" class="link">→ Abrir página de bater ponto</a>
        </div>
    </div>

    <script>
        let employees = JSON.parse(localStorage.getItem('employees')) || [];

        function salvar() {
            localStorage.setItem('employees', JSON.stringify(employees));
        }

        function gerarId() {
            return 'FUNC-' + Math.random().toString(36).substring(2, 10).toUpperCase();
        }

        function cadastrar() {
            const nome = document.getElementById('nome').value.trim();
            if (!nome) return alert("Digite o nome do funcionário!");

            if (employees.some(e => e.nome.toLowerCase() === nome.toLowerCase())) {
                return alert("Este funcionário já está cadastrado!");
            }

            employees.push({ id: gerarId(), nome: nome });
            salvar();
            document.getElementById('nome').value = '';
            renderTable();
        }

        function renderTable() {
            const tbody = document.querySelector('#tabela tbody');
            tbody.innerHTML = '';

            employees.forEach(func => {
                const baseUrl = window.location.href.replace('admin.html', 'ponto.html');
                const qrUrl = `${baseUrl}?id=${func.id}`;

                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><strong>${func.nome}</strong></td>
                    <td><code style="background:#f1f1f1; padding:4px 8px; border-radius:4px;">${func.id}</code></td>
                    <td>
                        <button class="btn qr-btn" onclick="gerarQR('${qrUrl}', '${func.nome.replace(/'/g, "\\'")}')">
                            📱 Gerar QR Code
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            if (employees.length === 0) {
                tbody.innerHTML = `<tr><td colspan="3" style="text-align:center; color:#95a5a6; padding:30px;">Nenhum funcionário cadastrado ainda.</td></tr>`;
            }
        }

        function gerarQR(url, nome) {
            const win = window.open('', '_blank', 'width=420,height=520');
            win.document.write(`
                <!DOCTYPE html>
                <html><head><meta charset="UTF-8"><title>QR Code - ${nome}</title>
                <style>body{font-family:Arial;text-align:center;padding:20px;background:#f9f9f9;}
                h2{color:#27ae60;}</style>
                </head><body>
                <h2>QR Code - ${nome}</h2>
                <div id="qrcode" style="margin:25px auto;"></div>
                <p>Escaneie este código para bater o ponto</p>
                <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"><\/script>
                <script>
                    new QRCode(document.getElementById("qrcode"), {
                        text: "${url}",
                        width: 320,
                        height: 320,
                        colorDark: "#000000",
                        colorLight: "#ffffff"
                    });
                <\/script>
                </body></html>
            `);
        }

        window.onload = renderTable;
    </script>
</body>
</html>
