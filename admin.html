<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Controle de Ponto</title>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; }
        h1, h2 { color: #27ae60; }
        .card { background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); padding: 25px; margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #27ae60; color: white; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn-primary { background: #27ae60; color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        input { padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 100%; margin-bottom: 10px; }
        #reader { width: 100%; max-width: 400px; margin: 15px auto; border: 2px solid #27ae60; border-radius: 12px; }
        .device-id { font-size: 0.95em; color: #333; background: #f8f9fa; padding: 10px; border-radius: 6px; word-break: break-all; font-family: monospace; }
    </style>
</head>
<body>
<div class="container">
    <h1>🛠️ Admin - Controle de Ponto (Supabase)</h1>

    <div class="card">
        <h2>Cadastrar Novo Funcionário</h2>
        <input type="text" id="nomeFunc" placeholder="Nome completo">
        <input type="text" id="deviceIDManual" placeholder="Device ID (copie do ponto.html)">
        
        <button class="btn btn-success" onclick="iniciarScanner()">📷 Escanear QR Code</button>
        <div id="reader"></div>
        
        <div id="deviceInfo" style="margin:15px 0; font-weight:bold;"></div>
        
        <button class="btn btn-primary" onclick="cadastrarFuncionario()">Cadastrar no Supabase</button>
    </div>

    <div class="card">
        <h2>Funcionários Cadastrados</h2>
        <table id="tabelaFuncionarios">
            <thead><tr><th>Nome</th><th>Device ID</th><th>Cadastrado em</th><th>Ações</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>

    <div class="card">
        <h2>📋 Histórico de Registros</h2>
        <input type="text" id="filtroNome" placeholder="Filtrar por nome..." onkeyup="filtrarHistorico()">
        <table id="tabelaHistorico">
            <thead><tr><th>Data/Hora</th><th>Funcionário</th><th>Tipo</th><th>Dispositivo</th></tr></thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
// ==================== CONFIG SUPABASE ====================
const supabaseClient = supabase.createClient(
    'https://osofdmgokrxdzsxozsrf.supabase.co',
    'sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe'
);
// =======================================================

let html5QrCode = null;

async function iniciarScanner() {
    document.getElementById('reader').innerHTML = '';
    html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 15, qrbox: { width: 250, height: 250 } },
        (decodedText) => {
            document.getElementById('deviceIDManual').value = decodedText.trim();
            document.getElementById('deviceInfo').innerHTML = `✅ Capturado: <span class="device-id">${decodedText}</span>`;
            html5QrCode.stop();
        }
    );
}

async function cadastrarFuncionario() {
    const nome = document.getElementById('nomeFunc').value.trim();
    const deviceID = document.getElementById('deviceIDManual').value.trim();

    if (!nome || !deviceID) return alert("Preencha todos os campos!");

    const { error } = await supabaseClient
        .from('employees')
        .insert([{ id: 'func_' + Date.now().toString(36), nome, device_id: deviceID }]);

    if (error) {
        alert(error.message.includes('unique') ? "Este Device ID já está cadastrado!" : "Erro ao cadastrar");
    } else {
        alert("✅ Funcionário cadastrado com sucesso!");
        document.getElementById('nomeFunc').value = '';
        document.getElementById('deviceIDManual').value = '';
        document.getElementById('deviceInfo').innerHTML = '';
        carregarFuncionarios();
    }
}

async function carregarFuncionarios() {
    const { data } = await supabaseClient.from('employees').select('*').order('cadastrado_em', { ascending: false });
    const tbody = document.querySelector('#tabelaFuncionarios tbody');
    tbody.innerHTML = data.map(func => `
        <tr>
            <td>${func.nome}</td>
            <td><span class="device-id">${func.device_id}</span></td>
            <td>${func.cadastrado_em ? new Date(func.cadastrado_em).toLocaleString('pt-BR') : '—'}</td>
            <td><button class="btn btn-danger" onclick="deletarFuncionario('${func.id}')">Excluir</button></td>
        </tr>
    `).join('');
}

async function deletarFuncionario(id) {
    if (confirm("Excluir funcionário?")) {
        await supabaseClient.from('employees').delete().eq('id', id);
        carregarFuncionarios();
    }
}

async function carregarHistorico() {
    const { data } = await supabaseClient.from('registros_ponto').select('*').order('registrado_em', { ascending: false });
    const tbody = document.querySelector('#tabelaHistorico tbody');
    tbody.innerHTML = data.map(reg => `
        <tr>
            <td>${reg.data_hora}</td>
            <td>${reg.nome}</td>
            <td><strong>${reg.tipo}</strong></td>
            <td>${reg.dispositivo || '—'}</td>
        </tr>
    `).join('');
}

function filtrarHistorico() {
    carregarHistorico();
}

window.onload = () => {
    carregarFuncionarios();
    carregarHistorico();
};
</script>
</body>
</html>
