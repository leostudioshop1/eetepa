<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Controle de Ponto (Supabase)</title>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <!-- Bibliotecas para Exportação -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root { --primary: #27ae60; }
        body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 1300px; margin: 0 auto; }
        h1, h2 { color: var(--primary); }
        .card { background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); padding: 25px; margin-bottom: 25px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; }
        .stat-card { background: #f8f9fa; padding: 20px; border-radius: 12px; text-align: center; border-left: 5px solid var(--primary); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: var(--primary); color: white; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-secondary { background: #3498db; color: white; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 100%; margin-bottom: 10px; }
        #reader { width: 100%; max-width: 400px; margin: 15px auto; border: 2px solid var(--primary); border-radius: 12px; }
        .device-id { font-size: 0.95em; color: #333; background: #f8f9fa; padding: 10px; border-radius: 6px; word-break: break-all; font-family: monospace; }
        .tab { display: none; }
        .tab.active { display: block; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body>
<div class="container">
    <h1>🛠️ Admin - Controle de Ponto (Supabase)</h1>

    <!-- DASHBOARD -->
    <div class="card">
        <h2>📊 Dashboard Contábil</h2>
        <div class="stats-grid" id="statsGrid"></div>
        <button class="btn btn-secondary" onclick="atualizarDashboard()" style="margin-top:15px;">🔄 Atualizar</button>
    </div>

    <!-- PONTO MANUAL -->
    <div class="card">
        <h2>✍️ Registrar Ponto Manual</h2>
        <select id="manualFuncionario" style="margin-bottom:10px;"></select>
        <select id="manualTipo">
            <option value="Entrada">Entrada</option>
            <option value="Saída">Saída</option>
        </select>
        <input type="datetime-local" id="manualDataHora">
        <button class="btn btn-success" onclick="registrarPontoManual()">Registrar Ponto Manual</button>
    </div>

    <!-- CADASTRO -->
    <div class="card">
        <h2>Cadastrar Novo Funcionário</h2>
        <input type="text" id="nomeFunc" placeholder="Nome completo">
        <input type="text" id="deviceIDManual" placeholder="Device ID">
        <button class="btn btn-success" onclick="iniciarScanner()">📷 Escanear QR Code</button>
        <div id="reader"></div>
        <div id="deviceInfo" style="margin:15px 0; font-weight:bold;"></div>
        <button class="btn btn-primary" onclick="cadastrarFuncionario()">Cadastrar</button>
    </div>

    <!-- RELATÓRIOS -->
    <div class="card">
        <h2>📋 Relatórios Contábeis</h2>
        
        <div style="display:grid; grid-template-columns:repeat(auto-fit,minmax(200px,1fr)); gap:15px; margin-bottom:20px;">
            <input type="date" id="filtroDataInicio">
            <input type="date" id="filtroDataFim">
            <select id="filtroFuncionario"></select>
            <div>
                <button class="btn btn-primary" onclick="gerarRelatorios()">Gerar Relatórios</button>
                <button class="btn btn-secondary" onclick="exportarCSV()">CSV</button>
                <button class="btn btn-secondary" onclick="exportarExcel()">Excel</button>
                <button class="btn btn-secondary" onclick="exportarPDF()">PDF</button>
            </div>
        </div>

        <!-- Abas -->
        <button onclick="mudarAba(1)" class="btn btn-primary" id="aba1">Histórico</button>
        <button onclick="mudarAba(2)" class="btn btn-secondary" id="aba2">Resumo por Funcionário</button>
        <button onclick="mudarAba(3)" class="btn btn-secondary" id="aba3">Atividade Diária</button>
        <button onclick="mudarAba(4)" class="btn btn-secondary" id="aba4">Gráfico</button>

        <div id="abaContent1" class="tab active"> <table id="tabelaHistorico"><thead><tr><th>Data/Hora</th><th>Funcionário</th><th>Tipo</th><th>Dispositivo</th></tr></thead><tbody></tbody></table> </div>
        <div id="abaContent2" class="tab"> <table id="tabelaResumoFunc"><thead><tr><th>Funcionário</th><th>Entradas</th><th>Saídas</th><th>Dias Ativos</th><th>Total</th></tr></thead><tbody></tbody></table> </div>
        <div id="abaContent3" class="tab"> <table id="tabelaDiaria"><thead><tr><th>Data</th><th>Entradas</th><th>Saídas</th><th>Total</th></tr></thead><tbody></tbody></table> </div>
        <div id="abaContent4" class="tab"> <canvas id="chartAtividade" height="130"></canvas> </div>
    </div>
</div>

<!-- Modal Edição -->
<div id="modalEditar" class="modal">
    <div class="card" style="max-width:420px;width:90%;">
        <h2>Editar Funcionário</h2>
        <input type="hidden" id="editId">
        <input type="text" id="editNome" placeholder="Nome">
        <input type="text" id="editDeviceID" placeholder="Device ID">
        <button class="btn btn-primary" onclick="salvarEdicao()">Salvar</button>
        <button class="btn btn-danger" onclick="fecharModal()">Cancelar</button>
    </div>
</div>

<script>
// ==================== SUPABASE ====================
const supabaseClient = supabase.createClient(
    'https://osofdmgokrxdzsxozsrf.supabase.co',
    'sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe'
);

let employeesData = [];
let registrosData = [];
let chartInstance = null;
let html5QrCode = null;

// ============== PONTO MANUAL ==============
async function carregarSelectFuncionarios() {
    const select = document.getElementById('manualFuncionario');
    select.innerHTML = employeesData.map(f => `<option value="${f.id}">${f.nome}</option>`).join('');
}

async function registrarPontoManual() {
    const employeeId = document.getElementById('manualFuncionario').value;
    const tipo = document.getElementById('manualTipo').value;
    const dataHoraInput = document.getElementById('manualDataHora').value;

    if (!employeeId || !dataHoraInput) return alert("Selecione funcionário e data/hora!");

    const func = employeesData.find(f => f.id === employeeId);
    const dataHora = new Date(dataHoraInput).toLocaleString('pt-BR', { 
        day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit' 
    });
    const data = new Date(dataHoraInput).toISOString().slice(0,10);

    const { error } = await supabaseClient.from('registros_ponto').insert([{
        employee_id: employeeId,
        nome: func.nome,
        data_hora: dataHora,
        tipo: tipo,
        data: data,
        dispositivo: 'Manual (Admin)',
        device_id: func.device_id
    }]);

    if (error) alert("Erro ao registrar: " + error.message);
    else {
        alert(`✅ ${tipo} registrada manualmente com sucesso!`);
        gerarRelatorios();
        atualizarDashboard();
    }
}

// ============== CADASTRO, FUNCIONÁRIOS, DASHBOARD (mantidos) ==============
async function iniciarScanner() { /* mesmo código anterior */ 
    // ... (código do scanner mantido)
}

async function cadastrarFuncionario() { /* mesmo código anterior */ }

async function carregarFuncionarios() {
    const { data } = await supabaseClient.from('employees').select('*').order('cadastrado_em', { ascending: false });
    employeesData = data || [];
    // ... (preenche tabela)
    carregarSelectFuncionarios(); // novo
    // ... resto igual
}

async function atualizarDashboard() { /* mesmo código anterior */ }

// ============== RELATÓRIOS ==============
async function gerarRelatorios() { /* mesmo código anterior */ }

// ============== EXPORTAÇÕES ==============
function exportarCSV() { /* mesmo código anterior */ }

function exportarExcel() {
    if (!registrosData.length) return alert("Não há dados para exportar.");
    
    const ws = XLSX.utils.json_to_sheet(registrosData.map(r => ({
        "Data/Hora": r.data_hora,
        "Funcionário": r.nome,
        "Tipo": r.tipo,
        "Dispositivo": r.dispositivo,
        "Device ID": r.device_id
    })));
    
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, "Registros de Ponto");
    XLSX.writeFile(wb, `relatorio_ponto_${new Date().toISOString().slice(0,10)}.xlsx`);
}

function exportarPDF() {
    if (!registrosData.length) return alert("Não há dados para exportar.");
    
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    doc.setFontSize(18);
    doc.text("Relatório de Controle de Ponto", 105, 15, { align: "center" });
    doc.setFontSize(11);
    doc.text(`Gerado em: ${new Date().toLocaleString('pt-BR')}`, 105, 25, { align: "center" });

    const tableData = registrosData.map(r => [
        r.data_hora,
        r.nome,
        r.tipo,
        r.dispositivo || '—'
    ]);

    doc.autoTable({
        head: [['Data/Hora', 'Funcionário', 'Tipo', 'Dispositivo']],
        body: tableData,
        startY: 35,
        theme: 'grid'
    });

    doc.save(`relatorio_ponto_${new Date().toISOString().slice(0,10)}.pdf`);
}

// ============== INICIALIZAÇÃO ==============
window.onload = async () => {
    await carregarFuncionarios();
    await atualizarDashboard();
    
    const hoje = new Date();
    document.getElementById('filtroDataFim').value = hoje.toISOString().slice(0,10);
    hoje.setDate(hoje.getDate() - 30);
    document.getElementById('filtroDataInicio').value = hoje.toISOString().slice(0,10);
    
    document.getElementById('manualDataHora').value = new Date().toISOString().slice(0,16);
};
</script>
</body>
</html>
