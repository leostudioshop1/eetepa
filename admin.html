<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Controle de Ponto</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1100px;
            margin: 0 auto;
        }
        h1, h2 { color: #27ae60; }
        .card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            padding: 25px;
            margin-bottom: 25px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        th { background: #27ae60; color: white; }
        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-primary { background: #27ae60; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        input, select {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            width: 100%;
            margin-bottom: 10px;
        }
        .qr {
            text-align: center;
            margin: 15px 0;
        }
        .device-id {
            font-size: 0.9em;
            color: #666;
            background: #f8f9fa;
            padding: 8px;
            border-radius: 6px;
            word-break: break-all;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🛠️ Painel Administrativo - Controle de Ponto</h1>

    <!-- Cadastro de Funcionário -->
    <div class="card">
        <h2>Cadastrar Novo Funcionário</h2>
        <input type="text" id="nomeFunc" placeholder="Nome completo do funcionário">
        <button class="btn btn-primary" onclick="cadastrarFuncionario()">Cadastrar Funcionário</button>
    </div>

    <!-- Lista de Funcionários -->
    <div class="card">
        <h2>Funcionários Cadastrados</h2>
        <table id="tabelaFuncionarios">
            <thead>
                <tr>
                    <th>Nome</th>
                    <th>ID</th>
                    <th>Device ID</th>
                    <th>QR Code</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>

    <!-- Histórico de Registros -->
    <div class="card">
        <h2>📋 Histórico de Pontos</h2>
        
        <div style="margin-bottom: 15px;">
            <input type="text" id="filtroNome" placeholder="Filtrar por nome..." onkeyup="filtrarHistorico()">
            <select id="filtroData" onchange="filtrarHistorico()">
                <option value="">Todas as datas</option>
            </select>
        </div>

        <table id="tabelaHistorico">
            <thead>
                <tr>
                    <th>Data/Hora</th>
                    <th>Funcionário</th>
                    <th>Tipo</th>
                    <th>Dispositivo</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </div>
</div>

<script>
    let employees = JSON.parse(localStorage.getItem('employees')) || [];
    let registros = JSON.parse(localStorage.getItem('registrosPonto')) || [];

    // Gerar Device Fingerprint (identificação única do dispositivo)
    function gerarDeviceID() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        ctx.textBaseline = "top";
        ctx.font = "14px Arial";
        ctx.fillText("Device Fingerprint", 2, 2);
        
        let fingerprint = canvas.toDataURL();
        fingerprint += navigator.userAgent;
        fingerprint += screen.width + screen.height + screen.colorDepth;
        
        // Hash simples
        let hash = 0;
        for (let i = 0; i < fingerprint.length; i++) {
            hash = (hash << 5) - hash + fingerprint.charCodeAt(i);
            hash = hash & hash;
        }
        return Math.abs(hash).toString(36).toUpperCase();
    }

    function cadastrarFuncionario() {
        const nome = document.getElementById('nomeFunc').value.trim();
        if (!nome) {
            alert("Digite o nome do funcionário!");
            return;
        }

        const deviceID = gerarDeviceID();

        const novoFunc = {
            id: 'func_' + Date.now().toString(36),
            nome: nome,
            deviceID: deviceID,
            cadastradoEm: new Date().toLocaleString('pt-BR')
        };

        employees.push(novoFunc);
        localStorage.setItem('employees', JSON.stringify(employees));

        alert(`Funcionário "${nome}" cadastrado com sucesso!\n\nDevice ID: ${deviceID}`);
        document.getElementById('nomeFunc').value = '';
        carregarFuncionarios();
    }

    function carregarFuncionarios() {
        const tbody = document.querySelector('#tabelaFuncionarios tbody');
        tbody.innerHTML = '';

        employees.forEach(func => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${func.nome}</td>
                <td><small>${func.id}</small></td>
                <td><small class="device-id">${func.deviceID || '—'}</small></td>
                <td class="qr">
                    <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${encodeURIComponent(window.location.origin + '/ponto.html?id=' + func.id)}" 
                       width="80" height="80" alt="QR Code">
                </td>
                <td>
                    <button class="btn btn-danger" onclick="deletarFuncionario('${func.id}')">Excluir</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function deletarFuncionario(id) {
        if (confirm("Tem certeza que deseja excluir este funcionário?")) {
            employees = employees.filter(f => f.id !== id);
            localStorage.setItem('employees', JSON.stringify(employees));
            carregarFuncionarios();
        }
    }

    function carregarHistorico() {
        const tbody = document.querySelector('#tabelaHistorico tbody');
        tbody.innerHTML = '';

        // Preencher filtro de datas
        const datas = [...new Set(registros.map(r => r.data))].sort().reverse();
        const selectData = document.getElementById('filtroData');
        selectData.innerHTML = '<option value="">Todas as datas</option>';
        datas.forEach(data => {
            const opt = document.createElement('option');
            opt.value = data;
            opt.textContent = data;
            selectData.appendChild(opt);
        });

        registros.sort((a, b) => new Date(b.dataHora.split('/').reverse().join('-')) - new Date(a.dataHora.split('/').reverse().join('-')));

        registros.forEach(reg => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${reg.dataHora}</td>
                <td>${reg.nome}</td>
                <td><strong>${reg.tipo}</strong></td>
                <td>${reg.dispositivo}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    function filtrarHistorico() {
        const filtroNome = document.getElementById('filtroNome').value.toLowerCase();
        const filtroData = document.getElementById('filtroData').value;

        const tbody = document.querySelector('#tabelaHistorico tbody');
        tbody.innerHTML = '';

        const filtrados = registros.filter(reg => {
            const matchNome = reg.nome.toLowerCase().includes(filtroNome);
            const matchData = !filtroData || reg.data === filtroData;
            return matchNome && matchData;
        });

        filtrados.forEach(reg => {
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${reg.dataHora}</td>
                <td>${reg.nome}</td>
                <td><strong>${reg.tipo}</strong></td>
                <td>${reg.dispositivo}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Inicialização
    window.onload = function() {
        carregarFuncionarios();
        carregarHistorico();
    };
</script>
</body>
</html>
