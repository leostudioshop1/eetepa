<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Controle de Ponto</title>
    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        :root { --primary: #27ae60; }
        body { font-family: Arial, sans-serif; background: #f4f6f9; margin: 0; padding: 20px; }
        .container { max-width: 1350px; margin: 0 auto; }
        h1, h2 { color: var(--primary); }
        .card { background: white; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); padding: 25px; margin-bottom: 25px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 15px; }
        .stat-card { background: #f8f9fa; padding: 20px; border-radius: 12px; text-align: center; border-left: 5px solid var(--primary); }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: var(--primary); color: white; }
        .btn { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; margin: 5px; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-secondary { background: #3498db; color: white; }
        input, select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 100%; margin-bottom: 8px; }
        #reader { max-width: 400px; margin: 15px auto; border: 2px solid var(--primary); border-radius: 12px; }
        .tab { display: none; }
        .tab.active { display: block; }
    </style>
</head>
<body>
<div class="container">
    <h1>🛠️ Admin - Controle de Ponto (Supabase)</h1>

    <!-- PONTO MANUAL -->
    <div class="card">
        <h2>✍️ Registrar Ponto Manual</h2>
        <select id="manualFuncionario"></select>
        <select id="manualTipo">
            <option value="Entrada">✅ Entrada</option>
            <option value="Saída">⏹️ Saída</option>
        </select>
        <input type="datetime-local" id="manualDataHora">
        <button class="btn btn-success" onclick="registrarPontoManual()">Registrar Ponto Manual</button>
    </div>

    <!-- RELATÓRIOS -->
    <div class="card">
        <h2>📋 Relatórios Contábeis</h2>

        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-bottom: 20px;">
            <input type="date" id="filtroDataInicio">
            <input type="date" id="filtroDataFim">
            <select id="filtroFuncionario"></select>
            <div>
                <button class="btn btn-primary" onclick="gerarRelatorios()">🔄 Gerar Relatórios</button>
            </div>
        </div>

        <div style="margin-bottom: 15px;">
            <button onclick="mudarAba(1)" class="btn btn-primary" id="aba1">Histórico Completo</button>
            <button onclick="mudarAba(2)" class="btn btn-secondary" id="aba2">Resumo por Funcionário</button>
            <button onclick="mudarAba(3)" class="btn btn-secondary" id="aba3">Atividade Diária</button>
            <button onclick="mudarAba(4)" class="btn btn-secondary" id="aba4">Gráfico</button>
        </div>

        <div id="abaContent1" class="tab active">
            <table id="tabelaHistorico"><thead><tr><th>Data/Hora</th><th>Funcionário</th><th>Tipo</th><th>Dispositivo</th></tr></thead><tbody></tbody></table>
        </div>
        <div id="abaContent2" class="tab">
            <table id="tabelaResumoFunc"><thead><tr><th>Funcionário</th><th>Entradas</th><th>Saídas</th><th>Dias Ativos</th><th>Total</th></tr></thead><tbody></tbody></table>
        </div>
        <div id="abaContent3" class="tab">
            <table id="tabelaDiaria"><thead><tr><th>Data</th><th>Entradas</th><th>Saídas</th><th>Total</th></tr></thead><tbody></tbody></table>
        </div>
        <div id="abaContent4" class="tab">
            <canvas id="chartAtividade" height="140"></canvas>
        </div>
    </div>
</div>

<script>
// ==================== SUPABASE ====================
const supabaseClient = supabase.createClient(
    'https://osofdmgokrxdzsxozsrf.supabase.co',
    'sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe'
);

let employeesData = [];
let registrosData = [];
let chartInstance = null;

// ==================== CARREGAR DADOS ====================
async function carregarDados() {
    // Carrega funcionários
    const { data: emps } = await supabaseClient.from('employees').select('*');
    employeesData = emps || [];
    
    // Atualiza select do ponto manual
    const selectManual = document.getElementById('manualFuncionario');
    selectManual.innerHTML = employeesData.map(f => `<option value="${f.id}">${f.nome}</option>`).join('');

    // Atualiza filtro de relatórios
    const selectFiltro = document.getElementById('filtroFuncionario');
    selectFiltro.innerHTML = '<option value="">Todos os funcionários</option>' + 
        employeesData.map(f => `<option value="${f.id}">${f.nome}</option>`).join('');
}

// ==================== PONTO MANUAL ====================
async function registrarPontoManual() {
    const employeeId = document.getElementById('manualFuncionario').value;
    const tipo = document.getElementById('manualTipo').value;
    const dataHoraInput = document.getElementById('manualDataHora').value;

    if (!employeeId || !dataHoraInput) return alert("Selecione funcionário e data/hora!");

    const func = employeesData.find(f => f.id === employeeId);
    const dt = new Date(dataHoraInput);
    const dataHora = dt.toLocaleString('pt-BR', {day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit'});
    const data = dt.toISOString().slice(0,10);

    const { error } = await supabaseClient.from('registros_ponto').insert([{
        employee_id: employeeId,
        nome: func.nome,
        data_hora: dataHora,
        tipo: tipo,
        data: data,
        dispositivo: 'Manual (Admin)',
        device_id: func.device_id
    }]);

    if (error) alert("Erro: " + error.message);
    else {
        alert(`✅ ${tipo} registrada com sucesso!`);
        gerarRelatorios();
    }
}

// ==================== RELATÓRIOS ====================
async function gerarRelatorios() {
    const { data } = await supabaseClient.from('registros_ponto').select('*').order('registrado_em', { ascending: false });
    registrosData = data || [];

    const dataInicio = document.getElementById('filtroDataInicio').value;
    const dataFim = document.getElementById('filtroDataFim').value;
    const funcId = document.getElementById('filtroFuncionario').value;

    let filtrados = registrosData.filter(r => {
        if (dataInicio && r.data < dataInicio) return false;
        if (dataFim && r.data > dataFim) return false;
        if (funcId && r.employee_id !== funcId) return false;
        return true;
    });

    // Aba 1 - Histórico
    document.querySelector('#tabelaHistorico tbody').innerHTML = filtrados.map(r => `
        <tr><td>${r.data_hora}</td><td>${r.nome}</td><td><strong>${r.tipo}</strong></td><td>${r.dispositivo || '—'}</td></tr>
    `).join('');

    // Aba 2 - Resumo por Funcionário
    const resumo = {};
    filtrados.forEach(r => {
        if (!resumo[r.nome]) resumo[r.nome] = {entradas:0, saidas:0, dias:new Set()};
        r.tipo === 'Entrada' ? resumo[r.nome].entradas++ : resumo[r.nome].saidas++;
        resumo[r.nome].dias.add(r.data);
    });
    document.querySelector('#tabelaResumoFunc tbody').innerHTML = Object.keys(resumo).map(nome => `
        <tr>
            <td>${nome}</td>
            <td>${resumo[nome].entradas}</td>
            <td>${resumo[nome].saidas}</td>
            <td>${resumo[nome].dias.size}</td>
            <td>${resumo[nome].entradas + resumo[nome].saidas}</td>
        </tr>
    `).join('');

    // Aba 3 - Atividade Diária
    const diaria = {};
    filtrados.forEach(r => {
        if (!diaria[r.data]) diaria[r.data] = {e:0, s:0};
        r.tipo === 'Entrada' ? diaria[r.data].e++ : diaria[r.data].s++;
    });
    document.querySelector('#tabelaDiaria tbody').innerHTML = Object.keys(diaria).sort().reverse().map(d => `
        <tr><td>${d}</td><td>${diaria[d].e}</td><td>${diaria[d].s}</td><td>${diaria[d].e + diaria[d].s}</td></tr>
    `).join('');

    // Aba 4 - Gráfico
    criarGrafico(filtrados);
}

function criarGrafico(filtrados) {
    if (chartInstance) chartInstance.destroy();
    
    const ultimos7 = {};
    const hoje = new Date();
    for (let i = 6; i >= 0; i--) {
        const d = new Date(hoje);
        d.setDate(d.getDate() - i);
        ultimos7[d.toISOString().slice(0,10)] = {e:0, s:0};
    }
    filtrados.forEach(r => {
        if (ultimos7[r.data]) r.tipo === 'Entrada' ? ultimos7[r.data].e++ : ultimos7[r.data].s++;
    });

    chartInstance = new Chart(document.getElementById('chartAtividade'), {
        type: 'bar',
        data: {
            labels: Object.keys(ultimos7).map(d => d.slice(5)),
            datasets: [
                { label: 'Entradas', data: Object.values(ultimos7).map(v => v.e), backgroundColor: '#27ae60' },
                { label: 'Saídas',   data: Object.values(ultimos7).map(v => v.s), backgroundColor: '#e74c3c' }
            ]
        },
        options: { responsive: true, scales: { y: { beginAtZero: true } } }
    });
}

// ==================== TABS ====================
function mudarAba(n) {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.getElementById(`abaContent${n}`).classList.add('active');
    document.querySelectorAll('button[id^="aba"]').forEach(b => b.classList.remove('btn-primary'));
    document.getElementById(`aba${n}`).classList.add('btn-primary');
}

// ==================== INICIALIZAÇÃO ====================
window.onload = async () => {
    await carregarDados();
    
    const hoje = new Date();
    document.getElementById('filtroDataFim').value = hoje.toISOString().slice(0,10);
    hoje.setDate(hoje.getDate() - 30);
    document.getElementById('filtroDataInicio').value = hoje.toISOString().slice(0,10);
    
    document.getElementById('manualDataHora').value = new Date().toISOString().slice(0,16);
    
    gerarRelatorios();   // Carrega os relatórios automaticamente
};
</script>
</body>
</html>
