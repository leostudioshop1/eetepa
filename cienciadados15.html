<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Cientistas de Dados Nota 10</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <style>
        :root { 
            --primary: #00ffcc; 
            --danger: #ff3366; 
            --matrix-green: #00ff41;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #000000;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #matrix-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.85;
        }

        #floating-banner {
            position: fixed;
            z-index: 10;
            background: rgba(0, 255, 65, 0.15);
            color: var(--matrix-green);
            padding: 12px 24px;
            border: 1px solid var(--matrix-green);
            box-shadow: 0 0 20px #008f11;
            font-weight: 700;
            font-size: 1rem;
            pointer-events: none;
            text-transform: uppercase;
            border-radius: 50px;
            backdrop-filter: blur(8px);
        }

        .header {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(8, 15, 32, 0.95); 
            backdrop-filter: blur(16px);
            z-index: 100; 
            padding: 16px 20px;
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            border-bottom: 3px solid var(--primary);
        }

        .logo { font-size: 1.75rem; font-weight: 900; display: flex; align-items: center; gap: 12px; }

        .progress-container { flex: 1; max-width: 520px; margin: 0 20px; }
        .progress { height: 14px; background: #112233; border-radius: 9999px; overflow: hidden; }
        .progress-bar { 
            height: 100%; 
            background: linear-gradient(90deg, var(--primary), #00ffaa); 
            width: 0%; 
            transition: width 0.8s ease; 
        }

        .score { font-size: 1.5rem; font-weight: 800; }

        .main { max-width: 960px; margin: 100px auto 60px; padding: 0 20px; position: relative; z-index: 2; }
        
        .card {
            background: rgba(255,255,255,0.08); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 204, 0.2);
            border-radius: 28px; 
            padding: 45px 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        
        .question-number { color: var(--primary); font-weight: 700; margin-bottom: 12px; }
        .question-text { font-size: 1.65rem; line-height: 1.4; margin-bottom: 35px; font-weight: 600; }
        
        .options { display: grid; gap: 16px; }
        .option {
            background: rgba(255,255,255,0.07); 
            border: 3px solid transparent;
            border-radius: 20px; 
            padding: 22px; 
            font-size: 1.25rem;
            cursor: pointer; 
            transition: all 0.3s ease;
        }
        .option:hover { transform: translateY(-8px) scale(1.03); box-shadow: 0 0 25px rgba(0,255,204,0.3); }
        .option.correct { border-color: #00ff88; background: rgba(0,255,136,0.18); animation: correctAnim 0.6s; }
        .option.wrong { border-color: var(--danger); background: rgba(255,51,102,0.18); animation: wrongAnim 0.5s; }

        @keyframes correctAnim { 0% { transform: scale(0.95); } 50% { transform: scale(1.08); } 100% { transform: scale(1); } }
        @keyframes wrongAnim { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-12px); } 75% { transform: translateX(12px); } }

        .feedback { margin-top: 30px; padding: 28px; border-radius: 20px; display: none; }
        .feedback.show { display: block; animation: fadeIn 0.5s; }
        .feedback.correct { background: rgba(0,255,136,0.12); border: 2px solid #00ff88; }
        .feedback.wrong { background: rgba(255,51,102,0.12); border: 2px solid var(--danger); }

        .next-btn, .retry-btn {
            margin-top: 30px; 
            padding: 18px 50px; 
            font-size: 1.3rem;
            font-weight: 700; 
            border: none; 
            border-radius: 9999px; 
            cursor: pointer; 
            width: 100%;
            transition: 0.3s;
        }
        .next-btn { background: linear-gradient(90deg, var(--primary), #00ccaa); color: #0a1428; }
        .retry-btn { background: var(--danger); color: white; }

        .big-score { 
            font-size: clamp(5rem, 12vw, 8rem); 
            font-weight: 900; 
            background: linear-gradient(90deg, #00ffcc, #ff00aa); 
            -webkit-background-clip: text; 
            color: transparent; 
        }

        #music-control {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 200;
            background: rgba(0,0,0,0.8);
            padding: 10px 18px;
            border-radius: 50px;
            border: 1px solid var(--primary);
            cursor: pointer;
            font-size: 0.95rem;
            user-select: none;
        }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>
    <div id="floating-banner">O ESTUDO DE HOJE</div>

    <div class="header">
        <div class="logo">📊 Cientistas de Dados Nota 10 <span style="font-size:1.25rem;">💾 Informática</span></div>
        <div class="progress-container">
            <div class="progress"><div id="progressBar" class="progress-bar"></div></div>
        </div>
        <div class="score">⭐ <span id="scoreDisplay">0</span>/20</div>
    </div>

    <div class="main" id="quizContainer"></div>

    <div id="resultsScreen" class="main" style="display:none;">
        <div class="card">
            <h1 style="text-align:center;">🎉 Parabéns, futuro Cientista de Dados!</h1>
            <div class="big-score" id="finalScore">20</div>
            <p id="finalMessage" style="text-align:center; font-size:1.7rem; margin:30px 0;"></p>
            <button onclick="restartQuiz()" class="next-btn">🔄 Refazer o Quiz</button>
        </div>
    </div>

    <!-- Controle de Música -->
    <div id="music-control" onclick="toggleMusic()">
        🎵 <span id="musicStatus">Trilha tocando</span>
    </div>

    <!-- Sons do Jogo -->
    <audio id="correctSound" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/2965/2965.wav" type="audio/wav">
    </audio>
    <audio id="wrongSound" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/2952/2952.wav" type="audio/wav">
    </audio>

    <!-- Trilha Sonora de Fundo -->
    <audio id="backgroundMusic" loop preload="auto">
        <source src="https://assets.mixkit.co/music/preview/296/296.wav" type="audio/wav">
    </audio>

    <script>
        // Matrix Background
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() {
            canvas.height = window.innerHeight;
            canvas.width = window.innerWidth;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZアァカサタナハマヤャラワ";
        const fontSize = 16;
        let drops = Array(Math.floor(canvas.width / fontSize)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.07)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff41';
            ctx.font = fontSize + 'px monospace';
            for(let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);

        // Banner flutuante
        const banner = document.getElementById('floating-banner');
        const frases = ["O estudo de hoje", "É a vitória de amanhã", "Quanto mais você estuda, mais sorte você tem"];
        let posX = 100, posY = 120, velX = 1.3, velY = 1.1;

        function moveBanner() {
            posX += velX; posY += velY;
            if (posX <= 0 || posX + banner.offsetWidth >= window.innerWidth) velX *= -1;
            if (posY <= 0 || posY + banner.offsetHeight >= window.innerHeight) velY *= -1;
            banner.style.transform = `translate(${posX}px, ${posY}px)`;
            requestAnimationFrame(moveBanner);
        }
        moveBanner();

        // ====================== PERGUNTAS ======================
        const questions = [
            { id: 1, type: "mcq", question: "Você vai montar um computador para editar vídeos. Quer algo rápido, silencioso, que não quebre fácil e gaste pouca energia. Qual é a melhor opção de armazenamento?", options: [{ text: "HD antigo (com disco que gira)", value: "A" }, { text: "SSD SATA", value: "B" }, { text: "Pendrive simples", value: "C" }, { text: "Disquete", value: "D" }, { text: "Qualquer HD", value: "E" }], correct: "B", explanation: "O SSD é rápido, não faz barulho, não tem partes que se mexem e gasta menos energia." },
            { id: 2, type: "mcq", question: "Um notebook tem duas opções: 1 TB girando a 5400 RPM ou 512 GB bem mais rápido. O de 512 GB provavelmente é:", options: [{ text: "HD tradicional", value: "A" }, { text: "Pendrive", value: "B" }, { text: "HD antigo", value: "C" }, { text: "SSD", value: "D" }, { text: "Fita magnética", value: "E" }], correct: "D", explanation: "O SSD é muito mais rápido que o HD porque não tem peças mecânicas girando." },
            { id: 3, type: "mcq", question: "Como o computador organiza pastas, arquivos e permissões no disco chamamos de:", options: [{ text: "Sistema de arquivos", value: "A" }, { text: "Big Data", value: "B" }, { text: "Velocidade da internet", value: "C" }, { text: "Programa de navegação", value: "D" }, { text: "Memória RAM", value: "E" }], correct: "A", explanation: "Exemplos: NTFS, exFAT. É como o 'índice' que ajuda a encontrar os arquivos facilmente." },
            { id: 4, type: "mcq", question: "Um arquivo de 4,7 GB tem quantos MB? (1 GB = 1024 MB)", options: [{ text: "4.000 MB", value: "A" }, { text: "4.812 MB", value: "B" }, { text: "1.024 MB", value: "C" }, { text: "480 MB", value: "D" }, { text: "4 MB", value: "E" }], correct: "B", explanation: "4,7 × 1024 = 4.812 MB." },
            { id: 5, type: "mcq", question: "Um HD de 2 TB formatado tem aproximadamente quantos MB?", options: [{ text: "300 MB", value: "A" }, { text: "48.000 MB", value: "B" }, { text: "2.097.152 MB", value: "C" }, { text: "224 milhões de MB", value: "D" }, { text: "9.024 MB", value: "E" }], correct: "C", explanation: "2 × 1024 × 1024 = 2.097.152 MB." },
            { id: 6, type: "mcq", question: "Qual é a menor unidade de informação que o computador entende (0 ou 1)?", options: [{ text: "Byte", value: "A" }, { text: "Megabyte", value: "B" }, { text: "Bit", value: "C" }, { text: "Gigabyte", value: "D" }, { text: "Terabyte", value: "E" }], correct: "C", explanation: "O bit é a menor unidade. 8 bits formam 1 byte." },
            { id: 7, type: "mcq", question: "Quando temos milhões de informações que não cabem em planilhas comuns, chamamos de:", options: [{ text: "Sistema de arquivos", value: "A" }, { text: "Big Data", value: "B" }, { text: "SSD pequeno", value: "C" }, { text: "Bit", value: "D" }, { text: "HD para backup", value: "E" }], correct: "B", explanation: "Big Data é um monte enorme de dados que precisam de ferramentas especiais." },
            { id: 8, type: "mcq", question: "Um HD externo antigo usa um cabo largo com 40 pinos. Qual é essa conexão antiga?", options: [{ text: "SATA", value: "A" }, { text: "ATA ou IDE", value: "B" }, { text: "USB 3.0", value: "C" }, { text: "PCIe", value: "D" }, { text: "HDMI", value: "E" }], correct: "B", explanation: "ATA/IDE é a conexão antiga com cabo largo." },
            { id: 9, type: "mcq", question: "Qual é a principal vantagem do SSD em relação ao HD tradicional?", options: [{ text: "É mais barato", value: "A" }, { text: "É muito mais rápido e silencioso", value: "B" }, { text: "Tem mais capacidade sempre", value: "C" }, { text: "Precisa de mais energia", value: "D" }, { text: "É mais pesado", value: "E" }], correct: "B", explanation: "O SSD não tem peças girando, por isso é rápido, silencioso e resistente." },
            { id: 10, type: "mcq", question: "O que significa a sigla HD?", options: [{ text: "High Definition", value: "A" }, { text: "Hard Disk (Disco Rígido)", value: "B" }, { text: "High Data", value: "C" }, { text: "Hard Drive antigo", value: "D" }, { text: "Hyper Disk", value: "E" }], correct: "B", explanation: "HD = Hard Disk." },
            { id: 11, type: "mcq", question: "Qual unidade de medida é a menor?", options: [{ text: "Byte", value: "A" }, { text: "Kilobyte", value: "B" }, { text: "Bit", value: "C" }, { text: "Megabyte", value: "D" }, { text: "Gigabyte", value: "E" }], correct: "C", explanation: "Bit é a menor unidade." },
            { id: 12, type: "mcq", question: "Quantos bytes tem 1 Kilobyte (KB)?", options: [{ text: "100 bytes", value: "A" }, { text: "1.000 bytes", value: "B" }, { text: "1.024 bytes", value: "C" }, { text: "1.048.576 bytes", value: "D" }, { text: "8 bytes", value: "E" }], correct: "C", explanation: "1 KB = 1.024 bytes." },
            { id: 13, type: "mcq", question: "Um arquivo de música de 5 MB é aproximadamente:", options: [{ text: "5 milhões de bytes", value: "A" }, { text: "5 mil bytes", value: "B" }, { text: "5 bilhões de bytes", value: "C" }, { text: "5 bits", value: "D" }, { text: "500 bytes", value: "E" }], correct: "A", explanation: "1 MB ≈ 1 milhão de bytes." },
            { id: 14, type: "mcq", question: "Para guardar fotos, vídeos e documentos do dia a dia de uma família, qual armazenamento é mais usado hoje?", options: [{ text: "Disquete", value: "A" }, { text: "SSD ou HD interno", value: "B" }, { text: "Fita cassete", value: "C" }, { text: "Papel impresso", value: "D" }, { text: "Pendrive de 128 KB", value: "E" }], correct: "B", explanation: "Hoje usamos HD ou SSD interno." },
            { id: 15, type: "mcq", question: "O que é Big Data de forma simples?", options: [{ text: "Um computador muito grande", value: "A" }, { text: "Uma quantidade enorme de dados que precisamos analisar", value: "B" }, { text: "Um tipo de HD", value: "C" }, { text: "Um jogo online", value: "D" }, { text: "Um cabo de internet", value: "E" }], correct: "B", explanation: "Big Data são grandes volumes de dados para análise." },
            { id: 16, type: "mcq", question: "Qual é a ordem correta das unidades do menor para o maior?", options: [{ text: "Bit → Byte → KB → MB → GB → TB", value: "A" }, { text: "TB → GB → MB → KB → Byte → Bit", value: "B" }, { text: "Byte → Bit → MB → GB", value: "C" }, { text: "MB → KB → GB → TB", value: "D" }, { text: "Bit → MB → Byte → TB", value: "E" }], correct: "A", explanation: "Bit (menor) → Byte → KB → MB → GB → TB." },
            { id: 17, type: "open", question: "Cite pelo menos 2 vantagens do SSD em comparação com o HD tradicional.", model: "1) Muito mais rápido\n2) Não faz barulho e aguenta quedas melhor\n3) Gasta menos bateria" },
            { id: 18, type: "open", question: "Explique com suas palavras o que é um 'bit' e o que é um 'byte'.", model: "Bit é a menor unidade (0 ou 1). Byte é formado por 8 bits." },
            { id: 19, type: "mcq", question: "Um pendrive de 64 GB consegue armazenar aproximadamente quantos filmes de 4 GB cada?", options: [{ text: "Cerca de 16 filmes", value: "A" }, { text: "Cerca de 4 filmes", value: "B" }, { text: "Mais de 100 filmes", value: "C" }, { text: "Apenas 1 filme", value: "D" }, { text: "64 filmes", value: "E" }], correct: "A", explanation: "64 ÷ 4 = 16 filmes." },
            { id: 20, type: "open", question: "Cite 3 exemplos de coisas que ocupam pouco espaço (KB ou MB) e 1 exemplo que ocupa muito espaço (GB ou TB).", model: "Pouco espaço: foto pequena, texto simples, música curta.\nMuito espaço: filme em alta qualidade, jogo grande." }
        ];

        let currentQuestion = 0;
        let score = 0;

        const correctSound = document.getElementById('correctSound');
        const wrongSound = document.getElementById('wrongSound');
        const bgMusic = document.getElementById('backgroundMusic');

        function playCorrect() {
            correctSound.currentTime = 0;
            correctSound.play();
        }
        function playWrong() {
            wrongSound.currentTime = 0;
            wrongSound.play();
        }

        function toggleMusic() {
            if (bgMusic.paused) {
                bgMusic.play();
                document.getElementById('musicStatus').textContent = "Trilha tocando";
            } else {
                bgMusic.pause();
                document.getElementById('musicStatus').textContent = "Trilha pausada";
            }
        }

        function renderQuestion() {
            const q = questions[currentQuestion];
            let html = `
                <div class="card">
                    <div class="question-number">Questão ${currentQuestion + 1} de 20</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options">`;

            if (q.type === "mcq") {
                q.options.forEach((opt, i) => {
                    html += `<div class="option" onclick="selectAnswer('${opt.value}')"><strong>${String.fromCharCode(65 + i)})</strong> ${opt.text}</div>`;
                });
            } else {
                html += `
                    <textarea id="openAnswer" rows="6" style="width:100%; background:rgba(255,255,255,0.1); border:2px solid #00ffcc; border-radius:16px; padding:18px; color:white; font-size:1.1rem;" placeholder="Digite sua resposta aqui..."></textarea>
                    <button onclick="saveOpenAnswer()" class="next-btn">✅ Confirmar Resposta</button>`;
            }

            html += `
                </div>
                <div id="feedbackArea" class="feedback"></div>
                <button id="retryBtn" class="retry-btn" style="display:none;" onclick="retryQuestion()">🔄 Tentar Novamente</button>
                <button id="nextBtn" class="next-btn" style="display:none;" onclick="nextQuestion()">Próxima Questão →</button>
            </div>`;

            document.getElementById('quizContainer').innerHTML = html;
            updateProgress();
        }

        function selectAnswer(selected) {
            const q = questions[currentQuestion];
            const isCorrect = selected === q.correct;

            const options = document.querySelectorAll('.option');
            options.forEach(opt => {
                opt.style.pointerEvents = 'none';
                if (opt.textContent.includes(selected)) opt.classList.add(isCorrect ? 'correct' : 'wrong');
                if (opt.textContent.includes(q.correct)) opt.classList.add('correct');
            });

            const feedback = document.getElementById('feedbackArea');
            const nextBtn = document.getElementById('nextBtn');
            const retryBtn = document.getElementById('retryBtn');

            if (isCorrect) {
                score++;
                document.getElementById('scoreDisplay').textContent = score;
                feedback.innerHTML = `<strong style="color:#00ff88; font-size:1.4rem;">🎉 Perfeito! Você acertou!</strong><br><br>${q.explanation}`;
                feedback.classList.add('show', 'correct');
                playCorrect();
                confetti({ particleCount: 250, spread: 80, origin: { y: 0.6 } });
                nextBtn.style.display = 'block';
            } else {
                feedback.innerHTML = `<strong style="color:#ff3366; font-size:1.4rem;">😢 Que pena... Vamos aprender com o erro!</strong><br><br><strong>Explicação:</strong><br>${q.explanation}`;
                feedback.classList.add('show', 'wrong');
                playWrong();
                retryBtn.style.display = 'block';
            }
        }

        function saveOpenAnswer() {
            alert("✅ Resposta salva! Compare com o modelo na aula.");
            nextQuestion();
        }

        function nextQuestion() {
            currentQuestion++;
            if (currentQuestion < questions.length) {
                renderQuestion();
            } else {
                showResults();
            }
        }

        function updateProgress() {
            const percent = Math.round(((currentQuestion) / questions.length) * 100);
            document.getElementById('progressBar').style.width = percent + '%';
        }

        function showResults() {
            document.getElementById('quizContainer').style.display = 'none';
            document.getElementById('resultsScreen').style.display = 'block';
            document.getElementById('finalScore').textContent = score + "/20";
            
            let message = score >= 18 ? "Você é incrível! Nota 10 de verdade!" :
                         score >= 14 ? "Parabéns! Você foi muito bem. Continue assim!" :
                         "Continue praticando! Refaça o quiz para melhorar sua nota.";
            document.getElementById('finalMessage').innerHTML = message;
        }

        function retryQuestion() {
            renderQuestion();
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            document.getElementById('quizContainer').style.display = 'block';
            document.getElementById('resultsScreen').style.display = 'none';
            renderQuestion();
        }

        // Iniciar
        window.onload = () => {
            bgMusic.volume = 0.28;
            bgMusic.play().catch(() => {});
            renderQuestion();
        };
    </script>
</body>
</html>
