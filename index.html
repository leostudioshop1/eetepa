<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Typing Master - EETEPA Xinguara</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
:root { --danger:#ff4757; --success:#2ed573; --bg:#1e272e; --primary:#3498db; }

body{
background:var(--bg);
color:white;
font-family:'Segoe UI';
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

#game-container{
position:relative;
width:520px;
height:500px;
background:#2c3e50;
border:5px solid #57606f;
border-radius:15px;
overflow:hidden;
}

.word-block{
position:absolute;
padding:8px 15px;
background:var(--primary);
border-radius:8px;
font-weight:bold;
}

#ground{
position:absolute;
bottom:0;
width:100%;
height:12px;
background:var(--danger);
}

#ui-overlay{
position:absolute;
inset:0;
background:rgba(0,0,0,0.95);
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

.stats-bar{
margin-bottom:10px;
font-size:1.2rem;
color:#f1c40f;
font-weight:bold;
}

input,select{
padding:10px;
border:none;
border-radius:8px;
width:260px;
margin:5px 0;
text-align:center;
}

button{
padding:10px 25px;
background:var(--success);
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

.ranking-box{
width:98%;
max-height:160px;
overflow-y:auto;
margin-top:10px;
background:rgba(255,255,255,0.05);
border-radius:8px;
font-size:0.75rem;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:6px;
border-bottom:1px solid rgba(255,255,255,0.1);
text-align:center;
}

.highlight{
color:#f1c40f;
font-weight:bold;
}
</style>
</head>

<body>

<div class="stats-bar">🏆 Pontos: <span id="score-board">0</span></div>

<div id="game-container">

<div id="ground"></div>

<div id="ui-overlay">

<h2>⌨️ LEOMASTER TYPING</h2>

<div id="menu-start">
<input type="text" id="player-name" placeholder="Nome do Aluno">
<input type="text" id="player-course" placeholder="Curso do Aluno">

<select id="level-select">
<option value="easy">Iniciante</option>
<option value="medium">Intermediário</option>
<option value="hard">Avançado</option>
</select>

<button onclick="prepareStart()">INICIAR</button>
</div>

<div class="ranking-box">
<strong>TOP 50 RANKING - EETEPA</strong>

<table>
<thead>
<tr>
<th>Pos</th>
<th>Aluno</th>
<th>Curso</th>
<th>Nível</th>
<th>Pontos</th>
</tr>
</thead>

<tbody id="ranking-body"></tbody>

</table>
</div>

</div>
</div>

<input id="typer" placeholder="Digite aqui..." disabled>

<script>

////////////////////////////////////////////////////
//// CONFIGURAÇÃO SUPABASE
////////////////////////////////////////////////////

const SB_URL = "https://osofdmgokrxdzsxozsrf.supabase.co";
const SB_KEY = "sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe";

const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

////////////////////////////////////////////////////
//// VARIÁVEIS DO JOGO
////////////////////////////////////////////////////

const wordLibrary={
easy:['casa','bola','sol','lua','pato','dado','rio'],
medium:['codigo','mouse','digital','logica','ensino'],
hard:['algoritmo','programacao','computador','sistemas']
};

let score=0;
let activeWords=[];
let gameRunning=false;
let fallSpeed=0.2;
let spawnTimer;
let pointsPerWord=10;

const input=document.getElementById("typer");
const scoreBoard=document.getElementById("score-board");
const rankingBody=document.getElementById("ranking-body");

////////////////////////////////////////////////////
//// INICIAR JOGO
////////////////////////////////////////////////////

function prepareStart(){

const name=document.getElementById("player-name").value.trim();
const course=document.getElementById("player-course").value.trim();

if(!name||!course){
alert("Preencha Nome e Curso");
return;
}

startGame();

}

function startGame(){

const level=document.getElementById("level-select").value;

if(level==="easy"){fallSpeed=0.15;pointsPerWord=10;}
if(level==="medium"){fallSpeed=0.3;pointsPerWord=20;}
if(level==="hard"){fallSpeed=0.5;pointsPerWord=30;}

score=0;
scoreBoard.innerText=score;
activeWords=[];
gameRunning=true;

document.getElementById("ui-overlay").style.display="none";

input.disabled=false;
input.value="";
input.focus();

spawnWord();
requestAnimationFrame(update);

}

////////////////////////////////////////////////////
//// SPAWN PALAVRAS
////////////////////////////////////////////////////

function spawnWord(){

if(!gameRunning)return;

const level=document.getElementById("level-select").value;
const list=wordLibrary[level];

const word=list[Math.floor(Math.random()*list.length)];

const div=document.createElement("div");
div.className="word-block";
div.innerText=word;
div.style.top="0px";
div.style.left=Math.random()*350+"px";

document.getElementById("game-container").appendChild(div);

activeWords.push({
element:div,
text:word,
top:0
});

spawnTimer=setTimeout(spawnWord,3000);

}

////////////////////////////////////////////////////
//// UPDATE JOGO
////////////////////////////////////////////////////

function update(){

if(!gameRunning)return;

for(let i=activeWords.length-1;i>=0;i--){

let w=activeWords[i];

w.top+=fallSpeed;
w.element.style.top=w.top+"px";

if(w.top+35>=490){
gameOver();
return;
}

}

requestAnimationFrame(update);

}

////////////////////////////////////////////////////
//// DIGITAÇÃO
////////////////////////////////////////////////////

input.addEventListener("keydown",e=>{

if(e.key==="Enter"){

const val=input.value.toLowerCase().trim();

const idx=activeWords.findIndex(w=>w.text===val);

if(idx!==-1){

activeWords[idx].element.remove();
activeWords.splice(idx,1);

score+=pointsPerWord;

scoreBoard.innerText=score;

}

input.value="";

}

});

////////////////////////////////////////////////////
//// GAME OVER
////////////////////////////////////////////////////

async function gameOver(){

gameRunning=false;
clearTimeout(spawnTimer);

const name=document.getElementById("player-name").value;
const course=document.getElementById("player-course").value;
const level=document.getElementById("level-select").value;

await saveScore(name,course,level,score);

activeWords.forEach(w=>w.element.remove());

document.getElementById("ui-overlay").style.display="flex";

updateRankingUI();

input.disabled=true;

}

////////////////////////////////////////////////////
//// SALVAR NO BANCO
////////////////////////////////////////////////////

async function saveScore(name,course,level,pts){

await supabaseClient
.from("ranking")
.insert([
{
name:name,
course:course,
level:level,
pts:pts
}
]);

}

////////////////////////////////////////////////////
//// BUSCAR RANKING
////////////////////////////////////////////////////

async function updateRankingUI(){

const {data}=await supabaseClient
.from("ranking")
.select("*")
.order("pts",{ascending:false})
.limit(50);

rankingBody.innerHTML=data.map((i,idx)=>`
<tr>
<td>${idx+1}</td>
<td>${i.name}</td>
<td>${i.course}</td>
<td>${i.level}</td>
<td class="highlight">${i.pts}</td>
</tr>
`).join("");

}

////////////////////////////////////////////////////
//// ATUALIZA RANKING EM TEMPO REAL
////////////////////////////////////////////////////

setInterval(updateRankingUI,3000);

updateRankingUI();

</script>

</body>
</html>
