<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Votação</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body{ background:#0f0f0f; color:#fff; font-family:Arial; display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; margin:0; }
        .container{ background:#1c1c1c; padding:30px; border-radius:12px; width:380px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        input, select, button{ width:100%; padding:12px; margin:10px 0; border:none; border-radius:6px; box-sizing: border-box; }
        input, select{ background:#2b2b2b; color:#fff; }
        button{ background:#7c3aed; color:#fff; cursor:pointer; font-weight:bold; }
        button:disabled{ background:#444; cursor:not-allowed; }
        footer{ margin-top:20px; font-size:12px; color:#888; }
    </style>
</head>
<body>

<div class="container">
    <h2>Votação</h2>
    <input type="text" id="nome" placeholder="Seu nome completo">
    <input type="text" id="turma" placeholder="Sua turma (ex: 3º A)">
    <select id="professor">
        <option value="">Carregando professores...</option>
    </select>
    <button id="btnVotar" onclick="votar()">Votar</button>
    <p style="font-size:13px;color:#ccc;">Cada aluno só poderá votar uma única vez por dispositivo.</p>
</div>

<footer>Desenvolvido por Léo Cruz</footer>

<script>
    const _supabase = supabase.createClient('https://hjvlgklyhzvpfyxhpjdb.supabase.co', 'sb_publishable_AtYA70tt9Nh03Gz-RR6c1w_J2PHVdJv');

    document.addEventListener("DOMContentLoaded", carregarProfessores);

    async function carregarProfessores() {
        const { data, error } = await _supabase.from('professores').select('nome').order('nome', { ascending: true });
        let select = document.getElementById("professor");
        select.innerHTML = '<option value="">Escolha o professor</option>';
        
        if (data) {
            data.forEach(p => {
                let opt = document.createElement("option");
                opt.value = p.nome;
                opt.textContent = p.nome;
                select.appendChild(opt);
            });
        }
    }

    async function votar() {
        if(localStorage.getItem("jaVotou")) {
            alert("Você já votou neste dispositivo!");
            return;
        }

        const nome = document.getElementById("nome").value.trim();
        const turma = document.getElementById("turma").value.trim();
        const professor = document.getElementById("professor").value;
        const btn = document.getElementById("btnVotar");

        if(!nome || !turma || !professor) {
            alert("Por favor, preencha todos os campos!");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Enviando...";

        const { error } = await _supabase
            .from('votos')
            .insert([{ aluno_nome: nome, turma: turma, professor_nome: professor }]);

        if (error) {
            alert("Erro ao votar: " + error.message);
            btn.disabled = false;
            btn.innerText = "Votar";
        } else {
            localStorage.setItem("jaVotou", "true");
            alert("Voto registrado com sucesso!");
            location.reload();
        }
    }
</script>
</body>
</html>
