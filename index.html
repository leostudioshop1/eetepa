<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Escola Pedro Ribeiro Mota - Eleição da Tutoria</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body{ background:#0f0f0f; color:#fff; font-family:Arial; display:flex; flex-direction:column; justify-content:center; align-items:center; min-height:100vh; margin:0; padding: 20px; }
        .container{ background:#1c1c1c; padding:30px; border-radius:12px; width:100%; max-width:400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); text-align: center; }
        h1{ font-size: 22px; color: #7c3aed; margin-bottom: 5px; }
        h2{ font-size: 18px; margin-bottom: 20px; color: #ccc; }
        input, select, button{ width:100%; padding:12px; margin:10px 0; border:none; border-radius:6px; box-sizing: border-box; font-size: 16px; }
        input, select{ background:#2b2b2b; color:#fff; border: 1px solid #444; }
        button{ background:#7c3aed; color:#fff; cursor:pointer; font-weight:bold; transition: 0.3s; }
        button:hover{ background: #6d28d9; }
        button:disabled{ background:#444; cursor:not-allowed; }
        footer{ margin-top:20px; font-size:12px; color:#888; }
    </style>
</head>
<body>

<div class="container">
    <h1>Escola Pedro Ribeiro Mota</h1>
    <h2>Eleição da Tutoria</h2>
    
    <input type="text" id="nome" placeholder="Seu nome completo">
    <input type="text" id="turma" placeholder="Sua turma (ex: 3º A)">
    
    <select id="professor">
        <option value="">Carregando professores e vagas...</option>
    </select>
    
    <button id="btnVotar" onclick="votar()">Confirmar Voto</button>
    <p style="font-size:13px;color:#888; margin-top: 15px;">Atenção: Limite de 14 alunos por tutor. Voto único por dispositivo.</p>
</div>

<footer>Desenvolvido por Léo Cruz</footer>

<script>
    const _supabase = supabase.createClient('https://hjvlgklyhzvpfyxhpjdb.supabase.co', 'sb_publishable_AtYA70tt9Nh03Gz-RR6c1w_J2PHVdJv');

    document.addEventListener("DOMContentLoaded", carregarProfessoresComVagas);

    async function carregarProfessoresComVagas() {
        // Busca professores e contagem de votos simultaneamente
        const { data: profs } = await _supabase.from('professores').select('nome').order('nome');
        const { data: votos } = await _supabase.from('votos').select('professor_nome');

        const contagem = {};
        if (votos) {
            votos.forEach(v => {
                contagem[v.professor_nome] = (contagem[v.professor_nome] || 0) + 1;
            });
        }

        let select = document.getElementById("professor");
        select.innerHTML = '<option value="">Escolha seu Tutor</option>';
        
        if (profs) {
            profs.forEach(p => {
                const totalVotos = contagem[p.nome] || 0;
                const vagasRestantes = 14 - totalVotos;
                let opt = document.createElement("option");
                
                opt.value = p.nome;
                if (vagasRestantes <= 0) {
                    opt.textContent = `${p.nome} (ESGOTADO)`;
                    opt.disabled = true;
                    opt.style.color = "#ff4444";
                } else {
                    opt.textContent = `${p.nome} (${vagasRestantes} vagas restantes)`;
                }
                select.appendChild(opt);
            });
        }
    }

    async function votar() {
        if(localStorage.getItem("jaVotou")) {
            alert("Você já votou neste dispositivo!");
            return;
        }

        const nome = document.getElementById("nome").value.trim();
        const turma = document.getElementById("turma").value.trim();
        const professor = document.getElementById("professor").value;
        const btn = document.getElementById("btnVotar");

        if(!nome || !turma || !professor) {
            alert("Por favor, preencha todos os campos!");
            return;
        }

        btn.disabled = true;
        btn.innerText = "Processando...";

        // Verificação de última hora se ainda há vaga
        const { count } = await _supabase
            .from('votos')
            .select('*', { count: 'exact', head: true })
            .eq('professor_nome', professor);

        if (count >= 14) {
            alert("Desculpe, as vagas para este professor acabaram de esgotar! Escolha outro.");
            carregarProfessoresComVagas();
            btn.disabled = false;
            btn.innerText = "Confirmar Voto";
            return;
        }

        const { error } = await _supabase
            .from('votos')
            .insert([{ aluno_nome: nome, turma: turma, professor_nome: professor }]);

        if (error) {
            alert("Erro ao votar: " + error.message);
            btn.disabled = false;
            btn.innerText = "Confirmar Voto";
        } else {
            localStorage.setItem("jaVotou", "true");
            alert("Voto registrado com sucesso!");
            location.reload();
        }
    }
</script>
</body>
</html>
