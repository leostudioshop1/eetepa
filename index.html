<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevQuest Elite - Real Time</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>
:root{
--bg:#050508;
--card:#111118;
--primary:#8b5cf6;
--secondary:#06b6d4;
--text:#e2e8f0;
}

*{ box-sizing:border-box; margin:0; padding:0; }

body{
background:var(--bg);
color:var(--text);
font-family:'Roboto',sans-serif;
display:flex;
min-height:100vh;
}

#sidebar{
width:300px;
background:#0a0a0f;
border-right:2px solid var(--primary);
padding:20px;
display:flex;
flex-direction:column;
}

#sidebar h2{
font-family:'Orbitron';
color:var(--secondary);
text-align:center;
margin-bottom:20px;
font-size: 1.2rem;
}

.rank-box{
background:rgba(139,92,246,0.1);
padding:10px;
margin-bottom:8px;
border-radius:5px;
display:flex;
justify-content:space-between;
font-family:'Orbitron';
font-size:12px;
border-left:3px solid var(--primary);
transition: all 0.3s ease;
}

.rank-me {
border-left: 3px solid var(--secondary);
background: rgba(6, 182, 212, 0.2);
color: var(--secondary);
box-shadow: 0 0 10px rgba(6, 182, 212, 0.3);
}

#reset-btn{
margin-top:auto;
padding:12px;
background:#ff0044;
border:none;
color:white;
cursor:pointer;
font-family:Orbitron;
border-radius: 5px;
font-size: 0.7rem;
transition: 0.3s;
}

#reset-btn:hover { background: #cc0033; }

#main-content{
flex-grow:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
}

.quiz-card{
width:100%;
max-width:650px;
background:var(--card);
padding:40px;
border-radius:15px;
box-shadow:0 0 50px rgba(0,0,0,0.8);
border: 1px solid #222;
}

h1{
font-family:'Orbitron';
text-align:center;
margin-bottom:20px;
color:var(--primary);
}

input{
width:100%;
padding:15px;
background:black;
border:1px solid var(--primary);
color:white;
margin-bottom:20px;
text-align:center;
font-family:Orbitron;
outline: none;
}

.btn-start{
width:100%;
padding:15px;
background:var(--primary);
border:none;
color:white;
cursor:pointer;
font-family:Orbitron;
transition: 0.3s;
}

.btn-start:hover { background: var(--secondary); }

.option-btn{
width:100%;
padding:14px;
margin-bottom:10px;
background:#1a1a24;
border:1px solid #333;
color:white;
cursor:pointer;
border-radius:6px;
transition: 0.2s;
text-align: left;
}

.option-btn:hover{
background:#252535;
border-color: var(--secondary);
}

#game-area,#finish-area{ display:none; }

.progress-bar{ height:4px; background:#222; margin-top:20px; }
#inner-progress{ height:100%; background:linear-gradient(90deg,var(--primary),var(--secondary)); width:0%; transition: 0.4s; }

footer{
margin-top:20px;
font-size:11px;
opacity:0.6;
font-family:Orbitron;
text-align:center;
letter-spacing: 1px;
}
</style>
</head>

<body>

<aside id="sidebar">
    <h2>GLOBAL RANKING</h2>
    <div id="ranking-list"></div>
    <button id="reset-btn" onclick="resetRanking()">ZERAR BANCO DE DADOS</button>
</aside>

<main id="main-content">
    <div class="quiz-card">
        <div id="start-area">
            <h1>SISTEMA LOGIN</h1>
            <input type="text" id="username" placeholder="CODINOME DE ACESSO">
            <button class="btn-start" onclick="startQuiz()">INICIAR SEQUÊNCIA</button>
        </div>

        <div id="game-area">
            <h3 id="question-text" style="margin-bottom: 20px; min-height: 50px;"></h3>
            <div id="options-container"></div>
            <div class="progress-bar"><div id="inner-progress"></div></div>
            <p id="counter" style="margin-top:10px; font-size:11px; font-family:Orbitron; opacity:0.7;"></p>
        </div>

        <div id="finish-area" style="text-align: center;">
            <h1 style="color: var(--secondary);">MISSÃO CONCLUÍDA</h1>
            <p id="final-result" style="font-size:40px; margin: 20px 0; font-family:Orbitron;"></p>
            <p style="opacity: 0.5; font-size: 12px;">PONTUAÇÃO SINCRONIZADA COM O BANCO.</p>
        </div>
    </div>

    <footer>
        Desenvolvido por = Léo Cruz - Engenheiro de Software
    </footer>
</main>

<script>
 const _supabase = supabase.createClient('https://osofdmgokrxdzsxozsrf.supabase.co', 'sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe');
        const supabase = supabase.createClient(SB_URL, SB_KEY);


let currentUser="";
let score=0;
let currentIdx=0;

// Base de 60 questões geradas dinamicamente
const baseQuestions=[
    {q:"2 + 2 = ?",a:["3","4","5","22"],c:1},
    {q:"False significa?",a:["Verdadeiro","Falso","Erro","Talvez"],c:1},
    {q:"Criar pasta no Linux?",a:["rm","mkdir","cd","ls"],c:1},
    {q:"Operador de atribuição?",a:["=","==","===","!="],c:0},
    {q:"Arquivo texto?",a:[".jpg",".txt",".mp3",".exe"],c:1},
    {q:"Onde salvamos arquivos?",a:["CPU","RAM","HD/SSD","Monitor"],c:2},
    {q:"Símbolo maior que?",a:[">","<","=","!"],c:0},
    {q:"Operador lógico E?",a:["||","&&","!","="],c:1},
    {q:"rm no linux?",a:["remove","cria","move","lista"],c:0},
    {q:"Lixeira serve para?",a:["salvar","apagar","ver","baixar"],c:1}
];

const questions=[];
for(let i=0; i<60; i++){
    let base = baseQuestions[i % baseQuestions.length];
    questions.push({
        q: `[LEVEL ${i+1}] ${base.q}`,
        options: base.a,
        correct: base.c
    });
}

async function startQuiz(){
    let name=document.getElementById("username").value;
    if(name.trim().length < 2){
        alert("Codinome inválido.");
        return;
    }
    currentUser=name.toUpperCase();

    document.getElementById("start-area").style.display="none";
    document.getElementById("game-area").style.display="block";

    renderQuestion();
    fetchRanking();
    setInterval(fetchRanking, 1500); // Placar global atualiza a cada 1.5s
}

function renderQuestion(){
    let q=questions[currentIdx];
    document.getElementById("question-text").innerText=q.q;
    document.getElementById("counter").innerText=`STATUS: ${currentIdx+1} / 60`;
    let container=document.getElementById("options-container");
    container.innerHTML="";

    q.options.forEach((opt,i)=>{
        let btn=document.createElement("button");
        btn.className="option-btn";
        btn.innerText=opt;
        btn.onclick=()=>handleAnswer(i);
        container.appendChild(btn);
    });

    document.getElementById("inner-progress").style.width=(currentIdx/questions.length*100)+"%";
}

async function handleAnswer(choice){
    if(choice===questions[currentIdx].correct){
        score+=100;
    }
    currentIdx++;

    // SINCRONIZAÇÃO EM TEMPO REAL
    await updateLiveScore();

    if(currentIdx < questions.length){
        renderQuestion();
    } else {
        finishQuiz();
    }
}

async function updateLiveScore(){
    // Upsert garante que se o usuário já existe ele atualiza, se não ele cria
    const { error } = await supabaseClient
        .from("ranking")
        .upsert([{ name: currentUser, score: score }], { onConflict: 'name' });
    
    if(!error) fetchRanking(); // Atualiza o visual na hora
}

async function finishQuiz(){
    document.getElementById("game-area").style.display="none";
    document.getElementById("finish-area").style.display="block";
    document.getElementById("final-result").innerText=score+" PTS";
}

async function fetchRanking(){
    const {data, error} = await supabaseClient
        .from("ranking")
        .select("*")
        .order("score", {ascending:false})
        .limit(10);

    if(error) return;

    const list=document.getElementById("ranking-list");
    list.innerHTML="";

    data.forEach((p,i)=>{
        let div=document.createElement("div");
        div.className = (p.name === currentUser) ? "rank-box rank-me" : "rank-box";
        div.innerHTML=`<span>#${i+1} ${p.name}</span> <span>${p.score}</span>`;
        list.appendChild(div);
    });
}

async function resetRanking(){
    let senha=prompt("SENHA DE ACESSO:");
    if(senha!=="102030") return alert("NEGADO.");

    if(confirm("Deseja expurgar todos os dados do ranking?")){
        const { error } = await supabaseClient
            .from("ranking")
            .delete()
            .neq("name", ""); // Remove tudo

        if(!error){
            alert("SISTEMA RESETADO.");
            fetchRanking();
        }
    }
}
</script>
</body>
</html>
