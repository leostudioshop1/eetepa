<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>QUIZZ LÓGICA - EETEPA</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const SB_URL="https://osofdmgokrxdzsxozsrf.supabase.co"
const SB_KEY="sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe"

window.supabase=createClient(SB_URL,SB_KEY)
</script>

<style>

body{
background:#0f172a;
color:white;
font-family:Segoe UI;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
width:900px;
background:#111827;
padding:30px;
border-radius:15px;
box-shadow:0 0 40px black;
}

h1{
text-align:center;
color:#22c55e;
}

.question{
font-size:20px;
margin-bottom:20px;
}

button{
width:100%;
margin:5px 0;
padding:12px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
background:#1f2937;
color:white;
}

button:hover{
background:#22c55e;
}

#score{
font-size:20px;
color:#facc15;
margin-bottom:15px;
}

.ranking{
margin-top:25px;
max-height:220px;
overflow:auto;
}

table{
width:100%;
border-collapse:collapse;
}

td,th{
padding:6px;
border-bottom:1px solid #333;
text-align:center;
}

th{
background:#1f2937;
}

</style>
</head>

<body>

<div class="container">

<h1>QUIZZ LÓGICA E SISTEMAS</h1>

<div id="menu">

<input id="player" placeholder="Nome do aluno" style="width:100%;padding:10px;margin-bottom:10px">

<button onclick="start()">INICIAR QUIZZ</button>

</div>

<div id="game" style="display:none">

<div id="score">Pontos: 0</div>

<div class="question" id="question"></div>

<div id="answers"></div>

</div>

<div class="ranking">

<h3>🏆 Ranking Global</h3>

<table>

<thead>
<tr>
<th>Pos</th>
<th>Aluno</th>
<th>Pontos</th>
</tr>
</thead>

<tbody id="ranking"></tbody>

</table>

</div>

</div>

<script type="module">

const supabase = window.supabase

//////////////////////////////////////////////////////
//// PERGUNTAS
//////////////////////////////////////////////////////

const questions=[

{q:"Qual operador lógico retorna verdadeiro se ambas condições forem verdadeiras?",a:["AND","OR","NOT","XOR"],c:0},
{q:"Qual operador lógico retorna verdadeiro se pelo menos uma condição for verdadeira?",a:["AND","OR","NOT","XOR"],c:1},
{q:"Qual operador inverte o valor lógico?",a:["AND","NOT","OR","XOR"],c:1},
{q:"Se A=true e B=false, A AND B é:",a:["true","false","erro","null"],c:1},
{q:"Se A=true e B=false, A OR B é:",a:["true","false","erro","null"],c:0},
{q:"Qual operador lógico retorna verdadeiro apenas se os valores forem diferentes?",a:["AND","XOR","OR","NOT"],c:1},
{q:"Qual sistema de arquivos é padrão do Windows moderno?",a:["EXT4","NTFS","FAT32","HFS"],c:1},
{q:"Qual sistema de arquivos é comum no Linux?",a:["EXT4","NTFS","FAT32","APFS"],c:0},
{q:"Qual sistema é antigo mas compatível com quase todos dispositivos?",a:["NTFS","FAT32","EXT4","ZFS"],c:1},
{q:"Qual sistema de arquivos é usado pela Apple?",a:["EXT4","APFS","NTFS","FAT"],c:1},
{q:"Operadores lógicos trabalham com:",a:["números","textos","valores booleanos","imagens"],c:2},
{q:"true AND true =",a:["true","false","erro","null"],c:0},
{q:"false OR false =",a:["true","false","erro","null"],c:1},
{q:"NOT true =",a:["true","false","null","erro"],c:1},
{q:"NOT false =",a:["true","false","erro","null"],c:0},
{q:"Qual operador significa 'E lógico'?",a:["OR","AND","NOT","XOR"],c:1},
{q:"Qual operador significa 'OU lógico'?",a:["OR","AND","NOT","XOR"],c:0},
{q:"Qual operador é usado para negar uma condição?",a:["NOT","AND","OR","XOR"],c:0},
{q:"Qual estrutura organiza arquivos?",a:["RAM","Sistema de arquivos","CPU","BIOS"],c:1},
{q:"Qual sistema suporta arquivos maiores que 4GB?",a:["FAT32","NTFS","FAT","EXT2"],c:1}

]

//////////////////////////////////////////////////////
//// VARIÁVEIS
//////////////////////////////////////////////////////

let score=0
let index=0

//////////////////////////////////////////////////////
//// INICIAR QUIZ
//////////////////////////////////////////////////////

window.start=function(){

const player=document.getElementById("player").value

if(player===""){
alert("Digite seu nome")
return
}

document.getElementById("menu").style.display="none"
document.getElementById("game").style.display="block"

next()

}

//////////////////////////////////////////////////////
//// PRÓXIMA PERGUNTA
//////////////////////////////////////////////////////

function next(){

if(index>=questions.length){
finish()
return
}

let q=questions[index]

document.getElementById("question").innerText=q.q

let html=""

q.a.forEach((opt,i)=>{
html+=`<button onclick="answer(${i})">${opt}</button>`
})

document.getElementById("answers").innerHTML=html

}

//////////////////////////////////////////////////////
//// RESPOSTA
//////////////////////////////////////////////////////

window.answer=function(i){

let q=questions[index]

if(i==q.c){
score+=10
}

document.getElementById("score").innerText="Pontos: "+score

index++

next()

}

//////////////////////////////////////////////////////
//// FINAL DO QUIZ
//////////////////////////////////////////////////////

async function finish(){

let name=document.getElementById("player").value

const {error}=await supabase
.from("ranking")
.insert([{name:name,pts:score}])

if(error){
console.log(error)
alert("Erro ao salvar no ranking")
return
}

alert("Quiz finalizado! Pontos: "+score)

location.reload()

}

//////////////////////////////////////////////////////
//// CARREGAR RANKING
//////////////////////////////////////////////////////

async function loadRanking(){

const {data,error}=await supabase
.from("ranking")
.select("*")
.order("pts",{ascending:false})
.limit(20)

if(error){
console.log(error)
return
}

document.getElementById("ranking").innerHTML=data.map((r,i)=>`

<tr>
<td>${i+1}</td>
<td>${r.name}</td>
<td>${r.pts}</td>
</tr>

`).join("")

}

//////////////////////////////////////////////////////
//// ATUALIZAÇÃO AUTOMÁTICA
//////////////////////////////////////////////////////

loadRanking()

setInterval(loadRanking,2000)

</script>

</body>
</html>
