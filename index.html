<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DevQuest Elite</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#050508;
--card:#111118;
--primary:#8b5cf6;
--secondary:#06b6d4;
--text:#e2e8f0;
}

*{
box-sizing:border-box;
margin:0;
padding:0;
}

body{
background:var(--bg);
color:var(--text);
font-family:'Roboto',sans-serif;
display:flex;
min-height:100vh;
}

#sidebar{
width:300px;
background:#0a0a0f;
border-right:2px solid var(--primary);
padding:20px;
display:flex;
flex-direction:column;
}

#sidebar h2{
font-family:'Orbitron';
color:var(--secondary);
text-align:center;
margin-bottom:20px;
}

.rank-box{
background:rgba(139,92,246,0.1);
padding:10px;
margin-bottom:8px;
border-radius:5px;
display:flex;
justify-content:space-between;
font-family:'Orbitron';
font-size:12px;
border-left:3px solid var(--primary);
}

#reset-btn{
margin-top:10px;
padding:10px;
background:#ff0044;
border:none;
color:white;
cursor:pointer;
font-family:Orbitron;
}

#main-content{
flex-grow:1;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
}

.quiz-card{
width:100%;
max-width:650px;
background:var(--card);
padding:40px;
border-radius:15px;
box-shadow:0 0 50px rgba(0,0,0,0.8);
}

h1{
font-family:'Orbitron';
text-align:center;
margin-bottom:20px;
color:var(--primary);
}

input{
width:100%;
padding:15px;
background:black;
border:1px solid var(--primary);
color:white;
margin-bottom:20px;
text-align:center;
font-family:Orbitron;
}

.btn-start{
width:100%;
padding:15px;
background:var(--primary);
border:none;
color:white;
cursor:pointer;
font-family:Orbitron;
}

.option-btn{
width:100%;
padding:14px;
margin-bottom:10px;
background:#1a1a24;
border:1px solid #333;
color:white;
cursor:pointer;
border-radius:6px;
}

.option-btn:hover{
background:#252535;
}

#game-area,#finish-area{
display:none;
}

.progress-bar{
height:4px;
background:#222;
margin-top:20px;
}

#inner-progress{
height:100%;
background:linear-gradient(90deg,var(--primary),var(--secondary));
width:0%;
}

footer{
margin-top:20px;
font-size:12px;
opacity:0.6;
font-family:Orbitron;
text-align:center;
}

</style>
</head>

<body>

<aside id="sidebar">

<h2>GLOBAL RANKING</h2>

<div id="ranking-list"></div>

<button id="reset-btn" onclick="resetRanking()">ZERAR</button>

</aside>

<main id="main-content">

<div class="quiz-card">

<div id="start-area">

<h1>SISTEMA LOGIN</h1>

<input type="text" id="username" placeholder="DIGITE SEU CODINOME">

<button class="btn-start" onclick="startQuiz()">INICIAR</button>

</div>

<div id="game-area">

<h3 id="question-text"></h3>

<div id="options-container"></div>

<div class="progress-bar">
<div id="inner-progress"></div>
</div>

<p id="counter"></p>

</div>

<div id="finish-area">

<h1>MISSÃO CONCLUÍDA</h1>

<p id="final-result" style="font-size:40px;text-align:center;"></p>

</div>

</div>

<footer>
Desenvolvido por = Léo Cruz - Engenheiro de Software
</footer>

</main>

<script>

const SB_URL="https://osofdmgokrxdzsxozsrf.supabase.co";
const SB_KEY="sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe";

const supabaseClient=supabase.createClient(SB_URL,SB_KEY);

let currentUser="";
let score=0;
let currentIdx=0;

const questions=[];

const baseQuestions=[

{q:"2 + 2 = ?",a:["3","4","5","22"],c:1},

{q:"False significa?",a:["Verdadeiro","Falso","Erro","Talvez"],c:1},

{q:"Criar pasta no Linux?",a:["rm","mkdir","cd","ls"],c:1},

{q:"Operador de atribuição?",a:["=","==","===","!="],c:0},

{q:"Arquivo texto?",a:[".jpg",".txt",".mp3",".exe"],c:1},

{q:"Onde salvamos arquivos?",a:["CPU","RAM","HD/SSD","Monitor"],c:2},

{q:"Símbolo maior que?",a:[">","<","=","!"],c:0},

{q:"Operador lógico E?",a:["||","&&","!","="],c:1},

{q:"rm no linux?",a:["remove","cria","move","lista"],c:0},

{q:"Lixeira serve para?",a:["salvar","apagar","ver","baixar"],c:1}

];

for(let i=0;i<60;i++){

let base=baseQuestions[i%baseQuestions.length];

questions.push({
q:`[Q${i+1}] ${base.q}`,
options:base.a,
correct:base.c
});

}

function startQuiz(){

let name=document.getElementById("username").value;

if(name.length<2){
alert("Nome muito curto");
return;
}

currentUser=name.toUpperCase();

document.getElementById("start-area").style.display="none";
document.getElementById("game-area").style.display="block";

renderQuestion();

fetchRanking();

setInterval(fetchRanking,1000);

}

function renderQuestion(){

let q=questions[currentIdx];

document.getElementById("question-text").innerText=q.q;

document.getElementById("counter").innerText=`QUESTÃO ${currentIdx+1} / 60`;

let container=document.getElementById("options-container");

container.innerHTML="";

q.options.forEach((opt,i)=>{

let btn=document.createElement("button");

btn.className="option-btn";

btn.innerText=opt;

btn.onclick=()=>handleAnswer(i);

container.appendChild(btn);

});

document.getElementById("inner-progress").style.width=
(currentIdx/questions.length*100)+"%";

}

function handleAnswer(choice){

if(choice===questions[currentIdx].correct){
score+=100;
}

currentIdx++;

updateLiveScore();

if(currentIdx<questions.length){

renderQuestion();

}else{

finishQuiz();

}

}

async function updateLiveScore(){

await supabaseClient
.from("ranking")
.upsert([
{
name:currentUser,
score:score
}
]);

fetchRanking();

}

async function finishQuiz(){

document.getElementById("game-area").style.display="none";

document.getElementById("finish-area").style.display="block";

document.getElementById("final-result").innerText=score+" PTS";

await supabaseClient
.from("ranking")
.upsert([{name:currentUser,score:score}]);

fetchRanking();

}

async function fetchRanking(){

let {data,error}=await supabaseClient
.from("ranking")
.select("*")
.order("score",{ascending:false})
.limit(10);

if(error)return;

let list=document.getElementById("ranking-list");

list.innerHTML="";

data.forEach((p,i)=>{

let div=document.createElement("div");

div.className="rank-box";

div.innerHTML=`<span>#${i+1} ${p.name}</span> <span>${p.score}</span>`;

list.appendChild(div);

});

}

async function resetRanking(){

let senha=prompt("Digite a senha:");

if(senha!=="102030"){
alert("Senha incorreta");
return;
}

let confirmar=confirm("Deseja apagar TODOS os usuários?");

if(!confirmar)return;

await supabaseClient
.from("ranking")
.delete()
.neq("name","");

alert("Ranking zerado");

fetchRanking();

}

</script>

</body>
</html>
