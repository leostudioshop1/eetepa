<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

</head>

<body class="bg-slate-950 text-white p-6">

<div class="max-w-6xl mx-auto">

<h1 class="text-3xl font-bold mb-6">📊 Dashboard de Gastos</h1>

<!-- CARDS -->
<div class="grid md:grid-cols-3 gap-4 mb-6">

<div class="bg-slate-900 p-4 rounded">
<p class="text-slate-400">Total Geral</p>
<h2 id="total" class="text-2xl font-bold"></h2>
</div>

<div class="bg-slate-900 p-4 rounded">
<p class="text-slate-400">Total Mensal</p>
<h2 id="mensal" class="text-2xl font-bold text-green-400"></h2>
</div>

<div class="bg-slate-900 p-4 rounded">
<p class="text-slate-400">Caixa / Banco</p>
<h2 id="origem" class="text-lg"></h2>
</div>

</div>

<button onclick="carregar()" class="bg-blue-500 px-4 py-2 rounded mb-4">
Atualizar
</button>

<table class="w-full border border-slate-700">
<thead class="bg-slate-800">
<tr>
<th>Data</th>
<th>Descrição</th>
<th>Valor</th>
<th>Origem</th>
<th>Pagamento</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>

</div>

<script>
const supabase = Supabase.createClient(
'https://osofdmgokrxdzsxozsrf.supabase.co',
'sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe'
);

async function carregar() {
const { data } = await supabase.from('gastos').select('*').order('data_hora', {ascending:false});

let total=0, mensal=0, caixa=0, banco=0;
const agora = new Date();

tabela.innerHTML="";

data.forEach(g=>{
const v=parseFloat(g.valor)||0;
const d=new Date(g.data_hora);

total+=v;

if (d.getMonth()===agora.getMonth()) mensal+=v;
if (g.origem==="Caixa do Hotel") caixa+=v;
if (g.origem==="Conta Bancária") banco+=v;

tabela.innerHTML+=`
<tr>
<td>${d.toLocaleString()}</td>
<td>${g.descricao}</td>
<td>R$ ${v.toFixed(2)}</td>
<td>${g.origem}</td>
<td>${g.forma_pagamento}</td>
</tr>`;
});

total.innerText = "R$ "+total.toFixed(2);
mensal.innerText = "R$ "+mensal.toFixed(2);
origem.innerText = "Caixa: R$ "+caixa.toFixed(2)+" | Banco: R$ "+banco.toFixed(2);
}

carregar();
</script>

</body>
</html>
