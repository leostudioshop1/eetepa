<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Projetos - Delphi + Firebird</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: 'Segoe UI', system-ui, sans-serif; }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-slate-800 to-black text-white min-h-screen">
  <div class="max-w-6xl mx-auto p-4 md:p-8">
    
    <h1 class="text-4xl font-bold mb-8 flex items-center gap-4">
      📌 Cadastro de Projetos - Delphi + Firebird
    </h1>

    <!-- Formulário -->
    <div class="bg-slate-800 p-8 rounded-3xl shadow-xl mb-10">
      <h2 class="text-2xl font-semibold mb-6">Novo Projeto / Atualizar</h2>
      
      <form id="projectForm" class="space-y-6">
        <input type="hidden" id="projectId">

        <div>
          <label class="block text-slate-400 mb-2 font-medium">Nome do Projeto</label>
          <input type="text" id="projectName" required
                 class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 focus:border-emerald-500 outline-none text-lg">
        </div>

        <div>
          <label class="block text-slate-400 mb-2 font-medium">Link do Tutorial</label>
          <input type="url" id="tutorialLink" required placeholder="https://youtube.com/..."
                 class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 focus:border-emerald-500 outline-none">
        </div>

        <div class="grid md:grid-cols-5 gap-4">
          <div>
            <label class="block text-slate-400 mb-2">Aluno 1</label>
            <input type="text" id="aluno1" required class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700">
          </div>
          <div>
            <label class="block text-slate-400 mb-2">Aluno 2</label>
            <input type="text" id="aluno2" required class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700">
          </div>
          <div>
            <label class="block text-slate-400 mb-2">Aluno 3</label>
            <input type="text" id="aluno3" required class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700">
          </div>
          <div>
            <label class="block text-slate-400 mb-2">Aluno 4</label>
            <input type="text" id="aluno4" required class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700">
          </div>
          <div>
            <label class="block text-slate-400 mb-2">Aluno 5</label>
            <input type="text" id="aluno5" required class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700">
          </div>
        </div>

        <div>
          <label class="block text-slate-400 mb-2">Descrição do Projeto</label>
          <textarea id="description" rows="4" placeholder="Descreva o sistema que será desenvolvido..."
                    class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700"></textarea>
        </div>

        <div>
          <label class="block text-slate-400 mb-2">Progresso Atual (%)</label>
          <input type="number" id="progress" min="0" max="100" value="0" required
                 class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-700 text-2xl font-bold">
        </div>

        <button type="submit"
                class="w-full bg-gradient-to-r from-emerald-500 to-teal-600 hover:from-emerald-600 hover:to-teal-700 p-5 rounded-2xl font-bold text-xl shadow-lg transition">
          💾 Salvar Projeto
        </button>
      </form>
    </div>

    <!-- Lista de Projetos -->
    <h2 class="text-2xl font-semibold mb-6">Projetos Cadastrados</h2>
    <div id="projectsList" class="grid md:grid-cols-2 gap-6">
      <!-- Cards são inseridos aqui via JavaScript -->
    </div>
  </div>

  <script>
    // ================== CONEXÃO SUPABASE ==================
    const supabase = Supabase.createClient(
      'https://osofdmgokrxdzsxozsrf.supabase.co',
      'sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe'
    );

    const TABLE = 'projetos_delphi';

    // Carregar projetos
    async function loadProjects() {
      const { data, error } = await supabase
        .from(TABLE)
        .select('*')
        .order('updated_at', { ascending: false });

      if (error) {
        console.error(error);
        alert("Erro ao carregar projetos: " + error.message);
        return;
      }

      const container = document.getElementById('projectsList');
      container.innerHTML = '';

      data.forEach(p => {
        const progressoCor = p.progress >= 80 ? 'text-emerald-400' : 
                           p.progress >= 50 ? 'text-yellow-400' : 'text-red-400';

        const card = `
          <div class="bg-slate-800 rounded-3xl p-7 shadow-xl hover:shadow-2xl transition">
            <div class="flex justify-between items-start mb-4">
              <h3 class="text-xl font-semibold leading-tight">${p.project_name}</h3>
              <span class="text-4xl font-bold ${progressoCor}">${p.progress}%</span>
            </div>
            
            <div class="text-slate-400 text-sm space-y-1">
              <p><strong>Grupo:</strong> ${p.aluno1}, ${p.aluno2}, ${p.aluno3}...</p>
              <p><a href="${p.tutorial_link}" target="_blank" class="text-emerald-400 hover:underline">🔗 Acessar Tutorial</a></p>
            </div>

            <div class="mt-6 flex justify-between items-center">
              <span class="text-xs text-slate-500">
                Atualizado em: ${new Date(p.updated_at).toLocaleDateString('pt-BR')}
              </span>
              <button onclick="editProject('${p.id}')" 
                      class="bg-slate-700 hover:bg-slate-600 px-6 py-2.5 rounded-2xl text-sm font-medium transition">
                ✏️ Editar
              </button>
            </div>
          </div>`;
        container.innerHTML += card;
      });
    }

    // Salvar projeto
    document.getElementById("projectForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const projectId = document.getElementById("projectId").value;

      const projectData = {
        project_name: document.getElementById("projectName").value.trim(),
        tutorial_link: document.getElementById("tutorialLink").value.trim(),
        aluno1: document.getElementById("aluno1").value.trim(),
        aluno2: document.getElementById("aluno2").value.trim(),
        aluno3: document.getElementById("aluno3").value.trim(),
        aluno4: document.getElementById("aluno4").value.trim(),
        aluno5: document.getElementById("aluno5").value.trim(),
        description: document.getElementById("description").value.trim(),
        progress: parseInt(document.getElementById("progress").value),
        updated_at: new Date().toISOString()
      };

      let result;
      if (projectId) {
        result = await supabase.from(TABLE).update(projectData).eq('id', projectId);
      } else {
        result = await supabase.from(TABLE).insert([projectData]);
      }

      if (result.error) {
        alert("❌ Erro ao salvar:\n" + result.error.message);
      } else {
        alert("✅ Projeto salvo com sucesso!");
        document.getElementById("projectForm").reset();
        document.getElementById("projectId").value = "";
        loadProjects();
      }
    });

    // Editar projeto
    window.editProject = async function(id) {
      const { data, error } = await supabase.from(TABLE).select('*').eq('id', id).single();
      if (error) return alert("Erro ao carregar projeto");

      document.getElementById("projectId").value = data.id;
      document.getElementById("projectName").value = data.project_name;
      document.getElementById("tutorialLink").value = data.tutorial_link;
      document.getElementById("aluno1").value = data.aluno1;
      document.getElementById("aluno2").value = data.aluno2;
      document.getElementById("aluno3").value = data.aluno3;
      document.getElementById("aluno4").value = data.aluno4;
      document.getElementById("aluno5").value = data.aluno5;
      document.getElementById("description").value = data.description || "";
      document.getElementById("progress").value = data.progress;
    };

    // Inicializar página
    loadProjects();
  </script>
</body>
</html>
