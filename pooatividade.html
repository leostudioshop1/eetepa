<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Projetos Delphi 12</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="bg-slate-900 text-white min-h-screen">

<div class="max-w-7xl mx-auto p-6">

    <h1 class="text-4xl font-bold mb-8">
        🎮 Projetos de Jogos - Delphi 12
    </h1>

    <!-- FORMULÁRIO -->
    <div class="bg-slate-800 p-6 rounded-2xl shadow-lg mb-8">

        <div class="grid md:grid-cols-2 gap-4">

            <input id="nome_jogo"
                   placeholder="Nome do jogo"
                   class="p-4 rounded-xl bg-slate-900 border border-slate-700">

            <input id="aluno"
                   placeholder="Aluno"
                   class="p-4 rounded-xl bg-slate-900 border border-slate-700">

            <input id="turma"
                   placeholder="Turma"
                   class="p-4 rounded-xl bg-slate-900 border border-slate-700">

            <input id="professor"
                   placeholder="Professor"
                   class="p-4 rounded-xl bg-slate-900 border border-slate-700">

            <input id="genero"
                   placeholder="Gênero do jogo"
                   class="p-4 rounded-xl bg-slate-900 border border-slate-700">

            <input id="progresso"
                   type="number"
                   placeholder="Progresso (%)"
                   class="p-4 rounded-xl bg-slate-900 border border-slate-700">

            <input id="data_entrega"
                   type="date"
                   class="p-4 rounded-xl bg-slate-900 border border-slate-700">

            <select id="status"
                    class="p-4 rounded-xl bg-slate-900 border border-slate-700">

                <option>Planejamento</option>
                <option>Desenvolvimento</option>
                <option>Testes</option>
                <option>Finalizado</option>

            </select>

        </div>

        <textarea id="descricao"
                  placeholder="Descrição do projeto"
                  class="w-full mt-4 p-4 rounded-xl bg-slate-900 border border-slate-700 h-32"></textarea>

        <div class="grid md:grid-cols-2 gap-4 mt-4">

            <input id="link_download"
                   placeholder="Link para download"
                   class="p-4 rounded-xl bg-slate-900 border border-slate-700">

            <input id="link_github"
                   placeholder="Link GitHub"
                   class="p-4 rounded-xl bg-slate-900 border border-slate-700">

        </div>

        <textarea id="observacoes"
                  placeholder="Observações"
                  class="w-full mt-4 p-4 rounded-xl bg-slate-900 border border-slate-700 h-24"></textarea>

        <button onclick="salvarProjeto()"
                class="w-full mt-6 bg-emerald-600 hover:bg-emerald-700 p-4 rounded-2xl font-bold text-lg">
            💾 Salvar Projeto
        </button>

        <p id="msg" class="mt-4 text-center font-bold"></p>

    </div>

    <!-- LISTA -->
    <div id="listaProjetos" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

</div>

<script>

const supabaseClient = supabase.createClient(
    'https://osofdmgokrxdzsxozsrf.supabase.co',
    'sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe'
);

// =====================================
// SALVAR PROJETO
// =====================================

async function salvarProjeto() {

    const dados = {

        nome_jogo: document.getElementById('nome_jogo').value,
        aluno: document.getElementById('aluno').value,
        turma: document.getElementById('turma').value,
        professor: document.getElementById('professor').value,
        genero: document.getElementById('genero').value,
        progresso: parseInt(document.getElementById('progresso').value || 0),
        status: document.getElementById('status').value,
        descricao: document.getElementById('descricao').value,
        data_entrega: document.getElementById('data_entrega').value,
        link_download: document.getElementById('link_download').value,
        link_github: document.getElementById('link_github').value,
        observacoes: document.getElementById('observacoes').value

    };

    // VALIDAÇÃO
    if (!dados.nome_jogo || !dados.aluno || !dados.turma) {

        document.getElementById('msg').innerText = '⚠️ Preencha Nome do Jogo, Aluno e Turma';
        document.getElementById('msg').className = 'mt-4 text-center font-bold text-red-400';
        return;

    }

    // INSERIR NO BANCO
    const { error } = await supabaseClient
        .from('projetos_delphi')
        .insert([dados]);

    // ERRO
    if (error) {

        console.log(error);

        document.getElementById('msg').innerText = '❌ Erro: ' + error.message;
        document.getElementById('msg').className = 'mt-4 text-center font-bold text-red-400';

        return;
    }

    // SUCESSO
    document.getElementById('msg').innerText = '✅ Projeto salvo com sucesso!';
    document.getElementById('msg').className = 'mt-4 text-center font-bold text-green-400';

    // LIMPAR FORMULÁRIO
    document.querySelectorAll('input, textarea').forEach(el => el.value = '');

    document.getElementById('status').selectedIndex = 0;

    carregarProjetos();
}

// =====================================
// CARREGAR PROJETOS
// =====================================

async function carregarProjetos() {

    const { data, error } = await supabaseClient
        .from('projetos_delphi')
        .select('*')
        .order('id', { ascending: false });

    if (error) {
        console.log(error);
        return;
    }

    const lista = document.getElementById('listaProjetos');

    lista.innerHTML = '';

    data.forEach(projeto => {

        lista.innerHTML += `

        <div class="bg-slate-800 rounded-2xl p-5 shadow-lg border border-slate-700">

            <h2 class="text-2xl font-bold mb-4 text-emerald-400">
                🎮 ${projeto.nome_jogo}
            </h2>

            <div class="space-y-2 text-sm">

                <p><strong>Aluno:</strong> ${projeto.aluno}</p>
                <p><strong>Turma:</strong> ${projeto.turma}</p>
                <p><strong>Professor:</strong> ${projeto.professor || '-'} </p>
                <p><strong>Gênero:</strong> ${projeto.genero || '-'} </p>
                <p><strong>Status:</strong> ${projeto.status}</p>
                <p><strong>Progresso:</strong> ${projeto.progresso}%</p>

            </div>

            <div class="w-full bg-slate-700 rounded-full h-4 mt-4 mb-4 overflow-hidden">
                <div class="bg-emerald-500 h-4 rounded-full"
                     style="width:${projeto.progresso}%">
                </div>
            </div>

            <p class="text-slate-300 text-sm mb-4">
                ${projeto.descricao || ''}
            </p>

            ${projeto.link_download ? `
                <a href="${projeto.link_download}"
                   target="_blank"
                   class="block bg-blue-600 hover:bg-blue-700 p-3 rounded-xl text-center mb-2">
                   ⬇ Download
                </a>
            ` : ''}

            ${projeto.link_github ? `
                <a href="${projeto.link_github}"
                   target="_blank"
                   class="block bg-gray-700 hover:bg-gray-800 p-3 rounded-xl text-center">
                   💻 GitHub
                </a>
            ` : ''}

        </div>

        `;

    });
}

// INICIALIZAR
carregarProjetos();

</script>

</body>
</html>


Agora o salvamento funciona corretamente.
