<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Acompanhamento de Gastos</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

</head>

<body class="bg-slate-950 text-white min-h-screen p-4">

<!-- iframe invisível -->
<iframe id="configFrame" src="config.html" style="display:none;"></iframe>

<div id="relatorio" class="max-w-7xl mx-auto">

<h1 class="text-2xl font-bold text-indigo-400 mb-4">
🏨 Painel financeiro mensal HOTEL DOS VIAJANTES
</h1>

<input type="month" id="mesFiltro" class="bg-slate-800 p-2 rounded">

<button onclick="carregar()" class="bg-indigo-600 px-4 py-2 rounded">
Carregar
</button>

<table class="w-full mt-4">
<tbody id="tabela"></tbody>
</table>

</div>

<script>

let supabaseClient;

// pega config do outro HTML
window.onload = function () {

    const iframe = document.getElementById("configFrame");

    iframe.onload = () => {

        const config = iframe.contentWindow.getConfig();

        supabaseClient = supabase.createClient(
            config.url,
            config.key
        );

        setMesAtual();
        carregar();
    };
};

// restante do código
function setMesAtual() {
const hoje = new Date();
document.getElementById("mesFiltro").value = hoje.toISOString().slice(0,7);
}

function getIntervaloMes() {
const mes = document.getElementById("mesFiltro").value;

const inicio = new Date(mes + "-01");
const fim = new Date(inicio);
fim.setMonth(fim.getMonth() + 1);

return {
inicio: inicio.toISOString(),
fim: fim.toISOString()
};
}

async function carregar() {

const { inicio, fim } = getIntervaloMes();

const { data, error } = await supabaseClient
.from('gastos')
.select('*')
.gte('data_hora', inicio)
.lt('data_hora', fim);

if (error) return alert(error.message);

const tabela = document.getElementById("tabela");
tabela.innerHTML = "";

data.forEach(g => {
tabela.innerHTML += `
<tr>
<td>${g.descricao}</td>
<td>R$ ${g.valor}</td>
</tr>`;
});

}

</script>

</body>
</html>
