<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Cientistas de Dados Nota 10</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --primary: #00ffcc; 
            --danger: #ff3366; 
            --matrix-green: #00ff41;
            --matrix-glow: #008f11;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #000000;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* MATRIX BACKGROUND */
        #matrix-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
            opacity: 0.85;
        }

        /* BANNER FLUTUANTE */
        #floating-banner {
            position: fixed;
            z-index: 10;
            white-space: nowrap;
            background: rgba(0, 255, 65, 0.12);
            color: var(--matrix-green);
            padding: 12px 24px;
            border: 1px solid var(--matrix-green);
            box-shadow: 0 0 20px var(--matrix-glow);
            font-weight: 700;
            font-size: 1rem;
            pointer-events: none;
            text-transform: uppercase;
            border-radius: 50px;
            backdrop-filter: blur(8px);
            will-change: transform;
        }

        .header {
            position: fixed; 
            top: 0; left: 0; right: 0;
            background: rgba(8, 15, 32, 0.95); 
            backdrop-filter: blur(16px);
            z-index: 100; 
            padding: 16px 20px;
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            border-bottom: 3px solid var(--primary);
        }

        .logo { 
            font-size: 1.75rem; 
            font-weight: 900; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            text-shadow: 0 0 15px var(--primary);
        }

        .progress-container { 
            flex: 1; 
            max-width: 520px; 
            margin: 0 20px; 
        }
        .progress { 
            height: 14px; 
            background: #112233; 
            border-radius: 9999px; 
            overflow: hidden; 
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
        }
        .progress-bar { 
            height: 100%; 
            background: linear-gradient(90deg, var(--primary), #00ffaa);
            width: 0%; 
            transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1); 
            box-shadow: 0 0 15px var(--primary);
        }

        .score { 
            font-size: 1.5rem; 
            font-weight: 800; 
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .main { 
            max-width: 960px; 
            margin: 100px auto 60px; 
            padding: 0 20px; 
            position: relative;
            z-index: 2;
        }
        
        .card {
            background: rgba(255,255,255,0.08); 
            backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 255, 204, 0.2);
            border-radius: 28px; 
            padding: 45px 40px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        
        .question-number { 
            color: var(--primary); 
            font-weight: 700; 
            margin-bottom: 12px; 
            font-size: 1.1rem;
        }
        .question-text { 
            font-size: 1.65rem; 
            line-height: 1.4; 
            margin-bottom: 35px; 
            font-weight: 600; 
        }
        
        .options { 
            display: grid; 
            gap: 16px;
        }
        .option {
            background: rgba(255,255,255,0.07); 
            border: 3px solid transparent;
            border-radius: 20px; 
            padding: 22px; 
            font-size: 1.25rem;
            cursor: pointer; 
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .option:hover { 
            transform: translateY(-6px) scale(1.02); 
            box-shadow: 0 15px 30px rgba(0, 255, 204, 0.15);
        }
        .option.correct { 
            border-color: #00ff88; 
            background: rgba(0,255,136,0.18); 
        }
        .option.wrong { 
            border-color: var(--danger); 
            background: rgba(255,51,102,0.18); 
        }
        
        .feedback {
            margin-top: 30px; 
            padding: 28px; 
            border-radius: 20px;
            display: none; 
            gap: 20px; 
            align-items: flex-start;
        }
        .feedback.show { display: flex; }
        .feedback.correct { 
            background: rgba(0,255,136,0.12); 
            border: 2px solid #00ff88; 
        }
        .feedback.wrong { 
            background: rgba(255,51,102,0.12); 
            border: 2px solid var(--danger); 
        }
        
        .next-btn, .retry-btn {
            margin-top: 30px; 
            padding: 18px 50px; 
            font-size: 1.3rem;
            font-weight: 700; 
            border: none; 
            border-radius: 9999px; 
            cursor: pointer; 
            width: 100%;
            transition: all 0.3s;
        }
        .next-btn { 
            background: linear-gradient(90deg, var(--primary), #00ccaa); 
            color: #0a1428; 
        }
        .next-btn:hover { transform: scale(1.05); }
        
        .retry-btn { 
            background: var(--danger); 
            color: white; 
        }

        .results { text-align: center; }
        .big-score { 
            font-size: clamp(5rem, 12vw, 8rem); 
            font-weight: 900; 
            background: linear-gradient(90deg, #00ffcc, #ff00aa); 
            -webkit-background-clip: text; 
            color: transparent; 
            line-height: 1;
        }

        .tears { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            pointer-events: none; 
            z-index: 999; 
            display: none; 
        }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>
    <div id="floating-banner">O ESTUDO DE HOJE</div>

    <div class="header">
        <div class="logo">📊 Cientistas de Dados Nota 10 <span style="font-size:1.25rem;">💾 Informática</span></div>
        <div class="progress-container">
            <div class="progress"><div id="progressBar" class="progress-bar"></div></div>
        </div>
        <div class="score">⭐ <span id="scoreDisplay">0</span>/20</div>
    </div>

    <div class="main" id="quizContainer"></div>

    <div id="resultsScreen" class="main" style="display:none;">
        <div class="card results">
            <h1>🎉 Parabéns, futuro Cientista de Dados!</h1>
            <div class="big-score" id="finalScore">20</div>
            <p id="finalMessage" style="font-size:1.7rem; margin:30px 0;"></p>
            <button onclick="restartQuiz()" class="next-btn">🔄 Refazer o Quiz</button>
        </div>
    </div>

    <div id="tearsContainer" class="tears"></div>

    <!-- GAME SOUNDS -->
    <audio id="correctSound" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/2965/2965.wav" type="audio/wav">
    </audio>
    <audio id="wrongSound" preload="auto">
        <source src="https://assets.mixkit.co/sfx/preview/2952/2952.wav" type="audio/wav">
    </audio>

    <script>
        // Matrix Background (mantido)
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.height = window.innerHeight;
            canvas.width = window.innerWidth;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZアァカサタナハマヤャラワ";
        const fontSize = 16;
        let columns = canvas.width / fontSize;
        let drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.06)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff41';
            ctx.font = fontSize + 'px monospace';
            
            for(let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);

        // Banner flutuante (mantido e melhorado)
        const banner = document.getElementById('floating-banner');
        const frases = ["O estudo de hoje", "É a vitória de amanhã", "Quanto mais você estuda", "mais sorte você tem", "Estudar não é castigo"];
        let fraseIndex = 0, posX = 80, posY = 80, velX = 1.2, velY = 1.1;

        function moveBanner() {
            const winW = window.innerWidth;
            const winH = window.innerHeight;
            const banW = banner.offsetWidth;

            posX += velX;
            posY += velY;

            if (posX + banW >= winW || posX <= 0) {
                velX *= -1;
                fraseIndex = (fraseIndex + 1) % frases.length;
                banner.textContent = frases[fraseIndex];
            }
            if (posY + banner.offsetHeight >= winH || posY <= 0) velY *= -1;

            banner.style.transform = `translate(${posX}px, ${posY}px)`;
            requestAnimationFrame(moveBanner);
        }
        moveBanner();

        // Quiz Logic (mantido com melhorias)
        let currentQuestion = 0;
        let score = 0;

        const questions = [ /* ... suas 20 perguntas permanecem iguais ... */ ];

        // Sons
        const correctSound = document.getElementById('correctSound');
        const wrongSound = document.getElementById('wrongSound');

        function playCorrect() {
            correctSound.currentTime = 0;
            correctSound.play();
        }
        function playWrong() {
            wrongSound.currentTime = 0;
            wrongSound.play();
        }

        function renderQuestion() { /* ... mesmo código anterior, só com pequenas melhorias de estilo ... */ }

        async function selectAnswer(selected) {
            const q = questions[currentQuestion];
            const isCorrect = selected === q.correct;

            const feedbackArea = document.getElementById('feedbackArea');
            const options = document.querySelectorAll('.option');

            options.forEach(opt => {
                opt.style.pointerEvents = 'none';
                if (opt.textContent.includes(selected)) opt.classList.add(isCorrect ? 'correct' : 'wrong');
                if (opt.textContent.includes(q.correct)) opt.classList.add('correct');
            });

            if (isCorrect) {
                score++;
                document.getElementById('scoreDisplay').textContent = score;
                feedbackArea.innerHTML = `<strong style="color:#00ff88; font-size:1.4rem;">🎉 Perfeito! Acertou em cheio!</strong><br><br>${q.explanation}`;
                feedbackArea.classList.add('show', 'correct');
                playCorrect();
                confetti({ particleCount: 220, spread: 80, origin: { y: 0.6 } });
                document.getElementById('nextBtn').style.display = 'block';
            } else {
                document.body.classList.add('error-mode');
                createTears();
                feedbackArea.innerHTML = `<strong style="color:#ff3366; font-size:1.4rem;">😢 Errou... mas agora você sabe!</strong><br><br><strong>Explicação:</strong><br>${q.explanation}`;
                feedbackArea.classList.add('show', 'wrong');
                playWrong();
                document.getElementById('retryBtn').style.display = 'block';
            }
        }

        // Restante do script (nextQuestion, showResults, etc.) permanece igual
        // ... (copie o resto do seu script original aqui)

        window.onload = () => {
            console.log("🚀 Quiz Moderno com Sons carregado!");
            renderQuestion();
        };
    </script>
</body>
</html>
