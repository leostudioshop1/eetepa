<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚀 Quiz Shooter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #0ff;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #game-container {
            position: relative;
            width: 100%;
            flex: 1;
        }
        canvas {
            display: block;
            margin: 0 auto;
            background: #001122;
            touch-action: none;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }
        .stat {
            background: rgba(0, 20, 40, 0.8);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
        }
        #question {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 30, 60, 0.95);
            padding: 12px 25px;
            border-radius: 15px;
            font-size: 20px;
            text-align: center;
            max-width: 90%;
            border: 2px solid #0ff;
            pointer-events: none;
            z-index: 20;
        }
        #controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 30;
        }
        button {
            background: rgba(0, 255, 255, 0.2);
            color: #0ff;
            border: 2px solid #0ff;
            padding: 15px 25px;
            font-size: 18px;
            border-radius: 50px;
            backdrop-filter: blur(5px);
        }
        #start-screen, #game-over {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 10, 30, 0.95);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: #0ff;
        }
        h1 { font-size: 42px; margin-bottom: 20px; text-shadow: 0 0 20px #0ff; }
        button.big {
            font-size: 24px;
            padding: 15px 40px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="canvas" width="800" height="600"></canvas>
        
        <div id="ui">
            <div class="stat">Pontos: <span id="score">0</span></div>
            <div class="stat">Vidas: <span id="lives">3</span></div>
        </div>
        
        <div id="question">Toque em INICIAR para começar</div>
        
        <div id="controls">
            <button id="left-btn">← ESQUERDA</button>
            <button id="shoot-btn">🔫 ATIRAR</button>
            <button id="right-btn">DIREITA →</button>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen">
        <h1>🚀 QUIZ SHOOTER</h1>
        <p style="font-size: 22px; margin-bottom: 30px;">Destrua as respostas corretas!</p>
        <button class="big" onclick="startGame()">INICIAR MISSÃO</button>
        <p style="margin-top: 40px; font-size: 16px; opacity: 0.8;">Funciona perfeitamente no iPhone e Android</p>
    </div>

    <!-- Game Over -->
    <div id="game-over" style="display: none;">
        <h1>FIM DE MISSÃO</h1>
        <p style="font-size: 28px; margin: 20px 0;">Pontuação Final: <span id="final-score">0</span></p>
        <button class="big" onclick="restartGame()">JOGAR NOVAMENTE</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        // Ajustar tamanho do canvas para mobile
        function resizeCanvas() {
            const maxWidth = Math.min(window.innerWidth, 800);
            const maxHeight = Math.min(window.innerHeight - 120, 600);
            canvas.width = maxWidth;
            canvas.height = maxHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Variáveis do jogo
        let ship = { x: canvas.width/2 - 25, y: canvas.height - 80, width: 50, height: 40, speed: 8 };
        let bullets = [];
        let answers = [];
        let score = 0;
        let lives = 3;
        let gameRunning = false;
        let currentQuestionIndex = 0;
        let keys = {};
        let touchStartX = 0;
        let isDragging = false;

        // Perguntas (fácil de adicionar mais)
        const questions = [
            {
                question: "Qual é a capital do Brasil?",
                answers: [
                    { text: "São Paulo", correct: false },
                    { text: "Brasília", correct: true },
                    { text: "Rio de Janeiro", correct: false },
                    { text: "Salvador", correct: false }
                ]
            },
            {
                question: "Quanto é 8 × 7?",
                answers: [
                    { text: "54", correct: false },
                    { text: "49", correct: false },
                    { text: "56", correct: true },
                    { text: "63", correct: false }
                ]
            },
            {
                question: "Qual planeta é conhecido como o Vermelho?",
                answers: [
                    { text: "Vênus", correct: false },
                    { text: "Júpiter", correct: false },
                    { text: "Marte", correct: true },
                    { text: "Saturno", correct: false }
                ]
            },
            {
                question: "Quem pintou a Mona Lisa?",
                answers: [
                    { text: "Van Gogh", correct: false },
                    { text: "Picasso", correct: false },
                    { text: "Leonardo da Vinci", correct: true },
                    { text: "Michelangelo", correct: false }
                ]
            }
        ];

        class Bullet {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 6;
                this.height = 20;
                this.speed = 12;
            }
            update() {
                this.y -= this.speed;
            }
            draw() {
                ctx.fillStyle = '#0ff';
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#0ff';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.shadowBlur = 0;
            }
        }

        class Answer {
            constructor(x, text, correct) {
                this.x = x;
                this.y = 80;
                this.width = 140;
                this.height = 50;
                this.text = text;
                this.correct = correct;
                this.speed = 2.2 + Math.random() * 1.2;
            }
            update() {
                this.y += this.speed;
            }
            draw() {
                ctx.fillStyle = this.correct ? '#0f0' : '#f44';
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.correct ? '#0f0' : '#f44';
                ctx.fillRect(this.x - this.width/2, this.y, this.width, this.height);
                ctx.strokeRect(this.x - this.width/2, this.y, this.width, this.height);
                ctx.shadowBlur = 0;

                ctx.fillStyle = '#000';
                ctx.font = 'bold 18px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.text, this.x, this.y + this.height/2);
            }
        }

        function drawShip() {
            ctx.save();
            ctx.translate(ship.x + 25, ship.y + 20);
            
            // Corpo da nave
            ctx.fillStyle = '#0ff';
            ctx.beginPath();
            ctx.moveTo(0, -25);
            ctx.lineTo(-20, 20);
            ctx.lineTo(20, 20);
            ctx.closePath();
            ctx.fill();
            
            // Detalhes
            ctx.fillStyle = '#f80';
            ctx.fillRect(-8, 5, 16, 12);
            
            ctx.restore();
        }

        function spawnAnswers() {
            answers = [];
            const q = questions[currentQuestionIndex];
            const positions = [canvas.width * 0.2, canvas.width * 0.45, canvas.width * 0.7, canvas.width * 0.9];
            
            // Embaralhar respostas
            const shuffled = [...q.answers].sort(() => Math.random() - 0.5);
            
            shuffled.forEach((ans, i) => {
                if (i < 4) {
                    const a = new Answer(positions[i], ans.text, ans.correct);
                    answers.push(a);
                }
            });
        }

        function update() {
            if (!gameRunning) return;

            // Movimento da nave (teclado)
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) ship.x -= ship.speed;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) ship.x += ship.speed;

            // Limites
            ship.x = Math.max(20, Math.min(canvas.width - 70, ship.x));

            // Atualizar tiros
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].update();
                if (bullets[i].y < 0) bullets.splice(i, 1);
            }

            // Atualizar respostas
            for (let i = answers.length - 1; i >= 0; i--) {
                answers[i].update();
                
                // Colisão com chão
                if (answers[i].y + answers[i].height > canvas.height - 60) {
                    if (answers[i].correct) {
                        lives--;
                    }
                    answers.splice(i, 1);
                    continue;
                }

                // Colisão com tiros
                for (let j = bullets.length - 1; j >= 0; j--) {
                    const b = bullets[j];
                    const a = answers[i];
                    if (b.x > a.x - a.width/2 && 
                        b.x < a.x + a.width/2 &&
                        b.y > a.y && 
                        b.y < a.y + a.height) {
                        
                        bullets.splice(j, 1);
                        
                        if (a.correct) {
                            score += 100;
                            document.getElementById('score').textContent = score;
                            nextQuestion();
                        } else {
                            lives--;
                            document.getElementById('lives').textContent = lives;
                        }
                        answers.splice(i, 1);
                        break;
                    }
                }
            }

            // Verificar se todas as respostas foram destruídas
            if (answers.length === 0) {
                nextQuestion();
            }

            // Game Over
            if (lives <= 0) {
                gameOver();
            }
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Estrelas de fundo
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 80; i++) {
                const x = (i * 37) % canvas.width;
                const y = (i * 23) % (canvas.height - 100);
                ctx.globalAlpha = 0.6 + Math.sin(Date.now()/300 + i) * 0.4;
                ctx.fillRect(x, y, 2, 2);
            }
            ctx.globalAlpha = 1;

            // Desenhar elementos
            drawShip();
            
            bullets.forEach(b => b.draw());
            answers.forEach(a => a.draw());
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function nextQuestion() {
            currentQuestionIndex = (currentQuestionIndex + 1) % questions.length;
            document.getElementById('question').textContent = questions[currentQuestionIndex].question;
            spawnAnswers();
        }

        function shoot() {
            if (!gameRunning) return;
            bullets.push(new Bullet(ship.x + 22, ship.y - 10));
        }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            gameRunning = true;
            score = 0;
            lives = 3;
            currentQuestionIndex = 0;
            bullets = [];
            answers = [];
            
            document.getElementById('score').textContent = '0';
            document.getElementById('lives').textContent = '3';
            document.getElementById('question').textContent = questions[0].question;
            
            spawnAnswers();
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('final-score').textContent = score;
            document.getElementById('game-over').style.display = 'flex';
        }

        function restartGame() {
            document.getElementById('game-over').style.display = 'none';
            startGame();
        }

        // Controles
        function setupControls() {
            // Teclado
            window.addEventListener('keydown', e => {
                keys[e.key] = true;
                if (e.key === ' ' || e.key === 'Enter') shoot();
            });
            window.addEventListener('keyup', e => keys[e.key] = false);

            // Botões na tela
            document.getElementById('left-btn').addEventListener('touchstart', e => {
                e.preventDefault();
                keys['ArrowLeft'] = true;
            });
            document.getElementById('left-btn').addEventListener('touchend', e => {
                e.preventDefault();
                keys['ArrowLeft'] = false;
            });

            document.getElementById('right-btn').addEventListener('touchstart', e => {
                e.preventDefault();
                keys['ArrowRight'] = true;
            });
            document.getElementById('right-btn').addEventListener('touchend', e => {
                e.preventDefault();
                keys['ArrowRight'] = false;
            });

            const shootBtn = document.getElementById('shoot-btn');
            shootBtn.addEventListener('touchstart', e => {
                e.preventDefault();
                shoot();
            });
            shootBtn.addEventListener('click', shoot); // também para desktop

            // Swipe na tela para mover nave (melhor experiência mobile)
            canvas.addEventListener('touchstart', e => {
                if (!gameRunning) return;
                touchStartX = e.touches[0].clientX;
                isDragging = true;
            });

            canvas.addEventListener('touchmove', e => {
                if (!isDragging || !gameRunning) return;
                e.preventDefault();
                const currentX = e.touches[0].clientX;
                const delta = currentX - touchStartX;
                
                ship.x += delta * 0.8;
                touchStartX = currentX;
                
                ship.x = Math.max(20, Math.min(canvas.width - 70, ship.x));
            });

            canvas.addEventListener('touchend', () => {
                isDragging = false;
            });

            // Clique/tap na tela também atira
            canvas.addEventListener('click', () => {
                if (gameRunning) shoot();
            });
        }

        // Iniciar
        setupControls();
        gameLoop();
    </script>
</body>
</html>
