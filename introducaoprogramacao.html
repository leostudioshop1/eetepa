<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🚀 Quiz Shooter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            color: #0ff;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            touch-action: none;
            height: 100vh;
            width: 100vw;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
        }
        canvas {
            display: block;
            background: #001122;
            touch-action: none;
        }
        #ui {
            position: absolute;
            top: 12px;
            left: 0;
            width: 100%;
            padding: 0 15px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }
        .stat {
            background: rgba(0, 20, 40, 0.85);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 18px;
            font-weight: bold;
            backdrop-filter: blur(6px);
        }
        #question {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 30, 60, 0.95);
            padding: 14px 25px;
            border-radius: 15px;
            font-size: 19px;
            text-align: center;
            max-width: 92%;
            border: 2px solid #0ff;
            pointer-events: none;
            z-index: 20;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }
        #controls {
            position: absolute;
            bottom: 25px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 30;
            gap: 15px;
        }
        button {
            background: rgba(0, 255, 255, 0.15);
            color: #0ff;
            border: 2px solid #0ff;
            padding: 16px 28px;
            font-size: 17px;
            border-radius: 50px;
            backdrop-filter: blur(8px);
            flex: 1;
        }
        #start-screen, #game-over {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 10, 30, 0.97);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 100;
            color: #0ff;
        }
        h1 { 
            font-size: 48px; 
            margin-bottom: 20px; 
            text-shadow: 0 0 25px #0ff;
        }
        button.big {
            font-size: 26px;
            padding: 18px 50px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="canvas"></canvas>
        
        <div id="ui">
            <div class="stat">Pontos: <span id="score">0</span></div>
            <div class="stat">Vidas: <span id="lives">3</span></div>
        </div>
        
        <div id="question">Toque em INICIAR</div>
        
        <div id="controls">
            <button id="left-btn">← ESQUERDA</button>
            <button id="shoot-btn">🔫 ATIRAR</button>
            <button id="right-btn">DIREITA →</button>
        </div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen">
        <h1>🚀 QUIZ SHOOTER</h1>
        <p style="font-size: 24px; margin-bottom: 40px; text-align:center;">Destrua as respostas corretas!</p>
        <button class="big" onclick="startGame()">INICIAR MISSÃO</button>
    </div>

    <!-- Game Over -->
    <div id="game-over" style="display: none;">
        <h1>FIM DE MISSÃO</h1>
        <p style="font-size: 32px; margin: 25px 0;">Pontuação: <span id="final-score">0</span></p>
        <button class="big" onclick="restartGame()">JOGAR NOVAMENTE</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Variáveis do jogo
        let ship = { x: canvas.width/2 - 30, y: canvas.height - 100, width: 60, height: 50, speed: 3.5 }; // reduzido
        let bullets = [];
        let answers = [];
        let score = 0;
        let lives = 3;
        let gameRunning = false;
        let currentQuestionIndex = 0;
        let keys = {};
        let touchStartX = 0;
        let isDragging = false;

        const questions = [
            { question: "Qual é a capital do Brasil?", answers: [
                { text: "São Paulo", correct: false }, { text: "Brasília", correct: true },
                { text: "Rio de Janeiro", correct: false }, { text: "Salvador", correct: false }
            ]},
            { question: "Quanto é 8 × 7?", answers: [
                { text: "54", correct: false }, { text: "49", correct: false },
                { text: "56", correct: true }, { text: "63", correct: false }
            ]},
            { question: "Qual planeta é o Vermelho?", answers: [
                { text: "Vênus", correct: false }, { text: "Júpiter", correct: false },
                { text: "Marte", correct: true }, { text: "Saturno", correct: false }
            ]},
            { question: "Quem pintou a Mona Lisa?", answers: [
                { text: "Van Gogh", correct: false }, { text: "Picasso", correct: false },
                { text: "Leonardo da Vinci", correct: true }, { text: "Michelangelo", correct: false }
            ]}
        ];

        class Bullet {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 8;
                this.height = 22;
                this.speed = 4.5; // reduzido em ~80%
            }
            update() { this.y -= this.speed; }
            draw() {
                ctx.fillStyle = '#0ff';
                ctx.shadowBlur = 20;
                ctx.shadowColor = '#0ff';
                ctx.fillRect(this.x, this.y, this.width, this.height);
                ctx.shadowBlur = 0;
            }
        }

        class Answer {
            constructor(x, text, correct) {
                this.x = x;
                this.y = 100;
                this.width = 160;
                this.height = 58;
                this.text = text;
                this.correct = correct;
                this.speed = 0.9 + Math.random() * 0.6; // velocidade reduzida
            }
            update() { this.y += this.speed; }
            draw() {
                ctx.fillStyle = this.correct ? '#0f0' : '#f44';
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 4;
                ctx.shadowBlur = 15;
                ctx.shadowColor = this.correct ? '#0f0' : '#f44';
                
                ctx.fillRect(this.x - this.width/2, this.y, this.width, this.height);
                ctx.strokeRect(this.x - this.width/2, this.y, this.width, this.height);
                ctx.shadowBlur = 0;

                ctx.fillStyle = '#000';
                ctx.font = 'bold 19px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.text, this.x, this.y + this.height/2);
            }
        }

        function drawShip() {
            ctx.save();
            ctx.translate(ship.x + 30, ship.y + 25);
            ctx.fillStyle = '#0ff';
            ctx.beginPath();
            ctx.moveTo(0, -30);
            ctx.lineTo(-25, 25);
            ctx.lineTo(25, 25);
            ctx.closePath();
            ctx.fill();
            
            ctx.fillStyle = '#f80';
            ctx.fillRect(-10, 8, 20, 14);
            ctx.restore();
        }

        function spawnAnswers() {
            answers = [];
            const q = questions[currentQuestionIndex];
            const positions = [canvas.width * 0.2, canvas.width * 0.45, canvas.width * 0.7, canvas.width * 0.9];
            
            const shuffled = [...q.answers].sort(() => Math.random() - 0.5);
            
            shuffled.forEach((ans, i) => {
                if (i < 4) {
                    const a = new Answer(positions[i], ans.text, ans.correct);
                    answers.push(a);
                }
            });
        }

        function update() {
            if (!gameRunning) return;

            if (keys['ArrowLeft'] || keys['a'] || keys['A']) ship.x -= ship.speed;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) ship.x += ship.speed;

            ship.x = Math.max(30, Math.min(canvas.width - 90, ship.x));

            // Bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].update();
                if (bullets[i].y < -30) bullets.splice(i, 1);
            }

            // Answers
            for (let i = answers.length - 1; i >= 0; i--) {
                answers[i].update();
                
                if (answers[i].y + answers[i].height > canvas.height - 80) {
                    if (answers[i].correct) lives--;
                    answers.splice(i, 1);
                    continue;
                }

                // Colisão
                for (let j = bullets.length - 1; j >= 0; j--) {
                    const b = bullets[j];
                    const a = answers[i];
                    if (b.x > a.x - a.width/2 && b.x < a.x + a.width/2 &&
                        b.y > a.y && b.y < a.y + a.height) {
                        
                        bullets.splice(j, 1);
                        
                        if (a.correct) {
                            score += 100;
                            document.getElementById('score').textContent = score;
                            nextQuestion();
                        } else {
                            lives--;
                            document.getElementById('lives').textContent = lives;
                        }
                        answers.splice(i, 1);
                        break;
                    }
                }
            }

            if (answers.length === 0) nextQuestion();
            if (lives <= 0) gameOver();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Fundo estrelado
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 100; i++) {
                const x = (i * 43) % canvas.width;
                const y = (i * 29 + Date.now()/30) % canvas.height;
                ctx.globalAlpha = 0.7;
                ctx.fillRect(x, y, 2.5, 2.5);
            }
            ctx.globalAlpha = 1;

            drawShip();
            bullets.forEach(b => b.draw());
            answers.forEach(a => a.draw());
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function nextQuestion() {
            currentQuestionIndex = (currentQuestionIndex + 1) % questions.length;
            document.getElementById('question').textContent = questions[currentQuestionIndex].question;
            spawnAnswers();
        }

        function shoot() {
            if (!gameRunning) return;
            bullets.push(new Bullet(ship.x + 26, ship.y - 10));
        }

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            gameRunning = true;
            score = 0;
            lives = 3;
            currentQuestionIndex = 0;
            bullets = [];
            answers = [];
            
            document.getElementById('score').textContent = '0';
            document.getElementById('lives').textContent = '3';
            document.getElementById('question').textContent = questions[0].question;
            spawnAnswers();
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('final-score').textContent = score;
            document.getElementById('game-over').style.display = 'flex';
        }

        function restartGame() {
            document.getElementById('game-over').style.display = 'none';
            startGame();
        }

        // Controles
        function setupControls() {
            window.addEventListener('keydown', e => { keys[e.key] = true; if (e.key === ' ' || e.key === 'Enter') shoot(); });
            window.addEventListener('keyup', e => keys[e.key] = false);

            document.getElementById('left-btn').addEventListener('touchstart', e => { e.preventDefault(); keys['ArrowLeft'] = true; });
            document.getElementById('left-btn').addEventListener('touchend', e => { e.preventDefault(); keys['ArrowLeft'] = false; });

            document.getElementById('right-btn').addEventListener('touchstart', e => { e.preventDefault(); keys['ArrowRight'] = true; });
            document.getElementById('right-btn').addEventListener('touchend', e => { e.preventDefault(); keys['ArrowRight'] = false; });

            const shootBtn = document.getElementById('shoot-btn');
            shootBtn.addEventListener('touchstart', e => { e.preventDefault(); shoot(); });
            shootBtn.addEventListener('click', shoot);

            // Swipe para mover
            canvas.addEventListener('touchstart', e => {
                if (!gameRunning) return;
                touchStartX = e.touches[0].clientX;
                isDragging = true;
            });

            canvas.addEventListener('touchmove', e => {
                if (!isDragging || !gameRunning) return;
                e.preventDefault();
                const delta = e.touches[0].clientX - touchStartX;
                ship.x += delta * 0.9;
                touchStartX = e.touches[0].clientX;
                ship.x = Math.max(30, Math.min(canvas.width - 90, ship.x));
            });

            canvas.addEventListener('touchend', () => isDragging = false);
            canvas.addEventListener('click', () => { if (gameRunning) shoot(); });
        }

        setupControls();
        gameLoop();
    </script>
</body>
</html>
