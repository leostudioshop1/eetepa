<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>🚀 REVISÃO JS - EETEPA 26</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        :root {
            --neon-blue: #00f0ff;
            --neon-green: #39ff14;
            --neon-pink: #ff007f;
            --neon-purple: #9d00ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            touch-action: none;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #0c0822 0%, #02000a 100%);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            touch-action: none;
        }

        #hud { position: absolute; top: 12px; left: 0; width: 100%; padding: 0 15px; display: flex; justify-content: space-between; z-index: 10; pointer-events: none; }
        .hud-panel {
            background: rgba(3, 0, 30, 0.75);
            border: 1px solid rgba(0, 240, 255, 0.4);
            padding: 8px 16px;
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(10px, 2.2vw, 14px);
            backdrop-filter: blur(12px);
        }

        #question-panel {
            position: absolute;
            top: 72px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(3, 0, 30, 0.9);
            border: 2px solid var(--neon-blue);
            padding: 10px 20px;
            border-radius: 16px;
            max-width: 92%;
            width: 560px;
            z-index: 10;
            backdrop-filter: blur(12px);
        }

        #mobile-controls {
            position: absolute;
            bottom: clamp(12px, 4vh, 28px);
            left: 0; width: 100%;
            display: none;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 20;
            gap: 12px;
        }

        @media (pointer: coarse) {
            #mobile-controls { display: flex; }
        }

        .game-btn {
            background: rgba(0, 240, 255, 0.12);
            color: var(--neon-blue);
            border: 2.5px solid var(--neon-blue);
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            padding: clamp(14px, 4.5vw, 18px) 12px;
            border-radius: 50px;
            flex: 1;
            min-height: 64px;
            font-size: clamp(13px, 3vw, 16px);
        }

        #shoot-btn {
            background: rgba(255, 0, 127, 0.15);
            color: var(--neon-pink);
            border-color: var(--neon-pink);
            flex: 1.35;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 0, 10, 0.96);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; padding: 20px; text-align: center; backdrop-filter: blur(15px);
        }

        .big-btn {
            background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
            color: #fff;
            padding: clamp(14px, 3vh, 22px) clamp(32px, 7vw, 52px);
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(17px, 4.5vw, 26px);
            border-radius: 50px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="canvas"></canvas>
        
        <div id="hud">
            <div class="hud-panel">
                <div>SCORE: <span id="score" class="stat-glow-blue">00000</span></div>
                <div>REC: <span id="highscore" style="color: #bbb;">00000</span></div>
            </div>
            <div class="hud-panel">
                <div>VIDAS: <span id="lives" class="stat-glow-pink">||||||||||||||||||||||||</span></div>
                <div style="display: flex; gap: 12px;">
                    <i class="fa-solid fa-volume-high control-icon" id="audio-toggle"></i>
                    <i class="fa-solid fa-pause control-icon" id="pause-toggle"></i>
                </div>
            </div>
        </div>
        
        <div id="question-panel">
            <div id="question-category">JavaScript</div>
            <div id="question-text">Carregando...</div>
        </div>
        
        <div id="mobile-controls">
            <button class="game-btn" id="left-btn"><i class="fa-solid fa-caret-left"></i> ESQ</button>
            <button class="game-btn" id="shoot-btn"><i class="fa-solid fa-crosshairs"></i> ATIRAR</button>
            <button class="game-btn" id="right-btn">DIR <i class="fa-solid fa-caret-right"></i></button>
        </div>

        <div id="start-screen" class="overlay">
            <h1>REVISÃO JS-EETEPA-26</h1>
            <p>Arraste para mover • Toque duas vezes para atirar</p>
            <button class="big-btn" onclick="game.startGame()">INICIAR REVISÃO</button>
        </div>

        <div id="game-over" class="overlay" style="display: none; opacity: 0;">
            <h1 style="color: var(--neon-pink);">FIM DE JOGO</h1>
            <p>Pontuação Final</p>
            <div id="final-score" style="font-size: 52px; font-weight: bold; color: var(--neon-pink);">0</div>
            <button class="big-btn" onclick="game.restartGame()">JOGAR NOVAMENTE</button>
        </div>

        <div id="pause-screen" class="overlay" style="display: none;">
            <h1>PAUSADO</h1>
            <button class="big-btn" onclick="game.togglePause()">RETOMAR</button>
        </div>
    </div>

    <script>
        class SoundSynth { /* ... mesmo código anterior ... */ 
            constructor() { this.ctx = null; this.muted = false; }
            init() { if (this.ctx) return; this.ctx = new (window.AudioContext || window.webkitAudioContext)(); }
            playLaser() {
                if (this.muted || !this.ctx) return; this.init();
                let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain();
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(820, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(90, this.ctx.currentTime + 0.14);
                gain.gain.setValueAtTime(0.25, this.ctx.currentTime); gain.gain.linearRampToValueAtTime(0.008, this.ctx.currentTime + 0.14);
                osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + 0.14);
            }
            playExplosion(isCorrect) {
                if (this.muted || !this.ctx) return; this.init();
                let dur = isCorrect ? 0.28 : 0.48;
                let osc = this.ctx.createOscillator(); let gain = this.ctx.createGain();
                osc.type = 'triangle'; osc.frequency.setValueAtTime(isCorrect ? 420 : 140, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(30, this.ctx.currentTime + dur);
                gain.gain.setValueAtTime(isCorrect ? 0.25 : 0.45, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.008, this.ctx.currentTime + dur);
                osc.connect(gain); gain.connect(this.ctx.destination); osc.start(); osc.stop(this.ctx.currentTime + dur);
            }
        }

        const audio = new SoundSynth();

        const originalQuestions = [ /* As 20 questões mantidas (mesmo array do arquivo anterior) */ 
            // ... (copie o array completo de originalQuestions aqui) ...
            { question: "Como declarar variável em JavaScript?", category: "JavaScript", answers: [{ text: "int", correct: false }, { text: "define", correct: false }, { text: "let", correct: true }, { text: "inteiro", correct: false }] },
            // ... adicione todas as outras 19 questões ...
        ];

        let questions = [];

        // Classes Particle, Bullet, AsteroideAnswer e GameEngine (mantidas com melhorias)

        class GameEngine {
            constructor() {
                this.canvas = document.getElementById('canvas');
                this.ctx = this.canvas.getContext('2d');
                this.ship = { x: 0, y: 0, width: 48, height: 42, targetX: 0, speed: 15.5 };
                this.bullets = []; this.answers = []; this.particles = []; this.starfield = [];
                this.score = 0; this.lives = 24; this.currentQuestionIdx = 0;
                this.isPlaying = false; this.isPaused = false; this.screenShake = 0; this.keys = {};
                
                this.lastTap = 0;        // Para detectar double tap
                this.tapTimeout = null;

                this.initEvents();
                this.resize();
                this.generateStars();
            }

            initEvents() {
                window.addEventListener('resize', () => this.resize());

                // === TOUCH - DOUBLE TAP PARA ATIRAR ===
                this.canvas.addEventListener('touchstart', (e) => {
                    if (!this.isPlaying || this.isPaused) return;
                    e.preventDefault();

                    const now = Date.now();
                    const tapLength = now - this.lastTap;

                    if (tapLength < 450 && tapLength > 0) {
                        // Double tap → Atirar
                        this.shootLaser();
                        clearTimeout(this.tapTimeout);
                    } else {
                        // Single tap → apenas mover (não atira)
                        this.tapTimeout = setTimeout(() => {
                            // Aqui você pode adicionar feedback visual se quiser
                        }, 300);
                    }
                    this.lastTap = now;

                    // Atualiza posição da nave
                    this.updateShipPosition(e);
                }, { passive: false });

                this.canvas.addEventListener('touchmove', (e) => {
                    if (!this.isPlaying || this.isPaused) return;
                    e.preventDefault();
                    this.updateShipPosition(e);
                }, { passive: false });

                // Controles virtuais (botões)
                document.getElementById('left-btn').addEventListener('touchstart', (e) => { e.preventDefault(); this.keys['ArrowLeft'] = true; });
                document.getElementById('left-btn').addEventListener('touchend', (e) => { e.preventDefault(); this.keys['ArrowLeft'] = false; });
                
                document.getElementById('right-btn').addEventListener('touchstart', (e) => { e.preventDefault(); this.keys['ArrowRight'] = true; });
                document.getElementById('right-btn').addEventListener('touchend', (e) => { e.preventDefault(); this.keys['ArrowRight'] = false; });

                document.getElementById('shoot-btn').addEventListener('touchstart', (e) => { 
                    e.preventDefault(); 
                    this.shootLaser(); 
                });

                // Teclado (desktop)
                window.addEventListener('keydown', (e) => {
                    this.keys[e.key] = true;
                    if ((e.key === ' ' || e.key.toLowerCase() === 'w') && this.isPlaying && !this.isPaused) {
                        e.preventDefault();
                        this.shootLaser();
                    }
                });
                window.addEventListener('keyup', (e) => this.keys[e.key] = false);

                // Áudio e Pause
                document.getElementById('audio-toggle').addEventListener('click', (e) => {
                    e.stopPropagation();
                    audio.muted = !audio.muted;
                    e.target.className = audio.muted ? "fa-solid fa-volume-xmark control-icon" : "fa-solid fa-volume-high control-icon";
                });

                document.getElementById('pause-toggle').addEventListener('click', (e) => { 
                    e.stopPropagation(); 
                    this.togglePause(); 
                });
            }

            updateShipPosition(e) {
                const rect = this.canvas.getBoundingClientRect();
                const touch = e.touches[0];
                this.ship.targetX = touch.clientX - rect.left - this.ship.width / 2;
            }

            // === RECURSOS EXCLUSIVOS PARA SMARTPHONES ===
            vibrate(pattern = 50) {
                if (navigator.vibrate) {
                    navigator.vibrate(pattern);
                }
            }

            shootLaser() {
                if (!this.isPlaying || this.isPaused) return;
                this.bullets.push(new Bullet(this.ship.x + 5, this.ship.y - 4));
                this.bullets.push(new Bullet(this.ship.x + this.ship.width - 9, this.ship.y - 4));
                audio.playLaser();
                this.vibrate(30); // feedback tátil ao atirar
            }

            registerHit(ans) {
                this.triggerExplosion(ans.x, ans.y + ans.height/2, ans.correct ? '#39ff14' : '#ff007f');
                if (ans.correct) {
                    this.score += 100;
                    this.currentQuestionIdx++;
                    if (this.currentQuestionIdx >= questions.length) {
                        this.currentQuestionIdx = 0;
                        questions.sort(() => Math.random() - 0.5);
                    }
                    this.loadQuestion();
                    this.vibrate([40, 60, 40]); // vibração de acerto
                } else {
                    this.lives--;
                    this.screenShake = 12;
                    this.vibrate([100, 50, 100]); // vibração forte de erro
                    if (this.lives > 0) this.spawnAnswers(questions[this.currentQuestionIdx]);
                }
                audio.playExplosion(ans.correct);
                this.updateHUD();
                if (this.lives <= 0) this.endGame();
            }

            // ... resto do código (update, draw, startGame, etc.) permanece igual ao anterior ...

            startGame() {
                audio.init();
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('game-over').style.display = 'none';
                this.score = 0; this.lives = 24; this.currentQuestionIdx = 0;
                this.bullets = []; this.answers = []; this.particles = [];
                this.isPlaying = true; this.isPaused = false;
                
                questions = [...originalQuestions].sort(() => Math.random() - 0.5);
                this.ship.x = this.canvas.width / 2 - this.ship.width / 2;
                this.ship.targetX = this.ship.x;
                this.updateHUD();
                this.loadQuestion();
            }

            // (Mantenha as demais funções como no arquivo anterior: resize, update, draw, etc.)
        }

        const game = new GameEngine();
        game.loop();
    </script>
</body>
</html>
