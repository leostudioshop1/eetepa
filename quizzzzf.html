<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZZ AULA 01 A 04</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root{
            --bg:#020617;
            --card:#0f172a;
            --neon:#00ff88;
            --danger:#ff4655;
            --accent:#7000ff;
            --text:#f8fafc;
            --border:#1e293b;
        }

        body{
            font-family:'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            background-image: 
                linear-gradient(rgba(112, 0, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(112, 0, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            display:flex;
            flex-direction:column;
            align-items:center;
            padding:20px;
            color:var(--text);
            min-height: 100vh;
            margin: 0;
        }

        #setup, #quiz-container, #leaderboard, #result-container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5), inset 0 0 10px rgba(112, 0, 255, 0.1);
            width: 100%;
            max-width: 700px;
            margin-bottom: 30px;
            border: 2px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        #setup::before {
            content: ""; position: absolute; top: 0; left: 0; width: 4px; height: 100%; background: var(--accent);
        }

        h2 { 
            color: var(--neon); 
            text-transform: uppercase; 
            letter-spacing: 2px;
            font-size: 1.8rem;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
        }

        .question { 
            font-size: 1.3rem; 
            margin-bottom: 25px; 
            color: #fff; 
            line-height: 1.4;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .options { display: grid; gap: 12px; }
        
        button {
            padding: 15px;
            cursor: pointer;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: rgba(30, 41, 59, 0.5);
            color: var(--text);
            transition: all 0.2s ease;
            font-size: 1rem;
            text-align: left;
            font-weight: 500;
        }

        button:hover:not(:disabled) { 
            background: var(--accent); 
            border-color: var(--neon);
            box-shadow: 0 0 15px rgba(112, 0, 255, 0.4);
            transform: translateX(5px);
        }

        .btn-submit { 
            background: var(--neon); 
            color: #000; 
            border: none; 
            margin-top: 25px; 
            width: 100%; 
            font-weight: 900; 
            font-size: 1.2rem; 
            text-align: center;
            text-transform: uppercase;
            clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
        }

        .btn-submit:hover { filter: brightness(1.2); cursor: pointer; }

        input[type="text"] { 
            padding: 15px; 
            width: 100%; 
            box-sizing: border-box; 
            border: 1px solid var(--border); 
            border-radius: 4px; 
            margin-bottom: 15px; 
            font-size: 1.1rem; 
            background: #000; 
            color: var(--neon); 
            outline: none;
        }

        input[type="text"]:focus { border-color: var(--neon); box-shadow: 0 0 10px rgba(0, 255, 136, 0.2); }

        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { color: #64748b; text-transform: uppercase; font-size: 0.75rem; padding: 10px; text-align: left; }
        td { background: rgba(30, 41, 59, 0.3); padding: 15px; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
        td:first-child { border-left: 1px solid var(--border); border-radius: 8px 0 0 8px; text-align: left; color: var(--neon); }
        td:last-child { border-right: 1px solid var(--border); border-radius: 0 8px 8px 0; font-weight: bold; }

        footer {
            margin-top: 40px;
            padding: 20px;
            font-size: 0.9rem;
            color: var(--neon);
            text-align: center;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 3px;
            opacity: 0.7;
        }

        .hidden { display: none; }
        #performanceChart { max-width: 400px; margin: 0 auto; }
    </style>
</head>
<body>

<div id="setup">
    <h2>QUIZZ AULA 01 A 04</h2>
    <p style="color: #94a3b8;">Sistemas de Arquivos, Lógica e Hardware</p>
    <input type="text" id="username" placeholder="PLAYER NAME..." maxlength="25">
    <button class="btn-submit" onclick="startQuiz()">START GAME</button>
</div>

<div id="quiz-container" class="hidden">
    <div id="progress" style="color:var(--accent); font-weight: bold; margin-bottom: 15px;"></div>
    <div class="question" id="question-text"></div>
    <div class="options" id="options-container"></div>
    <button id="next-btn" class="btn-submit" onclick="nextQuestion()" disabled>NEXT LEVEL</button>
</div>

<div id="result-container" class="hidden">
    <h2 style="text-align:center">GAME OVER - STATS</h2>
    <canvas id="performanceChart"></canvas>
    <p id="final-score-text" style="text-align:center; font-size:1.4rem; margin: 20px 0; font-weight: bold;"></p>
    <button class="btn-submit" onclick="location.reload()">RETRY</button>
</div>

<div id="leaderboard">
    <h2>🏆 HALL OF FAME</h2>
    <table>
        <thead><tr><th>PLAYER</th><th>SCORE</th></tr></thead>
        <tbody id="ranking-body"></tbody>
    </table>
</div>

<footer>
    DESENVOLVIDO POR = LÉO CRUZ - ENGENHEIRO DE SOFTWARE
</footer>

<script>
const SUPABASE_URL="https://osofdmgokrxdzsxozsrf.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zb2ZkbWdva3J4ZHpzeG96c3JmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMzk4ODMsImV4cCI6MjA4ODYxNTg4M30.lALjkQ65DPLFiLboHNH4mKzwoNZPFyGjwRLW-IrMH4c";
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentQuestion = 0;
let score = 0;
let user = "";

const questions = [
    // LÓGICA (1-20)
    {q:"O que o operador && faz?", o:["Retorna verdadeiro se ambos forem verdadeiros","Retorna verdadeiro se um for verdadeiro"], a:0},
    {q:"Qual o símbolo do operador OU (OR)?", o:["&&","||","!"], a:1},
    {q:"O que o operador ! faz?", o:["Soma valores","Inverte o valor lógico"], a:1},
    {q:"Resultado de (10 > 5 && 3 < 2)?", o:["true","false"], a:1},
    {q:"Resultado de (5 == 5 || 4 > 10)?", o:["true","false"], a:0},
    {q:"Qual o resultado de !true?", o:["false","true"], a:0},
    {q:"(true && true) é:", o:["Verdadeiro","Falso"], a:0},
    {q:"(false || false) é:", o:["Verdadeiro","Falso"], a:1},
    {q:"Se A=true e B=false, quanto é A && B?", o:["true","false"], a:1},
    {q:"Se A=false, quanto é !A?", o:["true","false"], a:0},
    {q:"O que significa '==' em programação?", o:["Atribuição","Comparação"], a:1},
    {q:"O que significa '!='?", o:["Diferente de","Igual a"], a:0},
    {q:"O resultado de (10 != 10) é:", o:["true","false"], a:1},
    {q:"Qual operador tem prioridade?", o:["&&","||"], a:0},
    {q:"'false && !false' resulta em:", o:["true","false"], a:1},
    {q:"(5 >= 5) retorna:", o:["true","false"], a:0},
    {q:"(2 < 1 || 3 > 2) retorna:", o:["true","false"], a:0},
    {q:"O que é um algoritmo?", o:["Um erro","Passos para resolver um problema"], a:1},
    {q:"Qual dessas é booleana?", o:["'Texto'","true"], a:1},
    {q:"O símbolo '>' significa:", o:["Menor","Maior"], a:1},
    
    // SISTEMA DE ARQUIVOS (21-40)
    {q:"O que significa NTFS?", o:["New Technology File System","Network File System"], a:0},
    {q:"Sistema de arquivos padrão do Linux?", o:["FAT32","EXT4"], a:1},
    {q:"FAT32 suporta arquivos de 10GB?", o:["Sim","Não"], a:1},
    {q:"Extensão .txt é de:", o:["Imagem","Texto simples"], a:1},
    {q:"Executável no Windows?", o:[".exe", ".pdf"], a:0},
    {q:"Onde ficam arquivos permanentes?", o:["RAM","HD/SSD"], a:1},
    {q:"O que é formatar?", o:["Limpar e preparar o sistema de arquivos","Aumentar o espaço"], a:0},
    {q:"O que é um diretório?", o:["Um arquivo","Uma pasta"], a:1},
    {q:"Extensão de imagem?", o:[".png",".mp3"], a:0},
    {q:"Comando 'ls' no Linux?", o:["Desliga","Lista arquivos"], a:1},
    {q:"Comando 'dir' no Windows?", o:["Lista diretórios","Cria pasta"], a:0},
    {q:"Função da Lixeira?", o:["Exclusão total","Armazenamento temporário"], a:1},
    {q:"O que é o Path?", o:["Tamanho","Endereço do arquivo"], a:1},
    {q:"FAT32 é bom para pendrives?", o:["Sim, pela compatibilidade","Não"], a:0},
    {q:"Comprimir um arquivo serve para:", o:["Aumentar qualidade","Reduzir espaço"], a:1},
    {q:"Extensão comprimida?", o:[".zip",".docx"], a:0},
    {q:"Arquivo oculto:", o:["Não aparece por padrão","Está deletado"], a:0},
    {q:"Sistema do macOS?", o:["APFS","NTFS"], a:0},
    {q:"Deletar um atalho apaga o programa?", o:["Sim","Não"], a:1},
    {q:"Fragmentação de disco ocorre em:", o:["SSD","HD"], a:1},

    // HARDWARE (41-60)
    {q:"O que significa HD?", o:["Hard Disk","High Data"], a:0},
    {q:"Diferença do SSD?", o:["Lento","Rápido e sem discos"], a:1},
    {q:"HD usa qual tecnologia?", o:["Laser","Magnética"], a:1},
    {q:"O que significa SSD?", o:["Solid State Drive","Space System Disk"], a:0},
    {q:"Mais resistente a quedas?", o:["HD","SSD"], a:1},
    {q:"Conexão interna comum de HD?", o:["SATA","HDMI"], a:0},
    {q:"NVMe é um tipo de:", o:["SSD super rápido","Processador"], a:0},
    {q:"Capacidade de HD é medida em:", o:["GB/TB","Watts"], a:0},
    {q:"RPM em HD significa:", o:["Rotações Por Minuto","Rápido Por Minuto"], a:0},
    {q:"HD de notebook comum?", o:["3.5'","2.5'"], a:1},
    {q:"Cache do HD serve para:", o:["Velocidade","Limpeza"], a:0},
    {q:"SSD consome menos energia?", o:["Sim","Não"], a:0},
    {q:"HD Externo usa porta:", o:["SATA","USB"], a:1},
    {q:"O que é TBW no SSD?", o:["Terabytes escritos (vida útil)","Total de bits"], a:0},
    {q:"Ímã perto de HD é perigoso?", o:["Sim","Não"], a:0},
    {q:"Tamanho de HD de Desktop?", o:["3.5'","2.5'"], a:0},
    {q:"SSD é silencioso?", o:["Sim","Não"], a:0},
    {q:"Cabo de dados do HD?", o:["SATA","VGA"], a:0},
    {q:"Posso usar SSD e HD juntos?", o:["Sim","Não"], a:0},
    {q:"S.M.A.R.T. monitora:", o:["Saúde do disco","Velocidade da internet"], a:0}
];

async function startQuiz(){
    const input = document.getElementById('username');
    user = input.value.trim();
    if(!user) return alert("PLAYER! ENTER YOUR NAME!");

    document.getElementById('setup').classList.add('hidden');
    document.getElementById('quiz-container').classList.remove('hidden');
    showQuestion();
}

function showQuestion(){
    const q = questions[currentQuestion];
    document.getElementById('progress').innerText = `LEVEL ${currentQuestion + 1} / ${questions.length}`;
    document.getElementById('question-text').innerText = q.q;

    const container = document.getElementById('options-container');
    container.innerHTML = "";

    q.o.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.innerText = opt;
        btn.onclick = () => selectOption(btn, i);
        container.appendChild(btn);
    });

    document.getElementById('next-btn').disabled = true;
}

function selectOption(clickedBtn, index){
    const q = questions[currentQuestion];
    const allBtns = document.querySelectorAll('#options-container button');
    allBtns.forEach(btn => btn.disabled = true);

    if(index === q.a){
        score++;
        clickedBtn.style.background = "var(--neon)";
        clickedBtn.style.color = "#000";
    } else {
        clickedBtn.style.background = "var(--danger)";
        clickedBtn.style.color = "#fff";
    }
    document.getElementById('next-btn').disabled = false;
}

async function nextQuestion(){
    currentQuestion++;
    if(currentQuestion < questions.length){
        showQuestion();
    } else {
        await finishQuiz();
    }
}

async function finishQuiz(){
    document.getElementById('quiz-container').classList.add('hidden');
    document.getElementById('result-container').classList.remove('hidden');
    document.getElementById('final-score-text').innerHTML = `SCORE: ${score} / ${questions.length}`;

    renderChart();

    try {
        await _supabase.from('ranking').insert([{ username: user, score: score }]);
    } catch(err) { console.error(err.message); }
}

function renderChart() {
    const ctx = document.getElementById('performanceChart').getContext('2d');
    new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['ACERTOS', 'ERROS'],
            datasets: [{
                data: [score, questions.length - score],
                backgroundColor: ['#00ff88', '#ff4655'],
                borderWidth: 0,
                hoverOffset: 10
            }]
        },
        options: {
            plugins: {
                legend: { position: 'bottom', labels: { color: '#f8fafc', font: { weight: 'bold' } } }
            }
        }
    });
}

async function fetchRanking(){
    const { data, error } = await _supabase.from('ranking').select('username,score').order('score', {ascending:false}).limit(10);
    if(error) return;
    const body = document.getElementById('ranking-body');
    body.innerHTML = data.map(row => `<tr><td>${row.username}</td><td>${row.score} PTS</td></tr>`).join('');
}

_supabase.channel('ranking-live').on('postgres_changes', {event:'INSERT', schema:'public', table:'ranking'}, () => fetchRanking()).subscribe();
fetchRanking();
</script>
</body>
</html>
