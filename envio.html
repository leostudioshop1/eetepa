<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Envio de Atividade</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family: Arial;
background:#f4f4f4;
text-align:center;
padding:40px;
}

input,select,button{
padding:10px;
margin:10px;
width:250px;
}

button{
background:#2ecc71;
color:white;
border:none;
cursor:pointer;
}
</style>
</head>

<body>

<h2>Enviar Atividade</h2>

<input type="text" id="nome" placeholder="Nome do aluno">

<select id="atividade">
<option value="">Fez a atividade?</option>
<option value="Sim">Sim</option>
<option value="Não">Não</option>
</select>

<br>

<button onclick="enviar()">Enviar</button>

<p id="msg"></p>

<script>

  const _supabase = supabase.createClient('https://osofdmgokrxdzsxozsrf.supabase.co', 'sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe');
        const supabase = supabase.createClient(SB_URL, SB_KEY);


async function enviar(){

let nome = document.getElementById("nome").value
let atividade = document.getElementById("atividade").value

if(nome=="" || atividade==""){
alert("Preencha todos os campos")
return
}

const { error } = await supabase
.from("atividades")
.insert([
{
nome:nome,
atividade:atividade
}
])

if(error){
document.getElementById("msg").innerText="Erro ao enviar"
}else{
document.getElementById("msg").innerText="Atividade enviada!"
}

}

</script>

</body>
</html>
