<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel de Atividades</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family: Arial;
background:#f4f4f4;
padding:30px;
}

table{
border-collapse:collapse;
width:100%;
background:white;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#2c3e50;
color:white;
}

</style>

</head>

<body>

<h2>Painel de Atividades</h2>

<table>

<thead>
<tr>
<th>Nome</th>
<th>Fez atividade</th>
<th>Data envio</th>
</tr>
</thead>

<tbody id="tabela"></tbody>

</table>

<script>


  const _supabase = supabase.createClient('https://osofdmgokrxdzsxozsrf.supabase.co', 'sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe');
        const supabase = supabase.createClient(SB_URL, SB_KEY);


async function carregar(){

const { data } = await supabase
.from("atividades")
.select("*")
.order("data_envio",{ascending:false})

let tabela = document.getElementById("tabela")

data.forEach(item=>{

let linha = `
<tr>
<td>${item.nome}</td>
<td>${item.atividade}</td>
<td>${new Date(item.data_envio).toLocaleString()}</td>
</tr>
`

tabela.innerHTML += linha

})

}

carregar()

</script>

</body>
