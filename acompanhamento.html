<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAINEL DE ATIVIDADES DOS DEVS ADS-EETEPA</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
    body {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0a0a0a; /* Fundo ultra escuro */
        color: #00ff41; /* Verde Matrix/Gamer */
        padding: 30px;
    }

    h2 {
        color: #00ffff; /* Ciano Neon */
        text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
        text-align: center;
        margin-bottom: 30px;
        text-transform: uppercase;
        letter-spacing: 4px;
        font-size: 2rem;
    }

    table {
        border-collapse: separate;
        border-spacing: 0;
        width: 100%;
        background: #111;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        border: 1px solid #333;
    }

    th {
        background: #1a1a1a;
        color: #00ffff;
        text-transform: uppercase;
        padding: 15px;
        font-size: 14px;
        border-bottom: 2px solid #00ffff;
    }

    td {
        padding: 15px;
        text-align: center;
        border-bottom: 1px solid #222;
        color: #e0e0e0;
    }

    tr:hover {
        background: #1a1a1a;
        transition: 0.3s;
    }

    .status-sim { color: #00ff88; font-weight: bold; text-shadow: 0 0 5px #00ff88; }
    .status-nao { color: #ff3e3e; font-weight: bold; text-shadow: 0 0 5px #ff3e3e; }
</style>
</head>
<body>

    <h2>PAINEL DE ATIVIDADES DOS DEVS ADS-EETEPA</h2>

    <table>
        <thead>
            <tr>
                <th>Nome do Aluno</th>
                <th>Fez atividade</th>
                <th>Data de Envio</th>
            </tr>
        </thead>
        <tbody id="tabela"></tbody>
    </table>

    <script>
        const supabaseClient = supabase.createClient('https://osofdmgokrxdzsxozsrf.supabase.co', 'sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe');

        async function carregar() {
            const { data, error } = await supabaseClient
                .from("atividades")
                .select("*")
                .order("data_envio", { ascending: false });

            if (error) return;

            const tabela = document.getElementById("tabela");
            tabela.innerHTML = "";

            data.forEach(item => {
                const classeStatus = item.atividade === 'Sim' ? 'status-sim' : 'status-nao';
                const dataFormatada = item.data_envio ? new Date(item.data_envio).toLocaleString('pt-BR') : '---';
                
                tabela.innerHTML += `
                    <tr>
                        <td>${item.nome}</td>
                        <td class="${classeStatus}">${item.atividade}</td>
                        <td>${dataFormatada}</td>
                    </tr>
                `;
            });
        }

        carregar();
        setInterval(carregar, 10000); // Atualiza a cada 10 segundos
    </script>
</body>
</html>
