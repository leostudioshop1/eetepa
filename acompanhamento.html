<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAINEL DE ATIVIDADES DOS DEVS ADS-EETEPA</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
    body {
        font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        background: #0a0a0a;
        color: #00ff41;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
    }

    h2 {
        color: #00ffff;
        text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff;
        text-align: center;
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 4px;
        font-size: 1.8rem;
    }

    /* Estilo do Contador Gamer */
    #countdown-container {
        background: #111;
        border: 2px solid #ff0055;
        box-shadow: 0 0 15px rgba(255, 0, 85, 0.4);
        border-radius: 10px;
        padding: 15px;
        margin-bottom: 30px;
        display: flex;
        gap: 20px;
        text-align: center;
    }

    .countdown-item {
        display: flex;
        flex-direction: column;
    }

    .countdown-value {
        font-size: 2.5rem;
        font-weight: bold;
        color: #ff0055;
        text-shadow: 0 0 10px #ff0055;
        font-family: 'Courier New', Courier, monospace;
    }

    .countdown-label {
        font-size: 0.8rem;
        text-transform: uppercase;
        color: #888;
    }

    table {
        border-collapse: separate;
        border-spacing: 0;
        width: 100%;
        max-width: 900px;
        background: #111;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 0 20px rgba(0, 255, 255, 0.1);
        border: 1px solid #333;
    }

    th {
        background: #1a1a1a;
        color: #00ffff;
        text-transform: uppercase;
        padding: 15px;
        font-size: 14px;
        border-bottom: 2px solid #00ffff;
    }

    td {
        padding: 15px;
        text-align: center;
        border-bottom: 1px solid #222;
        color: #e0e0e0;
    }

    tr:hover { background: #1a1a1a; transition: 0.3s; }

    .status-sim { color: #00ff88; font-weight: bold; text-shadow: 0 0 5px #00ff88; }
    .status-nao { color: #ff3e3e; font-weight: bold; text-shadow: 0 0 5px #ff3e3e; }
</style>
</head>
<body>

    <h2>PAINEL DE ATIVIDADES DOS DEVS ADS-EETEPA</h2>

    <div id="countdown-container">
        <div class="countdown-item">
            <span class="countdown-value" id="days">00</span>
            <span class="countdown-label">Dias</span>
        </div>
        <div class="countdown-item">
            <span class="countdown-value" id="hours">00</span>
            <span class="countdown-label">Horas</span>
        </div>
        <div class="countdown-item">
            <span class="countdown-value" id="minutes">00</span>
            <span class="countdown-label">Min</span>
        </div>
        <div class="countdown-item">
            <span class="countdown-value" id="seconds">00</span>
            <span class="countdown-label">Seg</span>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Nome do Aluno</th>
                <th>Fez atividade</th>
                <th>Data de Envio</th>
            </tr>
        </thead>
        <tbody id="tabela"></tbody>
    </table>

    <script>
        const supabaseClient = supabase.createClient('https://osofdmgokrxdzsxozsrf.supabase.co', 'sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe');

        // Lógica do Contador
        const targetDate = new Date("March 16, 2026 00:00:00").getTime();

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                document.getElementById("countdown-container").innerHTML = "<span class='countdown-value'>PRAZO ENCERRADO</span>";
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = days.toString().padStart(2, '0');
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }

        // Lógica da Tabela
        async function carregar() {
            const { data, error } = await supabaseClient
                .from("atividades")
                .select("*")
                .order("data_envio", { ascending: false });

            if (error) return;

            const tabela = document.getElementById("tabela");
            tabela.innerHTML = "";

            data.forEach(item => {
                const classeStatus = item.atividade === 'Sim' ? 'status-sim' : 'status-nao';
                const dataFormatada = item.data_envio ? new Date(item.data_envio).toLocaleString('pt-BR') : '---';
                
                tabela.innerHTML += `
                    <tr>
                        <td>${item.nome}</td>
                        <td class="${classeStatus}">${item.atividade}</td>
                        <td>${dataFormatada}</td>
                    </tr>
                `;
            });
        }

        // Inicialização
        carregar();
        setInterval(carregar, 10000);
        setInterval(updateCountdown, 1000);
        updateCountdown();
    </script>
</body>
</html>
