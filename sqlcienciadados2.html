<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Simulador SQL Full - By LÉO CRUZ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
body { margin:0; font-family: Arial; background:#0f172a; color:#fff; display:flex; flex-direction:column; height:100vh; }
header { background:#020617; padding:15px; text-align:center; font-weight:bold; color: #22c55e; border-bottom: 2px solid #22c55e; }
.main { display:flex; flex:1; overflow:hidden; }
.sidebar { width:250px; background:#020617; padding:10px; overflow-y:auto; border-right:1px solid #334155; }
.table-item { padding:8px; background:#1e293b; margin-bottom:5px; border-radius:6px; cursor:pointer; font-size: 14px; }
.table-item:hover { background:#334155; color: #22c55e; }
.content { flex:1; padding:10px; display:flex; flex-direction:column; }
textarea { width:100%; height:180px; background:#020617; color:#22c55e; border:1px solid #334155; border-radius:10px; padding:15px; font-family:monospace; font-size: 14px; outline: none; }
button { margin-top:10px; padding:12px; background:#22c55e; border:none; border-radius:8px; cursor:pointer; font-weight: bold; color: #020617; }
.output { margin-top:10px; background:#020617; padding:10px; border-radius:10px; overflow:auto; flex:1; border: 1px solid #334155; }
table { width:100%; border-collapse:collapse; }
th, td { border:1px solid #334155; padding:10px; text-align: left; }
th { background:#1e293b; color: #38bdf8; }
.status { margin-top:5px; color:#38bdf8; font-size: 13px; font-weight: bold; }
footer { background: #020617; padding: 10px; text-align: center; font-size: 11px; color: #94a3b8; }
</style>
</head>
<body>

<header>🔥 Simulador SQL Interativo (EETEPA-XINGUARA)</header>

<div class="main">
  <div class="sidebar">
    <h3 style="color: #38bdf8;">📊 Comandos</h3>
    <div id="tabelas">
        <div class="table-item" onclick="setSQL('SELECT * FROM alunos;')">Ver Alunos</div>
        <div class="table-item" onclick="setSQL('INSERT INTO alunos (nome, nota) VALUES (\'Léo Cruz\', 10);')">Inserir Exemplo</div>
        <div class="table-item" onclick="document.getElementById('sql').value = ''">Limpar Tudo</div>
    </div>
  </div>

  <div class="content">
    <textarea id="sql">SELECT * FROM alunos;</textarea>
    <button id="btnExecutar" onclick="executarNoSupabase()">Executar SQL</button>
    <div class="status" id="status">Pronto</div>
    <div class="output" id="resultado"></div>
  </div>
</div>

<footer>Desenvolvido por LÉO CRUZ - EETEPA-XINGUARA</footer>

<script>
const SUPABASE_URL = 'https://osofdmgokrxdzsxozsrf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe';
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function executarNoSupabase() {
    const query = document.getElementById("sql").value.trim();
    const status = document.getElementById("status");
    const resultadoDiv = document.getElementById("resultado");
    const btn = document.getElementById("btnExecutar");
    
    status.innerText = "⏳ Processando...";
    btn.disabled = true;
    resultadoDiv.innerHTML = "";

    try {
        // Chamada única via RPC para qualquer comando
        const { data, error } = await supabaseClient.rpc('executar_sql_estudante', { sql_query: query });

        if (error) throw error;

        // Se o retorno for um array, renderiza tabela. Se for objeto, mostra mensagem de sucesso.
        if (Array.isArray(data)) {
            renderTabela(data);
            status.innerText = "✅ Consulta concluída!";
        } else {
            status.innerText = "✅ " + (data.status || "Comando executado!");
            resultadoDiv.innerHTML = `<p style="color: #22c55e;">Operação realizada com sucesso no banco de dados.</p>`;
        }
    } catch (e) {
        status.innerText = "❌ Erro no SQL";
        resultadoDiv.innerHTML = `<p style="color: #ef4444; font-family: monospace;">> ${e.message}</p>`;
    } finally {
        btn.disabled = false;
    }
}

function renderTabela(dados) {
    if (!dados || dados.length === 0) {
        document.getElementById("resultado").innerHTML = "A consulta não retornou dados.";
        return;
    }
    let html = "<table><thead><tr>";
    const colunas = Object.keys(dados[0]);
    colunas.forEach(col => html += `<th>${col}</th>`);
    html += "</tr></thead><tbody>";
    dados.forEach(linha => {
        html += "<tr>";
        colunas.forEach(col => html += `<td>${linha[col] !== null ? linha[col] : ''}</td>`);
        html += "</tr>";
    });
    html += "</tbody></table>";
    document.getElementById("resultado").innerHTML = html;
}

function setSQL(comando) {
    document.getElementById("sql").value = comando;
}
</script>
</body>
</html>
