<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Simulador SQL Supabase - By LÉO CRUZ</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Supabase JS Library -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body { margin:0; font-family: Arial; background:#0f172a; color:#fff; display:flex; flex-direction:column; height:100vh; }
header { background:#020617; padding:15px; text-align:center; font-weight:bold; color: #22c55e; }
.main { display:flex; flex:1; overflow:hidden; }
.sidebar { width:250px; background:#020617; padding:10px; overflow-y:auto; border-right:1px solid #334155; }
.table-item { padding:8px; background:#1e293b; margin-bottom:5px; border-radius:6px; cursor:pointer; }
.table-item:hover { background:#334155; }
.content { flex:1; padding:10px; display:flex; flex-direction:column; }
textarea { width:100%; height:150px; background:#020617; color:#22c55e; border:1px solid #334155; border-radius:10px; padding:10px; font-family:monospace; font-size: 14px; }
button { margin-top:10px; padding:12px; background:#22c55e; border:none; border-radius:8px; cursor:pointer; font-weight: bold; }
button:disabled { background: #1e293b; cursor: not-allowed; }
.output { margin-top:10px; background:#020617; padding:10px; border-radius:10px; overflow:auto; flex:1; }
table { width:100%; border-collapse:collapse; margin-bottom:15px; }
th, td { border:1px solid #334155; padding:8px; text-align: left; }
th { background:#1e293b; }
.status { margin-top:5px; color:#38bdf8; font-size: 12px; }
footer { background: #020617; padding: 5px; text-align: center; font-size: 10px; color: #475569; }
</style>
</head>
<body>

<header>🚀 Simulador SQL Supabase - EETEPA-XINGUARA</header>

<div class="main">
  <div class="sidebar">
    <h3>📊 Tabelas Ativas</h3>
    <div id="tabelas">
        <div class="table-item" onclick="visualizarTabela('alunos')">alunos</div>
    </div>
  </div>

  <div class="content">
    <textarea id="sql">SELECT * FROM alunos;</textarea>
    <button id="btnExecutar" onclick="executarNoSupabase()">Executar via API Supabase</button>
    <div class="status" id="status">Conectado ao Supabase</div>
    <div class="output" id="resultado"></div>
  </div>
</div>

<footer>Desenvolvido por LÉO CRUZ - EETEPA-XINGUARA</footer>

<script>
// CONFIGURAÇÕES DO SUPABASE
const SUPABASE_URL = 'https://osofdmgokrxdzsxozsrf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe';

// Inicializa o cliente usando as variáveis acima
const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

async function executarNoSupabase() {
    const sqlTexto = document.getElementById("sql").value.trim();
    const status = document.getElementById("status");
    const resultadoDiv = document.getElementById("resultado");
    const btn = document.getElementById("btnExecutar");

    status.innerText = "Processando...";
    btn.disabled = true;
    resultadoDiv.innerHTML = "";

    try {
        // Nota: O Supabase via JS não executa comandos DDL (CREATE/DROP) por segurança.
        // Usamos o .rpc() ou funções pré-definidas. Para este simulador, focaremos no SELECT.
        
        if (sqlTexto.toLowerCase().startsWith("select")) {
            // Extração simples do nome da tabela para o exemplo
            const match = sqlTexto.match(/from\s+(\w+)/i);
            const tabela = match ? match[1] : 'alunos';

            const { data, error } = await supabase
                .from(tabela)
                .select('*');

            if (error) throw error;
            renderTabela(data);
            status.innerText = "Consulta realizada com sucesso!";
        } else {
            status.innerText = "Atenção: Comandos de escrita (INSERT/UPDATE) devem ser feitos via Dashboard ou funções RPC específicas.";
        }
    } catch (e) {
        status.innerText = "Erro: " + e.message;
        resultadoDiv.innerHTML = `<p style="color: #ef4444;">${e.message}</p>`;
    } finally {
        btn.disabled = false;
    }
}

function renderTabela(dados) {
    if (!dados || dados.length === 0) {
        document.getElementById("resultado").innerHTML = "Nenhum registro encontrado.";
        return;
    }

    let html = "<table><tr>";
    const colunas = Object.keys(dados[0]);
    
    colunas.forEach(col => html += `<th>${col}</th>`);
    html += "</tr>";

    dados.forEach(linha => {
        html += "<tr>";
        colunas.forEach(col => html += `<td>${linha[col]}</td>`);
        html += "</tr>";
    });

    html += "</table>";
    document.getElementById("resultado").innerHTML = html;
}

function visualizarTabela(nome) {
    document.getElementById("sql").value = `SELECT * FROM ${nome};`;
    executarNoSupabase();
}
</script>
</body>
</html>
