<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZZ AULA 01 A 04 - PRO EDITION</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root{
            --bg:#020617;
            --card:#0f172a;
            --neon:#00ff88;
            --danger:#ff4655;
            --accent:#7000ff;
            --text:#f8fafc;
            --border:#1e293b;
        }

        body{
            font-family:'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            background-image: 
                linear-gradient(rgba(112, 0, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(112, 0, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            display:flex;
            flex-direction:column;
            align-items:center;
            padding:20px;
            color:var(--text);
            min-height: 100vh;
            margin: 0;
        }

        #setup, #quiz-container, #leaderboard, #result-container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5), inset 0 0 10px rgba(112, 0, 255, 0.1);
            width: 100%;
            max-width: 700px;
            margin-bottom: 30px;
            border: 2px solid var(--border);
            position: relative;
            overflow: hidden;
        }

        /* Barra de tempo no topo do card */
        #timer-bar-container {
            width: 100%;
            height: 6px;
            background: #1e293b;
            position: absolute;
            top: 0;
            left: 0;
        }
        #timer-bar {
            width: 100%;
            height: 100%;
            background: var(--neon);
            transition: width 1s linear;
        }

        h2 { 
            color: var(--neon); 
            text-transform: uppercase; 
            letter-spacing: 2px;
            font-size: 1.8rem;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.3);
            border-bottom: 2px solid var(--border);
            padding-bottom: 15px;
        }

        .question { 
            font-size: 1.3rem; 
            margin-bottom: 25px; 
            color: #fff; 
            line-height: 1.4;
        }

        .options { display: grid; gap: 12px; }
        
        button {
            padding: 15px;
            cursor: pointer;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: rgba(30, 41, 59, 0.5);
            color: var(--text);
            transition: all 0.2s ease;
            font-size: 1rem;
            text-align: left;
        }

        button:hover:not(:disabled) { 
            background: var(--accent); 
            border-color: var(--neon);
        }

        .btn-submit { 
            background: var(--neon); 
            color: #000; 
            border: none; 
            margin-top: 25px; 
            width: 100%; 
            font-weight: 900; 
            font-size: 1.2rem; 
            text-align: center;
            text-transform: uppercase;
            clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%);
        }

        input[type="text"] { 
            padding: 15px; width: 100%; box-sizing: border-box; 
            border: 1px solid var(--border); border-radius: 4px; 
            margin-bottom: 15px; background: #000; color: var(--neon);
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        td { background: rgba(30, 41, 59, 0.3); padding: 15px; border-top: 1px solid var(--border); }
        td:first-child { color: var(--neon); border-radius: 8px 0 0 8px; }
        td:last-child { border-radius: 0 8px 8px 0; font-weight: bold; }

        .hidden { display: none; }
        #performanceChart { max-width: 400px; margin: 0 auto; }
    </style>
</head>
<body>

<div id="setup">
    <h2>QUIZZ AULA 01 A 04</h2>
    <p style="color: #94a3b8;">Sistemas de Arquivos, Lógica e Hardware</p>
    <input type="text" id="username" placeholder="PLAYER NAME..." maxlength="25">
    <button class="btn-submit" onclick="startQuiz()">START GAME</button>
</div>

<div id="quiz-container" class="hidden">
    <div id="timer-bar-container"><div id="timer-bar"></div></div>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <div id="progress" style="color:var(--accent); font-weight: bold;"></div>
        <div id="timer-text" style="color:var(--neon); font-family: monospace; font-size: 1.2rem;">15s</div>
    </div>
    <div class="question" id="question-text"></div>
    <div class="options" id="options-container"></div>
    <button id="next-btn" class="btn-submit" onclick="nextQuestion()" disabled>NEXT LEVEL</button>
</div>

<div id="result-container" class="hidden">
    <h2 style="text-align:center">GAME OVER - STATS</h2>
    <canvas id="performanceChart"></canvas>
    <p id="final-score-text" style="text-align:center; font-size:1.4rem; margin: 20px 0; font-weight: bold;"></p>
    <button class="btn-submit" onclick="location.reload()">RETRY</button>
</div>

<div id="leaderboard">
    <h2>🏆 HALL OF FAME</h2>
    <table>
        <thead><tr><th>PLAYER</th><th>SCORE</th></tr></thead>
        <tbody id="ranking-body"></tbody>
    </table>
</div>

<footer>DESENVOLVIDO POR = LÉO CRUZ</footer>

<script>
const SUPABASE_URL="https://osofdmgokrxdzsxozsrf.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zb2ZkbWdva3J4ZHpzeG96c3JmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMzk4ODMsImV4cCI6MjA4ODYxNTg4M30.lALjkQ65DPLFiLboHNH4mKzwoNZPFyGjwRLW-IrMH4c";
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let currentQuestion = 0;
let score = 0;
let user = "";
let timer;
let timeLeft = 15;

const questions = [
    {q:"Qual HD é mais rápido", o:["HD ATA - Antigo","HD SSD - Moderno"], a:1},
    {q:"O que é dado?", o:["Valor bruto","||","Uma imagem na tela"], a:0},
    {q:"O que é HD?", o:["programa","Equipamento usado para armazenar arquivos"], a:1},
    {q:"Qual tipo de HD não possui disco dentro?", o:["HD ATA","SSD"], a:1},
    {q:"Quais são dígitos binários?", o:["0, 1","2,3"], a:0},
    {q:"Quantos bytes tem 1 kb?", o:["1024 bytes","2048 bytes"], a:0},
    {q:"Qual hd pode levar quedas e não estraga?", o:["SSD","HD"], a:0},
    {q:"O que é RESET?", o:["Restaurar padrão de fábrica","Apagar tudo"], a:0},
    {q:"Qual o significado da sigla HD?", o:["High definition","Hard Disk"], a:1},
    {q:"Os digitos binários sao representados por quantos numeros", o:["2","3"], a:0},
    {q:"Quantos bits tem um byte?", o:["1024","8"], a:1},
    {q:"Como é a representação de do número 4 em binário?", o:["100","01010"], a:0},
    {q:"Qual das opções é um sistema de arquivos?", o:["NTFS","ALOK"], a:0},
    {q:"O que significa NTFS?", o:["New Technology File System","Network File System"], a:0},
    {q:"Sistema de arquivos padrão do Linux?", o:["FAT32","EXT4"], a:1},
    {q:"FAT32 suporta arquivos de 10GB?", o:["Sim","Não"], a:1},
    {q:"Onde ficam arquivos permanentes?", o:["RAM","HD/SSD"], a:1},
    {q:"O que é formatar?", o:["Limpar e preparar o sistema de arquivos","Aumentar o espaço"], a:0},
    {q:"FAT32 é bom para pendrives?", o:["Sim, pela compatibilidade","Não"], a:0},
    {q:"O que significa SSD?", o:["Solid State Drive","Space System Disk"], a:0},
    {q:"Mais resistente a quedas?", o:["HD","SSD"], a:1},
    {q:"SSD é silencioso?", o:["Sim","Não"], a:0},
    {q:"Cabo de dados do HD?", o:["SATA","VGA"], a:0},
    {q:"Posso usar SSD e HD juntos?", o:["Sim","Não"], a:0},
    {q:"S.M.A.R.T. monitora:", o:["Saúde do disco","Velocidade da internet"], a:0}
];

// Efeitos Sonoros via Audio API (Sintetizador)
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(type) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    
    if(type === 'correct') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(880, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(1200, audioCtx.currentTime + 0.1);
    } else {
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(50, audioCtx.currentTime + 0.2);
    }
    
    gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
    osc.start();
    osc.stop(audioCtx.currentTime + 0.3);
}

function startTimer() {
    clearInterval(timer);
    timeLeft = 15;
    updateTimerDisplay();
    timer = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();
        if(timeLeft <= 0) {
            clearInterval(timer);
            autoWrong();
        }
    }, 1000);
}

function updateTimerDisplay() {
    document.getElementById('timer-text').innerText = timeLeft + "s";
    const percent = (timeLeft / 15) * 100;
    document.getElementById('timer-bar').style.width = percent + "%";
    document.getElementById('timer-bar').style.background = timeLeft < 5 ? "var(--danger)" : "var(--neon)";
}

function autoWrong() {
    playSound('wrong');
    const allBtns = document.querySelectorAll('#options-container button');
    allBtns.forEach(btn => btn.disabled = true);
    document.getElementById('next-btn').disabled = false;
}

async function startQuiz(){
    const input = document.getElementById('username');
    user = input.value.trim();
    if(!user) return alert("PLAYER! ENTER YOUR NAME!");
    if(audioCtx.state === 'suspended') audioCtx.resume();

    document.getElementById('setup').classList.add('hidden');
    document.getElementById('quiz-container').classList.remove('hidden');
    showQuestion();
}

function showQuestion(){
    startTimer();
    const q = questions[currentQuestion];
    document.getElementById('progress').innerText = `LEVEL ${currentQuestion + 1} / ${questions.length}`;
    document.getElementById('question-text').innerText = q.q;

    const container = document.getElementById('options-container');
    container.innerHTML = "";

    q.o.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.innerText = opt;
        btn.onclick = () => selectOption(btn, i);
        container.appendChild(btn);
    });

    document.getElementById('next-btn').disabled = true;
}

function selectOption(clickedBtn, index){
    clearInterval(timer);
    const q = questions[currentQuestion];
    const allBtns = document.querySelectorAll('#options-container button');
    allBtns.forEach(btn => btn.disabled = true);

    if(index === q.a){
        score++;
        playSound('correct');
        clickedBtn.style.background = "var(--neon)";
        clickedBtn.style.color = "#000";
    } else {
        playSound('wrong');
        clickedBtn.style.background = "var(--danger)";
        clickedBtn.style.color = "#fff";
    }
    document.getElementById('next-btn').disabled = false;
}

async function nextQuestion(){
    currentQuestion++;
    if(currentQuestion < questions.length){
        showQuestion();
    } else {
        await finishQuiz();
    }
}

async function finishQuiz(){
    document.getElementById('quiz-container').classList.add('hidden');
    document.getElementById('result-container').classList.remove('hidden');
    document.getElementById('final-score-text').innerHTML = `SCORE: ${score} / ${questions.length}`;
    renderChart();
    
    // Inserção no Banco
    await _supabase.from('ranking').insert([{ username: user, score: score }]);
}

function renderChart() {
    const ctx = document.getElementById('performanceChart').getContext('2d');
    new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['ACERTOS', 'ERROS'],
            datasets: [{
                data: [score, questions.length - score],
                backgroundColor: ['#00ff88', '#ff4655'],
                borderWidth: 0
            }]
        },
        options: { plugins: { legend: { labels: { color: '#f8fafc' } } } }
    });
}

async function fetchRanking(){
    const { data, error } = await _supabase.from('ranking')
        .select('username,score')
        .not('username', 'eq', '') // Garante que tem nome
        .order('score', {ascending:false})
        .limit(10);
    if(error) return;
    const body = document.getElementById('ranking-body');
    body.innerHTML = data.map(row => `<tr><td>${row.username}</td><td>${row.score} PTS</td></tr>`).join('');
}

// Escuta em tempo real para qualquer nova inserção no banco
_supabase.channel('ranking-realtime')
    .on('postgres_changes', {event:'INSERT', schema:'public', table:'ranking'}, () => {
        fetchRanking();
    })
    .subscribe();

fetchRanking();
</script>
</body>

</html>
