<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Supremo</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="config.js"></script>

</head>

<body>

<!-- TELA INICIAL -->
<div id="startScreen">
    <h2>Iniciar Quiz</h2>
    <input type="text" id="nomeAluno" placeholder="Nome do aluno"><br><br>
    <input type="text" id="turmaAluno" placeholder="Turma"><br><br>
    <button onclick="startQuiz()">Começar</button>
</div>

<div id="quizContainer" style="display:none;"></div>

<script>

// ================= DADOS =================
let quizData = {
    nome: "",
    turma: "",
    respostas: [],
    pontuacao: 0,
    dispositivo: {}
};

// ================= DISPOSITIVO =================
function getDeviceInfo() {
    return {
        userAgent: navigator.userAgent,
        plataforma: navigator.platform,
        idioma: navigator.language,
        resolucao: `${screen.width}x${screen.height}`
    };
}

// ================= INICIAR =================
function startQuiz() {
    quizData.nome = document.getElementById("nomeAluno").value;
    quizData.turma = document.getElementById("turmaAluno").value;
    quizData.dispositivo = getDeviceInfo();

    if (!quizData.nome || !quizData.turma) {
        alert("Preencha nome e turma!");
        return;
    }

    document.getElementById("startScreen").style.display = "none";
    document.getElementById("quizContainer").style.display = "block";

    renderQuestion();
}

// ================= PERGUNTAS =================
const questions = [
    { id:1, question:"2+2?", options:["3","4","5"], correct:"4" },
    { id:2, question:"Capital do Brasil?", options:["RJ","Brasília","SP"], correct:"Brasília" }
];

let currentQuestion = 0;

// ================= RENDER =================
function renderQuestion() {
    const q = questions[currentQuestion];

    let html = `<h3>${q.question}</h3>`;

    q.options.forEach(opt => {
        html += `<button onclick="selectAnswer('${opt}')">${opt}</button><br>`;
    });

    document.getElementById("quizContainer").innerHTML = html;
}

// ================= RESPOSTA =================
function selectAnswer(answer) {
    const q = questions[currentQuestion];

    quizData.respostas.push({
        pergunta: q.question,
        resposta: answer,
        correta: q.correct
    });

    if (answer === q.correct) {
        quizData.pontuacao++;
    }

    currentQuestion++;

    if (currentQuestion < questions.length) {
        renderQuestion();
    } else {
        finishQuiz();
    }
}

// ================= FINAL =================
async function finishQuiz() {

    await saveToSupabase();

    document.getElementById("quizContainer").innerHTML = `
        <h2>Finalizado!</h2>
        <p>Pontuação: ${quizData.pontuacao}</p>
    `;
}

// ================= SUPABASE =================
async function saveToSupabase() {
    try {
        const { data, error } = await supabase
        .from("resultados_quiz")
        .insert([
            {
                nome: quizData.nome,
                turma: quizData.turma,
                pontuacao: quizData.pontuacao,
                respostas: quizData.respostas,
                dispositivo: quizData.dispositivo
            }
        ]);

        if (error) {
            console.error("Erro:", error);
        } else {
            console.log("Salvo com sucesso!");
        }

    } catch (err) {
        console.error("Erro geral:", err);
    }
}

</script>

</body>
</html>
