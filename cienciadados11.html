<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Quiz Supremo - Ciência de Dados 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <style>
        :root {
            --primary: #00ffcc;
            --secondary: #bd93f9;
            --danger: #ff3366;
            --dark: #0a1428;
            --matrix-green: #00ff41;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a1428, #111);
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        .header {
            background: rgba(10,20,40,0.9);
            backdrop-filter: blur(10px);
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid var(--primary);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .progress-container { flex: 1; max-width: 400px; margin: 0 20px; }
        .progress-bar { height: 8px; background: #222; border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.4s; }

        .main { max-width: 800px; margin: 40px auto; width: 90%; flex: 1; }
        
        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(0,255,204,0.2);
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #000;
            border: 1px solid var(--primary);
            color: var(--primary);
            border-radius: 5px;
        }

        .option {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid transparent;
            transition: 0.2s;
        }
        .option:hover { border-color: var(--primary); background: rgba(0,255,204,0.1); }
        .option.correct { border-color: #00ff88; background: rgba(0,255,136,0.1); }
        .option.wrong { border-color: var(--danger); background: rgba(255,51,102,0.1); }

        .btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
        }

        .feedback { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; }
        .show { display: block; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: 900; color: var(--primary);">🚀 CD-QUIZ 2026</div>
        <div class="progress-container">
            <div id="userInfo" style="font-size: 0.7rem; margin-bottom: 4px;">Aguardando login...</div>
            <div class="progress-bar"><div id="progressFill" class="progress-fill"></div></div>
        </div>
        <div>⭐ <span id="currentScore">0</span>/10</div>
    </div>

    <div class="main" id="screen-auth">
        <div class="card">
            <h2 style="text-align: center; color: var(--primary);">Identificação do Estudante</h2>
            <p style="font-size: 0.9rem; text-align: center; margin-bottom: 20px;">Ciência de Dados - Prof. Léo Cruz</p>
            <input type="text" id="name" placeholder="Nome Completo" required>
            <input type="text" id="class" placeholder="Turma (ex: 2º Jogos Digitais)" required>
            <select id="subject">
                <option value="Ciência de Dados">Ciência de Dados</option>
                <option value="Programação Orientada a Objetos">Object-Oriented Programming</option>
            </select>
            <button class="btn" onclick="initQuiz()">Iniciar Desafio</button>
        </div>
    </div>

    <div class="main" id="screen-quiz" style="display:none;"></div>

    <div class="main" id="screen-results" style="display:none;">
        <div class="card" style="text-align: center;">
            <h1 id="resultTitle">Processamento Concluído!</h1>
            <div style="font-size: 4rem; margin: 20px 0; color: var(--primary);" id="finalScore">0</div>
            <p id="resultMsg" style="margin-bottom: 25px;"></p>
            <div id="dbStatus" style="font-size: 0.8rem; color: #888; margin-bottom: 20px;"></div>
            <button class="btn" onclick="location.reload()">🔄 Reiniciar</button>
        </div>
    </div>

    <script>
        // Inicialização do Supabase usando o arquivo config.js
        const supabase = supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);

        const questions = [
            { q: "O que significa 'NaN' em um conjunto de dados?", options: ["Dado Ausente/Inválido", "Número Aproximado", "Nova Aba de Navegação", "Nota de Atendimento"], correct: 0 },
            { q: "Qual técnica prediz valores contínuos (ex: preços)?", options: ["Classificação", "Clusterização", "Regressão", "Mineração"], correct: 2 },
            { q: "Um valor extremamente fora do padrão da amostra é um:", options: ["Inlier", "Outlier", "Median", "Standard"], correct: 1 },
            { q: "A fase de 'conversar com os dados' para entender padrões é:", options: ["EDA (Análise Exploratória)", "Deploy", "SQL Injection", "Backup"], correct: 0 },
            { q: "Quais são os 3 Vs básicos do Big Data?", options: ["Valor, Venda, Vista", "Volume, Velocidade, Variedade", "Vetor, Via, Valor", "Voz, Vídeo, Versão"], correct: 1 },
            { q: "Qual gráfico mostra a relação entre duas variáveis numéricas?", options: ["Pizza", "Barras", "Dispersão (Scatter)", "Linha do tempo"], correct: 2 },
            { q: "O que é um 'Dataset'?", options: ["Um comando SQL", "Conjunto de dados estruturado", "Hardware de servidor", "Linguagem de script"], correct: 1 },
            { q: "Dados não estruturados incluem:", options: ["Tabelas SQL", "Planilhas Excel", "Imagens e Vídeos", "Arquivos CSV"], correct: 2 },
            { q: "O valor que divide a amostra exatamente ao meio é a:", options: ["Média", "Moda", "Mediana", "Variância"], correct: 2 },
            { q: "Principal objetivo da Ciência de Dados nas empresas:", options: ["Suporte técnico", "Gerar insights e decisões estratégicas", "Digitação", "Instalar Drivers"], correct: 1 }
        ];

        let currentIdx = 0;
        let score = 0;
        let studentData = {};
        let logRespostas = [];

        function initQuiz() {
            const n = document.getElementById('name').value;
            const c = document.getElementById('class').value;
            if(!n || !c) return alert("Preencha seus dados!");

            studentData = { name: n, class: c, subject: document.getElementById('subject').value };
            document.getElementById('screen-auth').style.display = 'none';
            document.getElementById('screen-quiz').style.display = 'block';
            document.getElementById('userInfo').textContent = `${n} | ${c}`;
            render();
        }

        function render() {
            const q = questions[currentIdx];
            document.getElementById('screen-quiz').innerHTML = `
                <div class="card">
                    <small style="color:var(--secondary)">Questão ${currentIdx+1}/10</small>
                    <h3 style="margin: 15px 0 25px 0;">${q.q}</h3>
                    <div id="options-box">
                        ${q.options.map((opt, i) => `<div class="option" onclick="validate(${i})">${opt}</div>`).join('')}
                    </div>
                    <div id="fdb" class="feedback"></div>
                    <button id="btnNext" class="btn" style="display:none; margin-top:20px;" onclick="next()">Continuar →</button>
                </div>
            `;
            updateProgress();
        }

        function validate(choice) {
            const q = questions[currentIdx];
            const divFdb = document.getElementById('fdb');
            if(divFdb.classList.contains('show')) return;

            const isCorrect = choice === q.correct;
            if(isCorrect) {
                score++;
                divFdb.innerHTML = "<strong>✅ Excelente!</strong> Resposta correta.";
                divFdb.className = "feedback show correct";
                confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 } });
            } else {
                divFdb.innerHTML = `<strong>❌ Errou.</strong> A correta era: ${q.options[q.correct]}`;
                divFdb.className = "feedback show wrong";
            }

            logRespostas.push({ questao: q.q, escolha: q.options[choice], sucesso: isCorrect });
            document.getElementById('currentScore').textContent = score;
            document.getElementById('btnNext').style.display = 'block';
        }

        function next() {
            currentIdx++;
            if(currentIdx < questions.length) render();
            else finalize();
        }

        function updateProgress() {
            document.getElementById('progressFill').style.width = (currentIdx / questions.length) * 100 + '%';
        }

        async function finalize() {
            document.getElementById('screen-quiz').style.display = 'none';
            document.getElementById('screen-results').style.display = 'block';
            document.getElementById('finalScore').textContent = `${score}/10`;
            document.getElementById('dbStatus').textContent = "💾 Sincronizando com Supabase...";

            const { error } = await supabase.from('resultados_quiz').insert([{
                nome_aluno: studentData.name,
                turma: studentData.class,
                disciplina: studentData.subject,
                pontuacao: score,
                user_agent: navigator.userAgent, // Identificação do dispositivo
                respostas_detalhadas: logRespostas,
                data_acesso: new Date().toISOString() // Data e hora
            }]);

            document.getElementById('dbStatus').textContent = error ? "❌ Erro ao salvar dados." : "✅ Dados salvos com sucesso!";
            document.getElementById('resultMsg').textContent = score >= 7 ? "Parabéns! Ótimo desempenho analítico." : "Continue estudando os fundamentos de dados.";
        }
    </script>
</body>
</html>
