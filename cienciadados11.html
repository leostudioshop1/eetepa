<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Quiz Supremo - Informática 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --primary: #00ffcc; --danger: #ff3366; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a1428, #1e3c72);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 0.8s ease;
        }
        body.error-mode { background: linear-gradient(135deg, #4a0f1f, #8b1a2f); }
        
        .header {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(10,20,40,0.95); backdrop-filter: blur(12px);
            z-index: 100; padding: 15px 20px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 3px solid var(--primary);
        }
        .logo { font-size: 1.8rem; font-weight: 900; display: flex; align-items: center; gap: 12px; }
        .progress-container { flex: 1; max-width: 500px; margin: 0 30px; }
        .progress { height: 12px; background: #112233; border-radius: 9999px; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), #00ccaa); width: 0%; transition: width 0.6s ease; }
        .score { font-size: 1.4rem; font-weight: 700; }
        
        .main { max-width: 920px; margin: 90px auto 40px; padding: 0 20px; }
        
        .card {
            background: rgba(255,255,255,0.1); backdrop-filter: blur(16px);
            border-radius: 24px; padding: 40px 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        
        .question-number { color: var(--primary); font-weight: 700; margin-bottom: 10px; }
        .question-text { font-size: 1.55rem; line-height: 1.45; margin-bottom: 30px; font-weight: 600; }
        
        .options { display: grid; gap: 14px; }
        .option {
            background: rgba(255,255,255,0.08); border: 3px solid transparent;
            border-radius: 16px; padding: 20px; font-size: 1.2rem;
            cursor: pointer; transition: all 0.3s;
        }
        .option:hover { transform: translateY(-4px); }
        .option.correct { border-color: #00ff88; background: rgba(0,255,136,0.2); }
        .option.wrong { border-color: var(--danger); background: rgba(255,51,102,0.2); }
        
        .feedback {
            margin-top: 25px; padding: 25px; border-radius: 16px;
            display: none; gap: 20px; align-items: flex-start;
        }
        .feedback.show { display: flex; }
        .feedback.correct { background: rgba(0,255,136,0.15); border: 2px solid #00ff88; }
        .feedback.wrong { background: rgba(255,51,102,0.15); border: 2px solid var(--danger); }
        
        .tears { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 999; display: none; }
        .tear {
            position: absolute; width: 6px; height: 25px;
            background: linear-gradient(transparent, #88ddff); opacity: 0.75;
            border-radius: 50%; animation: fall linear forwards;
        }
        @keyframes fall { to { transform: translateY(120vh); opacity: 0; } }
        
        .next-btn, .retry-btn {
            margin-top: 25px; padding: 16px 40px; font-size: 1.25rem;
            font-weight: 700; border: none; border-radius: 9999px; cursor: pointer; width: 100%;
        }
        .next-btn { background: var(--primary); color: #0a1428; }
        .retry-btn { background: #ff3366; color: white; }
        
        .results { text-align: center; }
        .big-score { font-size: 6.5rem; font-weight: 900; background: linear-gradient(90deg, #00ffcc, #ff00aa); -webkit-background-clip: text; color: transparent; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">🚀 Quiz Supremo <span style="font-size:1.3rem;">💾 Informática</span></div>
        <div class="progress-container">
            <div class="progress"><div id="progressBar" class="progress-bar"></div></div>
        </div>
        <div class="score">⭐ <span id="scoreDisplay">0</span>/10</div>
    </div>

    <div class="main" id="quizContainer"></div>

    <div id="resultsScreen" class="main" style="display:none;">
        <div class="card results">
            <h1>🎉 Parabéns, futuro técnico!</h1>
            <div class="big-score" id="finalScore">10</div>
            <p id="finalMessage" style="font-size:1.6rem; margin:25px 0;"></p>
            <button onclick="restartQuiz()" class="next-btn">🔄 Refazer o Quiz</button>
        </div>
    </div>

    <div id="tearsContainer" class="tears"></div>

    <script>
        // ====================== SUPABASE ======================
        const supabaseUrl = 'https://osofdmgokrxdzsxozsrf.supabase.co';
        const supabaseKey = 'sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe';
        const { createClient } = supabase;
        const supa = createClient(supabaseUrl, supabaseKey);

        let sessionId = 'quiz_' + Date.now() + '_' + Math.random().toString(36).slice(2, 11);
        let currentQuestion = 0;
        let score = 0;

        // ====================== TODAS AS 10 PERGUNTAS (COMPLETO) ======================
        const questions = [
            {
                id: 1, type: "mcq",
                question: "Um técnico precisa montar um PC para edição de vídeos em alta resolução. Precisa de alta velocidade, sem ruído, resistente a quedas e baixo consumo de energia. Qual armazenamento é o mais adequado?",
                options: [{ text: "HD ATA", value: "A" }, { text: "SSD SATA", value: "B" }, { text: "Pendrive", value: "C" }, { text: "Disquete", value: "D" }, { text: "Qualquer disco rígido", value: "E" }],
                correct: "B",
                explanation: "O SSD SATA não possui partes mecânicas, por isso é silencioso, resistente a quedas, consome menos energia e é muito mais rápido em leitura e escrita."
            },
            {
                id: 2, type: "mcq",
                question: "Um notebook oferece: 1 TB a 5400 RPM ou 512 GB com leitura sequencial muito superior. O segundo disco é provavelmente um:",
                options: [{ text: "HD ATA tradicional", value: "A" }, { text: "Pendrive moderno", value: "B" }, { text: "HD antigo", value: "C" }, { text: "SSD SATA", value: "D" }, { text: "Unidade de fita", value: "E" }],
                correct: "D",
                explanation: "SSDs oferecem velocidades de leitura/escrita muito superiores aos HDs mecânicos. A velocidade não depende de RPM."
            },
            {
                id: 3, type: "mcq",
                question: "O conjunto de regras que organiza pastas, subpastas, permissões e nomes de arquivos no disco chama-se:",
                options: [{ text: "Sistema de arquivos", value: "A" }, { text: "Big Data", value: "B" }, { text: "Unidade de medida de velocidade", value: "C" }, { text: "Protocolo de rede", value: "D" }, { text: "Memória RAM", value: "E" }],
                correct: "A",
                explanation: "Exemplos: NTFS, exFAT, ext4. É o que permite organizar e acessar os arquivos de forma estruturada."
            },
            {
                id: 4, type: "mcq",
                question: "Um arquivo de 4,7 GB ocupa quantos MB? (1 GB = 1024 MB)",
                options: [{ text: "4.000 MB", value: "A" }, { text: "4.812 MB", value: "B" }, { text: "1.024 MB", value: "C" }, { text: "480 MB", value: "D" }, { text: "4 MB", value: "E" }],
                correct: "B",
                explanation: "Cálculo correto: 4,7 × 1024 = 4.812 MB. Sempre use base 1024 para armazenamento."
            },
            {
                id: 5, type: "mcq",
                question: "Um HD de 2 TB formatado tem capacidade aproximada de quantos MB?",
                options: [{ text: "300 MB", value: "A" }, { text: "48.000 MB", value: "B" }, { text: "2.097.152 MB", value: "C" }, { text: "224.000.000 MB", value: "D" }, { text: "9.024 MB", value: "E" }],
                correct: "C",
                explanation: "Cálculo: 2 × 1024 × 1024 = 2.097.152 MB."
            },
            {
                id: 6, type: "mcq",
                question: "A menor unidade de informação que um computador consegue representar (0 ou 1) chama-se:",
                options: [{ text: "Byte", value: "A" }, { text: "Megabyte", value: "B" }, { text: "Bit", value: "C" }, { text: "Gigabyte", value: "D" }, { text: "Terabyte", value: "E" }],
                correct: "C",
                explanation: "Bit é a menor unidade. 8 bits formam 1 byte."
            },
            {
                id: 7, type: "mcq",
                question: "Milhões de registros de vendas, likes e geolocalização que não cabem em bancos tradicionais caracterizam:",
                options: [{ text: "Sistema de arquivos NTFS", value: "A" }, { text: "Big Data", value: "B" }, { text: "SSD SATA de baixa capacidade", value: "C" }, { text: "Unidade de medida bit", value: "D" }, { text: "HD ATA para backup", value: "E" }],
                correct: "B",
                explanation: "Big Data envolve grande Volume, Velocidade e Variedade de dados."
            },
            {
                id: 8, type: "mcq",
                question: "Um HD externo antigo usa cabo largo com 40 pinos. Qual interface ele utiliza?",
                options: [{ text: "SATA", value: "A" }, { text: "ATA (IDE)", value: "B" }, { text: "USB 3.0", value: "C" }, { text: "PCIe", value: "D" }, { text: "HDMI", value: "E" }],
                correct: "B",
                explanation: "ATA/IDE é a interface antiga, com cabo largo e 40 pinos."
            },
            {
                id: 9, type: "open",
                question: "Explique pelo menos 3 vantagens do SSD em comparação ao HD tradicional (mecânico).",
                model: "Vantagens do SSD: 1) Muito mais rápido; 2) Sem ruído e sem partes móveis (mais resistente a quedas); 3) Menor consumo de energia."
            },
            {
                id: 10, type: "open",
                question: "Cite e explique ao menos 3 unidades de medida de dados (do menor para o maior) com um exemplo.",
                model: "• Bit (0 ou 1)\n• Byte (8 bits)\n• KB, MB, GB, TB\nExemplos: uma foto ≈ 5 MB, um filme ≈ 5 GB, projetos científicos usam TB ou PB."
            }
        ];

        // ====================== FUNÇÕES ======================
        async function saveAnswerToSupabase(q, userAnswer, isCorrect) {
            try {
                const { error } = await supa.from('quiz_responses').insert({
                    session_id: sessionId,
                    question_id: q.id,
                    question_text: q.question,
                    user_answer: userAnswer,
                    is_correct: isCorrect,
                    score: isCorrect ? 1 : 0,
                    user_agent: navigator.userAgent
                });
                if (error) console.error('Erro ao salvar:', error.message);
                else console.log(`✅ Questão ${q.id} salva no Supabase`);
            } catch (err) {
                console.error('Falha Supabase:', err);
            }
        }

        function createTears() {
            const container = document.getElementById('tearsContainer');
            container.style.display = 'block';
            container.innerHTML = '';
            for (let i = 0; i < 70; i++) {
                const tear = document.createElement('div');
                tear.className = 'tear';
                tear.style.left = Math.random() * 100 + 'vw';
                tear.style.animationDuration = (Math.random() * 1.5 + 1.8) + 's';
                tear.style.animationDelay = Math.random() * 0.6 + 's';
                tear.style.height = (Math.random() * 20 + 18) + 'px';
                container.appendChild(tear);
                setTimeout(() => tear.remove(), 5000);
            }
        }

        function renderQuestion() {
            const q = questions[currentQuestion];
            let html = `
                <div class="card">
                    <div class="question-number">Questão ${currentQuestion + 1} de 10</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options">`;

            if (q.type === "mcq") {
                q.options.forEach((opt, i) => {
                    html += `<div class="option" onclick="selectAnswer('${opt.value}')"><strong>${String.fromCharCode(65 + i)})</strong> ${opt.text}</div>`;
                });
            } else {
                html += `
                    <textarea id="openAnswer" rows="7" style="width:100%; background:rgba(255,255,255,0.1); border:2px solid #00ffcc; border-radius:16px; padding:18px; color:white; font-size:1.1rem;" placeholder="Digite sua resposta aqui..."></textarea>
                    <button onclick="saveOpenAnswer()" class="next-btn">✅ Confirmar Resposta</button>`;
            }

            html += `
                </div>
                <div id="feedbackArea" class="feedback"></div>
                <button id="retryBtn" class="retry-btn" style="display:none;" onclick="retryQuestion()">🔄 Tentar Novamente</button>
                <button id="nextBtn" class="next-btn" style="display:none;" onclick="nextQuestion()">Próxima Questão →</button>
            </div>`;

            document.getElementById('quizContainer').innerHTML = html;
            updateProgress();
        }

        async function selectAnswer(selected) {
            const q = questions[currentQuestion];
            const isCorrect = selected === q.correct;

            await saveAnswerToSupabase(q, selected, isCorrect);

            const feedbackArea = document.getElementById('feedbackArea');
            const retryBtn = document.getElementById('retryBtn');
            const nextBtn = document.getElementById('nextBtn');
            const options = document.querySelectorAll('.option');

            options.forEach(opt => {
                opt.style.pointerEvents = 'none';
                if (opt.textContent.includes(selected)) opt.classList.add(isCorrect ? 'correct' : 'wrong');
                if (opt.textContent.includes(q.correct)) opt.classList.add('correct');
            });

            if (isCorrect) {
                score++;
                document.getElementById('scoreDisplay').textContent = score;
                feedbackArea.innerHTML = `<strong style="color:#00ff88; font-size:1.3rem;">🎉 Excelente! Você acertou!</strong><br><br>${q.explanation}`;
                feedbackArea.classList.add('show', 'correct');
                confetti({ particleCount: 180, spread: 70, origin: { y: 0.6 } });
                nextBtn.style.display = 'block';
            } else {
                document.body.classList.add('error-mode');
                createTears();
                feedbackArea.innerHTML = `<strong style="color:#ff3366; font-size:1.3rem;">😢 Ops... Você errou esta questão.</strong><br><br><strong>Explicação:</strong><br>${q.explanation}`;
                feedbackArea.classList.add('show', 'wrong');
                retryBtn.style.display = 'block';
            }
        }

        async function saveOpenAnswer() {
            const q = questions[currentQuestion];
            const answer = document.getElementById('openAnswer').value.trim() || "(sem resposta)";
            await saveAnswerToSupabase(q, answer, null);
            alert("✅ Resposta aberta salva no banco!");
            nextQuestion();
        }

        function nextQuestion() {
            document.body.classList.remove('error-mode');
            document.getElementById('tearsContainer').style.display = 'none';
            currentQuestion++;
            
            if (currentQuestion < questions.length) {
                renderQuestion();
            } else {
                showResults();
            }
        }

        function updateProgress() {
            const percent = Math.round(((currentQuestion) / questions.length) * 100);
            document.getElementById('progressBar').style.width = percent + '%';
        }

        function showResults() {
            document.getElementById('quizContainer').style.display = 'none';
            const results = document.getElementById('resultsScreen');
            results.style.display = 'block';
            
            document.getElementById('finalScore').textContent = score + "/10";
            let message = score >= 9 ? "Você é incrível! Dominou todos os conceitos!" :
                         score >= 7 ? "Muito bom! Revise as explicações e tire 10 na avaliação." :
                         "Continue praticando! Refaça o quiz para fixar tudo.";
            document.getElementById('finalMessage').innerHTML = message;
        }

        function retryQuestion() {
            document.body.classList.remove('error-mode');
            document.getElementById('tearsContainer').style.display = 'none';
            renderQuestion();
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            sessionId = 'quiz_' + Date.now() + '_' + Math.random().toString(36).slice(2, 11);
            document.getElementById('quizContainer').style.display = 'block';
            document.getElementById('resultsScreen').style.display = 'none';
            renderQuestion();
        }

        // Iniciar o quiz
        window.onload = () => {
            console.log("🚀 Quiz Supremo carregado com sucesso!");
            renderQuestion();
        };
    </script>
</body>
</html>
