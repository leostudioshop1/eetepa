<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Quiz Supremo - Informática 2026</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <!-- Supabase Client via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        /* Seu CSS original permanece igual (não alterei para economizar espaço) */
        :root { --primary: #00ffcc; --danger: #ff3366; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #0a1428, #1e3c72);
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        /* ... resto do seu CSS (copie e cole aqui) ... */
    </style>
</head>
<body>

    <!-- Seu HTML original (header, main, resultsScreen, tearsContainer) permanece igual -->

    <script>
        // ====================== CONFIGURAÇÃO SUPABASE ======================
        const supabaseUrl = 'https://osofdmgokrxdzsxozsrf.supabase.co';
        const supabaseKey = 'sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe'; // sua chave publishable

        const supabase = Supabase.createClient(supabaseUrl, supabaseKey);

        // Gerar um ID único para esta tentativa do quiz (session)
        let sessionId = 'quiz_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);

        // ====================== PERGUNTAS (mesmas que você tinha) ======================
        const questions = [ /* ... cole aqui todas as 10 perguntas exatamente como estavam ... */ ];

        let currentQuestion = 0;
        let score = 0;
        let userAnswers = []; // array para armazenar todas respostas antes de enviar

        // Função para salvar resposta no Supabase
        async function saveAnswerToSupabase(q, userAnswer, isCorrect) {
            try {
                const { error } = await supabase
                    .from('quiz_responses')
                    .insert({
                        session_id: sessionId,
                        question_id: q.id,
                        question_text: q.question,
                        user_answer: userAnswer,
                        is_correct: isCorrect,
                        score: isCorrect ? 1 : 0,
                        user_agent: navigator.userAgent
                        // aluno_nome e aluno_email podem ser adicionados se você pedir no início
                    });

                if (error) console.error('Erro ao salvar no Supabase:', error);
                else console.log(`✅ Resposta da questão ${q.id} salva`);
            } catch (err) {
                console.error('Falha na conexão com Supabase:', err);
            }
        }

        // ====================== FUNÇÕES DO QUIZ (modificadas) ======================
        function renderQuestion() {
            // ... seu código original de renderQuestion permanece quase igual ...
            // (apenas mantenha o que você já tinha)
        }

        async function selectAnswer(selected) {
            const q = questions[currentQuestion];
            const isCorrect = selected === q.correct;

            // Salva no array local (para resultados)
            userAnswers.push({
                question_id: q.id,
                user_answer: selected,
                is_correct: isCorrect
            });

            // Envia imediatamente para o Supabase
            await saveAnswerToSupabase(q, selected, isCorrect);

            // Resto da lógica visual (seu código original)
            const feedbackArea = document.getElementById('feedbackArea');
            const retryBtn = document.getElementById('retryBtn');
            const nextBtn = document.getElementById('nextBtn');
            const options = document.querySelectorAll('.option');

            options.forEach(opt => {
                opt.style.pointerEvents = 'none';
                if (opt.textContent.includes(selected)) {
                    opt.classList.add(isCorrect ? 'correct' : 'wrong');
                }
                if (opt.textContent.includes(q.correct)) {
                    opt.classList.add('correct');
                }
            });

            if (isCorrect) {
                score++;
                document.getElementById('scoreDisplay').textContent = score;
                feedbackArea.innerHTML = `<strong style="color:#00ff88; font-size:1.3rem;">🎉 Excelente! Você acertou!</strong><br><br>${q.explanation}`;
                feedbackArea.classList.add('show', 'correct');
                confetti({ particleCount: 180, spread: 70, origin: { y: 0.6 } });
                nextBtn.style.display = 'block';
            } else {
                document.body.classList.add('error-mode');
                createTears();
                feedbackArea.innerHTML = `
                    <strong style="color:#ff3366; font-size:1.3rem;">😢 Ops... Você errou esta questão.</strong><br><br>
                    <strong>Explicação:</strong><br>${q.explanation}
                `;
                feedbackArea.classList.add('show', 'wrong');
                retryBtn.style.display = 'block';
            }
        }

        async function saveOpenAnswer() {
            const q = questions[currentQuestion];
            const textarea = document.getElementById('openAnswer');
            const userAnswer = textarea.value.trim() || "(resposta vazia)";

            // Salva no Supabase
            await saveAnswerToSupabase(q, userAnswer, null); // open não tem "correct" automático

            alert("✅ Resposta registrada e salva no banco!\n\nCompare com o modelo ideal na aula.");
            nextQuestion();
        }

        function nextQuestion() {
            document.body.classList.remove('error-mode');
            document.getElementById('tearsContainer').style.display = 'none';
            currentQuestion++;
            
            if (currentQuestion < questions.length) {
                renderQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            // ... seu código original de resultados ...
            console.log('Quiz finalizado. Total de respostas salvas:', userAnswers.length);
        }

        function restartQuiz() {
            currentQuestion = 0;
            score = 0;
            userAnswers = [];
            sessionId = 'quiz_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9); // novo session
            document.getElementById('quizContainer').style.display = 'block';
            document.getElementById('resultsScreen').style.display = 'none';
            renderQuestion();
        }

        // Iniciar o quiz
        window.onload = renderQuestion;
    </script>
</body>
</html>
