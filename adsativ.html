<script>
    if (!window.SUPABASE_CONFIG) {
      alert("Erro: Arquivo config.js não encontrado!");
    }

    const supabaseClient = supabase.createClient(
      window.SUPABASE_CONFIG.url,
      window.SUPABASE_CONFIG.key
    );

    let currentQuestion = 0;
    let score = 0;
    let userName = '';
    let deviceId = '';
    let answers = [];

    const questions = [
      // ← Cole aqui as 40 questões que eu te passei anteriormente
      // (as perguntas sobre Portugol: nome/idade/nota, área do triângulo, par/ímpar, login e soma)
    ];

    function generateDeviceId() {
      if (!localStorage.getItem('deviceId')) {
        localStorage.setItem('deviceId', crypto.randomUUID());
      }
      return localStorage.getItem('deviceId');
    }

    async function startQuiz() {
      userName = document.getElementById('user-name').value.trim();
      if (!userName) {
        alert("Por favor, digite seu nome completo.");
        return;
      }

      deviceId = generateDeviceId();
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('quiz-screen').classList.remove('hidden');

      document.getElementById('sidebar-name').textContent = userName;
      document.getElementById('sidebar-device').textContent = deviceId;

      currentQuestion = 0;
      score = 0;
      answers = [];
      loadQuestion();
    }

    function loadQuestion() {
      const q = questions[currentQuestion];
      document.getElementById('question-counter').textContent = `${currentQuestion + 1}/${questions.length}`;
      document.getElementById('question-text').textContent = q.q;

      const optionsDiv = document.getElementById('options');
      optionsDiv.innerHTML = '';

      q.options.forEach((option, index) => {
        const btn = document.createElement('button');
        btn.className = `w-full text-left p-6 border-2 border-zinc-700 hover:border-emerald-500 rounded-2xl transition text-lg question-card bg-zinc-800`;
        btn.textContent = option;
        btn.onclick = () => selectAnswer(index, btn);
        optionsDiv.appendChild(btn);
      });

      updateProgress();
      updateScore();
    }

    function selectAnswer(selectedIndex, selectedBtn) {
      const q = questions[currentQuestion];
      answers[currentQuestion] = selectedIndex;

      if (selectedIndex === q.correct) {
        score++;
      }

      // Feedback visual
      const buttons = document.querySelectorAll('#options button');
      buttons.forEach((btn, i) => {
        btn.disabled = true;
        if (i === q.correct) btn.classList.add('correct');
        if (i === selectedIndex && i !== q.correct) btn.classList.add('incorrect');
      });

      updateScore();
      updateProgress();

      // Avança automaticamente após 1 segundo (1000ms)
      setTimeout(() => {
        if (currentQuestion < questions.length - 1) {
          currentQuestion++;
          loadQuestion();
        } else {
          saveToSupabase();   // Última questão → salva e mostra resultado
        }
      }, 1000);
    }

    function updateScore() {
      document.getElementById('score-main').textContent = score;
      document.getElementById('sidebar-score').textContent = score;
    }

    function updateProgress() {
      const progress = ((currentQuestion + 1) / questions.length) * 100;
      document.getElementById('progress-bar').style.width = `${progress}%`;
    }

    function nextQuestion() {
      if (currentQuestion < questions.length - 1) {
        currentQuestion++;
        loadQuestion();
      }
    }

    function prevQuestion() {
      if (currentQuestion > 0) {
        currentQuestion--;
        loadQuestion();
      }
    }

    function showResults() {
      document.getElementById('quiz-screen').classList.add('hidden');
      document.getElementById('result-screen').classList.remove('hidden');

      const percentage = Math.round((score / questions.length) * 100);
      document.getElementById('final-score-text').innerHTML = `
        ${score} / ${questions.length}<br>
        <span class="text-3xl font-normal text-zinc-400">(${percentage}%)</span>
      `;
    }

    async function saveToSupabase() {
      try {
        const { error } = await supabaseClient
          .from('quiz_results2')
          .insert({
            user_name: userName,
            device_id: deviceId,
            score: score,
            total_questions: questions.length,
            answers: JSON.stringify(answers),
            created_at: new Date().toISOString()
          });

        if (error) console.error("Erro ao salvar:", error);
        else console.log("Resultado salvo!");

        await loadRanking();
        showResults();
      } catch (err) {
        console.error(err);
        showResults();
      }
    }

    async function loadRanking() {
      try {
        const { data } = await supabaseClient
          .from('quiz_results2')
          .select('user_name, score')
          .order('score', { ascending: false })
          .limit(10);

        const rankingDiv = document.getElementById('ranking-list');
        rankingDiv.innerHTML = '';

        if (!data || data.length === 0) {
          rankingDiv.innerHTML = `<p class="text-zinc-500 text-center py-4">Nenhum resultado ainda.</p>`;
          return;
        }

        data.forEach((item, index) => {
          const div = document.createElement('div');
          div.className = `ranking-item flex justify-between items-center bg-zinc-800 px-4 py-3 rounded-2xl`;
          div.innerHTML = `
            <div class="flex items-center gap-3">
              <span class="text-emerald-400 font-bold w-6">${index + 1}º</span>
              <span class="text-zinc-300 truncate">${item.user_name}</span>
            </div>
            <span class="font-bold text-emerald-400">${item.score}/40</span>
          `;
          rankingDiv.appendChild(div);
        });
      } catch (err) {
        console.error("Erro ao carregar ranking:", err);
      }
    }

    function restartQuiz() {
      location.reload();
    }

    window.onload = () => {
      deviceId = generateDeviceId();
      loadRanking();
    };
  </script>
