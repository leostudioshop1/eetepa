<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Lógica de Programação - EETEPA Xinguara</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
    }
    .question-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .question-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 15px rgba(99, 102, 241, 0.3);
    }
    .correct {
      border-color: #22c55e !important;
      background-color: #052e16 !important;
      box-shadow: 0 0 10px #22c55e;
    }
    .incorrect {
      border-color: #ef4444 !important;
      background-color: #450a0a !important;
      box-shadow: 0 0 10px #ef4444;
    }
  </style>
</head>
<body class="min-h-screen">
  <div class="max-w-6xl mx-auto p-6">
    <div class="flex flex-col lg:flex-row gap-8">

      <div class="flex-1 bg-zinc-900 rounded-3xl shadow-2xl p-8 border border-zinc-800">
        <div class="flex items-center justify-between mb-8">
          <div>
            <h1 class="text-4xl font-bold text-indigo-400">Quiz: Portugol & Lógica</h1>
            <p class="text-zinc-400 text-sm mt-1">Algoritmos e Estruturas Fundamentais</p>
          </div>
        </div>

        <div id="start-screen" class="text-center py-12">
          <div class="max-w-md mx-auto">
            <input id="user-name" type="text" placeholder="Seu nome completo" 
                   class="w-full px-6 py-5 bg-zinc-800 border border-zinc-700 rounded-2xl focus:outline-none focus:border-indigo-500 text-lg placeholder-zinc-500 mb-4">
            
            <input id="user-course" type="text" placeholder="Curso (ex: Informática)" 
                   class="w-full px-6 py-5 bg-zinc-800 border border-zinc-700 rounded-2xl focus:outline-none focus:border-indigo-500 text-lg placeholder-zinc-500">
            
            <button onclick="startQuiz()" 
                    class="mt-8 w-full bg-indigo-600 hover:bg-indigo-500 transition py-5 rounded-2xl text-xl font-semibold shadow-lg shadow-indigo-500/20">
              Iniciar Desafio
            </button>
          </div>
        </div>

        <div id="quiz-screen" class="hidden">
          <div class="flex justify-between items-center mb-8">
            <span id="question-counter" class="text-2xl font-bold text-indigo-400">1/5</span>
            <div class="text-right">
              <div class="text-xs text-zinc-500">Pontos Ganhos</div>
              <div id="score-main" class="text-4xl font-bold text-emerald-400">0</div>
            </div>
          </div>

          <div id="question-text" class="text-2xl font-medium leading-relaxed min-h-[110px] mb-10 text-white"></div>

          <div id="options" class="grid grid-cols-1 gap-4"></div>

          <div class="flex justify-end mt-12">
            <button onclick="nextQuestion()" id="btn-next"
                    class="px-10 py-4 bg-indigo-600 hover:bg-indigo-500 rounded-2xl font-medium shadow-lg shadow-indigo-500/20">Próxima →</button>
          </div>
        </div>

        <div id="result-screen" class="hidden text-center py-12">
          <h2 class="text-5xl font-bold mb-6 text-emerald-400">Mandou bem!</h2>
          <div id="final-score-text" class="text-7xl font-bold mb-6"></div>
          <p class="text-xl text-zinc-400 mb-10">Dados enviados para o ranking da EETEPA.</p>
          
          <button onclick="restartQuiz()" 
                  class="bg-zinc-700 hover:bg-zinc-600 px-12 py-5 rounded-2xl font-semibold text-lg transition">
            Tentar Novamente
          </button>
        </div>
      </div>

      <div class="w-full lg:w-80 bg-zinc-900 rounded-3xl shadow-2xl p-8 border border-zinc-800 h-fit sticky top-6">
        <h3 class="font-bold text-2xl mb-8 text-white">Status</h3>
        
        <div class="space-y-8">
          <div>
            <p class="text-xs uppercase tracking-widest text-zinc-500">Estudante</p>
            <p id="sidebar-name" class="font-semibold text-lg mt-1 text-indigo-300">—</p>
          </div>

          <div>
            <p class="text-xs uppercase tracking-widest text-zinc-500">Pontuação</p>
            <div id="sidebar-score" class="text-6xl font-bold text-emerald-400 mt-1">0</div>
          </div>

          <div>
            <p class="text-xs uppercase tracking-widest text-zinc-500 mb-2">Progresso do Quiz</p>
            <div class="h-3 bg-zinc-800 rounded-full overflow-hidden">
              <div id="progress-bar" class="h-3 bg-gradient-to-r from-indigo-500 to-emerald-500 w-0 transition-all duration-300"></div>
            </div>
          </div>
        </div>

        <div class="mt-12 pt-8 border-t border-zinc-800 text-center text-xs text-zinc-500">
          <p class="font-bold text-zinc-400">EETEPA Xinguara</p>
          <p>Prof. Léo Cruz</p>
        </div>
      </div>
    </div>
  </div>

  <script>
    const supabaseClient = supabase.createClient(window.SUPABASE_CONFIG.url, window.SUPABASE_CONFIG.key);

    let currentQuestion = 0;
    let score = 0;
    let userName = '';
    let userCourse = '';
    let deviceId = '';
    let answers = [];

    // Questões baseadas na sua solicitação
    const questions = [
      { 
        q: "Qual a sintaxe correta para ler NOME, IDADE e NOTA em Portugol?", 
        options: [
          "leia(nome, idade, nota)", 
          "escreva(nome, idade, nota)", 
          "leia(\"nome\", \"idade\", \"nota\")", 
          "entrada -> nome, idade, nota"
        ], 
        correct: 0 
      },
      { 
        q: "Para calcular a área de um triângulo (base * altura / 2), qual a expressão correta?", 
        options: [
          "area <- base * altura / 2", 
          "area <- base + altura / 2", 
          "area <- (base * altura) * 2", 
          "area <- base * altura ^ 2"
        ], 
        correct: 0 
      },
      { 
        q: "Como verificar se um número é PAR ou ÍMPAR usando o operador de resto (%)?", 
        options: [
          "se (num % 2 == 0) entao { escreva(\"PAR\") }", 
          "se (num / 2 == 0) entao { escreva(\"PAR\") }", 
          "se (num % 2 == 1) entao { escreva(\"PAR\") }", 
          "se (num * 2 == 0) entao { escreva(\"PAR\") }"
        ], 
        correct: 0 
      },
      { 
        q: "Em um programa de LOGIN, qual estrutura é usada para validar usuário e senha?", 
        options: [
          "Estrutura de Seleção (se...entao...senao)", 
          "Estrutura de Repetição (para)", 
          "Apenas variáveis do tipo Inteiro", 
          "Comando de Saída (escreva)"
        ], 
        correct: 0 
      },
      { 
        q: "Para somar 5 números digitados pelo usuário, qual a melhor abordagem?", 
        options: [
          "Usar um laço de repetição (para i de 1 ate 5)", 
          "Criar 50 variáveis diferentes", 
          "Usar apenas o comando escreva", 
          "Não é possível somar mais de 2 números"
        ], 
        correct: 0 
      }
    ];

    function generateDeviceId() {
      if (!localStorage.getItem('deviceId')) {
        localStorage.setItem('deviceId', 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase());
      }
      return localStorage.getItem('deviceId');
    }

    async function startQuiz() {
      userName = document.getElementById('user-name').value.trim();
      userCourse = document.getElementById('user-course').value.trim();
      
      if (!userName || !userCourse) {
        alert("Preencha seu nome e curso para continuar!");
        return;
      }

      deviceId = generateDeviceId();
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('quiz-screen').classList.remove('hidden');
      document.getElementById('sidebar-name').textContent = userName;

      currentQuestion = 0;
      score = 0;
      loadQuestion();
    }

    function loadQuestion() {
      const q = questions[currentQuestion];
      document.getElementById('question-counter').textContent = `${currentQuestion + 1}/${questions.length}`;
      document.getElementById('question-text').textContent = q.q;

      const optionsDiv = document.getElementById('options');
      optionsDiv.innerHTML = '';

      q.options.forEach((option, index) => {
        const btn = document.createElement('button');
        btn.className = `w-full text-left p-6 border-2 border-zinc-700 hover:border-indigo-500 rounded-2xl transition text-lg question-card bg-zinc-800 text-zinc-300`;
        btn.textContent = option;
        btn.onclick = () => selectAnswer(index, btn);
        optionsDiv.appendChild(btn);
      });

      updateProgress();
    }

    function selectAnswer(selectedIndex, selectedBtn) {
      const q = questions[currentQuestion];
      const buttons = document.querySelectorAll('#options button');
      
      buttons.forEach(btn => btn.disabled = true);

      if (selectedIndex === q.correct) {
        score += 20; // 20 pontos por questão para totalizar 100
        selectedBtn.classList.add('correct');
      } else {
        selectedBtn.classList.add('incorrect');
        buttons[q.correct].classList.add('correct');
      }

      updateScore();

      if (currentQuestion === questions.length - 1) {
        setTimeout(saveToSupabase, 1500);
      }
    }

    function updateScore() {
      document.getElementById('score-main').textContent = score;
      document.getElementById('sidebar-score').textContent = score;
    }

    function updateProgress() {
      const progress = ((currentQuestion + 1) / questions.length) * 100;
      document.getElementById('progress-bar').style.width = `${progress}%`;
    }

    function nextQuestion() {
      if (currentQuestion < questions.length - 1) {
        currentQuestion++;
        loadQuestion();
      }
    }

    async function saveToSupabase() {
      try {
        await supabaseClient.from('quiz_results2').insert({
          user_name: userName,
          course: userCourse,
          device_id: deviceId,
          score: score,
          created_at: new Date().toISOString()
        });
        showResults();
      } catch (err) {
        console.error("Erro Supabase:", err);
        showResults();
      }
    }

    function showResults() {
      document.getElementById('quiz-screen').classList.add('hidden');
      document.getElementById('result-screen').classList.remove('hidden');
      document.getElementById('final-score-text').textContent = `${score} Pontos`;
    }

    function restartQuiz() {
      location.reload();
    }
  </script>
</body>
</html>
