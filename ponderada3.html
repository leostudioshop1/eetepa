<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Missão Delphi | Jogos Digitais 2º Ano</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #151515;
            --accent-color: #00ff41; /* Verde Gamer/Matrix */
            --text-color: #ffffff;
            --secondary-text: #888888;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%);
        }

        .container {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 15px;
            border: 1px solid #333;
            box-shadow: 0 0 30px rgba(0, 255, 65, 0.15);
            max-width: 600px;
            width: 90%;
            text-align: center;
        }

        h1 {
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 5px;
            font-size: 1.8rem;
        }

        .subtitle {
            color: var(--secondary-text);
            margin-bottom: 30px;
            font-weight: 300;
        }

        .challenge-details {
            background: #202020;
            padding: 20px;
            border-radius: 8px;
            border-left: 5px solid var(--accent-color);
            text-align: left;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .timer-box {
            margin-bottom: 35px;
        }

        .timer-label {
            font-size: 0.8rem;
            text-transform: uppercase;
            color: var(--secondary-text);
            letter-spacing: 2px;
            margin-bottom: 10px;
        }

        #timer {
            font-family: 'Courier New', Courier, monospace;
            font-size: 3rem;
            font-weight: bold;
            color: var(--accent-color);
            text-shadow: 0 0 15px rgba(0, 255, 65, 0.4);
        }

        button {
            background: transparent;
            color: var(--accent-color);
            border: 2px solid var(--accent-color);
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s ease;
            border-radius: 5px;
            letter-spacing: 2px;
        }

        button:hover:not(:disabled) {
            background: var(--accent-color);
            color: #000;
            box-shadow: 0 0 20px var(--accent-color);
            transform: translateY(-2px);
        }

        button:disabled {
            border-color: #444;
            color: #444;
            cursor: not-allowed;
        }

        #status-message {
            margin-top: 20px;
            font-size: 0.9rem;
            min-height: 20px;
        }

        .success { color: var(--accent-color); }
        .error { color: #ff4444; }
    </style>
</head>
<body>

<div class="container">
    <h1>System Override</h1>
    <p class="subtitle">Turma: Jogos Digitais - 2º Ano</p>

    <div class="challenge-details">
        <strong>MISSÃO:</strong> Desenvolver um algoritmo em <b>Delphi (Object Pascal)</b> para calcular a <b>Média Ponderada</b> de 3 números reais.<br><br>
        <strong>REQUISITO:</strong> O usuário deve poder inserir os valores e os pesos.
    </div>

    <div class="timer-box">
        <div class="timer-label">Autodestruição do prazo em:</div>
        <div id="timer">06:00:00:00</div>
    </div>

    <button id="btnAceitar">Aceitar Desafio</button>
    <div id="status-message"></div>
</div>

<script>
    // --- CREDENCIAIS DO SUPABASE ---
    const SUPABASE_URL = 'https://osofdmgokrxdzsxozsrf.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // --- LÓGICA DO CRONÔMETRO (6 DIAS) ---
    // Define o prazo final somando 6 dias à data/hora do primeiro acesso do aluno
    const prazoFinal = new Date();
    prazoFinal.setDate(prazoFinal.getDate() + 6);

    function atualizarContagem() {
        const agora = new Date().getTime();
        const distancia = prazoFinal - agora;

        if (distancia < 0) {
            document.getElementById("timer").innerHTML = "00:00:00:00";
            return;
        }

        const dias = Math.floor(distancia / (1000 * 60 * 60 * 24));
        const horas = Math.floor((distancia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutos = Math.floor((distancia % (1000 * 60 * 60)) / (1000 * 60));
        const segundos = Math.floor((distancia % (1000 * 60)) / 1000);

        // Formatação com zeros à esquerda
        const d = dias.toString().padStart(2, '0');
        const h = horas.toString().padStart(2, '0');
        const m = minutos.toString().padStart(2, '0');
        const s = segundos.toString().padStart(2, '0');

        document.getElementById("timer").innerHTML = `${d}:${h}:${m}:${s}`;
    }

    setInterval(atualizarContagem, 1000);
    atualizarContagem();

    // --- ENVIAR DADOS PARA O SUPABASE ---
    const btn = document.getElementById('btnAceitar');
    const msg = document.getElementById('status-message');

    btn.addEventListener('click', async () => {
        btn.disabled = true;
        msg.innerHTML = "Iniciando upload de metadados...";
        msg.className = "";

        const payload = {
            device_info: navigator.userAgent,
            acess_time: new Date().toISOString(),
            screen_res: `${window.screen.width}x${window.screen.height}`,
            plataforma: navigator.platform
        };

        try {
            const { error } = await _supabase
                .from('registros_atividade') // Certifique-se que este nome de tabela existe no seu SQL
                .insert([payload]);

            if (error) throw error;

            msg.innerHTML = "REGISTRO ENCRYPTADO. DESAFIO INICIADO COM SUCESSO.";
            msg.className = "success";
            
        } catch (err) {
            console.error(err);
            msg.innerHTML = "ERRO NA CONEXÃO COM O MAINFRAME. TENTE NOVAMENTE.";
            msg.className = "error";
            btn.disabled = false;
        }
    });
</script>

</body>
</html>
