<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MISSÃO 03 • MÉDIA PONDERADA | Jogos Digitais 2º Ano</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

        :root {
            --bg: #0a0a0f;
            --surface: #111118;
            --surface2: #1a1a24;
            --accent: #00d4ff;
            --accent2: #00ff9d;
            --accent3: #ff2e63;
            --text: #e0e0ff;
            --text-secondary: #a0a0cc;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
        }

        header {
            padding: 18px 5%;
            display: flex;
            justify-content: space-between;
            background: #111118;
        }

        .logo {
            font-family: 'Space Grotesk';
            font-size: 1.8rem;
            color: var(--accent);
        }

        main { max-width: 900px; margin: 60px auto; padding: 20px; }

        .btn-mission {
            padding: 18px 40px;
            border: 2px solid var(--accent);
            background: transparent;
            color: white;
            border-radius: 50px;
            cursor: pointer;
        }

        .btn-mission:hover {
            background: var(--accent);
            color: black;
        }
    </style>
</head>

<body>

<header>
    <div class="logo">JOGOS DIGITAIS</div>
    <div>MISSÃO 03</div>
</header>

<main>
    <h1>MÉDIA PONDERADA</h1>
    <p>Desenvolva o sistema em Delphi antes do prazo.</p>

    <button class="btn-mission" id="missionBtn">
        ACEITAR MISSÃO
    </button>
</main>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // ==================== CONFIGURAÇÃO SUPABASE ====================
    const SUPABASE_URL = 'https://osofdmgokrxdzsxozsrf.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe';

    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ==================== GERAR ID ====================
    function generateDeviceId() {
        return 'DEV-' + Math.random().toString(36).substring(2, 10).toUpperCase();
    }

    // ==================== SALVAR ====================
    async function salvarAceite() {
        const agora = new Date();

        const { error } = await supabase
            .from('missao_aceites')
            .insert([{
                data: agora.toISOString().split('T')[0],
                hora: agora.toTimeString().split(' ')[0],
                dispositivo: navigator.userAgent,
                id_dispositivo: generateDeviceId(),
                nome_dispositivo: navigator.platform
            }]);

        if (error) {
            console.error('Erro:', error);
        }
    }

    // ==================== BOTÃO ====================
    document.getElementById('missionBtn').addEventListener('click', async () => {
        await salvarAceite();

        document.getElementById('missionBtn').innerText = "MISSÃO ACEITA";
        document.body.style.background = "#0f2b1f";
    });
</script>

</body>
</html>
