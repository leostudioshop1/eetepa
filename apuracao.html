<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Apuração - Escola Pedro Ribeiro Mota</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        body{ background:#0f0f0f; color:#fff; font-family:Arial; padding:20px; }
        .container{ max-width:1100px; margin:auto; }
        h1{ text-align: center; color: #7c3aed; margin-bottom: 5px; }
        h4{ text-align: center; color: #aaa; margin-top: 0; margin-bottom: 30px; }
        .card{ background:#1c1c1c; padding:20px; border-radius:12px; margin-bottom:20px; border: 1px solid #333; }
        .flex-buttons{ display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        input, button{ padding:10px; border:none; border-radius:6px; font-weight:bold; }
        input{ background:#2b2b2b; color:#fff; width:250px; border: 1px solid #444; }
        .btn-add{ background:#7c3aed; color:#fff; cursor:pointer; }
        .btn-excel{ background:#16a34a; color:#fff; cursor:pointer; }
        .btn-pdf{ background:#dc2626; color:#fff; cursor:pointer; }
        .btn-danger{ background:#444; color:#ff4444; border: 1px solid #ff4444; margin-left: auto; cursor:pointer; }
        table{ width:100%; border-collapse:collapse; margin-top:10px; background: #111; }
        th, td{ padding:12px; border: 1px solid #333; text-align:left; }
        th{ background: #222; color: #7c3aed; }
        .chart-container{ background:#fff; border-radius:8px; padding:15px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>Escola Pedro Ribeiro Mota</h1>
    <h4>Eleição da Tutoria - Painel de Controle</h4>

    <div class="card">
        <h3>Gerenciar Professores</h3>
        <input type="text" id="novoProfessor" placeholder="Nome do novo tutor">
        <button class="btn-add" onclick="adicionarProfessor()">Cadastrar Professor</button>
    </div>

    <div class="card">
        <h3>Ações e Relatórios</h3>
        <div class="flex-buttons">
            <button class="btn-excel" onclick="exportarExcel()">Exportar para Excel</button>
            <button class="btn-pdf" onclick="exportarPDF()">Exportar PDF Detalhado</button>
            <button class="btn-danger" onclick="zerarBanco()">Zerar Sistema (CUIDADO)</button>
        </div>
    </div>

    <div class="card">
        <h3>Quadro de Resumo</h3>
        <table id="tabelaVotos">
            <thead>
                <tr>
                    <th>Professor / Tutor</th>
                    <th>Votos Recebidos</th>
                    <th>Vagas Restantes</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="corpoTabela"></tbody>
        </table>
    </div>

    <div class="card">
        <h3>Gráfico de Preenchimento</h3>
        <div class="chart-container">
            <canvas id="graficoVotos"></canvas>
        </div>
    </div>
</div>

<script>
    const _supabase = supabase.createClient('https://hjvlgklyhzvpfyxhpjdb.supabase.co', 'sb_publishable_AtYA70tt9Nh03Gz-RR6c1w_J2PHVdJv');
    let meuGrafico = null;

    document.addEventListener("DOMContentLoaded", atualizarDados);

    async function adicionarProfessor() {
        const nome = document.getElementById("novoProfessor").value.trim();
        if(!nome) return;
        const { error } = await _supabase.from('professores').insert([{ nome }]);
        if(error) alert("Erro: Nome já cadastrado ou falha na conexão.");
        document.getElementById("novoProfessor").value = "";
        atualizarDados();
    }

    async function atualizarDados() {
        const { data: profs } = await _supabase.from('professores').select('*').order('nome');
        const { data: votos } = await _supabase.from('votos').select('professor_nome');

        const contagem = {};
        profs.forEach(p => contagem[p.nome] = 0);
        if(votos) votos.forEach(v => { if(contagem[v.professor_nome] !== undefined) contagem[v.professor_nome]++; });

        const tbody = document.getElementById("corpoTabela");
        tbody.innerHTML = "";
        
        Object.keys(contagem).forEach(nome => {
            const v = contagem[nome];
            const restantes = 14 - v;
            const status = restantes <= 0 ? "<b style='color:#ff4444'>LOTADO</b>" : "<span style='color:#4ade80'>Disponível</span>";
            
            tbody.innerHTML += `
                <tr>
                    <td>${nome}</td>
                    <td>${v}</td>
                    <td>${restantes < 0 ? 0 : restantes}</td>
                    <td>${status}</td>
                </tr>`;
        });

        renderizarGrafico(Object.keys(contagem), Object.values(contagem));
    }

    function renderizarGrafico(labels, valores) {
        const ctx = document.getElementById('graficoVotos').getContext('2d');
        if(meuGrafico) meuGrafico.destroy();
        meuGrafico = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [{ 
                    label: 'Votos Atuais (Máx 14)', 
                    data: valores, 
                    backgroundColor: valores.map(v => v >= 14 ? '#ef4444' : '#7c3aed')
                }]
            },
            options: { 
                scales: { y: { max: 14, beginAtZero: true, ticks: { stepSize: 1 } } }
            }
        });
    }

    function exportarExcel() {
        const table = document.getElementById("tabelaVotos");
        const wb = XLSX.utils.table_to_book(table);
        XLSX.writeFile(wb, "Eleicao_Tutoria_Resumo.xlsx");
    }

    async function exportarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF();
        
        // Título do PDF
        doc.setFontSize(18);
        doc.text("Relatório Detalhado - Escola Pedro Ribeiro Mota", 14, 20);
        doc.setFontSize(12);
        doc.text("Eleição da Tutoria - Lista de Alunos por Professor", 14, 28);
        
        // Busca todos os dados do banco para o PDF
        const { data: todosVotos, error } = await _supabase
            .from('votos')
            .select('aluno_nome, turma, professor_nome, created_at')
            .order('professor_nome', { ascending: true });

        if (error || !todosVotos) {
            alert("Erro ao buscar dados para o PDF");
            return;
        }

        // Agrupar votos por professor
        const agrupado = {};
        todosVotos.forEach(v => {
            if (!agrupado[v.professor_nome]) agrupado[v.professor_nome] = [];
            agrupado[v.professor_nome].push(v);
        });

        let yPos = 35;

        // Gerar tabelas para cada professor
        for (const professor in agrupado) {
            doc.setFontSize(14);
            doc.setTextColor(124, 58, 237); // Cor Roxa
            doc.text(`Tutor: ${professor} (${agrupado[professor].length} votos)`, 14, yPos);
            
            const rows = agrupado[professor].map(v => [
                v.aluno_nome,
                v.turma,
                new Date(v.created_at).toLocaleString('pt-BR')
            ]);

            doc.autoTable({
                head: [['Aluno', 'Turma', 'Data/Hora do Voto']],
                body: rows,
                startY: yPos + 5,
                theme: 'striped',
                headStyles: { fillColor: [124, 58, 237] },
                margin: { bottom: 20 }
            });

            yPos = doc.lastAutoTable.finalY + 15;

            // Adiciona nova página se o espaço acabar
            if (yPos > 250) {
                doc.addPage();
                yPos = 20;
            }
        }

        doc.save("Relatorio_Detalhado_Tutoria.pdf");
    }

    async function zerarBanco() {
        if (!confirm("⚠️ ATENÇÃO: Isso apagará TODOS os votos e TODOS os professores permanentemente. Tem certeza?")) return;
        if (!confirm("Confirmação final: Deseja REALMENTE formatar o banco de dados?")) return;

        // No Supabase, sem filtros complexos, usamos uma gambiarra comum para deletar tudo:
        const { error: errVotos } = await _supabase.from('votos').delete().neq('aluno_nome', 'SISTEMA_NULL');
        const { error: errProfs } = await _supabase.from('professores').delete().neq('nome', 'SISTEMA_NULL');

        if (!errVotos && !errProfs) {
            alert("Banco de dados resetado com sucesso!");
            localStorage.clear();
            location.reload();
        } else {
            alert("Erro ao zerar banco. Certifique-se de que o RLS do Supabase permite DELETE.");
        }
    }

    setInterval(atualizarDados, 15000);
</script>
</body>
</html>
