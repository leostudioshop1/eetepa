<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Horário EETEPA</title>
  <link rel="icon" type="image/png" href="icone.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>
    .horario-cell { transition: all 0.2s; }
    .horario-cell:hover { transform: scale(1.02); z-index: 10; }
    .professor-tag { font-size: 0.75rem; padding: 2px 8px; border-radius: 9999px; }
    .title-animation { animation: slideTitle 8s infinite alternate ease-in-out; }
    @keyframes slideTitle { 0% { transform: translateX(-10px); } 100% { transform: translateX(10px); } }
    .blocked { filter: grayscale(1); pointer-events: none; opacity: 0.7; }
    .disponibilidade-tag { font-size: 0.7rem; padding: 1px 6px; border-radius: 9999px; }
  </style>
</head>
<body class="bg-gray-50 font-sans flex flex-col h-screen" oncontextmenu="return false;">

  <div class="bg-indigo-700 text-white py-4 px-6 flex items-center justify-between shadow-lg">
    <div class="flex items-center gap-3">
      <i class="fas fa-clock text-3xl"></i>
      <div>
        <h1 class="text-3xl font-bold tracking-tight title-animation">Master Horário EETEPA</h1>
        <p class="text-indigo-200 text-sm">Sistema de Gerenciamento de Horários</p>
      </div>
    </div>
    <div class="text-right">
      <div id="device-info" class="text-sm opacity-90"></div>
    </div>
  </div>

  <div class="flex flex-1 overflow-hidden" id="main-content">
    <div class="w-96 bg-white shadow-xl overflow-y-auto">
      <div class="p-6 border-b">
        <h2 class="text-xl font-semibold text-gray-800">Controles</h2>
      </div>
      <div class="flex border-b">
        <button onclick="showTab(0)" class="tab-button flex-1 py-3 font-medium tab-active">Turmas</button>
        <button onclick="showTab(1)" class="tab-button flex-1 py-3 font-medium">Disciplinas</button>
        <button onclick="showTab(2)" class="tab-button flex-1 py-3 font-medium">Professores</button>
      </div>

      <div id="tab-0" class="tab-content p-6">
        <div class="space-y-4">
          <input id="nova-turma" type="text" placeholder="Nome da Turma" class="w-full border rounded-lg px-4 py-2">
          <div>
            <label class="block text-sm font-medium mb-2">Turno</label>
            <select id="turno-turma" class="w-full border rounded-lg px-4 py-2">
              <option value="manha">Manhã</option>
              <option value="tarde">Tarde</option>
              <option value="noite">Noite</option>
            </select>
          </div>
          <button onclick="addTurma()" class="w-full bg-indigo-600 text-white py-3 rounded-lg hover:bg-indigo-700 font-medium">
            Adicionar Turma
          </button>
        </div>
        <ul id="lista-turmas" class="space-y-3 mt-8"></ul>
      </div>

      <div id="tab-1" class="tab-content p-6 hidden">
        <div class="flex gap-2 mb-4">
          <input id="nova-disciplina" type="text" placeholder="Nova Disciplina" class="flex-1 border rounded-lg px-4 py-2">
          <button onclick="addDisciplina()" class="bg-indigo-600 text-white px-5 rounded-lg hover:bg-indigo-700">
            <i class="fas fa-plus"></i>
          </button>
        </div>
        <ul id="lista-disciplinas" class="space-y-2"></ul>
      </div>

      <div id="tab-2" class="tab-content p-6 hidden">
        <div class="space-y-5">
          <input id="nome-professor" type="text" placeholder="Nome do Professor" class="w-full border rounded-lg px-4 py-2">
          <div>
            <label class="block text-sm font-medium mb-1">Cor</label>
            <input id="cor-professor" type="color" value="#4f46e5" class="w-full h-10 border rounded-lg p-1">
          </div>
          <div>
            <label class="block text-sm font-medium mb-2">Dias disponíveis</label>
            <div id="dias-disponiveis" class="grid grid-cols-5 gap-3 text-center"></div>
          </div>
          <div>
            <label class="block text-sm font-medium mb-2">Horários disponíveis</label>
            <div id="horarios-disponiveis" class="grid grid-cols-2 gap-2 text-sm max-h-80 overflow-y-auto"></div>
          </div>
          <button onclick="addProfessor()" class="w-full bg-emerald-600 text-white py-3 rounded-lg hover:bg-emerald-700 font-medium">
            Adicionar Professor
          </button>
        </div>
        <ul id="lista-professores" class="mt-8 space-y-3"></ul>
      </div>
    </div>

    <div class="flex-1 flex flex-col">
      <div class="bg-white border-b px-6 py-4 flex items-center justify-between">
        <select id="filtro-turma" onchange="renderGrade()" class="border rounded-lg px-4 py-2"></select>
        <div class="flex gap-3">
          <button onclick="exportarImagem()" class="flex items-center gap-2 px-4 py-2 border rounded-lg hover:bg-gray-50">
            <i class="fas fa-image"></i> Exportar PNG
          </button>
          <button onclick="gerarPDFCompleto()" class="flex items-center gap-2 px-4 py-2 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700">
            <i class="fas fa-file-pdf"></i> Gerar PDF Completo
          </button>
          <button onclick="limparGrade()" class="flex items-center gap-2 px-4 py-2 text-red-600 border rounded-lg hover:bg-red-50">
            <i class="fas fa-trash"></i> Limpar-por: Léo Cruz
          </button>
        </div>
      </div>
      <div class="flex-1 overflow-auto p-6" id="grade-container">
        <table id="grade-horarios" class="w-full border-collapse bg-white shadow-lg rounded-xl overflow-hidden">
          <thead>
            <tr class="bg-gray-100">
              <th class="border p-3 w-36">Horário</th>
              <th class="border p-3">Segunda</th>
              <th class="border p-3">Terça</th>
              <th class="border p-3">Quarta</th>
              <th class="border p-3">Quinta</th>
              <th class="border p-3">Sexta</th>
            </tr>
          </thead>
          <tbody id="corpo-grade"></tbody>
        </table>
      </div>
      <div class="bg-white border-t p-4">
        <h3 class="font-medium mb-2 text-sm text-gray-600">Legenda de Professores</h3>
        <div id="legenda-professores" class="flex flex-wrap gap-4"></div>
      </div>
    </div>
  </div>

  <footer class="bg-gray-900 text-white py-3 px-6 text-center text-sm">
    <div class="flex items-center justify-center gap-2">
      <i class="fas fa-code"></i>
      <span>Desenvolvido por: <strong>Léo Cruz</strong> - Engenheiro de Software</span>
    </div>
  </footer>

  <div id="modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
    <div class="bg-white rounded-2xl p-8 w-full max-w-md mx-4">
      <h2 class="text-xl font-bold mb-6" id="modal-title">Alocar Aula</h2>
      <div class="space-y-5">
        <div>
          <label class="block text-sm font-medium mb-1">Turma</label>
          <select id="modal-turma" class="w-full border rounded-lg px-4 py-3" onchange="atualizarDisciplinasModal()"></select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Disciplina</label>
          <select id="modal-disciplina" class="w-full border rounded-lg px-4 py-3" onchange="atualizarProfessoresModal()"></select>
        </div>
        <div>
          <label class="block text-sm font-medium mb-1">Professor</label>
          <select id="modal-professor" class="w-full border rounded-lg px-4 py-3" onchange="validarDisponibilidade()"></select>
        </div>
      </div>
      <div id="aviso-disponibilidade" class="mt-4 text-sm p-3 rounded-lg"></div>
      <div class="flex gap-3 mt-8">
        <button onclick="fecharModal()" class="flex-1 py-3 border rounded-xl font-medium hover:bg-gray-50">Cancelar</button>
        <button onclick="salvarAlocacao()" id="btn-salvar" class="flex-1 py-3 bg-indigo-600 text-white rounded-xl font-medium disabled:opacity-50" disabled>Salvar Alocação</button>
      </div>
    </div>
  </div>

  <script>
    let turmas = [];
    let disciplinasGerais = [];
    let professores = [];
    let horariosAlocados = {};
    let currentCellId = null;
    let turmaSelecionada = null;

    const horariosPorTurno = {
      manha: ["07:00 - 07:45", "07:45 - 08:30", "08:30 - 09:15", "09:30 - 10:15", "10:15 - 11:00", "11:00 - 11:45"],
      tarde: ["13:00 - 13:35", "13:35 - 14:10", "14:10 - 14:45", "15:00 - 15:35", "15:35 - 16:10", "16:10 - 16:45"],
      noite: ["19:00 - 19:35", "19:35 - 20:10", "20:10 - 20:45", "21:00 - 21:35", "21:35 - 22:10", "22:10 - 22:45"]
    };

    const diasSemana = ["segunda", "terca", "quarta", "quinta", "sexta"];

    if (!window.SUPABASE_CONFIG) alert("Erro: de registro entre em contato 94-99186-1222 LEOMASTER64");

    const supabaseClient = supabase.createClient(window.SUPABASE_CONFIG.url, window.SUPABASE_CONFIG.key);

    let deviceId = "";
    let isAuthorized = false;

    function gerarDeviceId() {
      let id = localStorage.getItem('deviceId');
      if (!id) {
        id = 'DEV-' + Date.now().toString(36).toUpperCase() + Math.random().toString(36).substring(2, 8).toUpperCase();
        localStorage.setItem('deviceId', id);
      }
      return id;
    }

    async function verificarAutorizacao() {
      deviceId = gerarDeviceId();
      document.getElementById("device-info").innerHTML = `Dispositivo: <strong>${deviceId}</strong>`;

      try {
        const { data, error } = await supabaseClient.from('allowed_devices').select('id').eq('device_id', deviceId).single();
        if (error || !data) {
          isAuthorized = false;
          bloquearSistema();
        } else {
          isAuthorized = true;
        }
      } catch (err) {
        bloquearSistema();
      }
    }

    function bloquearSistema() {
      const main = document.getElementById("main-content");
      if (main) main.classList.add("blocked");
      const bloqueioHTML = `
        <div class="fixed inset-0 bg-black/90 flex items-center justify-center z-[9999]">
          <div class="bg-white text-center p-10 rounded-3xl max-w-md mx-4 shadow-2xl">
            <i class="fas fa-lock text-7xl text-red-600 mb-6"></i>
            <h2 class="text-3xl font-bold text-red-700 mb-3">Acesso Bloqueado</h2>
            <p class="text-gray-700 mb-6 text-lg">Este dispositivo não está autorizado.</p>
            <p class="text-sm text-gray-500 mb-8 font-mono">Device ID: ${deviceId}</p>
            <button onclick="window.location.reload()" class="px-8 py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl text-lg font-medium">
              Tentar novamente
            </button>
          </div>
        </div>
      `;
      document.body.insertAdjacentHTML('beforeend', bloqueioHTML);
    }

    function ativarProtecoes() {
      document.addEventListener('contextmenu', e => e.preventDefault());
      document.addEventListener('keydown', function(e) {
        if (e.key === "F12" || (e.ctrlKey && e.shiftKey && (e.key === "I" || e.key === "C" || e.key === "J")) ||
            (e.ctrlKey && e.key === "u") || (e.ctrlKey && e.key === "s") || (e.ctrlKey && e.key === "p")) {
          e.preventDefault();
          alert("❌ Ação bloqueada por segurança.");
          return false;
        }
      });
    }

    function carregarDados() {
      const savedTurmas = localStorage.getItem('turmas');
      const savedDisciplinas = localStorage.getItem('disciplinasGerais');
      const savedProfessores = localStorage.getItem('professores');
      const savedHorarios = localStorage.getItem('horariosAlocados');

      if (savedTurmas) turmas = JSON.parse(savedTurmas);
      if (savedDisciplinas) disciplinasGerais = JSON.parse(savedDisciplinas);
      if (savedProfessores) professores = JSON.parse(savedProfessores);
      if (savedHorarios) horariosAlocados = JSON.parse(savedHorarios);

      if (disciplinasGerais.length === 0) disciplinasGerais = ["Matemática", "Português", "História", "Geografia", "Inglês", "Educação Física"];
      if (turmas.length === 0) turmas = [{ nome: "7º A", turno: "manha" }, { nome: "8º B", turno: "tarde" }];
      if (professores.length === 0) {
        professores = [{ 
          nome: "João Silva", 
          cor: "#4f46e5", 
          disponibilidade: { dias: [...diasSemana], horarios: Object.values(horariosPorTurno).flat() } 
        }];
      }

      renderAll();
    }

    function salvarDados() {
      if (!isAuthorized) return alert("❌ Dispositivo não autorizado.");
      localStorage.setItem('turmas', JSON.stringify(turmas));
      localStorage.setItem('disciplinasGerais', JSON.stringify(disciplinasGerais));
      localStorage.setItem('professores', JSON.stringify(professores));
      localStorage.setItem('horariosAlocados', JSON.stringify(horariosAlocados));
    }

    function renderAll() {
      renderTurmas();
      renderDisciplinasGerais();
      renderProfessores();
      renderLegenda();
      renderDiasDisponiveis();
      renderHorariosDisponiveis();
      updateFiltroTurma();
      showTab(0);
    }

    // ... (funções renderTurmas, renderDisciplinasGerais, etc. permanecem iguais) ...

    function renderGrade() {
      turmaSelecionada = document.getElementById("filtro-turma").value;
      const tbody = document.getElementById("corpo-grade");

      if (!turmaSelecionada) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-center py-12 text-gray-400">Selecione uma turma para ver a grade</td></tr>`;
        return;
      }

      const turma = turmas.find(t => t.nome === turmaSelecionada);
      if (!turma) return;

      const horariosDoTurno = horariosPorTurno[turma.turno] || horariosPorTurno.manha;
      tbody.innerHTML = "";

      horariosDoTurno.forEach((horario, hIndex) => {
        const tr = document.createElement("tr");
        tr.innerHTML = `<td class="border p-4 font-medium bg-gray-50">${horario}</td>`;

        diasSemana.forEach(dia => {
          const cellId = `${dia}-${hIndex}`;
          const key = `${turmaSelecionada}-${cellId}`;
          const alocacao = horariosAlocados[key];

          const td = document.createElement("td");
          td.className = `border p-4 horario-cell min-h-28 align-top cursor-pointer text-sm`;

          if (alocacao) {
            td.style.backgroundColor = alocacao.cor ? alocacao.cor + '44' : '#f3e8ff';
            td.style.borderLeft = `6px solid ${alocacao.cor || '#6366f1'}`;
            
            td.innerHTML = `
              <div class="text-xs font-medium">${alocacao.disciplina}</div>
              <div class="professor-tag mt-1 inline-block" style="background-color: ${alocacao.cor || '#6366f1'}; color: white;">
                ${alocacao.professor}
              </div>
            `;
          } else {
            td.innerHTML = `<div class="h-20 flex items-center justify-center text-4xl text-gray-200 hover:text-gray-400">+</div>`;
          }
          
          td.onclick = () => abrirModal(cellId);
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
    }

    // Função atualizada para PDF manter as cores
    async function gerarPDFCompleto() {
      if (!isAuthorized) return alert("❌ Dispositivo não autorizado.");
      if (turmas.length === 0) return alert("Nenhuma turma cadastrada.");
      
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('landscape', 'pt', 'a4');
      const pageWidth = pdf.internal.pageSize.getWidth();
      pdf.setFont("helvetica", "bold");
      pdf.setFontSize(22);
      pdf.text("MASTER HORÁRIO EETEPA", pageWidth / 2, 40, { align: "center" });
      let yPosition = 80;

      for (let turma of turmas) {
        if (yPosition > 450) { pdf.addPage(); yPosition = 60; }
        pdf.setFontSize(16);
        pdf.text(`${turma.nome} (${turma.turno.toUpperCase()})`, 40, yPosition);
        yPosition += 30;

        const tempContainer = document.createElement("div");
        tempContainer.style.width = "1100px";
        tempContainer.style.background = "white";
        tempContainer.style.padding = "15px";

        const horarios = horariosPorTurno[turma.turno] || horariosPorTurno.manha;
        let tableHTML = `<table style="width:100%; border-collapse: collapse; font-family: Arial, sans-serif; font-size: 11px;">`;
        tableHTML += `<thead><tr style="background:#f3f4f6;"><th style="border:1px solid #ddd; padding:8px;">Horário</th>`;
        diasSemana.forEach(d => tableHTML += `<th style="border:1px solid #ddd; padding:8px;">${d.charAt(0).toUpperCase() + d.slice(1)}</th>`);
        tableHTML += `</tr></thead><tbody>`;

        horarios.forEach((horario, hIndex) => {
          tableHTML += `<tr><td style="border:1px solid #ddd; padding:8px; font-weight:bold;">${horario}</td>`;
          diasSemana.forEach(dia => {
            const key = `${turma.nome}-${dia}-${hIndex}`;
            const aloc = horariosAlocados[key];
            
            let bgStyle = '';
            if (aloc && aloc.cor) {
              bgStyle = `background-color: ${aloc.cor}44; border-left: 6px solid ${aloc.cor};`;
            }

            tableHTML += `<td style="border:1px solid #ddd; padding:8px; vertical-align:top; ${bgStyle}">`;
            if (aloc) {
              tableHTML += `<div>${aloc.disciplina}</div><div style="color:#111827; font-size:10px; font-weight:600;">${aloc.professor}</div>`;
            }
            tableHTML += `</td>`;
          });
          tableHTML += `</tr>`;
        });
        tableHTML += `</tbody></table>`;
        tempContainer.innerHTML = tableHTML;
        document.body.appendChild(tempContainer);

        const canvas = await html2canvas(tempContainer, { scale: 1.5 });
        const imgData = canvas.toDataURL("image/png");
        const imgWidth = pageWidth - 80;
        const imgHeight = (canvas.height * imgWidth) / canvas.width;

        pdf.addImage(imgData, 'PNG', 40, yPosition, imgWidth, Math.min(imgHeight, 240));
        yPosition += Math.min(imgHeight, 240) + 30;
        document.body.removeChild(tempContainer);
      }
      pdf.save("Master_Horario_EETEPA_Completo.pdf");
    }

    // Restante das funções (abrirModal, salvarAlocacao, etc.) permanecem iguais
    function abrirModal(cellId) {
      if (!isAuthorized) return;
      currentCellId = cellId;
      popularModalTurmas();
      popularModalDisciplinas();
      popularModalProfessores();
      document.getElementById("modal").classList.remove("hidden");
      document.getElementById("btn-salvar").disabled = true;
      document.getElementById("aviso-disponibilidade").innerHTML = "";
    }

    function popularModalTurmas() {
      const select = document.getElementById("modal-turma");
      select.innerHTML = `<option value="">Selecione uma Turma</option>`;
      turmas.forEach(turma => {
        const opt = document.createElement("option");
        opt.value = turma.nome;
        opt.textContent = `${turma.nome} (${turma.turno})`;
        select.appendChild(opt);
      });
      if (turmaSelecionada) select.value = turmaSelecionada;
    }

    function popularModalDisciplinas() {
      const select = document.getElementById("modal-disciplina");
      select.innerHTML = `<option value="">Selecione uma Disciplina</option>`;
      disciplinasGerais.forEach(disc => {
        const opt = document.createElement("option");
        opt.value = disc;
        opt.textContent = disc;
        select.appendChild(opt);
      });
    }

    function popularModalProfessores() {
      const select = document.getElementById("modal-professor");
      select.innerHTML = `<option value="">Selecione um Professor</option>`;
      professores.forEach(prof => {
        const opt = document.createElement("option");
        opt.value = prof.nome;
        opt.textContent = prof.nome;
        select.appendChild(opt);
      });
    }

    function atualizarDisciplinasModal() { popularModalDisciplinas(); }
    function atualizarProfessoresModal() { popularModalProfessores(); }

    function getHorarioAtual() {
      const turmaNome = document.getElementById("modal-turma").value;
      const turma = turmas.find(t => t.nome === turmaNome);
      if (!turma || !currentCellId) return null;
      const hIndex = parseInt(currentCellId.split('-')[1]);
      return horariosPorTurno[turma.turno][hIndex];
    }

    function temConflito(professorNome, dia, horario) {
      for (let key in horariosAlocados) {
        const aloc = horariosAlocados[key];
        if (aloc.professor === professorNome && aloc.dia === dia && aloc.horario === horario) {
          return true;
        }
      }
      return false;
    }

    function validarDisponibilidade() {
      const professorNome = document.getElementById("modal-professor").value;
      const aviso = document.getElementById("aviso-disponibilidade");
      const btn = document.getElementById("btn-salvar");

      if (!professorNome) {
        aviso.innerHTML = "";
        btn.disabled = true;
        return;
      }

      const horarioAtual = getHorarioAtual();
      const [dia] = currentCellId.split('-');
      const professor = professores.find(p => p.nome === professorNome);

      if (!professor?.disponibilidade) {
        aviso.innerHTML = `<span class="text-amber-600">⚠️ Professor sem disponibilidade</span>`;
        btn.disabled = true;
        return;
      }

      const diaOk = professor.disponibilidade.dias.includes(dia);
      const horarioOk = professor.disponibilidade.horarios.includes(horarioAtual);

      if (!diaOk || !horarioOk) {
        aviso.innerHTML = `<span class="text-red-600">❌ Esse Horário a flor do campo não pode</span>`;
        btn.disabled = true;
      } else if (temConflito(professorNome, dia, horarioAtual)) {
        aviso.innerHTML = `<span class="text-red-600">⚠️ Professor já alocado neste dia/horário</span>`;
        btn.disabled = true;
      } else {
        aviso.innerHTML = `<span class="text-green-600">✅ Disponível para alocação</span>`;
        btn.disabled = false;
      }
    }

    function salvarAlocacao() {
      if (!isAuthorized) return alert("❌ Dispositivo não autorizado.");
      const turma = document.getElementById("modal-turma").value;
      const disciplina = document.getElementById("modal-disciplina").value;
      const professorNome = document.getElementById("modal-professor").value;

      if (!turma || !disciplina || !professorNome) {
        alert("Preencha todos os campos.");
        return;
      }

      const [dia, hIndex] = currentCellId.split('-');
      const turmaObj = turmas.find(t => t.nome === turma);
      const horarioAtual = horariosPorTurno[turmaObj.turno][parseInt(hIndex)];

      if (temConflito(professorNome, dia, horarioAtual)) {
        alert("❌ Conflito detectado!");
        return;
      }

      const professor = professores.find(p => p.nome === professorNome);
      const key = `${turma}-${currentCellId}`;

      horariosAlocados[key] = {
        disciplina: disciplina,
        professor: professorNome,
        cor: professor ? professor.cor : '#6366f1',
        horario: horarioAtual,
        dia: dia
      };

      salvarDados();
      fecharModal();
      renderGrade();
      alert(`✅ Aula alocada com sucesso!`);
    }

    function fecharModal() {
      document.getElementById("modal").classList.add("hidden");
    }

    function showTab(n) {
      document.querySelectorAll(".tab-content").forEach(el => el.classList.add("hidden"));
      document.getElementById(`tab-${n}`).classList.remove("hidden");
    }

    function addTurma() {
      if (!isAuthorized) return alert("❌ Dispositivo não autorizado.");
      const nome = document.getElementById("nova-turma").value.trim();
      if (!nome) return alert("Digite o nome da turma");
      const turno = document.getElementById("turno-turma").value;
      turmas.push({ nome, turno });
      document.getElementById("nova-turma").value = "";
      salvarDados();
      renderAll();
      updateFiltroTurma();
    }

    function addDisciplina() {
      if (!isAuthorized) return alert("❌ Dispositivo não autorizado.");
      const nome = document.getElementById("nova-disciplina").value.trim();
      if (!nome) return alert("Digite o nome da disciplina");
      disciplinasGerais.push(nome);
      document.getElementById("nova-disciplina").value = "";
      salvarDados();
      renderAll();
    }

    function addProfessor() {
      if (!isAuthorized) return alert("❌ Dispositivo não autorizado.");
      const nome = document.getElementById("nome-professor").value.trim();
      const cor = document.getElementById("cor-professor").value;
      if (!nome) return alert("Digite o nome do professor");

      const disponibilidade = getDisponibilidadeSelecionada();
      if (disponibilidade.dias.length === 0 || disponibilidade.horarios.length === 0) {
        return alert("Selecione pelo menos um dia e um horário de disponibilidade.");
      }

      professores.push({ nome, cor, disponibilidade });
      document.getElementById("nome-professor").value = "";
      salvarDados();
      renderAll();
      alert(`✅ Professor ${nome} adicionado com sucesso!`);
    }

    function deletarTurma(index) {
      if (!isAuthorized) return alert("❌ Dispositivo não autorizado.");
      if (confirm(`Excluir a turma "${turmas[index].nome}"?`)) {
        const turmaNome = turmas[index].nome;
        Object.keys(horariosAlocados).forEach(key => {
          if (key.startsWith(turmaNome + "-")) delete horariosAlocados[key];
        });
        turmas.splice(index, 1);
        salvarDados();
        renderAll();
        updateFiltroTurma();
      }
    }

    function deletarDisciplina(index) {
      if (!isAuthorized) return alert("❌ Dispositivo não autorizado.");
      if (confirm(`Excluir a disciplina "${disciplinasGerais[index]}"?`)) {
        disciplinasGerais.splice(index, 1);
        salvarDados();
        renderAll();
      }
    }

    function deletarProfessor(index) {
      if (!isAuthorized) return alert("❌ Dispositivo não autorizado.");
      if (confirm(`Excluir o professor "${professores[index].nome}"?`)) {
        const profNome = professores[index].nome;
        Object.keys(horariosAlocados).forEach(key => {
          if (horariosAlocados[key].professor === profNome) delete horariosAlocados[key];
        });
        professores.splice(index, 1);
        salvarDados();
        renderAll();
      }
    }

    async function exportarImagem() {
      if (!turmaSelecionada) return alert("Selecione uma turma primeiro!");
      const container = document.getElementById("grade-container");
      const exportContainer = document.createElement("div");
      exportContainer.style.background = "white";
      exportContainer.style.padding = "30px";
      exportContainer.style.width = "1200px";
      exportContainer.innerHTML = `
        <div style="text-align: center; margin-bottom: 30px;">
          <h1 style="font-size: 32px; font-weight: bold; color: #4f46e5;">${turmaSelecionada}</h1>
          <p style="color: #6b7280;">Master Horário EETEPA</p>
        </div>
        ${container.querySelector("table").outerHTML}
      `;
      document.body.appendChild(exportContainer);
      const canvas = await html2canvas(exportContainer, { scale: 2 });
      const link = document.createElement("a");
      link.download = `${turmaSelecionada.replace(/[^a-zA-Z0-9]/g, '_')}_horario.png`;
      link.href = canvas.toDataURL("image/png");
      link.click();
      document.body.removeChild(exportContainer);
    }

    function limparGrade() {
      if (!isAuthorized) return alert("❌ Dispositivo não autorizado.");
      if (confirm("Limpar grade desta turma?")) {
        Object.keys(horariosAlocados).forEach(key => {
          if (key.startsWith(turmaSelecionada + "-")) delete horariosAlocados[key];
        });
        salvarDados();
        renderGrade();
      }
    }

    window.onload = async () => {
      ativarProtecoes();
      await verificarAutorizacao();
      if (isAuthorized) carregarDados();
    };
  </script>
</body>
</html>
