<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema de Atividade - EETEPA Xinguara</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #e5e5e5; }
    .selected-option { border-color: #fbbf24 !important; background: #27272a !important; transform: translateX(5px); }
    .correct { border-color: #22c55e !important; background: #052e16 !important; }
    .incorrect { border-color: #ef4444 !important; background: #450a0a !important; }
    .ranking-card { background: rgba(24, 24, 27, 0.9); backdrop-filter: blur(12px); }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #18181b; }
    ::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
  </style>
</head>
<body class="min-h-screen p-4 md:p-8 lg:p-12">

  <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-8">
    
  
    <div class="lg:col-span-3 bg-zinc-900 rounded-3xl p-6 md:p-10 border border-zinc-800 shadow-2xl h-fit">
      
  
      <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
        <div>
          <h1 class="text-3xl font-bold text-yellow-500 tracking-tight">Lógica de Programação</h1>
          <p class="text-zinc-500 text-sm">Professor: Léo Cruz</p>
        </div>
        <div id="quiz-stats" class="hidden flex gap-6">
          <div class="text-center">
            <p class="text-[10px] text-zinc-500 uppercase tracking-widest">Acertos</p>
            <p id="live-score" class="text-3xl font-bold text-white">0</p>
          </div>
        </div>
      </div>

    
      <div id="setup-screen" class="max-w-md mx-auto py-12 text-center">
        <div class="mb-8">
          <div class="w-20 h-20 bg-yellow-600/10 rounded-full flex items-center justify-center mx-auto mb-4 border border-yellow-600/20">
            <span class="text-3xl">👨‍💻</span>
          </div>
          <h2 class="text-xl font-semibold">Atividade</h2>
          <p class="text-zinc-500 text-sm">Insira seus dados.</p>
        </div>
        
        <input id="user-name" type="text" placeholder="Nome do Aluno" 
               class="w-full px-6 py-4 bg-zinc-800 border border-zinc-700 rounded-2xl mb-6 outline-none focus:border-yellow-500 text-white transition-all">
        
        <button onclick="iniciarProva()" 
                class="w-full bg-yellow-600 hover:bg-yellow-500 px-12 py-5 rounded-2xl font-bold transition-all shadow-xl shadow-yellow-900/10 flex items-center justify-center gap-2">
          <span>Carregar </span>
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6" />
          </svg>
        </button>
      </div>

    
      <div id="quiz-screen" class="hidden">
        <div class="mb-8">
          <div class="flex justify-between items-end mb-2">
            <span id="progress-text" class="text-yellow-500 font-bold tracking-tighter text-lg">Questão 1/--</span>
            <span id="device-tag" class="text-[10px] text-zinc-600 font-mono italic">ID: --</span>
          </div>
          <div class="w-full h-1.5 bg-zinc-800 rounded-full overflow-hidden">
            <div id="progress-bar" class="h-full bg-yellow-600 transition-all duration-500 w-0"></div>
          </div>
        </div>

        <h2 id="question-text" class="text-2xl md:text-3xl mb-10 leading-snug font-medium text-zinc-100"></h2>
        
        <div id="options-container" class="grid gap-4"></div>
        
        <div class="mt-12 flex justify-end">
          <button id="btn-confirm" onclick="validarResposta()" 
                  class="w-full md:w-72 py-5 bg-zinc-700 text-zinc-400 rounded-2xl font-bold transition-all flex items-center justify-center gap-2 cursor-not-allowed" disabled>
            Confirmar Resposta
          </button>
        </div>
      </div>

   
      <div id="result-screen" class="hidden text-center py-12">
        <div class="mb-6">
          <span class="text-6xl">🏆</span>
        </div>
        <h2 class="text-4xl font-bold text-white mb-2">Atividade Concluída!</h2>
        <p class="text-zinc-500 mb-10">Os dados foram enviados para o sistema.</p>
        
        <div class="bg-zinc-800/50 inline-block px-16 py-8 rounded-3xl border border-zinc-700 mb-10">
          <p class="text-sm text-zinc-400 uppercase tracking-widest mb-2">Sua Nota</p>
          <p id="final-score" class="text-7xl font-black text-yellow-500"></p>
        </div>
        
        <div>
          <button onclick="location.reload()" class="text-zinc-500 hover:text-white transition-colors text-sm font-medium">
            Sair e voltar ao início
          </button>
        </div>
      </div>

    </div>

   
    <div class="lg:col-span-1">
      <div class="ranking-card rounded-3xl p-6 border border-zinc-800 sticky top-8 shadow-2xl">
        <div class="flex items-center justify-between mb-6">
          <h3 class="text-lg font-bold text-white flex items-center gap-2">
            <span class="text-yellow-500">🥇</span> Top 10 Alunos
          </h3>
          <button onclick="loadRanking()" class="text-zinc-600 hover:text-zinc-400 transition">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
            </svg>
          </button>
        </div>

        <div id="ranking-list" class="space-y-3">
          <p class="text-zinc-600 text-center py-10 text-sm animate-pulse italic">Sincronizando banco...</p>
        </div>

        <div class="mt-8 pt-6 border-t border-zinc-800/50">
          <div class="text-center">
            <p class="text-[9px] text-zinc-600 uppercase tracking-[0.2em] leading-relaxed">
              Desenvolvido por<br>
              <span class="text-zinc-500 font-bold">LÉO CRUZ - EETEPA XINGUARA</span>
            </p>
          </div>
        </div>
      </div>
    </div>

  </div>

  <script>
    const supabaseClient = supabase.createClient(window.SUPABASE_CONFIG.url, window.SUPABASE_CONFIG.key);
    let questoes = [], indiceAtual = 0, acertos = 0, selecionada = null, nomeAluno = '', deviceId = '';
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.onkeydown = (e) => {
      if (e.keyCode == 123 || (e.ctrlKey && e.shiftKey && e.keyCode == 73)) return false;
    };
    window.onload = () => {
      loadRanking();
      prepararDeviceId();
    };
    function prepararDeviceId() {
      deviceId = localStorage.getItem('deviceId');
      if (!deviceId) {
        deviceId = 'DEV-' + crypto.randomUUID().split('-')[0].toUpperCase() + '-' + Date.now().toString(36).toUpperCase();
        localStorage.setItem('deviceId', deviceId);
      }
      document.getElementById('device-tag').textContent = `ID: ${deviceId}`;
    }

    async function loadRanking() {
      const { data, error } = await supabaseClient
        .from('quiz_results2')
        .select('user_name, score')
        .order('score', { ascending: false })
        .limit(10);
      const container = document.getElementById('ranking-list');
      if (error) {
        container.innerHTML = '<p class="text-red-900/50 text-center text-xs italic">Erro de conexão</p>';
        return;
      }
      container.innerHTML = data.map((item, index) => `
        <div class="flex justify-between items-center bg-zinc-800/30 p-4 rounded-2xl border border-zinc-700/30 hover:bg-zinc-800/60 transition-colors group">
          <span class="truncate pr-2 text-sm">
            <b class="text-yellow-600 font-mono mr-2">${index + 1}º</b> 
            <span class="text-zinc-300 group-hover:text-white transition-colors">${item.user_name}</span>
          </span>
          <span class="font-black text-yellow-500 text-xs bg-yellow-500/10 px-2 py-1 rounded-lg">${item.score}</span>
        </div>
      `).join('') || '<p class="text-zinc-700 text-center py-4 text-xs italic">Aguardando primeiros resultados...</p>';
    }

    async function iniciarProva() {
      nomeAluno = document.getElementById('user-name').value.trim();
      if (nomeAluno.length < 3) return alert("Por favor, digite seu nome para registro.");
      const { data, error } = await supabaseClient.from('questoes_portugol').select('*');
      
      if (error || !data || data.length === 0) {
        return alert("Erro ao carregar banco de questões.");
      }
      
      questoes = data.sort(() => Math.random() - 0.5); 
      
      document.getElementById('setup-screen').classList.add('hidden');
      document.getElementById('quiz-screen').classList.remove('hidden');
      document.getElementById('quiz-stats').classList.remove('hidden');
      mostrarQuestao();
    }

    function mostrarQuestao() {
      const q = questoes[indiceAtual];
      selecionada = null;
      
    
      document.getElementById('progress-text').textContent = `Questão ${indiceAtual + 1}/${questoes.length}`;
      document.getElementById('progress-bar').style.width = `${((indiceAtual + 1) / questoes.length) * 100}%`;
      document.getElementById('question-text').textContent = q.pergunta;
      
      const container = document.getElementById('options-container');
      container.innerHTML = '';
      
      q.opcoes.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = "w-full text-left p-5 bg-zinc-800 border-2 border-zinc-700/50 rounded-2xl transition-all hover:bg-zinc-700 hover:border-zinc-500 text-lg font-medium";
        btn.textContent = opt;
        btn.onclick = () => selecionar(i, btn);
        container.appendChild(btn);
      });

    
      const btnC = document.getElementById('btn-confirm');
      btnC.disabled = true;
      btnC.className = "w-full md:w-72 py-5 bg-zinc-700 text-zinc-400 rounded-2xl font-bold transition-all flex items-center justify-center gap-2 cursor-not-allowed";
    }

    function selecionar(idx, btn) {
      selecionada = idx;
      document.querySelectorAll('#options-container button').forEach(b => b.classList.remove('selected-option'));
      btn.classList.add('selected-option');
      
      const btnC = document.getElementById('btn-confirm');
      btnC.disabled = false;
      btnC.className = "w-full md:w-72 py-5 bg-yellow-600 text-white rounded-2xl font-bold transition-all shadow-lg shadow-yellow-900/20 hover:bg-yellow-500 cursor-pointer scale-105";
    }

    async function validarResposta() {
      const q = questoes[indiceAtual];
      const botoes = document.querySelectorAll('#options-container button');
      
      botoes.forEach(b => b.disabled = true);
      
      if (selecionada === q.correta) {
        acertos++;
        botoes[selecionada].classList.add('correct');
        document.getElementById('live-score').textContent = acertos;
      } else {
        botoes[selecionada].classList.add('incorrect');
        botoes[q.correta].classList.add('correct');
      }

      setTimeout(() => {
        if (indiceAtual < questoes.length - 1) {
          indiceAtual++;
          mostrarQuestao();
        } else {
          finalizarProva();
        }
      }, 1400);
    }

    async function finalizarProva() {
     
      try {
        await supabaseClient.from('quiz_results2').insert({
          user_name: nomeAluno,
          device_id: deviceId,
          score: acertos,
          total_questions: questoes.length,
          created_at: new Date().toISOString()
        });
      } catch (err) {
        console.error("Erro ao salvar resultado.");
      }

      loadRanking(); 

      document.getElementById('quiz-screen').classList.add('hidden');
      document.getElementById('quiz-stats').classList.add('hidden');
      document.getElementById('result-screen').classList.remove('hidden');
      document.getElementById('final-score').textContent = `${acertos}/${questoes.length}`;
    }
  </script>
</body>
</html>
