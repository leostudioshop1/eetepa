<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Quiz: Lógica e Portugol - EETEPA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #0a0a0a; color: #e5e5e5; }
    .question-card { transition: all 0.2s ease; }
    .selected-option { border-color: #fbbf24 !important; background-color: #27272a !important; transform: scale(1.02); }
    .correct { border-color: #22c55e !important; background-color: #052e16 !important; }
    .incorrect { border-color: #ef4444 !important; background-color: #450a0a !important; }
    .ranking-item { transition: all 0.2s; }
  </style>
</head>
<body class="min-h-screen">
  <div class="max-w-6xl mx-auto p-6">
    <div class="flex flex-col lg:flex-row gap-8">
      
      <!-- Área Principal -->
      <div class="flex-1 bg-zinc-900 rounded-3xl shadow-2xl p-8 border border-zinc-800">
        <div class="flex items-center justify-between mb-8">
          <h1 class="text-4xl font-bold text-yellow-500">Lógica & Portugol</h1>
          <p class="text-zinc-400 text-sm">40 Questões • Nível Pro</p>
        </div>

        <div id="start-screen" class="text-center py-12">
          <input id="user-name" type="text" placeholder="Nome Completo" class="w-full max-w-md px-6 py-5 bg-zinc-800 border border-zinc-700 rounded-2xl focus:outline-none focus:border-yellow-500 text-lg mb-6">
          <button onclick="startQuiz()" class="w-full max-w-md bg-yellow-600 hover:bg-yellow-500 py-5 rounded-2xl text-xl font-bold transition">Iniciar Desafio</button>
        </div>

        <div id="quiz-screen" class="hidden">
          <div class="flex justify-between items-center mb-8">
            <span id="question-counter" class="text-2xl font-bold text-yellow-500">1/40</span>
            <div id="score-main" class="text-4xl font-bold text-yellow-500">0</div>
          </div>
          <div id="question-text" class="text-xl font-medium mb-10 min-h-[80px]"></div>
          <div id="options" class="grid grid-cols-1 gap-4"></div>
          
          <div class="flex justify-between mt-12">
            <button id="btn-confirm" onclick="confirmAnswer()" class="w-full py-4 bg-zinc-700 text-white rounded-2xl font-bold opacity-50 cursor-not-allowed" disabled>Confirmar Resposta</button>
          </div>
        </div>

        <div id="result-screen" class="hidden text-center py-12">
          <h2 class="text-5xl font-bold mb-6 text-yellow-500">Finalizado!</h2>
          <div id="final-score-text" class="text-7xl font-bold mb-10"></div>
          <button onclick="location.reload()" class="bg-zinc-700 hover:bg-zinc-600 px-12 py-5 rounded-2xl font-bold">Reiniciar</button>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="w-full lg:w-80 bg-zinc-900 rounded-3xl p-8 border border-zinc-800 h-fit sticky top-6">
        <div class="space-y-6">
          <div><p class="text-xs text-zinc-500 uppercase">Aluno</p><p id="sidebar-name" class="font-bold text-lg">—</p></div>
          <div>
            <p class="text-xs text-zinc-500 uppercase mb-2">Progresso</p>
            <div class="h-2 bg-zinc-800 rounded-full overflow-hidden"><div id="progress-bar" class="h-full bg-yellow-500 w-0 transition-all"></div></div>
          </div>
          <div class="pt-6 border-t border-zinc-800">
            <h4 class="font-bold mb-4">🏆 Top Ranking</h4>
            <div id="ranking-list" class="space-y-2 text-sm"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const supabaseClient = supabase.createClient(window.SUPABASE_CONFIG.url, window.SUPABASE_CONFIG.key);
    let currentQuestion = 0, score = 0, userName = '', selectedIdx = null;

    const questions = [
        { q: "Qual a função do algoritmo?", options: ["Executar tarefas aleatórias", "Sequência lógica para resolver um problema", "Apenas somar números", "Substituir o hardware"], correct: 1 },
        { q: "O comando 'leia()' serve para:", options: ["Mostrar dados", "Entrada de dados pelo usuário", "Limpar a memória", "Repetir o código"], correct: 1 },
        { q: "Para que serve o operador 'mod' ou '%'?", options: ["Multiplicação", "Média aritmética", "Resto da divisão inteira", "Potenciação"], correct: 2 },
        { q: "Qual variável armazena 'Verdadeiro' ou 'Falso'?", options: ["Inteiro", "Cadeia", "Logico", "Real"], correct: 2 },
        { q: "A estrutura 'se-senao' é do tipo:", options: ["Repetição", "Condicional", "Atribuição", "Leitura"], correct: 1 },
        { q: "O que é um 'Loop Infinito'?", options: ["Um erro de hardware", "Um laço que nunca termina", "Um código muito rápido", "Uma função matemática"], correct: 1 },
        { q: "Qual símbolo representa 'diferente de' em Portugol?", options: ["==", "!=", "><", "<>"], correct: 3 },
        { q: "Para contar de 1 a 10, qual estrutura é ideal?", options: ["Escolha-Caso", "Para", "Se", "Escreva"], correct: 1 },
        { q: "O que acontece na atribuição 'x = x + 1'?", options: ["Erro de lógica", "Incremento do valor de x", "X vira zero", "Nada acontece"], correct: 1 },
        { q: "Qual o tipo de dado para o nome de uma pessoa?", options: ["Caracter", "Cadeia", "Real", "Inteiro"], correct: 1 },
        // ... Adicionando mais lógica e raciocínio ...
        { q: "Se todos os programadores são lógicos e João é programador, logo:", options: ["João é lógico", "João não é lógico", "Lógicos são programadores", "João gosta de café"], correct: 0 },
        { q: "Qual o resultado de (10 > 5 e 2 < 1)?", options: ["Verdadeiro", "Falso", "Erro", "10"], correct: 1 },
        { q: "O comando 'escreva' é uma operação de:", options: ["Entrada", "Processamento", "Saída", "Armazenamento"], correct: 2 },
        { q: "Um vetor de 5 posições vai de qual índice a qual?", options: ["1 a 5", "0 a 4", "0 a 5", "1 a 6"], correct: 1 },
        { q: "Qual estrutura avalia uma variável entre várias opções?", options: ["Para", "Enquanto", "Escolha-Caso", "Se-Senao"], correct: 2 },
        { q: "A ordem correta do desenvolvimento é:", options: ["Código -> Teste -> Lógica", "Lógica -> Código -> Teste", "Teste -> Lógica -> Código", "Código -> Lógica -> Teste"], correct: 1 },
        { q: "O que faz o comando 'interrompa'?", options: ["Desliga o PC", "Para a execução de um laço", "Pula para o próximo 'se'", "Lê um dado"], correct: 1 },
        { q: "Como declarar um comentário em Portugol?", options: ["//", "/*", "#", "--"], correct: 0 },
        { q: "Qual o valor de 'A' se: A = 5, B = 2, A = A * B?", options: ["5", "2", "10", "7"], correct: 2 },
        { q: "Uma variável 'Real' armazena:", options: ["Apenas inteiros", "Números com casas decimais", "Textos", "Fotos"], correct: 1 },
        { q: "O que é indentação?", options: ["Erros no código", "Recuo do texto para organização", "Tipo de variável", "Velocidade do processador"], correct: 1 },
        { q: "Qual operador tem maior precedência?", options: ["Soma (+)", "Subtração (-)", "Multiplicação (*)", "Igualdade (==)"], correct: 2 },
        { q: "Para que serve o 'Enquanto'?", options: ["Repetir enquanto uma condição for verdadeira", "Executar uma vez só", "Escolher um caminho", "Finalizar o programa"], correct: 0 },
        { q: "O que é 'Teste de Mesa'?", options: ["Limpar o computador", "Seguir o código manualmente no papel", "Comprar uma mesa nova", "Um software de benchmark"], correct: 1 },
        { q: "Se A=verdadeiro, o que é 'nao A'?", options: ["Verdadeiro", "Falso", "Nulo", "Erro"], correct: 1 },
        { q: "Qual a saída de: escreva(2 + 2 * 3)?", options: ["12", "8", "10", "4"], correct: 1 },
        { q: "Um algoritmo deve ser sempre:", options: ["Infinito", "Finito", "Ambíguo", "Confuso"], correct: 1 },
        { q: "Qual destas é uma variável válida?", options: ["1nome", "nome_aluno", "nome aluno", "nome-aluno"], correct: 1 },
        { q: "O que é uma constante?", options: ["Valor que muda sempre", "Valor que não muda durante a execução", "Um tipo de laço", "Um erro"], correct: 1 },
        { q: "Para concatenar textos em Portugol usamos:", options: ["+", "-", "*", "/"], correct: 0 },
        { q: "O que significa 'compilar'?", options: ["Escrever o código", "Traduzir o código para linguagem de máquina", "Apagar o código", "Desenhar o algoritmo"], correct: 1 },
        { q: "Qual o resultado de 15 / 2 em uma variável Inteira?", options: ["7.5", "7", "8", "0"], correct: 1 },
        { q: "O operador 'OU' resulta em falso apenas quando:", options: ["Ambos são falsos", "Um é verdadeiro", "Ambos são verdadeiros", "Nunca é falso"], correct: 0 },
        { q: "O que é um parâmetro?", options: ["Um erro", "Informação enviada para uma função", "Um tipo de monitor", "Um laço de repetição"], correct: 1 },
        { q: "O fluxo de um algoritmo geralmente segue:", options: ["Baixo para cima", "Cima para baixo, esquerda para direita", "Aleatório", "Direita para esquerda"], correct: 1 },
        { q: "Qual a função da Placa-mãe na lógica?", options: ["Nenhuma, é hardware", "Interligar os componentes", "Processar dados", "Armazenar o BIOS"], correct: 1 },
        { q: "Um 'Se' dentro de outro 'Se' é chamado de:", options: ["Loop", "Condicional Aninhada", "Recursão", "Erro"], correct: 1 },
        { q: "Qual a melhor forma de aprender lógica?", options: ["Decorar códigos", "Praticar resolvendo problemas", "Assistir filmes", "Apenas ler"], correct: 1 },
        { q: "O que é Pseudocódigo?", options: ["Código falso que não funciona", "Linguagem intermediária entre natural e programação", "Linguagem de máquina", "Vírus"], correct: 1 },
        { q: "O Portugol Studio é:", options: ["Um jogo", "Uma IDE para aprender programação", "Um sistema operacional", "Um editor de fotos"], correct: 1 }
    ];

    function startQuiz() {
      userName = document.getElementById('user-name').value.trim();
      if (!userName) return alert("Digite seu nome!");
      document.getElementById('start-screen').classList.add('hidden');
      document.getElementById('quiz-screen').classList.remove('hidden');
      document.getElementById('sidebar-name').textContent = userName;
      loadQuestion();
    }

    function loadQuestion() {
      selectedIdx = null;
      const btnConfirm = document.getElementById('btn-confirm');
      btnConfirm.disabled = true;
      btnConfirm.classList.add('opacity-50', 'cursor-not-allowed');
      btnConfirm.classList.remove('bg-yellow-600');

      const q = questions[currentQuestion];
      document.getElementById('question-counter').textContent = `${currentQuestion + 1}/${questions.length}`;
      document.getElementById('question-text').textContent = q.q;
      
      const optionsDiv = document.getElementById('options');
      optionsDiv.innerHTML = '';
      
      q.options.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = `w-full text-left p-5 border-2 border-zinc-700 rounded-2xl transition-all question-card bg-zinc-800 hover:border-zinc-500`;
        btn.textContent = opt;
        btn.onclick = () => selectOption(i, btn);
        optionsDiv.appendChild(btn);
      });
      updateProgress();
    }

    function selectOption(idx, btn) {
      selectedIdx = idx;
      document.querySelectorAll('.question-card').forEach(b => b.classList.remove('selected-option'));
      btn.classList.add('selected-option');
      
      const btnConfirm = document.getElementById('btn-confirm');
      btnConfirm.disabled = false;
      btnConfirm.classList.remove('opacity-50', 'cursor-not-allowed');
      btnConfirm.classList.add('bg-yellow-600');
    }

    function confirmAnswer() {
      const q = questions[currentQuestion];
      const buttons = document.querySelectorAll('.question-card');
      
      buttons.forEach((btn, i) => {
        btn.disabled = true;
        if (i === q.correct) btn.classList.add('correct');
        if (i === selectedIdx && i !== q.correct) btn.classList.add('incorrect');
      });

      if (selectedIdx === q.correct) score++;
      document.getElementById('score-main').textContent = score;

      setTimeout(() => {
        if (currentQuestion < questions.length - 1) {
          currentQuestion++;
          loadQuestion();
        } else {
          saveResult();
        }
      }, 1200);
    }

    function updateProgress() {
      document.getElementById('progress-bar').style.width = `${((currentQuestion + 1) / questions.length) * 100}%`;
    }

    async function saveResult() {
      await supabaseClient.from('quiz_results2').insert({ user_name: userName, score: score, total_questions: 40 });
      document.getElementById('quiz-screen').classList.add('hidden');
      document.getElementById('result-screen').classList.remove('hidden');
      document.getElementById('final-score-text').textContent = `${score} / 40`;
      loadRanking();
    }

    async function loadRanking() {
      const { data } = await supabaseClient.from('quiz_results2').select('user_name, score').order('score', { ascending: false }).limit(10);
      document.getElementById('ranking-list').innerHTML = data?.map((item, i) => `
        <div class="ranking-item flex justify-between bg-zinc-800 p-3 rounded-xl border border-zinc-700">
          <span class="truncate pr-2">${i+1}º ${item.user_name}</span>
          <span class="text-yellow-500 font-bold">${item.score}</span>
        </div>
      `).join('') || '';
    }

    window.onload = loadRanking;
  </script>
</body>
</html>
