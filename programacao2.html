<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quiz Seguro - EETEPA Xinguara</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #e5e5e5; }
    .selected-option { border-color: #fbbf24 !important; background: #27272a !important; }
    .correct { border-color: #22c55e !important; background: #052e16 !important; }
    .incorrect { border-color: #ef4444 !important; background: #450a0a !important; }
  </style>
</head>
<body class="min-h-screen p-6">
  <div class="max-w-4xl mx-auto bg-zinc-900 rounded-3xl p-8 border border-zinc-800 shadow-2xl">
    
    <div id="setup-screen" class="text-center py-10">
      <h1 class="text-3xl font-bold text-yellow-500 mb-6">Avaliação de Algoritmos</h1>
      <input id="user-name" type="text" placeholder="Nome do Aluno" class="w-full max-w-sm px-6 py-4 bg-zinc-800 border border-zinc-700 rounded-xl mb-6 outline-none focus:border-yellow-500">
      <button onclick="iniciarProva()" class="block mx-auto bg-yellow-600 hover:bg-yellow-500 px-10 py-4 rounded-xl font-bold transition">Carregar Prova</button>
    </div>

    <div id="quiz-screen" class="hidden">
      <div class="flex justify-between mb-8">
        <span id="progress-text" class="text-yellow-500 font-bold">Questão 1</span>
        <span id="timer" class="text-zinc-500">ID: —</span>
      </div>
      <h2 id="question-text" class="text-2xl mb-8 leading-relaxed"></h2>
      <div id="options-container" class="grid gap-4"></div>
      <button id="btn-confirm" onclick="validarResposta()" class="mt-10 w-full py-4 bg-zinc-700 rounded-xl font-bold opacity-50" disabled>Confirmar Resposta</button>
    </div>

    <div id="result-screen" class="hidden text-center py-10">
      <h2 class="text-4xl font-bold text-yellow-500 mb-4">Prova Concluída</h2>
      <p id="final-score" class="text-6xl font-bold mb-8"></p>
      <button onclick="location.reload()" class="bg-zinc-800 px-8 py-3 rounded-lg border border-zinc-700">Sair</button>
    </div>

  </div>

  <script>
    const supabaseClient = supabase.createClient(window.SUPABASE_CONFIG.url, window.SUPABASE_CONFIG.key);
    let questoes = [], indiceAtual = 0, acertos = 0, selecionada = null, nomeAluno = '', deviceId = '';

    // Bloqueia inspeção básica
    document.addEventListener('contextmenu', e => e.preventDefault());

    async function iniciarProva() {
      nomeAluno = document.getElementById('user-name').value.trim();
      if (!nomeAluno) return alert("Digite seu nome!");

      // Busca questões no banco (o gabarito vem junto, mas você pode tratar isso)
      const { data, error } = await supabaseClient.from('questoes_portugol').select('*');
      
      if (error || !data) return alert("Erro ao carregar questões do banco.");
      
      questoes = data.sort(() => Math.random() - 0.5); // Embaralha ordem
      deviceId = localStorage.getItem('deviceId') || 'DEV-' + Math.random().toString(36).substr(2, 9).toUpperCase();
      localStorage.setItem('deviceId', deviceId);

      document.getElementById('setup-screen').classList.add('hidden');
      document.getElementById('quiz-screen').classList.remove('hidden');
      mostrarQuestao();
    }

    function mostrarQuestao() {
      const q = questoes[indiceAtual];
      selecionada = null;
      document.getElementById('progress-text').textContent = `Questão ${indiceAtual + 1}/${questoes.length}`;
      document.getElementById('question-text').textContent = q.pergunta;
      
      const container = document.getElementById('options-container');
      container.innerHTML = '';
      
      q.opcoes.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.className = "w-full text-left p-5 bg-zinc-800 border-2 border-zinc-700 rounded-xl transition-all hover:border-zinc-500";
        btn.textContent = opt;
        btn.onclick = () => {
          selecionada = i;
          document.querySelectorAll('#options-container button').forEach(b => b.classList.remove('selected-option'));
          btn.classList.add('selected-option');
          document.getElementById('btn-confirm').disabled = false;
          document.getElementById('btn-confirm').classList.remove('opacity-50');
          document.getElementById('btn-confirm').classList.add('bg-yellow-600');
        };
        container.appendChild(btn);
      });
    }

    async function validarResposta() {
      const q = questoes[indiceAtual];
      const botoes = document.querySelectorAll('#options-container button');
      
      botoes.forEach(b => b.disabled = true);
      
      // Validação
      if (selecionada === q.correta) {
        acertos++;
        botoes[selecionada].classList.add('correct');
      } else {
        botoes[selecionada].classList.add('incorrect');
        botoes[q.correta].classList.add('correct');
      }

      setTimeout(() => {
        if (indiceAtual < questoes.length - 1) {
          indiceAtual++;
          mostrarQuestao();
          document.getElementById('btn-confirm').disabled = true;
          document.getElementById('btn-confirm').classList.add('opacity-50');
        } else {
          finalizarProva();
        }
      }, 1500);
    }

    async function finalizarProva() {
      await supabaseClient.from('quiz_results2').insert({
        user_name: nomeAluno,
        device_id: deviceId,
        score: acertos,
        total_questions: questoes.length
      });

      document.getElementById('quiz-screen').classList.add('hidden');
      document.getElementById('result-screen').classList.remove('hidden');
      document.getElementById('final-score').textContent = `${acertos} / ${questoes.length}`;
    }
  </script>
</body>
</html>
