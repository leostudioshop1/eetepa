<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Placar Geral - Quiz SQL</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>

  <style>
    body {
      background: #0a0a0a;
      color: #e5e5e5;
      font-family: system-ui;
    }
  </style>
</head>

<body class="min-h-screen p-6">

  <div class="max-w-6xl mx-auto">

    <div class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-bold text-indigo-400">
        🏆 Placar Geral
      </h1>

      <button onclick="loadRanking()" 
        class="bg-indigo-600 hover:bg-indigo-500 px-6 py-3 rounded-xl">
        Atualizar
      </button>
    </div>

    <!-- Tabela -->
    <div class="bg-zinc-900 rounded-3xl p-6 border border-zinc-800 shadow-2xl">

      <table class="w-full text-left">
        <thead>
          <tr class="text-zinc-400 border-b border-zinc-700">
            <th class="py-4">#</th>
            <th>Nome</th>
            <th>Pontuação</th>
            <th>Aproveitamento</th>
            <th>Data</th>
          </tr>
        </thead>

        <tbody id="ranking-table"></tbody>

      </table>

    </div>

  </div>

<script>

if (!window.SUPABASE_CONFIG) {
  alert("Erro: config.js não encontrado!");
}

const supabaseClient = supabase.createClient(
  window.SUPABASE_CONFIG.url,
  window.SUPABASE_CONFIG.key
);

// 🔥 CARREGAR RANKING
async function loadRanking() {

  const table = document.getElementById('ranking-table');
  table.innerHTML = `<tr><td colspan="5" class="py-6 text-center">Carregando...</td></tr>`;

  try {

    const { data, error } = await supabaseClient
      .from('quiz_results2')
      .select('*')
      .order('score', { ascending: false })
      .limit(50);

    if (error) {
      console.error(error);
      table.innerHTML = `<tr><td colspan="5" class="py-6 text-center text-red-400">Erro ao carregar</td></tr>`;
      return;
    }

    if (data.length === 0) {
      table.innerHTML = `<tr><td colspan="5" class="py-6 text-center">Nenhum resultado ainda</td></tr>`;
      return;
    }

    table.innerHTML = '';

    data.forEach((player, index) => {

      const percent = Math.round((player.score / player.total_questions) * 100);

      const medal =
        index === 0 ? "🥇" :
        index === 1 ? "🥈" :
        index === 2 ? "🥉" : "";

      const row = `
        <tr class="border-b border-zinc-800 hover:bg-zinc-800 transition">
          <td class="py-4 font-bold">${index + 1} ${medal}</td>
          <td>${player.user_name}</td>
          <td class="text-emerald-400 font-bold">${player.score}</td>
          <td>${percent}%</td>
          <td class="text-sm text-zinc-400">${new Date(player.created_at).toLocaleString()}</td>
        </tr>
      `;

      table.innerHTML += row;
    });

  } catch (err) {
    console.error(err);
    table.innerHTML = `<tr><td colspan="5" class="py-6 text-center text-red-400">Erro inesperado</td></tr>`;
  }
}

// carregar automático
window.onload = loadRanking;

</script>

</body>
</html>
