
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Placar Quiz Portugol - EETEPA Xinguara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <style>
        body {
            background-color: #0a0a0a;
            color: #e5e5e5;
            font-family: system-ui, -apple-system, sans-serif;
        }
        .glow-emerald {
            text-shadow: 0 0 15px rgba(16, 185, 129, 0.4);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 8px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #18181b;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #3f3f46;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #52525b;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10 flex flex-col items-center">
    
    <div class="w-full max-w-5xl">
        <!-- Header -->
        <div class="flex flex-col md:flex-row justify-between items-end mb-12 gap-6">
            <div>
                <h1 class="text-5xl font-black text-emerald-400 tracking-tight glow-emerald uppercase">Ranking Global</h1>
                <p class="text-zinc-500 text-lg mt-2 font-medium">Resultados em tempo real • EETEPA Xinguara</p>
            </div>
            <div class="flex gap-3">
                <button onclick="fetchRanking()" class="bg-zinc-800 hover:bg-zinc-700 text-white px-6 py-3 rounded-2xl transition-all flex items-center gap-2 border border-zinc-700">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"></path><path d="M21 3v5h-5"></path><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"></path><path d="M8 16H3v5"></path></svg>
                    Atualizar
                </button>
            </div>
        </div>

        <!-- Leaderboard Table -->
        <div class="bg-zinc-900/50 rounded-[2.5rem] border border-zinc-800 shadow-2xl overflow-hidden">
            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-left">
                    <thead>
                        <tr class="bg-zinc-800/40 text-zinc-400 text-xs uppercase tracking-[0.2em]">
                            <th class="px-8 py-6 font-bold">Posição</th>
                            <th class="px-8 py-6 font-bold">Estudante</th>
                            <th class="px-8 py-6 font-bold text-center">Acertos</th>
                            <th class="px-8 py-6 font-bold text-center">Aproveitamento</th>
                            <th class="px-8 py-6 font-bold text-right">Data de Conclusão</th>
                        </tr>
                    </thead>
                    <tbody id="ranking-body" class="divide-y divide-zinc-800/50">
                        <!-- JS injection -->
                        <tr>
                            <td colspan="5" class="px-8 py-32 text-center">
                                <div class="flex flex-col items-center gap-4">
                                    <div class="w-8 h-8 border-4 border-emerald-500/30 border-t-emerald-500 rounded-full animate-spin"></div>
                                    <p class="text-zinc-500 animate-pulse">Sincronizando com o banco de dados...</p>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-12 flex flex-col md:flex-row justify-between items-center text-zinc-600 text-sm gap-4">
            <p>© 2026 EETEPA Xinguara - Laboratório de Informática</p>
            <p class="font-bold tracking-widest uppercase text-zinc-500">Desenvolvido por LÉO CRUZ</p>
        </footer>
    </div>

    <script>
        // Configuração do Supabase (reutilizando sua estrutura)
        const supabaseClient = supabase.createClient(
            window.SUPABASE_CONFIG.url,
            window.SUPABASE_CONFIG.key
        );

        async function fetchRanking() {
            const tbody = document.getElementById('ranking-body');
            
            try {
                // Busca os top resultados
                const { data, error } = await supabaseClient
                    .from('quiz_results2')
                    .select('user_name, score, total_questions, created_at')
                    .order('score', { ascending: false })
                    .order('created_at', { ascending: true });

                if (error) throw error;

                tbody.innerHTML = '';

                if (data.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="5" class="px-8 py-20 text-center text-zinc-500 italic">Nenhum registro encontrado até o momento.</td></tr>`;
                    return;
                }

                data.forEach((row, index) => {
                    const percentage = Math.round((row.score / row.total_questions) * 100);
                    const date = new Date(row.created_at).toLocaleDateString('pt-BR', {
                        day: '2-digit',
                        month: '2-digit',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                    const isTop1 = index === 0;
                    const tr = document.createElement('tr');
                    tr.className = `group hover:bg-emerald-500/[0.03] transition-all duration-300`;
                    
                    tr.innerHTML = `
                        <td class="px-8 py-6">
                            <span class="flex items-center justify-center w-10 h-10 rounded-xl font-black text-sm 
                                ${index === 0 ? 'bg-emerald-500 text-black shadow-[0_0_20px_rgba(16,185,129,0.4)]' : 
                                  index === 1 ? 'bg-zinc-300 text-black' : 
                                  index === 2 ? 'bg-zinc-600 text-white' : 'bg-zinc-800 text-zinc-400'}">
                                ${index + 1}º
                            </span>
                        </td>
                        <td class="px-8 py-6 font-bold text-lg text-white group-hover:text-emerald-400 transition-colors">
                            ${row.user_name}
                        </td>
                        <td class="px-8 py-6 text-center">
                            <span class="text-2xl font-mono font-bold text-emerald-400">${row.score}</span>
                            <span class="text-zinc-600 text-sm ml-1">/ ${row.total_questions}</span>
                        </td>
                        <td class="px-8 py-6 text-center">
                            <div class="flex items-center justify-center gap-3">
                                <div class="w-16 h-2 bg-zinc-800 rounded-full overflow-hidden hidden md:block">
                                    <div class="h-full bg-emerald-500" style="width: ${percentage}%"></div>
                                </div>
                                <span class="font-bold text-zinc-300">${percentage}%</span>
                            </div>
                        </td>
                        <td class="px-8 py-6 text-right text-zinc-500 font-mono text-sm">
                            ${date}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });

            } catch (err) {
                console.error("Erro:", err);
                tbody.innerHTML = `<tr><td colspan="5" class="px-8 py-20 text-center text-red-500">Falha na conexão com o Supabase. Verifique o config.js.</td></tr>`;
            }
        }

        // Auto-refresh a cada 30 segundos (opcional para exibição em TV/Projetor)
        setInterval(fetchRanking, 30000);

        window.onload = fetchRanking;
    </script>
</body>
</html>
