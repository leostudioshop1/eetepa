<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Placar Geral</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
</head>

<body class="bg-black text-white p-6">

<h1 class="text-3xl text-indigo-400 mb-6">🏆 Ranking Geral</h1>

<div id="status" class="mb-4 text-yellow-400"></div>

<table class="w-full border border-zinc-700">
  <thead>
    <tr class="bg-zinc-800">
      <th>#</th>
      <th>Nome</th>
      <th>Pontos</th>
      <th>%</th>
    </tr>
  </thead>
  <tbody id="tabela"></tbody>
</table>

<script>

const statusDiv = document.getElementById("status");

if (!window.SUPABASE_CONFIG) {
  statusDiv.innerHTML = "❌ config.js NÃO encontrado";
}

// 🔗 CONEXÃO
const supabaseClient = supabase.createClient(
  window.SUPABASE_CONFIG.url,
  window.SUPABASE_CONFIG.key
);

// 🚨 TESTE DE CONEXÃO
async function testarConexao() {
  statusDiv.innerHTML = "🔄 Conectando ao banco...";

  try {
    const { data, error } = await supabaseClient
      .from('quiz_results2')
      .select('*')
      .limit(1);

    if (error) {
      statusDiv.innerHTML = "❌ ERRO: " + error.message;
      console.error(error);
      return false;
    }

    statusDiv.innerHTML = "✅ Conectado com sucesso!";
    return true;

  } catch (err) {
    statusDiv.innerHTML = "❌ Falha na conexão";
    console.error(err);
    return false;
  }
}

// 📊 CARREGAR DADOS
async function carregarRanking() {

  const ok = await testarConexao();
  if (!ok) return;

  statusDiv.innerHTML = "📥 Buscando dados...";

  const { data, error } = await supabaseClient
    .from('quiz_results2')
    .select('user_name, score, total_questions, created_at')
    .order('score', { ascending: false });

  if (error) {
    statusDiv.innerHTML = "❌ Erro ao buscar: " + error.message;
    console.error(error);
    return;
  }

  console.log("DADOS:", data);

  const tabela = document.getElementById("tabela");
  tabela.innerHTML = "";

  if (!data || data.length === 0) {
    statusDiv.innerHTML = "⚠️ Nenhum dado encontrado!";
    return;
  }

  data.forEach((item, i) => {

    const percent = Math.round((item.score / item.total_questions) * 100);

    tabela.innerHTML += `
      <tr class="border-t border-zinc-700">
        <td class="p-2">${i+1}</td>
        <td>${item.user_name}</td>
        <td class="text-green-400">${item.score}</td>
        <td>${percent}%</td>
      </tr>
    `;
  });

  statusDiv.innerHTML = `✅ ${data.length} registros carregados`;
}

// iniciar
carregarRanking();

</script>

</body>
</html>
