```html
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Folha de Ponto PRO</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

</head>

<body class="bg-gray-900 text-white p-6">

<h1 class="text-2xl mb-4">📊 Folha de Ponto (Supabase)</h1>

<!-- CADASTRO -->
<div class="mb-6">
    <input id="nome" placeholder="Nome" class="p-2 text-black">
    <input id="telefone" placeholder="Telefone" class="p-2 text-black">
    <button onclick="cadastrarFuncionario()" class="bg-green-500 px-4 py-2">Salvar</button>
</div>

<!-- LISTA -->
<div id="lista"></div>

<hr class="my-6">

<!-- REGISTRO -->
<div>
    <input id="inputId" placeholder="ID ou telefone" class="p-2 text-black">
    <button onclick="registrar('entrada')" class="bg-blue-500 px-4 py-2">Entrada</button>
    <button onclick="registrar('saida')" class="bg-red-500 px-4 py-2">Saída</button>
</div>

<hr class="my-6">

<!-- RELATÓRIO -->
<button onclick="carregarLogs()" class="bg-yellow-500 px-4 py-2 mb-4">Atualizar Relatório</button>
<div id="logs"></div>

<script>
let employees = []
let logs = []

// ================= LOAD =================
async function loadData() {
    const { data } = await supabaseClient.from('employees').select('*')
    employees = data || []

    renderLista()
}

// ================= CADASTRO =================
async function cadastrarFuncionario() {
    const nome = document.getElementById('nome').value
    const telefone = document.getElementById('telefone').value

    const id = 'FUNC-' + Math.floor(Math.random()*999999)

    await supabaseClient.from('employees').insert([{
        id, name: nome, phone: telefone
    }])

    loadData()
}

// ================= LISTA =================
function renderLista() {
    const div = document.getElementById('lista')
    div.innerHTML = ''

    employees.forEach(f => {
        div.innerHTML += `<p>${f.name} - ${f.phone} (${f.id})</p>`
    })
}

// ================= REGISTRO =================
async function registrar(acao) {
    const input = document.getElementById('inputId').value

    let f = employees.find(e => e.id == input || e.phone == input)

    const nome = f ? f.name : input

    await supabaseClient.from('logs').insert([{
        timestamp: new Date(),
        id: input,
        name: nome,
        action: acao,
        fullDate: new Date().toLocaleString()
    }])

    alert('Registrado!')
}

// ================= LOGS =================
async function carregarLogs() {
    const { data } = await supabaseClient.from('logs')
        .select('*')
        .order('timestamp', { ascending: false })

    logs = data

    const div = document.getElementById('logs')
    div.innerHTML = ''

    logs.forEach(l => {
        div.innerHTML += `<p>${l.fullDate} - ${l.name} - ${l.action}</p>`
    })
}

// INIT
loadData()
</script>

</body>
</html>
