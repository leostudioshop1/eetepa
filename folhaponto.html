<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Folha de Ponto • Supabase</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
        .tail-container * { font-family: 'Inter', system_ui, sans-serif; }
        .header-font { font-family: 'Space Grotesk', sans-serif; }
    </style>
</head>
<body class="tail-container bg-gray-950 text-white min-h-screen">

    <!-- MODO PONTO (QR Code) -->
    <div id="ponto-screen" class="hidden flex-col min-h-screen bg-gradient-to-br from-blue-600 to-cyan-500">
        <div class="px-6 pt-8 pb-6 text-center">
            <div class="mx-auto w-16 h-16 bg-white rounded-2xl flex items-center justify-center mb-4">⏰</div>
            <h1 class="header-font text-4xl font-semibold">Folha de Ponto</h1>
            <p class="text-blue-100">Conectado ao Supabase</p>
            <div id="current-time" class="mt-6 text-5xl font-mono font-semibold"></div>
        </div>

        <div class="flex-1 bg-white text-gray-900 rounded-t-3xl px-6 pt-8 pb-12">
            <div class="max-w-md mx-auto">

                <div id="identified-screen" class="hidden text-center">
                    <h2 id="welcome-name" class="text-3xl font-semibold mb-2"></h2>
                    <p class="text-gray-500 mb-8">Escolha sua ação</p>
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="registrarPonto('entrada')" class="h-28 bg-emerald-500 hover:bg-emerald-600 rounded-3xl text-white flex flex-col items-center justify-center">
                            <span class="text-5xl mb-2">🚪</span>
                            <span class="text-2xl font-semibold">ENTRADA</span>
                        </button>
                        <button onclick="registrarPonto('saida')" class="h-28 bg-red-500 hover:bg-red-600 rounded-3xl text-white flex flex-col items-center justify-center">
                            <span class="text-5xl mb-2">🚪</span>
                            <span class="text-2xl font-semibold">SAÍDA</span>
                        </button>
                    </div>
                </div>

                <div id="setup-screen">
                    <input id="unique-id-input" type="text" placeholder="Digite seu código (FUNC-XXXXXX) ou telefone"
                           class="w-full px-5 py-4 border-2 border-gray-300 rounded-2xl mb-6 text-lg">
                    <div class="grid grid-cols-2 gap-4">
                        <button onclick="registrarPonto('entrada')" class="h-28 bg-emerald-500 hover:bg-emerald-600 rounded-3xl text-white flex flex-col items-center justify-center">
                            <span class="text-5xl mb-2">🚪</span>
                            <span class="text-2xl font-semibold">ENTRADA</span>
                        </button>
                        <button onclick="registrarPonto('saida')" class="h-28 bg-red-500 hover:bg-red-600 rounded-3xl text-white flex flex-col items-center justify-center">
                            <span class="text-5xl mb-2">🚪</span>
                            <span class="text-2xl font-semibold">SAÍDA</span>
                        </button>
                    </div>
                </div>

                <div id="success-message" class="hidden mt-10 text-center bg-emerald-50 text-emerald-700 rounded-3xl p-8">
                    <div class="text-5xl mb-4">✅</div>
                    <h3 id="success-title" class="text-2xl font-semibold"></h3>
                    <p id="success-details" class="mt-3"></p>
                </div>
            </div>
        </div>
    </div>

    <!-- MODO ADMIN -->
    <div id="admin-screen" class="min-h-screen">
        <div class="bg-gradient-to-r from-cyan-500 to-blue-600 p-6">
            <h1 class="header-font text-3xl font-semibold text-white">Folha de Ponto</h1>
        </div>

        <div class="flex border-b">
            <button onclick="showTab(0)" id="tab-0" class="flex-1 py-4 font-medium border-b-2 border-cyan-400 text-cyan-400">Cadastro</button>
            <button onclick="showTab(1)" id="tab-1" class="flex-1 py-4 font-medium">QR Code</button>
            <button onclick="showTab(2)" id="tab-2" class="flex-1 py-4 font-medium">Relatório</button>
        </div>

        <div id="content-0" class="tab-content p-6">
            <div class="bg-gray-900 rounded-3xl p-6">
                <input id="nome" placeholder="Nome completo" class="w-full p-4 bg-gray-800 rounded-2xl mb-4">
                <input id="telefone" placeholder="Telefone" class="w-full p-4 bg-gray-800 rounded-2xl mb-6">
                <button onclick="cadastrarFuncionario()" class="w-full bg-cyan-500 py-4 rounded-3xl font-semibold">Cadastrar Funcionário</button>
            </div>
            <div id="lista-funcionarios" class="mt-8"></div>
        </div>

        <div id="content-1" class="tab-content p-6 hidden">
            <div id="qrcode" class="bg-white p-8 rounded-3xl mx-auto max-w-[280px]"></div>
        </div>

        <div id="content-2" class="tab-content p-6 hidden">
            <div id="relatorio" class="bg-gray-900 rounded-3xl p-6"></div>
        </div>
    </div>

    <script type="module">
        import { supabaseConfig } from './config.js';

        const supabase = Supabase.createClient(supabaseConfig.url, supabaseConfig.anonKey);

        let currentUser = null;

        async function cadastrarFuncionario() {
            const nome = document.getElementById('nome').value.trim();
            const telefone = document.getElementById('telefone').value.trim();
            if (!nome || !telefone) return alert("Preencha todos os campos");

            const codigo_unico = "FUNC-" + Math.floor(100000 + Math.random() * 900000);

            const { error } = await supabase.from('funcionarios').insert([{ codigo_unico, nome, telefone }]);
            if (error) alert("Erro: " + error.message);
            else {
                alert("✅ Cadastrado com sucesso!");
                carregarFuncionarios();
            }
        }

        async function carregarFuncionarios() {
            const { data } = await supabase.from('funcionarios').select('*').order('nome');
            const div = document.getElementById('lista-funcionarios');
            div.innerHTML = data ? data.map(f => `
                <div class="bg-gray-900 p-5 rounded-3xl mb-3">
                    <div class="font-semibold">${f.nome}</div>
                    <div class="text-cyan-400">${f.telefone} • ${f.codigo_unico}</div>
                </div>
            `).join('') : '<p class="text-gray-400">Nenhum funcionário cadastrado</p>';
        }

        async function registrarPonto(acao) {
            let funcionario_id, nome;

            if (currentUser) {
                funcionario_id = currentUser.id;
                nome = currentUser.nome;
            } else {
                const input = document.getElementById('unique-id-input').value.trim();
                if (!input) return alert("Digite seu código ou telefone");

                const { data, error } = await supabase
                    .from('funcionarios')
                    .select('id, nome')
                    .or(`codigo_unico.eq.${input},telefone.eq.${input}`)
                    .single();

                if (error || !data) return alert("Funcionário não encontrado");

                funcionario_id = data.id;
                nome = data.nome;

                currentUser = { id: funcionario_id, nome };
                localStorage.setItem('ponto_my_user', JSON.stringify(currentUser));
                document.getElementById('setup-screen').classList.add('hidden');
                document.getElementById('identified-screen').classList.remove('hidden');
                document.getElementById('welcome-name').textContent = `Olá, ${nome}!`;
            }

            const { error } = await supabase.from('registros_ponto').insert([{
                funcionario_id,
                acao,
                device_id: localStorage.getItem('device_fingerprint') || 'dev-' + Date.now()
            }]);

            if (error) alert("Erro ao bater ponto: " + error.message);
            else mostrarSucesso(acao, nome);
        }

        function mostrarSucesso(acao, nome) {
            const msg = document.getElementById('success-message');
            msg.classList.remove('hidden');
            document.getElementById('success-title').textContent = `${acao.toUpperCase()} registrada!`;
            document.getElementById('success-details').innerHTML = `${nome}<br>${new Date().toLocaleString('pt-BR')}`;
        }

        function gerarQRCode() {
            const container = document.getElementById('qrcode');
            container.innerHTML = '';
            const url = window.location.href.split('?')[0] + '?mode=ponto';
            new QRCode(container, { text: url, width: 260, height: 260 });
        }

        function showTab(n) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById('content-' + n).classList.remove('hidden');

            if (n === 0) carregarFuncionarios();
            if (n === 1) gerarQRCode();
        }

        // Inicialização
        window.onload = () => {
            const isPonto = new URLSearchParams(window.location.search).get('mode') === 'ponto';

            if (isPonto) {
                document.getElementById('admin-screen').classList.add('hidden');
                document.getElementById('ponto-screen').classList.remove('hidden');

                const saved = localStorage.getItem('ponto_my_user');
                if (saved) {
                    currentUser = JSON.parse(saved);
                    document.getElementById('setup-screen').classList.add('hidden');
                    document.getElementById('identified-screen').classList.remove('hidden');
                    document.getElementById('welcome-name').textContent = `Olá, ${currentUser.nome}!`;
                }
            } else {
                showTab(0);
            }
        };
    </script>
</body>
</html>
