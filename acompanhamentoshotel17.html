<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard PRO • Livro Caixa</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

<style>
body { font-family: Inter, sans-serif; }
.card { transition: .3s; }
.card:hover { transform: translateY(-4px); }
</style>
</head>

<body class="bg-slate-950 text-white p-6">

<div class="max-w-7xl mx-auto">

<h1 class="text-3xl font-bold mb-6">📊 Dashboard Financeiro PRO</h1>

<div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
  <div class="card bg-slate-900 p-4 rounded-xl">
    <p>Saldo</p>
    <h2 id="saldo" class="text-2xl">R$ 0</h2>
  </div>
  <div class="card bg-slate-900 p-4 rounded-xl">
    <p>Entradas</p>
    <h2 id="entradas">R$ 0</h2>
  </div>
  <div class="card bg-slate-900 p-4 rounded-xl">
    <p>Saídas</p>
    <h2 id="saidas">R$ 0</h2>
  </div>
  <div class="card bg-slate-900 p-4 rounded-xl">
    <p>Registros</p>
    <h2 id="total">0</h2>
  </div>
</div>

<div class="grid md:grid-cols-2 gap-6">
  <canvas id="chartLine"></canvas>
  <canvas id="chartPie"></canvas>
</div>

</div>

<script>
const supabaseClient = supabase.createClient(
  window.SUPABASE_CONFIG.url,
  window.SUPABASE_CONFIG.key
);

let chartLine, chartPie;
let cache = [];
let updating = false;

function format(v){
 return v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})
}

async function carregar(){
 if(updating) return;
 updating = true;

 const { data } = await supabaseClient.from('gastos').select('*');
 cache = data || [];

 render();
 updating = false;
}

function render(){
 let entradas=0,saidas=0;

 cache.forEach(i=>{
  const v=parseFloat(i.valor)||0;
  i.tipo==='entrada'?entradas+=v:saidas+=v;
 });

 document.getElementById('saldo').innerText=format(entradas-saidas);
 document.getElementById('entradas').innerText=format(entradas);
 document.getElementById('saidas').innerText=format(saidas);
 document.getElementById('total').innerText=cache.length;

 renderCharts();
}

function renderCharts(){
 if(chartLine) chartLine.destroy();
 if(chartPie) chartPie.destroy();

 const dias={};
 cache.forEach(i=>{
  const d=i.data_hora?.slice(0,10);
  if(!dias[d]) dias[d]=0;
  dias[d]+=parseFloat(i.valor)||0;
 });

 const labels=Object.keys(dias);
 const valores=Object.values(dias);

 chartLine=new Chart(document.getElementById('chartLine'),{
  type:'line',
  data:{labels,datasets:[{data:valores}]},
  options:{animation:false}
 });

 const categorias={};
 cache.forEach(i=>{
  const c=i.categoria||'Outros';
  categorias[c]=(categorias[c]||0)+Math.abs(i.valor);
 });

 chartPie=new Chart(document.getElementById('chartPie'),{
  type:'doughnut',
  data:{labels:Object.keys(categorias),datasets:[{data:Object.values(categorias)}]},
  options:{animation:false}
 });
}

// realtime seguro
supabaseClient.channel('db-changes')
.on('postgres_changes',{event:'*',schema:'public',table:'gastos'},()=>{
 carregar();
}).subscribe();

setInterval(()=>{
 if(!document.hidden) carregar();
},30000);

carregar();
</script>

</body>
</html>
