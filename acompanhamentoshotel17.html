<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Livro Caixa • Hotel dos Viajantes</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

<script src="config.js"></script>

<style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');
    
    body { font-family: 'Inter', system_ui, sans-serif; }
    .title-font { font-family: 'Space Grotesk', sans-serif; }

    .card-hover {
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .card-hover:hover {
        transform: translateY(-6px);
        box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.3);
    }

    .table-row { transition: background-color 0.2s; }
    .table-row:hover { background-color: #1e2937; }

    .live-dot {
        animation: pulse 2s infinite;
    }
    @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
    }
</style>
</head>

<body class="bg-slate-950 text-white min-h-screen p-4 md:p-8">

<div id="relatorio" class="max-w-7xl mx-auto">

    <!-- HEADER -->
    <div class="flex flex-col lg:flex-row justify-between items-start lg:items-center mb-8 gap-6 bg-slate-900/80 backdrop-blur-xl border border-slate-700 rounded-3xl p-6">
        <div class="flex items-center gap-4">
            <div class="w-14 h-14 bg-gradient-to-br from-indigo-500 to-violet-600 rounded-3xl flex items-center justify-center text-4xl">📖</div>
            <div>
                <h1 class="title-font text-4xl font-semibold tracking-tight">Livro Caixa</h1>
                <p class="text-slate-400">Hotel dos Viajantes • <span class="inline-flex items-center gap-1.5 text-emerald-400">
                    <span class="live-dot w-2.5 h-2.5 bg-emerald-400 rounded-full"></span> AO VIVO
                </span></p>
            </div>
        </div>

        <div class="flex flex-wrap gap-3">
            <input type="month" id="mesFiltro" class="bg-slate-800 border border-slate-700 rounded-2xl px-5 py-3 text-lg">
            
            <button onclick="carregar()" class="bg-indigo-600 hover:bg-indigo-700 px-8 py-3 rounded-2xl font-semibold flex items-center gap-2">
                🔍 Filtrar
            </button>
            <button onclick="exportarPDF()" class="bg-emerald-600 hover:bg-emerald-700 px-6 py-3 rounded-2xl font-semibold">📄 PDF</button>
            <button onclick="exportarCSV()" class="bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-2xl font-semibold">📤 CSV</button>
        </div>
    </div>

    <!-- CARDS (3 cards) -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
        <div class="card-hover bg-gradient-to-br from-slate-800 to-slate-900 p-6 rounded-3xl border border-slate-700">
            <p class="text-slate-400 text-sm font-medium">SALDO DO MÊS</p>
            <p id="saldo" class="text-4xl font-bold title-font mt-3">R$ 0,00</p>
            <div id="trendSaldo" class="mt-4 text-sm"></div>
        </div>

        <div class="card-hover bg-gradient-to-br from-slate-800 to-slate-900 p-6 rounded-3xl border border-slate-700">
            <p class="text-emerald-400 text-sm font-medium">TOTAL ENTRADAS</p>
            <p id="entradas" class="text-4xl font-bold title-font mt-3 text-emerald-400">R$ 0,00</p>
            <div id="trendEntradas" class="mt-4 text-sm"></div>
        </div>

        <div class="card-hover bg-gradient-to-br from-slate-800 to-slate-900 p-6 rounded-3xl border border-slate-700">
            <p class="text-red-400 text-sm font-medium">TOTAL SAÍDAS</p>
            <p id="saidas" class="text-4xl font-bold title-font mt-3 text-red-400">R$ 0,00</p>
            <div id="trendSaidas" class="mt-4 text-sm"></div>
        </div>
    </div>

    <!-- GRÁFICOS -->
    <div class="mb-10">
        <h2 class="text-3xl font-semibold title-font mb-6">📊 Análise Visual</h2>
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Gráfico 1 -->
            <div class="bg-slate-900 rounded-3xl p-6 border border-slate-700">
                <h3 class="font-medium mb-4">Evolução do Saldo</h3>
                <canvas id="evolucaoChart" height="320"></canvas>
            </div>

            <!-- Gráfico 2 -->
            <div class="bg-slate-900 rounded-3xl p-6 border border-slate-700">
                <h3 class="font-medium mb-4">Entradas × Saídas por Dia</h3>
                <canvas id="dailyChart" height="320"></canvas>
            </div>

            <!-- Gráfico 3 -->
            <div class="bg-slate-900 rounded-3xl p-6 border border-slate-700">
                <h3 class="font-medium mb-4">Distribuição por Categoria</h3>
                <canvas id="categoriaChart" height="320"></canvas>
            </div>
        </div>
    </div>

    <!-- TABELA -->
    <div class="bg-slate-900 rounded-3xl p-6 border border-slate-700">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-semibold title-font">Transações</h2>
            <input id="searchInput" type="text" placeholder="Buscar descrição ou categoria..." 
                   class="bg-slate-800 border border-slate-700 rounded-2xl px-5 py-3 w-80 focus:outline-none focus:border-indigo-500">
        </div>

        <div class="overflow-x-auto">
            <table class="w-full">
                <thead class="bg-slate-800">
                    <tr>
                        <th class="p-4 text-left">Data</th>
                        <th class="p-4 text-left">Descrição</th>
                        <th class="p-4 text-center">Tipo</th>
                        <th class="p-4 text-right">Valor</th>
                        <th class="p-4">Categoria</th>
                        <th class="p-4">Origem</th>
                        <th class="p-4">Pagamento</th>
                        <th class="p-4">Responsável</th>
                    </tr>
                </thead>
                <tbody id="tabela" class="divide-y divide-slate-700"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
// ==================== CONFIG SUPABASE ====================
const supabaseClient = supabase.createClient(
    window.SUPABASE_CONFIG.url,
    window.SUPABASE_CONFIG.key
);

let allData = [];
let charts = {};

// ==================== FUNÇÕES BÁSICAS ====================
function setMesAtual() {
    const hoje = new Date();
    document.getElementById("mesFiltro").value = hoje.toISOString().slice(0,7);
}

function getIntervaloMes(mes) {
    const inicio = new Date(mes + "-01");
    const fim = new Date(inicio);
    fim.setMonth(fim.getMonth() + 1);
    fim.setSeconds(-1);
    return { inicio: inicio.toISOString(), fim: fim.toISOString() };
}

// ==================== RENDER CARDS ====================
function renderCards(data) {
    let entradas = 0, saidas = 0;
    data.forEach(item => {
        const v = parseFloat(item.valor) || 0;
        if (item.tipo === 'entrada') entradas += v;
        else saidas += v;
    });
    const saldo = entradas - saidas;

    document.getElementById("saldo").textContent = saldo.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
    document.getElementById("entradas").textContent = entradas.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});
    document.getElementById("saidas").textContent = saidas.toLocaleString('pt-BR', {style:'currency', currency:'BRL'});

    // Cores do saldo
    document.getElementById("saldo").className = saldo >= 0 
        ? "text-4xl font-bold title-font mt-3 text-emerald-400" 
        : "text-4xl font-bold title-font mt-3 text-red-400";
}

// ==================== GRÁFICOS ====================
function renderCharts(data) {
    // Destruir gráficos antigos para evitar memory leak
    Object.values(charts).forEach(chart => chart && chart.destroy());

    const dailyMap = {};
    const catMap = {};

    data.forEach(item => {
        const date = item.data_hora.slice(0,10);
        const valor = parseFloat(item.valor) || 0;

        if (!dailyMap[date]) dailyMap[date] = {entrada:0, saida:0};
        if (item.tipo === 'entrada') dailyMap[date].entrada += valor;
        else dailyMap[date].saida += valor;

        const cat = item.categoria || "Outros";
        catMap[cat] = (catMap[cat] || 0) + Math.abs(valor);
    });

    const dates = Object.keys(dailyMap).sort();
    const entradasDaily = dates.map(d => dailyMap[d].entrada);
    const saidasDaily = dates.map(d => dailyMap[d].saida);

    // Gráfico 1 - Evolução Saldo
    charts.evolucao = new Chart(document.getElementById('evolucaoChart'), {
        type: 'line',
        data: {
            labels: dates.map(d => new Date(d).toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'})),
            datasets: [{
                label: 'Saldo Acumulado',
                data: dates.reduce((acc, d, i) => {
                    acc.push((acc[i-1] || 0) + dailyMap[d].entrada - dailyMap[d].saida);
                    return acc;
                }, []),
                borderColor: '#10b981',
                tension: 0.4,
                fill: true,
                backgroundColor: 'rgba(16, 185, 129, 0.1)'
            }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });

    // Gráfico 2 - Barras Diárias
    charts.daily = new Chart(document.getElementById('dailyChart'), {
        type: 'bar',
        data: {
            labels: dates.map(d => new Date(d).toLocaleDateString('pt-BR', {day:'2-digit'})),
            datasets: [
                { label: 'Entradas', data: entradasDaily, backgroundColor: '#10b981' },
                { label: 'Saídas',   data: saidasDaily,   backgroundColor: '#ef4444' }
            ]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });

    // Gráfico 3 - Pizza Categorias
    const catLabels = Object.keys(catMap);
    const catValues = Object.values(catMap);
    charts.categoria = new Chart(document.getElementById('categoriaChart'), {
        type: 'doughnut',
        data: {
            labels: catLabels,
            datasets: [{
                data: catValues,
                backgroundColor: ['#10b981','#22d3ee','#a78bfa','#f472b6','#fb923c','#eab308']
            }]
        },
        options: { responsive: true, maintainAspectRatio: false, cutout: '65%' }
    });
}

// ==================== TABELA ====================
function renderTable(data) {
    const tbody = document.getElementById("tabela");
    tbody.innerHTML = "";

    data.forEach(item => {
        const valor = parseFloat(item.valor) || 0;
        const cor = item.tipo === 'entrada' ? 'text-emerald-400' : 'text-red-400';
        const sinal = item.tipo === 'entrada' ? '+' : '-';

        tbody.innerHTML += `
        <tr class="table-row">
            <td class="p-4">${new Date(item.data_hora).toLocaleString('pt-BR')}</td>
            <td class="p-4">${item.descricao}</td>
            <td class="p-4 text-center"><span class="${cor} font-bold">${item.tipo.toUpperCase()}</span></td>
            <td class="p-4 text-right font-bold ${cor}">${sinal} R$ ${valor.toFixed(2)}</td>
            <td class="p-4">${item.categoria || '-'}</td>
            <td class="p-4">${item.origem}</td>
            <td class="p-4">${item.forma_pagamento || '-'}</td>
            <td class="p-4">${item.responsavel || '-'}</td>
        </tr>`;
    });
}

// ==================== CARREGAR DADOS ====================
async function carregar() {
    const mes = document.getElementById("mesFiltro").value;
    if (!mes) return;

    const { inicio, fim } = getIntervaloMes(mes);

    try {
        const { data, error } = await supabaseClient
            .from('gastos')
            .select('*')
            .gte('data_hora', inicio)
            .lte('data_hora', fim)
            .order('data_hora', { ascending: false });

        if (error) throw error;

        allData = data || [];
        
        renderCards(allData);
        renderTable(allData);
        renderCharts(allData);

    } catch (err) {
        console.error(err);
        alert("Erro ao carregar dados: " + err.message);
    }
}

// ==================== EXPORTAÇÃO ====================
function exportarPDF() {
    html2pdf().set({
        margin: 0.8,
        filename: `livro_caixa_${document.getElementById("mesFiltro").value}.pdf`
    }).from(document.getElementById("relatorio")).save();
}

function exportarCSV() {
    if (!allData.length) return alert("Sem dados para exportar");
    
    let csv = "Data,Descricao,Tipo,Valor,Categoria,Origem,Pagamento,Responsavel\n";
    allData.forEach(r => {
        csv += `"${r.data_hora}","${r.descricao}",${r.tipo},${r.valor},"${r.categoria || ''}","${r.origem}","${r.forma_pagamento || ''}","${r.responsavel || ''}"\n`;
    });
    
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `livro_caixa_${document.getElementById("mesFiltro").value}.csv`;
    a.click();
}

// ==================== BUSCA ====================
document.getElementById("searchInput").addEventListener("input", (e) => {
    const term = e.target.value.toLowerCase();
    const filtered = allData.filter(item =>
        item.descricao.toLowerCase().includes(term) ||
        (item.categoria || "").toLowerCase().includes(term)
    );
    renderTable(filtered);
});

// ==================== INICIALIZAÇÃO ====================
setMesAtual();
carregar();
setInterval(carregar, 45000); // Atualiza a cada 45 segundos (mais leve)

console.log("%c✅ Dashboard Livro Caixa otimizado carregado com sucesso!", "color:#6366f1; font-weight:bold");
</script>
</body>
</html>
