<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Simulador SQL By Leomaster64</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f172a;
  color:#fff;
  display:flex;
  flex-direction:column;
  height:100vh;
}

/* HEADER */
header {
  background:#020617;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

/* LAYOUT */
.main {
  display:flex;
  flex:1;
  overflow:hidden;
}

/* SIDEBAR */
.sidebar {
  width:250px;
  background:#020617;
  padding:10px;
  overflow-y:auto;
  border-right:1px solid #334155;
}

.sidebar h3 {
  margin-top:0;
}

.table-item {
  padding:8px;
  background:#1e293b;
  margin-bottom:5px;
  border-radius:6px;
  cursor:pointer;
}

.table-item:hover {
  background:#334155;
}

/* CONTENT */
.content {
  flex:1;
  padding:10px;
  display:flex;
  flex-direction:column;
}

/* EDITOR */
textarea {
  width:100%;
  height:150px;
  background:#020617;
  color:#22c55e;
  border:1px solid #334155;
  border-radius:10px;
  padding:10px;
  font-family:monospace;
}

/* BUTTON */
button {
  margin-top:10px;
  padding:12px;
  background:#22c55e;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

/* OUTPUT */
.output {
  margin-top:10px;
  background:#020617;
  padding:10px;
  border-radius:10px;
  overflow:auto;
  flex:1;
}

/* TABLE */
table {
  width:100%;
  border-collapse:collapse;
  margin-bottom:15px;
}

th, td {
  border:1px solid #334155;
  padding:8px;
}

th {
  background:#1e293b;
}

/* STATUS */
.status {
  margin-top:5px;
  color:#38bdf8;
}

/* RESPONSIVO */
@media (max-width:768px) {
  .main {
    flex-direction:column;
  }

  .sidebar {
    width:100%;
    height:150px;
    border-right:none;
    border-bottom:1px solid #334155;
  }
}
</style>
</head>

<body>

<header>🔥 Simulador SQL By Leomaster64</header>

<div class="main">

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>📊 Tabelas</h3>
  <div id="tabelas"></div>
</div>

<!-- CONTENT -->
<div class="content">

<textarea id="sql">
CREATE TABLE alunos (id INTEGER PRIMARY KEY, nome TEXT, nota REAL);

INSERT INTO alunos (nome, nota) VALUES ('João', 8.5);
INSERT INTO alunos (nome, nota) VALUES ('Maria', 9.2);

SELECT * FROM alunos;
</textarea>

<button onclick="executar()">Executar SQL</button>

<div class="status" id="status"></div>
<div class="output" id="resultado"></div>

</div>
</div>

<script>
let db;

initSqlJs({
  locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}`
}).then(SQL => {
  db = new SQL.Database();
  atualizarTabelas();
  document.getElementById("status").innerText = "Banco pronto!";
});

/* EXECUTAR SQL */
function executar() {
  const sqlTexto = document.getElementById("sql").value;
  const comandos = sqlTexto.split(";").map(c => c.trim()).filter(c => c);

  const resultadoDiv = document.getElementById("resultado");
  resultadoDiv.innerHTML = "";

  try {
    comandos.forEach(cmd => {

      if (cmd.toLowerCase().startsWith("select")) {
        renderTabela(cmd);
      } else {
        db.run(cmd);
      }

    });

    atualizarTabelas();
    document.getElementById("status").innerText = "Comandos executados com sucesso!";

  } catch (e) {
    document.getElementById("status").innerText = "Erro: " + e.message;
  }
}

/* RENDER SELECT */
function renderTabela(query) {
  const res = db.exec(query);
  const resultadoDiv = document.getElementById("resultado");

  res.forEach(r => {
    let html = "<table><tr>";

    r.columns.forEach(col => html += `<th>${col}</th>`);
    html += "</tr>";

    r.values.forEach(linha => {
      html += "<tr>";
      linha.forEach(v => html += `<td>${v}</td>`);
      html += "</tr>";
    });

    html += "</table>";
    resultadoDiv.innerHTML += html;
  });
}

/* LISTAR TABELAS */
function atualizarTabelas() {
  const div = document.getElementById("tabelas");
  div.innerHTML = "";

  const res = db.exec("SELECT name FROM sqlite_master WHERE type='table'");

  if (res.length === 0) return;

  res[0].values.forEach(t => {
    const nome = t[0];

    const el = document.createElement("div");
    el.className = "table-item";
    el.innerText = nome;

    el.onclick = () => {
      visualizarTabela(nome);
    };

    div.appendChild(el);
  });
}

/* VISUALIZAR TABELA */
function visualizarTabela(nome) {
  const resultadoDiv = document.getElementById("resultado");
  resultadoDiv.innerHTML = `<h3>Tabela: ${nome}</h3>`;
  renderTabela(`SELECT * FROM ${nome}`);
}
</script>

</body>
</html>
