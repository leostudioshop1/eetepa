
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Terminal Acadêmico - Supabase Edition</title>
    <!-- SDK do Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-magenta: #bc13fe;
            --terminal-black: #0d1117;
            --border-color: #30363d;
        }

        body {
            background-color: #010409;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .terminal-container {
            width: 100%;
            max-width: 1000px;
            background: var(--terminal-black);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .header {
            background: #161b22;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 16px;
            margin: 0;
            color: var(--neon-cyan);
            font-family: 'Courier New', monospace;
        }

        .status-badge {
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 12px;
            background: #238636;
            color: white;
            font-weight: bold;
        }

        .editor-box {
            background: #0d1117;
            padding: 0;
        }

        textarea {
            width: 100%;
            height: 200px;
            background: transparent;
            color: #79c0ff;
            border: none;
            padding: 20px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
            resize: vertical;
        }

        .toolbar {
            padding: 10px 20px;
            background: #161b22;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .table-selector {
            background: #21262d;
            color: #c9d1d9;
            border: 1px solid var(--border-color);
            padding: 5px 10px;
            border-radius: 6px;
            outline: none;
        }

        button {
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
            transition: 0.3s;
        }

        .btn-execute {
            background: var(--neon-magenta);
            border: none;
            color: white;
        }

        .btn-execute:hover {
            box-shadow: 0 0 15px var(--neon-magenta);
            filter: brightness(1.1);
        }

        .results-area {
            padding: 20px;
            background: #0d1117;
            border-top: 1px solid var(--border-color);
            min-height: 200px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th {
            background: #161b22;
            color: var(--neon-cyan);
            text-align: left;
            padding: 12px;
            border: 1px solid var(--border-color);
        }

        td {
            padding: 10px;
            border: 1px solid var(--border-color);
        }

        .error-msg {
            color: #ff7b72;
            background: rgba(255, 123, 114, 0.1);
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid #ff7b72;
        }

        .success-msg {
            color: #7ee787;
            margin-bottom: 10px;
        }

        .loading {
            color: #8b949e;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="terminal-container">
    <div class="header">
        <h1>SQL TERMINAL // SUPABASE CLOUD</h1>
        <span class="status-badge">CONNECTED</span>
    </div>

    <div class="editor-box">
        <textarea id="sqlQuery" placeholder="-- Exemplo: SELECT * FROM sua_tabela LIMIT 5
SELECT * FROM "></textarea>
    </div>

    <div class="toolbar">
        <span style="font-size: 12px; color: #8b949e;">Powered by Supabase SDK</span>
        <button class="btn-execute" onclick="executeSQL()">EXECUTAR COMANDO (_>)</button>
    </div>

    <div id="results" class="results-area">
        <div style="color: #484f58; text-align: center; margin-top: 50px;">Aguardando comando SQL...</div>
    </div>
</div>

<!-- Importação das credenciais -->
<script src="config.js"></script>

<script>
    async function executeSQL() {
        const query = document.getElementById('sqlQuery').value.trim();
        const resultsDiv = document.getElementById('results');
        
        if (!query) return;

        resultsDiv.innerHTML = '<div class="loading">Executando consulta no banco remoto...</div>';

        try {
            /* NOTA IMPORTANTE: 
               O Supabase SDK não permite rodar SQL bruto (SELECT * FROM...) diretamente por segurança (SQL Injection).
               Para rodar SQL bruto no front-end, você precisaria de uma RPC (Remote Procedure Call) no Supabase.
               
               Abaixo, simulamos a chamada via RPC 'exec_sql' que você deve criar no painel do Supabase.
            */
            
            // Tentativa via RPC (Recomendado para simuladores acadêmicos)
            const { data, error } = await supabase.rpc('exec_sql', { query_text: query });

            if (error) throw error;

            if (data && data.length > 0) {
                renderTable(data);
            } else {
                resultsDiv.innerHTML = '<div class="success-msg">> Comando executado. Nenhum dado retornado ou tabela vazia.</div>';
            }

        } catch (err) {
            resultsDiv.innerHTML = `
                <div class="error-msg">
                    <strong>Erro no Supabase:</strong><br>
                    ${err.message}
                    <p style="font-size: 11px; margin-top: 10px; color: #8b949e;">
                        Dica: Certifique-se de que a função RPC 'exec_sql' está criada no seu banco de dados.
                    </p>
                </div>`;
        }
    }

    function renderTable(data) {
        const columns = Object.keys(data[0]);
        let html = '<div class="success-msg">> ' + data.length + ' registros encontrados:</div>';
        html += '<table><thead><tr>';
        
        columns.forEach(col => {
            html += `<th>${col}</th>`;
        });
        
        html += '</tr></thead><tbody>';
        
        data.forEach(row => {
            html += '<tr>';
            columns.forEach(col => {
                html += `<td>${row[col] !== null ? row[col] : '<em>null</em>'}</td>`;
            });
            html += '</tr>';
        });
        
        html += '</tbody></table>';
        document.getElementById('results').innerHTML = html;
    }
</script>

</body>
</html>
