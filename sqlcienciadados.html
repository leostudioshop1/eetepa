<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL SQL // CYBERPUNK</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- SQL.js Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>
    <!-- Google Fonts for Cyberpunk vibe -->
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-color: #050505;
            --panel-bg: #0a0a0c;
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff00ff;
            --neon-yellow: #fcee0a;
            --text-color: #e0e0e0;
            --border-glow: 0 0 10px rgba(0, 243, 255, 0.3);
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Fira Code', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            /* Efeito de Scanlines */
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 4px, 3px 100%;
        }

        header {
            background: var(--panel-bg);
            padding: 20px;
            text-align: center;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--neon-cyan);
            border-bottom: 3px solid var(--neon-magenta);
            box-shadow: 0 4px 15px rgba(255, 0, 255, 0.3);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        .container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 20px;
        }

        .editor-container {
            position: relative;
            margin-bottom: 20px;
        }

        .editor-container::before {
            content: "SYSTEM_INPUT_";
            position: absolute;
            top: -12px;
            left: 15px;
            background: var(--bg-color);
            padding: 0 10px;
            color: var(--neon-magenta);
            font-size: 0.8rem;
            font-weight: bold;
        }

        textarea {
            width: 100%;
            height: 250px;
            background: rgba(10, 10, 12, 0.8);
            color: var(--neon-yellow);
            border: 2px solid var(--neon-cyan);
            border-radius: 4px;
            padding: 15px;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
            outline: none;
            box-shadow: var(--border-glow);
            resize: vertical;
        }

        button {
            width: 100%;
            padding: 15px;
            background: transparent;
            color: var(--neon-cyan);
            border: 2px solid var(--neon-cyan);
            font-family: 'Orbitron', sans-serif;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            clip-path: polygon(10% 0, 100% 0, 100% 70%, 90% 100%, 0 100%, 0 30%);
        }

        button:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 20px var(--neon-cyan);
        }

        .status {
            margin: 15px 0;
            padding: 10px;
            font-size: 0.9rem;
            color: var(--neon-magenta);
            border-left: 3px solid var(--neon-magenta);
            background: rgba(255, 0, 255, 0.05);
        }

        .output-container {
            margin-top: 30px;
            overflow-x: auto; /* Garante responsividade na tabela */
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(0, 243, 255, 0.02);
            border: 1px solid rgba(0, 243, 255, 0.2);
        }

        th {
            background: rgba(0, 243, 255, 0.1);
            color: var(--neon-cyan);
            text-transform: uppercase;
            font-size: 0.8rem;
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid var(--neon-cyan);
        }

        td {
            padding: 10px;
            border-bottom: 1px solid rgba(0, 243, 255, 0.1);
            font-size: 14px;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--neon-magenta); }

        @media (max-width: 600px) {
            header { font-size: 1.2rem; letter-spacing: 2px; }
            .container { padding: 10px; }
            textarea { height: 180px; }
        }
    </style>
</head>

<body>

<header>⚡ SQL_CORE_EXECUTOR</header>

<div class="container">

    <div class="editor-container">
<textarea id="sql">
-- Inicializando matriz de dados...
CREATE TABLE unidades_ciberneticas (
    id INTEGER PRIMARY KEY, 
    modelo TEXT, 
    nivel_hacking INTEGER
);

INSERT INTO unidades_ciberneticas (modelo, nivel_hacking) VALUES ('V-Type Raven', 88);
INSERT INTO unidades_ciberneticas (modelo, nivel_hacking) VALUES ('NetRunner Elite', 95);

SELECT * FROM unidades_ciberneticas;</textarea>
    </div>

    <button onclick="executar()">Executar Protocolo</button>

    <div class="status" id="status">Iniciando sistema...</div>

    <div class="output-container" id="resultado"></div>

</div>

<script>
let db;

// Inicialização com tratamento de erro
initSqlJs({
    locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}`
}).then(SQL => {
    db = new SQL.Database();
    document.getElementById("status").innerText = "> SISTEMA ONLINE // AGUARDANDO COMANDOS";
}).catch(err => {
    document.getElementById("status").innerText = "> FALHA NO NÚCLEO: " + err.message;
});

function executar() {
    const sqlTexto = document.getElementById("sql").value;
    const comandos = sqlTexto.split(";").map(c => c.trim()).filter(c => c);

    const resultadoDiv = document.getElementById("resultado");
    resultadoDiv.innerHTML = "";
    
    document.getElementById("status").innerText = "> PROCESSANDO REQUISIÇÃO...";

    try {
        comandos.forEach(cmd => {
            if (cmd.toLowerCase().startsWith("select")) {
                const res = db.exec(cmd);

                res.forEach(r => {
                    let html = "<table><thead><tr>";
                    r.columns.forEach(col => html += `<th>${col}</th>`);
                    html += "</tr></thead><tbody>";

                    r.values.forEach(linha => {
                        html += "<tr>";
                        linha.forEach(v => html += `<td>${v}</td>`);
                        html += "</tr>";
                    });

                    html += "</tbody></table><br>";
                    resultadoDiv.innerHTML += html;
                });
            } else {
                db.run(cmd);
            }
        });

        document.getElementById("status").innerText = "> SUCESSO: OPERAÇÃO CONCLUÍDA.";
        
    } catch (e) {
        document.getElementById("status").innerText = "> ERRO CRÍTICO: " + e.message.toUpperCase();
    }
}
</script>

</body>
</html>
