
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL Simulator - GitHub Edition</title>
    <style>
        :root {
            --neon-cyan: #00f2ff;
            --neon-magenta: #bc13fe;
            --terminal-black: #0d1117;
            --border-color: #30363d;
        }

        body {
            background-color: #010409;
            color: #c9d1d9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 900px;
            background: var(--terminal-black);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .header {
            background: #161b22;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 14px;
            margin: 0;
            color: var(--neon-cyan);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .badge {
            background: #238636;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: bold;
        }

        .editor-container {
            position: relative;
            background: #0d1117;
        }

        textarea {
            width: 100%;
            height: 180px;
            background: transparent;
            color: #79c0ff;
            border: none;
            padding: 20px;
            font-family: 'Fira Code', 'Courier New', monospace;
            font-size: 15px;
            outline: none;
            box-sizing: border-box;
            resize: none;
        }

        .controls {
            padding: 10px 20px;
            background: #161b22;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        button {
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: 0.2s;
        }

        .btn-run {
            background-color: var(--neon-magenta);
            border: 1px solid var(--neon-magenta);
            color: white;
        }

        .btn-run:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 10px var(--neon-magenta);
        }

        .btn-clear {
            background-color: #21262d;
            border: 1px solid var(--border-color);
            color: #c9d1d9;
        }

        .btn-clear:hover {
            background-color: #30363d;
        }

        .output-area {
            padding: 20px;
            background: #0d1117;
            border-top: 1px solid var(--border-color);
            min-height: 150px;
        }

        .status-msg {
            font-size: 13px;
            margin-bottom: 15px;
            padding-left: 10px;
            border-left: 3px solid var(--neon-cyan);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
            margin-top: 10px;
        }

        th {
            background: #161b22;
            color: var(--neon-cyan);
            text-align: left;
            padding: 10px;
            border: 1px solid var(--border-color);
        }

        td {
            padding: 10px;
            border: 1px solid var(--border-color);
        }

        tr:nth-child(even) {
            background: #161b2244;
        }

        .empty-state {
            color: #484f58;
            text-align: center;
            margin-top: 40px;
        }
        
        .footer-info {
            margin-top: 20px;
            font-size: 11px;
            color: #484f58;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>SQL Simulator // Client-Side</h1>
        <span class="badge">Static GitHub Host</span>
    </div>

    <div class="editor-container">
        <textarea id="sqlInput" placeholder="-- Digite seus comandos SQL aqui (Simulação Local)
-- Exemplo:
CREATE TABLE alunos (id INT, nome TEXT);
INSERT INTO alunos VALUES (1, 'Léo Cruz');
SELECT * FROM alunos;"></textarea>
    </div>

    <div class="controls">
        <button class="btn-clear" onclick="clearEditor()">LIMPAR</button>
        <button class="btn-run" onclick="runSimulation()">EXECUTAR NO NAVEGADOR (_>)</button>
    </div>

    <div id="output" class="output-area">
        <div class="empty-state">O terminal está pronto. Digite um comando para simular o resultado.</div>
    </div>
</div>

<div class="footer-info">
    Interface otimizada para GitHub Pages | Desenvolvido para práticas acadêmicas
</div>

<script>
    function clearEditor() {
        document.getElementById('sqlInput').value = '';
        document.getElementById('output').innerHTML = '<div class="empty-state">O terminal está pronto. Digite um comando para simular o resultado.</div>';
    }

    function runSimulation() {
        const sql = document.getElementById('sqlInput').value.trim().toUpperCase();
        const output = document.getElementById('output');
        
        if (!sql) return;

        // Simulação de lógica para fins didáticos (já que GitHub Pages é estático)
        let html = '<div class="status-msg">Simulando execução... (Ambiente Local)</div>';
        
        if (sql.includes('SELECT')) {
            html += `
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>NOME</th>
                            <th>CURSO</th>
                            <th>STATUS</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>1</td>
                            <td>Léo Cruz</td>
                            <td>Sistemas</td>
                            <td>Ativo</td>
                        </tr>
                        <tr>
                            <td>2</td>
                            <td>Ana Silva</td>
                            <td>Informática</td>
                            <td>Ativo</td>
                        </tr>
                    </tbody>
                </table>
            `;
        } else if (sql.includes('INSERT') || sql.includes('UPDATE') || sql.includes('DELETE')) {
            html += '<div style="color: #55ff55;">> Comando executado com sucesso! 1 linha afetada.</div>';
        } else if (sql.includes('CREATE') || sql.includes('DROP')) {
            html += '<div style="color: #55ff55;">> Estrutura modificada com sucesso.</div>';
        } else {
            html += '<div style="color: #ff5555;">> Erro de sintaxe: Comando não reconhecido neste simulador.</div>';
        }

        output.innerHTML = html;
    }
</script>

</body>
</html>
