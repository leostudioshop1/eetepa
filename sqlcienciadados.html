<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Simulador SQL Profissional</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- SQL.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/sql-wasm.js"></script>

<style>
  body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: #fff;
    margin: 0;
  }

  header {
    background: #020617;
    padding: 15px;
    text-align: center;
    font-size: 20px;
    font-weight: bold;
  }

  .container {
    display: flex;
    flex-direction: column;
    padding: 15px;
  }

  textarea {
    width: 100%;
    height: 180px;
    background: #020617;
    color: #22c55e;
    border: 1px solid #334155;
    border-radius: 10px;
    padding: 10px;
    font-family: monospace;
    font-size: 14px;
  }

  button {
    margin-top: 10px;
    padding: 12px;
    background: #22c55e;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
  }

  button:hover {
    background: #16a34a;
  }

  .output {
    margin-top: 20px;
    background: #020617;
    padding: 10px;
    border-radius: 10px;
    overflow-x: auto;
  }

  table {
    width: 100%;
    border-collapse: collapse;
  }

  th, td {
    border: 1px solid #334155;
    padding: 8px;
    text-align: left;
  }

  th {
    background: #1e293b;
  }

  .status {
    margin-top: 10px;
    color: #38bdf8;
  }
</style>
</head>

<body>

<header>🔥 Simulador SQL Profissional</header>

<div class="container">

<textarea id="sql">
-- Exemplo inicial
CREATE TABLE alunos (id INTEGER PRIMARY KEY, nome TEXT, nota REAL);

INSERT INTO alunos (nome, nota) VALUES ('João', 8.5);
INSERT INTO alunos (nome, nota) VALUES ('Maria', 9.2);

SELECT * FROM alunos;
</textarea>

<button onclick="executar()">Executar SQL</button>

<div class="status" id="status"></div>

<div class="output" id="resultado"></div>

</div>

<script>
let db;

initSqlJs({
  locateFile: file => `https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.8.0/${file}`
}).then(SQL => {
  db = new SQL.Database();
  document.getElementById("status").innerText = "Banco pronto!";
});

function executar() {
  const sql = document.getElementById("sql").value;
  const resultadoDiv = document.getElementById("resultado");

  try {
    const resultados = db.exec(sql);

    if (resultados.length === 0) {
      resultadoDiv.innerHTML = "<p>Comando executado com sucesso.</p>";
      return;
    }

    let html = "";

    resultados.forEach(res => {
      html += "<table><tr>";

      res.columns.forEach(col => {
        html += `<th>${col}</th>`;
      });

      html += "</tr>";

      res.values.forEach(linha => {
        html += "<tr>";
        linha.forEach(valor => {
          html += `<td>${valor}</td>`;
        });
        html += "</tr>";
      });

      html += "</table><br>";
    });

    resultadoDiv.innerHTML = html;
    document.getElementById("status").innerText = "Executado com sucesso!";
    
  } catch (e) {
    document.getElementById("status").innerText = "Erro: " + e.message;
  }
}
</script>

</body>
</html>
