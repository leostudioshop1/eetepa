<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel dos Viajantes • Lançamento</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

</head>

<body class="bg-slate-950 text-white min-h-screen p-6">

<div class="max-w-4xl mx-auto">

<!-- Header -->
<div class="mb-6">
<h1 class="text-3xl font-bold">🏨 Hotel dos Viajantes</h1>
<p class="text-slate-400">Lançamento de gastos</p>
</div>

<!-- TOTAL MENSAL -->
<div class="bg-slate-900 p-6 rounded-2xl mb-6 shadow">
<p class="text-slate-400">Total do mês</p>
<h2 id="totalMensal" class="text-3xl font-bold text-green-400">R$ 0,00</h2>
</div>

<!-- FORM -->
<div class="bg-slate-900 p-6 rounded-2xl shadow space-y-4">

<input id="descricao" placeholder="Descrição" class="w-full p-3 rounded text-black">
<input id="valor" type="number" step="0.01" placeholder="Valor" class="w-full p-3 rounded text-black">
<input id="categoria" placeholder="Categoria" class="w-full p-3 rounded text-black">
<input id="responsavel" placeholder="Responsável" class="w-full p-3 rounded text-black">

<select id="origem" class="w-full p-3 rounded text-black">
<option value="">Origem</option>
<option>Caixa do Hotel</option>
<option>Conta Bancária</option>
</select>

<select id="forma" class="w-full p-3 rounded text-black">
<option value="">Forma de pagamento</option>
<option>Pix</option>
<option>Dinheiro</option>
<option>Cartão de Crédito</option>
<option>Cartão de Débito</option>
<option>Transferência</option>
</select>

<button onclick="salvar()" class="w-full bg-green-500 hover:bg-green-600 p-3 rounded font-bold">
Registrar Gasto
</button>

<p id="msg" class="text-center"></p>

</div>

</div>

<script>
const supabase = Supabase.createClient(
'https://osofdmgokrxdzsxozsrf.supabase.co',
'sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe'
);

async function carregarTotalMensal() {
const { data } = await supabase.from('gastos').select('*');

let total = 0;
const agora = new Date();

data.forEach(g => {
const d = new Date(g.data_hora);
if (d.getMonth() === agora.getMonth() && d.getFullYear() === agora.getFullYear()) {
total += parseFloat(g.valor);
}
});

document.getElementById("totalMensal").innerText =
total.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });
}

async function salvar() {
const descricao = descricao.value;
const valor = valor.value;
const categoria = categoria.value;
const responsavel = responsavel.value;
const origem = origem.value;
const forma = forma.value;

if (!descricao || !valor || !categoria || !responsavel || !origem || !forma) {
msg.innerText = "⚠️ Preencha tudo!";
return;
}

const { error } = await supabase.from('gastos').insert([{
descricao,
valor,
categoria,
responsavel,
origem,
forma_pagamento: forma,
data_hora: new Date().toISOString()
}]);

msg.innerText = error ? "❌ Erro!" : "✅ Salvo!";
document.querySelectorAll("input").forEach(i=>i.value="");
carregarTotalMensal();
}

carregarTotalMensal();
</script>

</body>
</html>
