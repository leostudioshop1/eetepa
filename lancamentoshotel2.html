<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel dos Viajantes • Lançamento</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="bg-gradient-to-br from-slate-950 to-slate-900 text-white min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-lg bg-slate-900/80 backdrop-blur-xl p-8 rounded-3xl shadow-2xl border border-slate-700">
        <div class="flex items-center gap-3 mb-8">
            <div class="w-10 h-10 bg-amber-500 rounded-2xl flex items-center justify-center">
                <i class="fas fa-hotel text-slate-950 text-xl"></i>
            </div>
            <div>
                <h1 class="text-3xl font-bold tracking-tight">Registrar Gasto</h1>
                <p class="text-slate-400 text-sm">Hotel dos Viajantes</p>
            </div>
        </div>

        <form id="form" class="space-y-6">
            <div>
                <label class="block text-sm font-medium text-slate-400 mb-1">Descrição</label>
                <input id="descricao" placeholder="Ex: Compra de suprimentos" required 
                       class="w-full p-4 bg-slate-800 border border-slate-700 rounded-2xl focus:outline-none focus:border-amber-500 transition-all">
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Valor (R$)</label>
                    <input id="valor" type="number" step="0.01" placeholder="0,00" required 
                           class="w-full p-4 bg-slate-800 border border-slate-700 rounded-2xl focus:outline-none focus:border-amber-500 transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Categoria</label>
                    <select id="categoria" 
                            class="w-full p-4 bg-slate-800 border border-slate-700 rounded-2xl focus:outline-none focus:border-amber-500 transition-all">
                        <option>Alimentação</option>
                        <option>Manutenção</option>
                        <option>Outros</option>
                    </select>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Responsável</label>
                    <input id="responsavel" placeholder="Nome do responsável" required 
                           class="w-full p-4 bg-slate-800 border border-slate-700 rounded-2xl focus:outline-none focus:border-amber-500 transition-all">
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-400 mb-1">Origem</label>
                    <select id="origem" 
                            class="w-full p-4 bg-slate-800 border border-slate-700 rounded-2xl focus:outline-none focus:border-amber-500 transition-all">
                        <option>Caixa do Hotel</option>
                        <option>Conta Bancária</option>
                    </select>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-400 mb-1">Forma de Pagamento</label>
                <select id="forma_pagamento" 
                        class="w-full p-4 bg-slate-800 border border-slate-700 rounded-2xl focus:outline-none focus:border-amber-500 transition-all">
                    <option>Pix</option>
                    <option>Dinheiro</option>
                    <option>Cartão</option>
                </select>
            </div>

            <button type="submit" 
                    class="w-full bg-gradient-to-r from-amber-500 to-orange-500 hover:from-amber-600 hover:to-orange-600 p-4 rounded-2xl font-bold text-lg transition-all active:scale-95 flex items-center justify-center gap-2">
                <i class="fas fa-save"></i>
                SALVAR LANÇAMENTO
            </button>
        </form>

        <!-- Total mensal -->
        <div id="total-mensal" class="mt-8 pt-6 border-t border-slate-700 text-center">
            <p class="text-sm text-slate-400">Total do mês atual</p>
            <p id="valor-total" class="text-4xl font-bold text-emerald-400">R$ 0,00</p>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://osofdmgokrxdzsxozsrf.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe';

        const { createClient } = supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_KEY);

        // Função para calcular total mensal
        async function atualizarTotalMensal() {
            const agora = new Date();
            const ano = agora.getFullYear();
            const mes = String(agora.getMonth() + 1).padStart(2, '0');

            const { data, error } = await db
                .from("gastos")
                .select("valor")
                .gte("data_hora", `${ano}-${mes}-01T00:00:00Z`)
                .lt("data_hora", `${ano}-${String(parseInt(mes)+1).padStart(2,'0')}-01T00:00:00Z`);

            if (error) {
                console.error(error);
                return;
            }

            const total = data.reduce((acc, item) => acc + parseFloat(item.valor || 0), 0);
            document.getElementById("valor-total").textContent = `R$ ${total.toFixed(2).replace('.', ',')}`;
        }

        // Submit do formulário
        document.getElementById("form").addEventListener("submit", async (e) => {
            e.preventDefault();

            const data = {
                descricao: descricao.value,
                valor: parseFloat(valor.value),
                categoria: categoria.value,
                responsavel: responsavel.value,
                origem: origem.value,
                forma_pagamento: forma_pagamento.value,
                data_hora: new Date().toISOString()
            };

            const { error } = await db.from("gastos").insert([data]);

            if (error) {
                alert("Erro ao salvar: " + error.message);
            } else {
                alert("✅ Lançamento salvo com sucesso!");
                form.reset();
                atualizarTotalMensal(); // Atualiza o total após salvar
            }
        });

        // Atualiza total ao carregar a página
        window.onload = atualizarTotalMensal;
    </script>
</body>
</html>
