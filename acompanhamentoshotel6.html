<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relatório de Gastos</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="bg-gradient-to-br from-slate-900 to-black text-white p-6">

<h1 class="text-3xl font-bold mb-6">📊 Relatório de Gastos</h1>

<button onclick="carregar()" class="bg-indigo-600 hover:bg-indigo-700 px-4 py-2 rounded mb-6 shadow">
🔄 Atualizar
</button>

<!-- CARDS -->
<div class="grid md:grid-cols-3 gap-4 mb-6">
<div class="bg-slate-800 p-4 rounded-xl shadow">
<p class="text-slate-400">Total Geral</p>
<p id="total" class="text-2xl font-bold text-green-400"></p>
</div>

<div class="bg-slate-800 p-4 rounded-xl shadow">
<p class="text-slate-400">Caixa</p>
<p id="caixa" class="text-xl font-bold text-blue-400"></p>
</div>

<div class="bg-slate-800 p-4 rounded-xl shadow">
<p class="text-slate-400">Banco</p>
<p id="banco" class="text-xl font-bold text-purple-400"></p>
</div>
</div>

<!-- TOTAL POR CATEGORIA -->
<div class="bg-slate-800 p-4 rounded-xl shadow mb-6">
<h2 class="text-xl font-bold mb-2">📂 Total por Categoria</h2>
<div id="categorias" class="grid md:grid-cols-3 gap-3"></div>
</div>

<!-- TABELA -->
<div class="overflow-x-auto">
<table class="w-full border border-slate-700 rounded-xl overflow-hidden">
<thead class="bg-slate-800">
<tr>
<th class="p-2">Data</th>
<th class="p-2">Descrição</th>
<th class="p-2">Categoria</th>
<th class="p-2">Valor</th>
<th class="p-2">Origem</th>
<th class="p-2">Pagamento</th>
<th class="p-2">Responsável</th>
</tr>
</thead>
<tbody id="tabela"></tbody>
</table>
</div>

<script>
const supabaseClient = supabase.createClient(
'https://osofdmgokrxdzsxozsrf.supabase.co',
'sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe'
);

async function carregar() {

const { data, error } = await supabaseClient
.from('gastos')
.select('*')
.order('data_hora', { ascending: false });

if (error) return alert(error.message);

let total = 0, caixa = 0, banco = 0;
let categorias = {};

const tabela = document.getElementById("tabela");
tabela.innerHTML = "";

data.forEach(g => {
const valor = parseFloat(g.valor) || 0;
total += valor;

if (g.origem === "Caixa do Hotel") caixa += valor;
if (g.origem === "Conta Bancária") banco += valor;

// CATEGORIAS
if (!categorias[g.categoria]) categorias[g.categoria] = 0;
categorias[g.categoria] += valor;

const linha = `
<tr class="border-b border-slate-700 hover:bg-slate-800 transition">
<td class="p-2">${new Date(g.data_hora).toLocaleString()}</td>
<td class="p-2">${g.descricao}</td>
<td class="p-2">${g.categoria}</td>
<td class="p-2 text-green-400 font-bold">R$ ${valor.toFixed(2)}</td>
<td class="p-2">${g.origem}</td>
<td class="p-2">${g.forma_pagamento}</td>
<td class="p-2">${g.responsavel}</td>
</tr>`;
tabela.innerHTML += linha;
});

// Atualizar cards
total.innerText = "R$ " + total.toFixed(2);
caixa.innerText = "R$ " + caixa.toFixed(2);
banco.innerText = "R$ " + banco.toFixed(2);

// Renderizar categorias
const catDiv = document.getElementById("categorias");
catDiv.innerHTML = "";

for (let cat in categorias) {
catDiv.innerHTML += `
<div class="bg-slate-700 p-3 rounded-lg">
<p class="text-slate-300">${cat}</p>
<p class="text-lg font-bold text-yellow-400">
R$ ${categorias[cat].toFixed(2)}
</p>
</div>`;
}
}

carregar();
</script>

</body>
</html>
