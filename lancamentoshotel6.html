<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lançamento de Gastos</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

</head>

<body class="bg-gradient-to-br from-slate-900 to-black text-white min-h-screen p-6">

<div class="max-w-4xl mx-auto">

<h1 class="text-3xl font-bold mb-6">💰 Lançamento de Gastos</h1>

<!-- TOTAL -->
<div class="bg-slate-800 p-6 rounded-xl mb-6 shadow">
<p class="text-slate-400">Total do mês</p>
<h2 id="totalMensal" class="text-3xl font-bold text-green-400">R$ 0,00</h2>
</div>

<!-- TOTAL POR CATEGORIA -->
<div class="bg-slate-800 p-4 rounded-xl mb-6 shadow">
<h2 class="text-xl font-bold mb-2">📂 Total por Categoria</h2>
<div id="categorias" class="grid md:grid-cols-2 gap-3"></div>
</div>

<!-- FORM -->
<div class="bg-slate-800 p-6 rounded-xl shadow space-y-4">

<input id="descricao" placeholder="Descrição"
class="w-full p-3 rounded bg-slate-900 border border-slate-700">

<input id="valor" type="number" step="0.01" placeholder="Valor"
class="w-full p-3 rounded bg-slate-900 border border-slate-700">

<input id="categoria" placeholder="Categoria"
class="w-full p-3 rounded bg-slate-900 border border-slate-700">

<input id="responsavel" placeholder="Responsável"
class="w-full p-3 rounded bg-slate-900 border border-slate-700">

<select id="origem"
class="w-full p-3 rounded bg-slate-900 border border-slate-700">
<option value="">Origem</option>
<option>Caixa do Hotel</option>
<option>Conta Bancária</option>
</select>

<select id="forma"
class="w-full p-3 rounded bg-slate-900 border border-slate-700">
<option value="">Forma de pagamento</option>
<option>Pix</option>
<option>Dinheiro</option>
<option>Cartão de Crédito</option>
<option>Cartão de Débito</option>
<option>Transferência</option>
</select>

<button onclick="salvar()"
class="w-full bg-green-500 hover:bg-green-600 p-3 rounded font-bold shadow">
💾 Registrar Gasto
</button>

<p id="msg" class="text-center"></p>

</div>

</div>

<script>
const supabase = Supabase.createClient(
'https://osofdmgokrxdzsxozsrf.supabase.co',
'sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe'
);

// 🔄 CARREGAR TOTAIS
async function carregarResumo() {

const { data, error } = await supabase
.from('gastos')
.select('*');

if (error) return console.error(error);

let total = 0;
let categorias = {};
const agora = new Date();

data.forEach(g => {
const d = new Date(g.data_hora);
const valor = parseFloat(g.valor) || 0;

// TOTAL DO MÊS
if (d.getMonth() === agora.getMonth() &&
    d.getFullYear() === agora.getFullYear()) {

total += valor;

// CATEGORIA
if (!categorias[g.categoria]) categorias[g.categoria] = 0;
categorias[g.categoria] += valor;
}
});

// Atualiza total
document.getElementById("totalMensal").innerText =
total.toLocaleString("pt-BR", { style: "currency", currency: "BRL" });

// Atualiza categorias
const catDiv = document.getElementById("categorias");
catDiv.innerHTML = "";

for (let cat in categorias) {
catDiv.innerHTML += `
<div class="bg-slate-700 p-3 rounded-lg">
<p class="text-slate-300">${cat}</p>
<p class="text-lg font-bold text-yellow-400">
R$ ${categorias[cat].toFixed(2)}
</p>
</div>`;
}
}

// 💾 SALVAR
async function salvar() {

const dados = {
descricao: descricao.value,
valor: valor.value,
categoria: categoria.value,
responsavel: responsavel.value,
origem: origem.value,
forma_pagamento: forma.value,
data_hora: new Date().toISOString()
};

// validação
if (!dados.descricao || !dados.valor || !dados.categoria ||
    !dados.responsavel || !dados.origem || !dados.forma_pagamento) {

msg.innerText = "⚠️ Preencha todos os campos!";
return;
}

const { error } = await supabase.from('gastos').insert([dados]);

if (error) {
msg.innerText = "❌ Erro ao salvar!";
console.error(error);
return;
}

msg.innerText = "✅ Salvo com sucesso!";

// limpa campos
document.querySelectorAll("input").forEach(i => i.value = "");
document.querySelectorAll("select").forEach(s => s.value = "");

// atualiza resumo
carregarResumo();
}

// carregamento inicial
carregarResumo();

</script>

</body>
</html>
