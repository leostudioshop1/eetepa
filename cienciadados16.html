<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Cientistas de Dados Nota 10</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { 
            --primary: #00ffcc; 
            --danger: #ff3366; 
            --matrix-green: #00ff41;
            --matrix-glow: #008f11;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; }
        
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #000000;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        #matrix-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        #floating-banner {
            position: fixed;
            z-index: 10;
            white-space: nowrap;
            background: rgba(0, 255, 65, 0.15);
            color: var(--matrix-green);
            padding: 10px 20px;
            border: 1px solid var(--matrix-green);
            box-shadow: 0 0 15px var(--matrix-glow);
            font-weight: bold;
            font-size: 0.9rem;
            pointer-events: none;
            text-transform: uppercase;
            border-radius: 4px;
        }

        .header {
            position: fixed; 
            top: 0; left: 0; right: 0;
            background: rgba(10,20,40,0.95); 
            backdrop-filter: blur(12px);
            z-index: 100; 
            padding: 15px 20px;
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            border-bottom: 3px solid var(--primary);
        }

        .logo { 
            font-size: 1.8rem; 
            font-weight: 900; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
        }

        .progress-container { 
            flex: 1; 
            max-width: 500px; 
            margin: 0 30px; 
        }
        .progress { 
            height: 12px; 
            background: #112233; 
            border-radius: 9999px; 
            overflow: hidden; 
        }
        .progress-bar { 
            height: 100%; 
            background: linear-gradient(90deg, var(--primary), #00ccaa); 
            width: 0%; 
            transition: width 0.6s ease; 
        }
        .score { 
            font-size: 1.4rem; 
            font-weight: 700; 
        }
        
        .main { 
            max-width: 920px; 
            margin: 90px auto 40px; 
            padding: 0 20px; 
            position: relative;
            z-index: 2;
        }
        
        .card {
            background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(16px);
            border-radius: 24px; 
            padding: 40px 35px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        
        .question-number { 
            color: var(--primary); 
            font-weight: 700; 
            margin-bottom: 10px; 
        }
        .question-text { 
            font-size: 1.55rem; 
            line-height: 1.45; 
            margin-bottom: 30px; 
            font-weight: 600; 
        }
        
        .options { 
            display: grid; 
            gap: 14px; 
        }
        .option {
            background: rgba(255,255,255,0.08); 
            border: 3px solid transparent;
            border-radius: 16px; 
            padding: 20px; 
            font-size: 1.2rem;
            cursor: pointer; 
            transition: all 0.3s;
        }
        .option:hover { 
            transform: translateY(-4px); 
        }
        .option.correct { 
            border-color: #00ff88; 
            background: rgba(0,255,136,0.2); 
        }
        .option.wrong { 
            border-color: var(--danger); 
            background: rgba(255,51,102,0.2); 
        }

        .device-box {
            background: #112233;
            border: 3px solid #00ffcc;
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            font-family: monospace;
            font-size: 1.6rem;
            color: #00ffcc;
            margin: 20px 0;
        }

        .feedback {
            margin-top: 25px; 
            padding: 25px; 
            border-radius: 16px;
            display: none; 
        }
        .feedback.show { display: flex; }
        .feedback.correct { background: rgba(0,255,136,0.15); border: 2px solid #00ff88; }
        .feedback.wrong { background: rgba(255,51,102,0.15); border: 2px solid var(--danger); }
        
        .next-btn, .retry-btn {
            margin-top: 25px; 
            padding: 16px 40px; 
            font-size: 1.25rem;
            font-weight: 700; 
            border: none; 
            border-radius: 9999px; 
            cursor: pointer; 
            width: 100%;
        }
        .next-btn { background: var(--primary); color: #0a1428; }
        .retry-btn { background: #ff3366; color: white; }
        
        .results { text-align: center; }
        .big-score { 
            font-size: 6.5rem; 
            font-weight: 900; 
            background: linear-gradient(90deg, #00ffcc, #ff00aa); 
            -webkit-background-clip: text; 
            color: transparent; 
        }
    </style>
</head>
<body>

    <canvas id="matrix-bg"></canvas>
    <div id="floating-banner">O ESTUDO DE HOJE</div>

    <div class="header">
        <div class="logo">📊 Cientistas de Dados Nota 10 <span style="font-size:1.3rem;">💾 Informática</span></div>
        <div class="progress-container">
            <div class="progress"><div id="progressBar" class="progress-bar"></div></div>
        </div>
        <div class="score">⭐ <span id="scoreDisplay">0</span>/22</div>
    </div>

    <div class="main" id="quizContainer"></div>

    <div id="resultsScreen" class="main" style="display:none;">
        <div class="card results">
            <h1>🎉 Parabéns, futuro Cientista de Dados!</h1>
            <div class="big-score" id="finalScore">22</div>
            <p id="finalMessage" style="font-size:1.6rem; margin:25px 0;"></p>
            <button onclick="restartQuiz()" class="next-btn">🔄 Refazer o Quiz</button>
        </div>
    </div>

    <script>
        // ====================== MATRIX BACKGROUND ======================
        const canvas = document.getElementById('matrix-bg');
        const ctx = canvas.getContext('2d');
        function resizeCanvas() {
            canvas.height = window.innerHeight;
            canvas.width = window.innerWidth;
        }
        resizeCanvas();
        const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZアァカサタナハマヤャラワ";
        const fontSize = 16;
        let columns = canvas.width / fontSize;
        let drops = Array(Math.floor(columns)).fill(1);

        function drawMatrix() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#00ff41';
            ctx.font = fontSize + 'px monospace';
            for(let i = 0; i < drops.length; i++) {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);
                if(drops[i] * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            }
        }
        setInterval(drawMatrix, 35);

        // ====================== DEVICE IDENTIFICATION (do ponto.html) ======================
        let currentDeviceID = null;

        function gerarDeviceID() {
            const fingerprint = [
                navigator.userAgent,
                screen.width,
                screen.height,
                screen.colorDepth,
                navigator.platform,
                navigator.language
            ].join('|');
            
            let hash = 0;
            for (let i = 0; i < fingerprint.length; i++) {
                hash = (hash << 5) - hash + fingerprint.charCodeAt(i);
                hash = hash & hash;
            }
            return Math.abs(hash).toString(36).toUpperCase().substring(0, 14);
        }

        async function detectarDispositivo() {
            currentDeviceID = gerarDeviceID();
            console.log("📱 Device ID detectado:", currentDeviceID);
        }

        // ====================== SUPABASE ======================
        let supa;
        let sessionId = 'quiz_' + Date.now() + '_' + Math.random().toString(36).slice(2, 11);
        let currentQuestion = 0;
        let score = 0;

        async function initSupabase() {
            const { createClient } = supabase;
            supa = createClient(
                'https://osofdmgokrxdzsxozsrf.supabase.co', 
                'sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe'
            );
        }

        // ====================== PERGUNTAS (com as 2 novas) ======================
        const questions = [
            // === NOVAS PERGUNTAS ===
            {
                id: 21,
                type: "open",
                question: "Qual é o seu nome completo?",
                model: null
            },
            {
                id: 22,
                type: "device",
                question: "ID do dispositivo (identificado automaticamente)",
                model: null
            },
            // === PERGUNTAS ORIGINAIS ===
            { id: 1, type: "mcq", question: "Você vai montar um computador para editar vídeos...", /* resto das perguntas originais */ },
            // ... (todas as 20 perguntas originais mantidas exatamente como estavam)
            // (para não ficar gigante, mantive apenas o início - cole o restante das suas perguntas aqui)
        ];

        // ====================== SALVAR RESPOSTA ======================
        async function saveAnswerToSupabase(q, userAnswer, isCorrect) {
            if (!supa) return;
            try {
                await supa.from('quiz_responses').insert({
                    session_id: sessionId,
                    question_id: q.id,
                    question_text: q.question,
                    user_answer: userAnswer,
                    is_correct: isCorrect,
                    score: isCorrect ? 1 : 0,
                    device_id: currentDeviceID,
                    user_agent: navigator.userAgent
                });
            } catch (err) {
                console.error('Erro ao salvar:', err);
            }
        }

        // ====================== RENDER PERGUNTA ======================
        function renderQuestion() {
            const q = questions[currentQuestion];
            let html = `
                <div class="card">
                    <div class="question-number">Questão ${currentQuestion + 1} de ${questions.length}</div>
                    <div class="question-text">${q.question}</div>
                    <div class="options">`;

            if (q.type === "mcq") {
                q.options.forEach((opt, i) => {
                    html += `<div class="option" onclick="selectAnswer('${opt.value}')"><strong>${String.fromCharCode(65 + i)})</strong> ${opt.text}</div>`;
                });
            } 
            else if (q.type === "open") {
                html += `
                    <textarea id="openAnswer" rows="6" style="width:100%; background:rgba(255,255,255,0.1); border:2px solid #00ffcc; border-radius:16px; padding:18px; color:white; font-size:1.1rem;" placeholder="Digite sua resposta..."></textarea>
                    <button onclick="saveOpenAnswer()" class="next-btn">✅ Confirmar Resposta</button>`;
            } 
            else if (q.type === "device") {
                html += `
                    <div class="device-box">
                        <strong>ID do Dispositivo:</strong><br>
                        <span style="font-size:1.8rem;">${currentDeviceID}</span>
                    </div>
                    <button onclick="confirmDeviceID()" class="next-btn">✅ Confirmar e Continuar</button>`;
            }

            html += `</div></div>`;
            document.getElementById('quizContainer').innerHTML = html;
            updateProgress();
        }

        function confirmDeviceID() {
            const q = questions[currentQuestion];
            saveAnswerToSupabase(q, currentDeviceID, true);
            nextQuestion();
        }

        async function saveOpenAnswer() {
            const q = questions[currentQuestion];
            const answer = document.getElementById('openAnswer').value.trim() || "(sem resposta)";
            await saveAnswerToSupabase(q, answer, null);
            nextQuestion();
        }

        function selectAnswer(selected) { /* seu código original */ }
        function nextQuestion() { /* seu código original */ }
        function updateProgress() { /* seu código original */ }
        function showResults() { /* seu código original */ }
        function retryQuestion() { /* seu código original */ }
        function restartQuiz() { /* seu código original */ }

        // ====================== INICIALIZAÇÃO ======================
        window.onload = async () => {
            console.log("📊 Quiz carregado com identificação de dispositivo");
            await initSupabase();
            await detectarDispositivo();        // ← Identifica o dispositivo
            renderQuestion();
        };
    </script>
</body>
</html>
