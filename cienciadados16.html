<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Cientistas de Dados Nota 10</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --primary: #00ffcc; --danger: #ff3366; --matrix-green: #00ff41; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #000000; color: #fff; min-height: 100vh; }
        #matrix-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; }
        #floating-banner { position: fixed; z-index: 10; background: rgba(0,255,65,0.15); color: var(--matrix-green); padding: 10px 20px; border: 1px solid var(--matrix-green); font-weight: bold; }
        .header { position: fixed; top: 0; left: 0; right: 0; background: rgba(10,20,40,0.95); z-index: 100; padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; }
        .logo { font-size: 1.8rem; font-weight: 900; }
        .main { max-width: 920px; margin: 90px auto 40px; padding: 0 20px; }
        .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(16px); border-radius: 24px; padding: 40px 35px; }
        .question-text { font-size: 1.55rem; margin-bottom: 30px; }
        .device-box { background: #112233; border: 3px solid #00ffcc; border-radius: 16px; padding: 25px; text-align: center; font-size: 1.8rem; color: #00ffcc; margin: 20px 0; }
        .next-btn { margin-top: 25px; padding: 16px 40px; font-size: 1.25rem; font-weight: 700; border: none; border-radius: 9999px; background: var(--primary); color: #0a1428; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

<canvas id="matrix-bg"></canvas>
<div id="floating-banner">O ESTUDO DE HOJE</div>

<div class="header">
    <div class="logo">📊 Cientistas de Dados Nota 10</div>
    <div class="score">⭐ <span id="scoreDisplay">0</span>/22</div>
</div>

<div class="main" id="quizContainer"></div>

<div id="resultsScreen" class="main" style="display:none;">
    <div class="card">
        <h1>🎉 Fim do Quiz!</h1>
        <div style="font-size:6rem; font-weight:900;" id="finalScore">22</div>
        <button onclick="restartQuiz()" class="next-btn">Refazer Quiz</button>
    </div>
</div>

<script>
// ====================== MATRIX + DEVICE ID ======================
const canvas = document.getElementById('matrix-bg');
const ctx = canvas.getContext('2d');
function resizeCanvas(){ canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
setInterval(() => {
    ctx.fillStyle = 'rgba(0,0,0,0.05)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#00ff41';
    ctx.font = '16px monospace';
    // Matrix draw logic (simplificado)
}, 35);

let currentDeviceID = null;
function gerarDeviceID() {
    const fp = [navigator.userAgent, screen.width, screen.height, screen.colorDepth, navigator.platform, navigator.language].join('|');
    let hash = 0;
    for (let i = 0; i < fp.length; i++) hash = (hash << 5) - hash + fp.charCodeAt(i);
    return Math.abs(hash).toString(36).toUpperCase().substring(0, 14);
}

// ====================== SUPABASE ======================
const supabaseClient = supabase.createClient(
    'https://osofdmgokrxdzsxozsrf.supabase.co',
    'sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe'
);

let sessionId = 'quiz_' + Date.now();
let currentQuestion = 0;
let score = 0;
let userName = "";

// ====================== PERGUNTAS ======================
const questions = [
    { id: 21, type: "open", question: "Qual é o seu nome completo?", model: null },
    { id: 22, type: "device", question: "ID do dispositivo (detectado automaticamente)", model: null },
    // ... (insira aqui as 20 perguntas originais do seu quiz)
    // Para brevidade, deixei apenas as novas. Cole as restantes no mesmo formato.
];

// ====================== FUNÇÕES PRINCIPAIS ======================
async function detectarDispositivo() {
    currentDeviceID = gerarDeviceID();
}

function renderQuestion() {
    const q = questions[currentQuestion];
    let html = `<div class="card"><div class="question-text">${q.question}</div><div class="options">`;

    if (q.type === "mcq") {
        // seu código de múltipla escolha
    } else if (q.type === "open") {
        html += `<textarea id="openAnswer" rows="6" style="width:100%;padding:15px;background:#112233;color:white;border:2px solid #00ffcc;border-radius:12px;" placeholder="Digite sua resposta..."></textarea>
                 <button onclick="saveOpenAnswer()" class="next-btn">✅ Confirmar e Avançar</button>`;
    } else if (q.type === "device") {
        html += `<div class="device-box">${currentDeviceID}</div>
                 <button onclick="confirmDeviceID()" class="next-btn">✅ Confirmar e Avançar</button>`;
    }

    html += `</div></div>`;
    document.getElementById('quizContainer').innerHTML = html;
}

async function saveOpenAnswer() {
    const answer = document.getElementById('openAnswer').value.trim();
    if (questions[currentQuestion].id === 21) userName = answer;

    await saveAnswerToSupabase(questions[currentQuestion], answer);
    nextQuestion();
}

async function confirmDeviceID() {
    await saveAnswerToSupabase(questions[currentQuestion], currentDeviceID);
    nextQuestion();
}

async function saveAnswerToSupabase(q, userAnswer) {
    try {
        await supabaseClient.from('quiz_responses').insert({
            session_id: sessionId,
            question_id: q.id,
            question_text: q.question,
            user_name: userName,
            device_id: currentDeviceID,
            user_answer: userAnswer
        });
    } catch(e) { console.error(e); }
}

function nextQuestion() {
    currentQuestion++;
    if (currentQuestion < questions.length) {
        renderQuestion();
    } else {
        document.getElementById('quizContainer').style.display = 'none';
        document.getElementById('resultsScreen').style.display = 'block';
    }
}

// ====================== INICIALIZAÇÃO ======================
window.onload = async () => {
    await detectarDispositivo();
    renderQuestion();
};
</script>
</body>
</html>
