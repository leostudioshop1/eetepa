<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 Cientistas de Dados Nota 10</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root { --primary: #00ffcc; --danger: #ff3366; --matrix: #00ff41; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #050505;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }
        #matrix-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            opacity: 0.12;
            pointer-events: none;
        }
        #floating-banner {
            position: fixed;
            z-index: 20;
            white-space: nowrap;
            background: rgba(0,255,65,0.12);
            color: var(--matrix);
            padding: 10px 25px;
            border: 1px solid var(--matrix);
            font-weight: bold;
            font-size: 1rem;
            border-radius: 6px;
            box-shadow: 0 0 15px rgba(0,255,65,0.3);
            pointer-events: none;
        }
        .header {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(10,15,30,0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 3px solid var(--primary);
        }
        .logo { font-size: 1.7rem; font-weight: 900; }
        .main { max-width: 920px; margin: 90px auto 40px; padding: 0 15px; position: relative; z-index: 2; }
        .card {
            background: rgba(255,255,255,0.09);
            backdrop-filter: blur(12px);
            border-radius: 20px;
            padding: 35px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }
        .question-number { color: var(--primary); font-weight: bold; margin-bottom: 10px; }
        .question-text { font-size: 1.45rem; line-height: 1.45; margin-bottom: 30px; }
        .device-box {
            background: #112233;
            border: 3px solid #00ffcc;
            border-radius: 16px;
            padding: 25px;
            text-align: center;
            font-family: monospace;
            font-size: 1.7rem;
            color: #00ffcc;
            margin: 20px 0;
        }
        .options { display: grid; gap: 12px; }
        .option {
            background: rgba(255,255,255,0.1);
            border: 2px solid transparent;
            border-radius: 12px;
            padding: 18px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .option:hover { transform: translateY(-4px); border-color: var(--primary); }
        .next-btn {
            margin-top: 25px;
            padding: 16px 40px;
            font-size: 1.25rem;
            font-weight: 700;
            border: none;
            border-radius: 50px;
            background: var(--primary);
            color: #000;
            width: 100%;
            cursor: pointer;
        }
        @media (max-width: 600px) {
            .question-text { font-size: 1.25rem; }
            .option { font-size: 1rem; padding: 15px; }
        }
    </style>
</head>
<body>

<canvas id="matrix-bg"></canvas>
<div id="floating-banner">O ESTUDO DE HOJE</div>

<div class="header">
    <div class="logo">📊 Cientistas de Dados Nota 10</div>
    <div>⭐ <span id="scoreDisplay">0</span>/22</div>
</div>

<div class="main" id="quizContainer"></div>

<div id="resultsScreen" class="main" style="display:none;">
    <div class="card">
        <h1 style="text-align:center;">🎉 Quiz Finalizado!</h1>
        <div style="font-size:5rem; text-align:center; font-weight:900; margin:20px 0;" id="finalScore">22</div>
        <button onclick="restartQuiz()" class="next-btn">🔄 Refazer o Quiz</button>
    </div>
</div>

<script>
// ====================== MATRIX + BANNER FLUTUANTE ======================
const canvas = document.getElementById('matrix-bg');
const ctx = canvas.getContext('2d');
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

const chars = "0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZアィゥェォ";
setInterval(() => {
    ctx.fillStyle = 'rgba(5,5,5,0.08)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#00ff41';
    ctx.font = '14px monospace';
    // Matrix draw (simplificado)
}, 45);

// Banner flutuante
const banner = document.getElementById('floating-banner');
const frases = ["O estudo de hoje", "É a vitória de amanhã", "Quanto mais você estuda, mais sorte você tem", "Estudar não é castigo", "É o caminho para conquistar seus sonhos"];
let fraseIndex = 0;
let posX = 100, posY = 100, velX = 1.2, velY = 1.1;

function moveBanner() {
    const w = window.innerWidth, h = window.innerHeight;
    posX += velX; posY += velY;
    if (posX < 0 || posX > w - 300) velX *= -1;
    if (posY < 0 || posY > h - 60) velY *= -1;
    banner.style.transform = `translate(${posX}px, ${posY}px)`;
    requestAnimationFrame(moveBanner);
}
moveBanner();

// ====================== DEVICE ID ======================
let currentDeviceID = null;
function gerarDeviceID() {
    const fp = [navigator.userAgent, screen.width, screen.height, screen.colorDepth, navigator.platform, navigator.language].join('|');
    let hash = 0;
    for (let i = 0; i < fp.length; i++) hash = (hash << 5) - hash + fp.charCodeAt(i);
    return Math.abs(hash).toString(36).toUpperCase().substring(0,14);
}

// ====================== SUPABASE ======================
const supabaseClient = supabase.createClient(
    'https://osofdmgokrxdzsxozsrf.supabase.co',
    'sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe'
);

let sessionId = 'quiz_' + Date.now();
let currentQuestion = 0;
let score = 0;
let userName = "";

// ====================== 22 PERGUNTAS ======================
const questions = [
    { id: 21, type: "open", question: "Qual é o seu nome completo?", model: null },
    { id: 22, type: "device", question: "ID do Dispositivo (detectado automaticamente)", model: null },

    { id: 1, type: "mcq", question: "Você vai montar um computador para editar vídeos. Quer algo rápido, silencioso, que não quebre fácil e gaste pouca energia. Qual é a melhor opção de armazenamento?", options: [{ text: "HD antigo (com disco que gira)", value: "A" }, { text: "SSD SATA", value: "B" }, { text: "Pendrive simples", value: "C" }, { text: "Disquete", value: "D" }, { text: "Qualquer HD", value: "E" }], correct: "B", explanation: "O SSD é rápido, não faz barulho, não tem partes que se mexem e gasta menos energia." },
    { id: 2, type: "mcq", question: "Um notebook tem duas opções: 1 TB girando a 5400 RPM ou 512 GB bem mais rápido. O de 512 GB provavelmente é:", options: [{ text: "HD tradicional", value: "A" }, { text: "Pendrive", value: "B" }, { text: "HD antigo", value: "C" }, { text: "SSD", value: "D" }, { text: "Fita magnética", value: "E" }], correct: "D", explanation: "O SSD é muito mais rápido que o HD porque não tem peças mecânicas girando." },
    { id: 3, type: "mcq", question: "Como o computador organiza pastas, arquivos e permissões no disco chamamos de:", options: [{ text: "Sistema de arquivos", value: "A" }, { text: "Big Data", value: "B" }, { text: "Velocidade da internet", value: "C" }, { text: "Programa de navegação", value: "D" }, { text: "Memória RAM", value: "E" }], correct: "A", explanation: "Exemplos: NTFS, exFAT." },
    { id: 4, type: "mcq", question: "Um arquivo de 4,7 GB tem quantos MB? (1 GB = 1024 MB)", options: [{ text: "4.000 MB", value: "A" }, { text: "4.812 MB", value: "B" }, { text: "1.024 MB", value: "C" }, { text: "480 MB", value: "D" }, { text: "4 MB", value: "E" }], correct: "B", explanation: "4,7 × 1024 = 4.812 MB." },
    { id: 5, type: "mcq", question: "Um HD de 2 TB formatado tem aproximadamente quantos MB?", options: [{ text: "300 MB", value: "A" }, { text: "48.000 MB", value: "B" }, { text: "2.097.152 MB", value: "C" }, { text: "224 milhões de MB", value: "D" }, { text: "9.024 MB", value: "E" }], correct: "C", explanation: "2 × 1024 × 1024 = 2.097.152 MB." },
    { id: 6, type: "mcq", question: "Qual é a menor unidade de informação que o computador entende (0 ou 1)?", options: [{ text: "Byte", value: "A" }, { text: "Megabyte", value: "B" }, { text: "Bit", value: "C" }, { text: "Gigabyte", value: "D" }, { text: "Terabyte", value: "E" }], correct: "C", explanation: "O bit é a menor unidade." },
    { id: 7, type: "mcq", question: "Quando temos milhões de informações que não cabem em planilhas comuns, chamamos de:", options: [{ text: "Sistema de arquivos", value: "A" }, { text: "Big Data", value: "B" }, { text: "SSD pequeno", value: "C" }, { text: "Bit", value: "D" }, { text: "HD para backup", value: "E" }], correct: "B", explanation: "Big Data são grandes volumes de dados." },
    { id: 8, type: "mcq", question: "Um HD externo antigo usa um cabo largo com 40 pinos. Qual é essa conexão antiga?", options: [{ text: "SATA", value: "A" }, { text: "ATA ou IDE", value: "B" }, { text: "USB 3.0", value: "C" }, { text: "PCIe", value: "D" }, { text: "HDMI", value: "E" }], correct: "B", explanation: "ATA/IDE é a conexão antiga." },
    { id: 9, type: "mcq", question: "Qual é a principal vantagem do SSD em relação ao HD tradicional?", options: [{ text: "É mais barato", value: "A" }, { text: "É muito mais rápido e silencioso", value: "B" }, { text: "Tem mais capacidade sempre", value: "C" }, { text: "Precisa de mais energia", value: "D" }, { text: "É mais pesado", value: "E" }], correct: "B", explanation: "O SSD não tem peças girando." },
    { id: 10, type: "mcq", question: "O que significa a sigla HD?", options: [{ text: "High Definition", value: "A" }, { text: "Hard Disk (Disco Rígido)", value: "B" }, { text: "High Data", value: "C" }, { text: "Hard Drive antigo", value: "D" }, { text: "Hyper Disk", value: "E" }], correct: "B", explanation: "HD = Hard Disk." },
    { id: 11, type: "mcq", question: "Qual unidade de medida é a menor?", options: [{ text: "Byte", value: "A" }, { text: "Kilobyte", value: "B" }, { text: "Bit", value: "C" }, { text: "Megabyte", value: "D" }, { text: "Gigabyte", value: "E" }], correct: "C", explanation: "Bit é a menor unidade." },
    { id: 12, type: "mcq", question: "Quantos bytes tem 1 Kilobyte (KB)?", options: [{ text: "100 bytes", value: "A" }, { text: "1.000 bytes", value: "B" }, { text: "1.024 bytes", value: "C" }, { text: "1.048.576 bytes", value: "D" }, { text: "8 bytes", value: "E" }], correct: "C", explanation: "1 KB = 1.024 bytes." },
    { id: 13, type: "mcq", question: "Um arquivo de música de 5 MB é aproximadamente:", options: [{ text: "5 milhões de bytes", value: "A" }, { text: "5 mil bytes", value: "B" }, { text: "5 bilhões de bytes", value: "C" }, { text: "5 bits", value: "D" }, { text: "500 bytes", value: "E" }], correct: "A", explanation: "1 MB ≈ 1 milhão de bytes." },
    { id: 14, type: "mcq", question: "Para guardar fotos, vídeos e documentos do dia a dia de uma família, qual armazenamento é mais usado hoje?", options: [{ text: "Disquete", value: "A" }, { text: "SSD ou HD interno", value: "B" }, { text: "Fita cassete", value: "C" }, { text: "Papel impresso", value: "D" }, { text: "Pendrive de 128 KB", value: "E" }], correct: "B", explanation: "Hoje usamos HD ou SSD interno." },
    { id: 15, type: "mcq", question: "O que é Big Data de forma simples?", options: [{ text: "Um computador muito grande", value: "A" }, { text: "Uma quantidade enorme de dados que precisamos analisar", value: "B" }, { text: "Um tipo de HD", value: "C" }, { text: "Um jogo online", value: "D" }, { text: "Um cabo de internet", value: "E" }], correct: "B", explanation: "Big Data são grandes volumes de dados." },
    { id: 16, type: "mcq", question: "Qual é a ordem correta das unidades do menor para o maior?", options: [{ text: "Bit → Byte → KB → MB → GB → TB", value: "A" }, { text: "TB → GB → MB → KB → Byte → Bit", value: "B" }, { text: "Byte → Bit → MB → GB", value: "C" }, { text: "MB → KB → GB → TB", value: "D" }, { text: "Bit → MB → Byte → TB", value: "E" }], correct: "A", explanation: "Bit (menor) → Byte → KB → MB → GB → TB." },
    { id: 17, type: "open", question: "Cite pelo menos 2 vantagens do SSD em comparação com o HD tradicional.", model: "1) Muito mais rápido\n2) Não faz barulho e aguenta quedas melhor" },
    { id: 18, type: "open", question: "Explique com suas palavras o que é um 'bit' e o que é um 'byte'.", model: "Bit é a menor unidade (0 ou 1). Byte é formado por 8 bits." },
    { id: 19, type: "mcq", question: "Um pendrive de 64 GB consegue armazenar aproximadamente quantos filmes de 4 GB cada?", options: [{ text: "Cerca de 16 filmes", value: "A" }, { text: "Cerca de 4 filmes", value: "B" }, { text: "Mais de 100 filmes", value: "C" }, { text: "Apenas 1 filme", value: "D" }, { text: "64 filmes", value: "E" }], correct: "A", explanation: "64 ÷ 4 = 16 filmes." },
    { id: 20, type: "open", question: "Cite 3 exemplos de coisas que ocupam pouco espaço (KB ou MB) e 1 exemplo que ocupa muito espaço (GB ou TB).", model: "Pouco: foto, texto, música curta. Muito: filme em 4K, jogo grande." }
];

// ====================== FUNÇÕES DO QUIZ ======================
function renderQuestion() {
    const q = questions[currentQuestion];
    let html = `<div class="card"><div class="question-number">Questão ${currentQuestion + 1} de ${questions.length}</div><div class="question-text">${q.question}</div>`;

    if (q.type === "device") {
        html += `<div class="device-box">${currentDeviceID}</div><button onclick="confirmDeviceID()" class="next-btn">✅ Confirmar e Continuar</button>`;
    } else if (q.type === "open") {
        html += `<textarea id="openAnswer" rows="6" style="width:100%; padding:15px; background:#112233; color:white; border:2px solid #00ffcc; border-radius:12px;"></textarea><button onclick="saveOpenAnswer()" class="next-btn">✅ Confirmar e Avançar</button>`;
    } else {
        html += `<div class="options">`;
        q.options.forEach((opt,i) => {
            html += `<div class="option" onclick="selectAnswer('${opt.value}')">${String.fromCharCode(65+i)}) ${opt.text}</div>`;
        });
        html += `</div>`;
    }
    html += `</div>`;
    document.getElementById('quizContainer').innerHTML = html;
}

async function saveOpenAnswer() {
    const answer = document.getElementById('openAnswer').value.trim() || "(sem resposta)";
    if (questions[currentQuestion].id === 21) userName = answer;
    await saveAnswerToSupabase(questions[currentQuestion], answer);
    nextQuestion();
}

async function confirmDeviceID() {
    await saveAnswerToSupabase(questions[currentQuestion], currentDeviceID);
    nextQuestion();
}

async function saveAnswerToSupabase(q, answer) {
    try {
        await supabaseClient.from('quiz_responses').insert({
            session_id: sessionId,
            question_id: q.id,
            user_name: userName,
            device_id: currentDeviceID,
            user_answer: answer
        });
    } catch(e) {}
}

function selectAnswer() { nextQuestion(); }

function nextQuestion() {
    currentQuestion++;
    if (currentQuestion < questions.length) renderQuestion();
    else {
        document.getElementById('quizContainer').style.display = 'none';
        document.getElementById('resultsScreen').style.display = 'block';
    }
}

function restartQuiz() {
    currentQuestion = 0;
    score = 0;
    document.getElementById('quizContainer').style.display = 'block';
    document.getElementById('resultsScreen').style.display = 'none';
    renderQuestion();
}

// ====================== INICIALIZAÇÃO ======================
window.onload = async () => {
    currentDeviceID = gerarDeviceID();
    renderQuestion();
};
</script>
</body>
</html>
