<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Montador de Horários Escolar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>
    .horario-cell { transition: all 0.2s; }
    .horario-cell:hover { transform: scale(1.02); z-index: 10; }
    .professor-tag { font-size: 0.75rem; padding: 2px 8px; border-radius: 9999px; }
  </style>
</head>
<body class="bg-gray-50 font-sans">
  <div class="flex h-screen">
    <!-- Sidebar e todo o HTML anterior (mantido igual) -->
    <div class="w-96 bg-white shadow-xl overflow-y-auto">
      <div class="p-6 border-b">
        <h1 class="text-2xl font-bold text-indigo-700 flex items-center gap-2">
          <i class="fas fa-calendar-alt"></i> Montador de Horários
        </h1>
      </div>
      <!-- ... resto do HTML da sidebar, tabs, modal etc. (mantido) ... -->
    </div>

    <!-- Área Principal (mantida) -->
    <div class="flex-1 flex flex-col">
      <!-- ... conteúdo principal ... -->
    </div>
  </div>

  <!-- Modal (mantido) -->
  <div id="modal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
    <!-- ... modal ... -->
  </div>

  <script>
    // Configuração Supabase (igual ao seu exemplo)
    const supabaseClient = supabase.createClient(
      window.SUPABASE_CONFIG.url,
      window.SUPABASE_CONFIG.key
    );

    let turmas = [];
    let disciplinasGerais = [];
    let professores = [];
    let gradesPorTurma = {};

    const horariosPorTurno = {
      manha: ["07:00 - 07:45", "07:45 - 08:30", "08:30 - 09:15", "09:30 - 10:15", "10:15 - 11:00", "11:00 - 11:45"],
      tarde: ["13:00 - 13:35", "13:35 - 14:10", "14:10 - 14:45", "15:00 - 15:35", "15:35 - 16:10", "16:10 - 16:45"],
      noite: ["19:00 - 19:35", "19:35 - 20:10", "20:10 - 20:45", "21:00 - 21:35", "21:35 - 22:10", "22:10 - 22:45"]
    };

    const diasSemana = ["segunda", "terca", "quarta", "quinta", "sexta"];
    let currentCellId = null;

    // ==================== CARREGAR DADOS ====================
    async function carregarDados() {
      try {
        // Disciplinas
        const { data: discs } = await supabaseClient.from('disciplinas').select('*');
        disciplinasGerais = discs ? discs.map(d => d.nome) : [];

        // Turmas
        const { data: tms } = await supabaseClient.from('turmas').select('*');
        turmas = tms || [];

        // Professores
        const { data: profs } = await supabaseClient.from('professores').select('*');
        professores = profs || [];

        renderAll();
      } catch (error) {
        console.error(error);
        alert("Erro ao carregar dados do Supabase: " + error.message);
      }
    }

    function renderAll() {
      renderTurmas();
      renderDisciplinasGerais();
      renderDisciplinasProfessor();
      renderDisciplinasTurma();
      renderProfessores();
      renderLegenda();
      updateFiltroTurma();
      showTab(0);
    }

    // ==================== CADASTROS ====================
    async function addTurma() {
      const nome = document.getElementById("nova-turma").value.trim();
      if (!nome) return;

      const turno = document.getElementById("turno-turma").value;

      const { error } = await supabaseClient.from('turmas').insert({ nome, turno });
      if (error) alert("Erro: " + error.message);
      else {
        document.getElementById("nova-turma").value = "";
        await carregarDados();
      }
    }

    async function addDisciplina() {
      const nome = document.getElementById("nova-disciplina").value.trim();
      if (!nome) return;

      const { error } = await supabaseClient.from('disciplinas').insert({ nome });
      if (error) alert("Erro: " + error.message);
      else {
        document.getElementById("nova-disciplina").value = "";
        await carregarDados();
      }
    }

    async function addProfessor() {
      const nome = document.getElementById("nome-professor").value.trim();
      const cor = document.getElementById("cor-professor").value;
      if (!nome) return;

      const { error } = await supabaseClient.from('professores').insert({ nome, cor });
      if (error) alert("Erro: " + error.message);
      else {
        document.getElementById("nome-professor").value = "";
        await carregarDados();
      }
    }

    // ==================== RENDERIZAÇÕES (mantidas) ====================
    function renderDisciplinasTurma() {
      const container = document.getElementById("disciplinas-turma");
      container.innerHTML = disciplinasGerais.map(d => `
        <label class="flex items-center gap-2 bg-gray-50 p-2 rounded-lg cursor-pointer hover:bg-gray-100">
          <input type="checkbox" value="${d}" class="w-4 h-4">
          <span>${d}</span>
        </label>
      `).join("");
    }

    function renderTurmas() {
      const ul = document.getElementById("lista-turmas");
      ul.innerHTML = turmas.map(t => `
        <li class="bg-gray-50 p-4 rounded-xl">
          <div class="flex justify-between">
            <div>
              <strong>${t.nome}</strong>
              <span class="ml-2 text-xs px-2 py-1 bg-indigo-100 text-indigo-700 rounded-full">${t.turno}</span>
            </div>
          </div>
        </li>
      `).join("");
    }

    // ... (adicione as demais funções de render, modal, salvarAlocacao etc. conforme necessário)

    // Inicialização
    window.onload = () => {
      carregarDados();
      renderDiasDisponiveis();
      renderHorariosDisponiveis();
    };
  </script>
</body>
</html>
