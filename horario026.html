<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Montador de Horários Escolar</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>
    .horario-cell { transition: all 0.2s; }
    .horario-cell:hover { transform: scale(1.02); z-index: 10; }
    .professor-tag { font-size: 0.75rem; padding: 2px 8px; border-radius: 9999px; }
  </style>
</head>
<body class="bg-gray-50 font-sans">
  <!-- HTML completo (mesmo de antes) -->
  <div class="flex h-screen">
    <!-- Sidebar -->
    <div class="w-96 bg-white shadow-xl overflow-y-auto">
      <!-- ... (todo o sidebar mantido) ... -->
      <div id="tab-2" class="tab-content p-6 hidden">
        <div class="space-y-5">
          <input id="nome-professor" type="text" placeholder="Nome do Professor" class="w-full border rounded-lg px-4 py-2">
          <div>
            <label class="block text-sm font-medium mb-1">Cor</label>
            <input id="cor-professor" type="color" value="#4f46e5" class="w-full h-10 border rounded-lg p-1">
          </div>
          <div>
            <label class="block text-sm font-medium mb-2">Disciplinas que leciona</label>
            <div id="disciplinas-professor" class="grid grid-cols-2 gap-2 text-sm max-h-60 overflow-y-auto"></div>
          </div>
          <div>
            <label class="block text-sm font-medium mb-2">Dias disponíveis</label>
            <div id="dias-disponiveis" class="grid grid-cols-5 gap-3 text-center"></div>
          </div>
          <div>
            <label class="block text-sm font-medium mb-2">Horários disponíveis</label>
            <div id="horarios-disponiveis" class="grid grid-cols-2 gap-2 text-sm max-h-80 overflow-y-auto"></div>
          </div>
          <button onclick="addProfessor()" class="w-full bg-emerald-600 text-white py-3 rounded-lg hover:bg-emerald-700 font-medium">
            Adicionar Professor
          </button>
        </div>
        <ul id="lista-professores" class="mt-8 space-y-3"></ul>
      </div>
    </div>

    <!-- Área Principal -->
    <div class="flex-1 flex flex-col">
      <div class="bg-white border-b px-6 py-4 flex items-center justify-between">
        <select id="filtro-turma" onchange="renderGrade()" class="border rounded-lg px-4 py-2"></select>
        <!-- botões -->
      </div>
      <div class="flex-1 overflow-auto p-6" id="grade-container">
        <table id="grade-horarios" class="w-full border-collapse bg-white shadow-lg rounded-xl overflow-hidden">
          <thead>
            <tr class="bg-gray-100">
              <th class="border p-3 w-36">Horário</th>
              <th class="border p-3">Segunda</th>
              <th class="border p-3">Terça</th>
              <th class="border p-3">Quarta</th>
              <th class="border p-3">Quinta</th>
              <th class="border p-3">Sexta</th>
            </tr>
          </thead>
          <tbody id="corpo-grade"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal (mantido) -->
  <!-- ... -->

  <script>
    const supabaseClient = supabase.createClient(
      window.SUPABASE_CONFIG.url,
      window.SUPABASE_CONFIG.key
    );

    let turmas = [];
    let disciplinasGerais = [];
    let professores = [];

    const horariosPorTurno = { /* ... mesmo ... */ };
    const diasSemana = ["segunda", "terca", "quarta", "quinta", "sexta"];
    let currentCellId = null;

    async function carregarDados() {
      try {
        const { data: discs } = await supabaseClient.from('disciplinas').select('*');
        disciplinasGerais = discs ? discs.map(d => d.nome) : [];

        const { data: tms } = await supabaseClient.from('turmas').select('*');
        turmas = tms || [];

        const { data: profs } = await supabaseClient.from('professores').select('*');
        professores = profs || [];

        renderAll();
      } catch (e) {
        console.error(e);
      }
    }

    function renderAll() {
      renderTurmas();
      renderDisciplinasGerais();
      renderDisciplinasProfessor();
      renderDisciplinasTurma();
      renderProfessores();
      renderLegenda();
      renderDiasDisponiveis();
      renderHorariosDisponiveis();
      updateFiltroTurma();
      showTab(0);
    }

    function renderDiasDisponiveis() {
      const container = document.getElementById("dias-disponiveis");
      container.innerHTML = diasSemana.map(d => `
        <label class="cursor-pointer">
          <input type="checkbox" value="${d}" checked class="hidden peer">
          <div class="peer-checked:bg-indigo-600 peer-checked:text-white text-xs py-2 px-3 rounded-lg border text-center">${d.substring(0,3).toUpperCase()}</div>
        </label>
      `).join("");
    }

    function renderHorariosDisponiveis() {
      const container = document.getElementById("horarios-disponiveis");
      const horariosFixos = Object.values(horariosPorTurno).flat();
      container.innerHTML = horariosFixos.map(h => `
        <label class="flex items-center gap-2 bg-gray-50 p-2 rounded-lg cursor-pointer hover:bg-gray-100">
          <input type="checkbox" value="${h}" checked class="w-4 h-4"><span class="text-sm">${h}</span>
        </label>
      `).join("");
    }

    // Funções de cadastro e render (mantidas)
    // ... 

    window.onload = carregarDados;
  </script>
</body>
</html>
