<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APURAÇÃO ELEITORAL 2026 • TSE</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Roboto+Mono:wght@300;400;500;600&display=swap');

        :root {
            --matrix-green: #00ff41;
            --matrix-dark: #0a0f0a;
            --neon-glow: 0 0 20px rgba(0, 255, 65, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #050705;
            color: var(--matrix-green);
            font-family: 'Roboto Mono', monospace;
            background-image: 
                linear-gradient(rgba(0, 255, 65, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 65, 0.025) 1px, transparent 1px);
            background-size: 60px 60px;
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(transparent 0px, transparent 3px, rgba(0, 255, 65, 0.012) 3px, rgba(0, 255, 65, 0.012) 6px);
            pointer-events: none;
            z-index: -1;
            animation: matrix-rain 30s linear infinite;
        }

        @keyframes matrix-rain { 0% { background-position: 0 0; } 100% { background-position: 0 1500px; } }

        .topo {
            background: linear-gradient(to bottom, #0a0f0a, #111827);
            border-bottom: 4px solid var(--matrix-green);
            padding: 20px;
            text-align: center;
            box-shadow: var(--neon-glow);
        }

        .topo h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.4rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-shadow: 0 0 25px var(--matrix-green);
        }

        .relogio {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.9rem;
            margin-top: 10px;
            color: #00ff88;
        }

        .container {
            max-width: 1450px;
            margin: 30px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 25px;
        }

        .painel {
            background: rgba(15, 23, 42, 0.96);
            border: 1px solid rgba(0, 255, 65, 0.35);
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 0 35px rgba(0, 255, 65, 0.18);
            backdrop-filter: blur(12px);
        }

        h3 {
            font-family: 'Orbitron', sans-serif;
            margin-bottom: 22px;
            font-size: 1.45rem;
            text-shadow: 0 0 12px var(--matrix-green);
        }

        .tabs {
            display: flex;
            background: #0a140a;
            border-radius: 12px;
            padding: 6px;
            margin-bottom: 25px;
        }

        .tab {
            flex: 1;
            padding: 14px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            transition: 0.3s;
        }

        .tab.active {
            background: var(--matrix-green);
            color: #000;
            font-weight: bold;
        }

        select, button {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 65, 0.4);
            background: #0a140a;
            color: white;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button {
            background: linear-gradient(90deg, #00ff41, #22c55e);
            color: #000;
            font-weight: 700;
            cursor: pointer;
            border: none;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.02); box-shadow: var(--neon-glow); }

        .reset-btn { background: #991b1b; color: white; margin-top: 10px; }

        .stats { display: flex; gap: 15px; margin-bottom: 20px; }
        .stat-card { flex: 1; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 12px; text-align: center; border: 1px solid rgba(0,255,65,0.2); }
        .stat-card strong { font-size: 1.5rem; color: #00ff88; display: block; }

        .donut-container { width: 150px; height: 150px; margin: 20px auto; position: relative; }
        .donut { 
            width: 100%; height: 100%; border-radius: 50%; 
            background: conic-gradient(var(--matrix-green) 0% var(--p1), #22c55e var(--p1) var(--p2), #4ade80 var(--p2) 100%);
        }
        .donut::after { content: ""; position: absolute; inset: 20%; background: #0a140a; border-radius: 50%; }

        .voto-item { padding: 10px; border-bottom: 1px solid rgba(0,255,65,0.1); font-size: 0.85rem; }
    </style>
</head>
<body>

    <div class="topo">
        <h1>🗳️ APURAÇÃO ELEITORAL 2026</h1>
        <div class="relogio" id="relogio">00:00:00</div>
    </div>

    <div class="container">
        <div class="painel">
            <h3>VOTAR</h3>
            <label>Estado</label>
            <select id="estado" onchange="carregarCidades()"></select>
            <label>Cidade</label>
            <select id="cidade"></select>
            <label>Candidato</label>
            <select id="candidato">
                <option value="0">Candidato A</option>
                <option value="1">Candidato B</option>
                <option value="2">Candidato C</option>
                <option value="3">VOTO NULO</option>
            </select>
            <button onclick="votar()">CONFIRMAR VOTO</button>
            <button class="reset-btn" onclick="zerarVotos()">ZERAR BANCO</button>
        </div>

        <div class="painel">
            <div class="stats" id="stats-gerais"></div>
            <div class="tabs">
                <div class="tab active" onclick="mudarFiltro(0)" id="tab0">GERAL</div>
                <div class="tab" onclick="mudarFiltro(1)" id="tab1">ESTADO</div>
                <div class="tab" onclick="mudarFiltro(2)" id="tab2">CIDADE</div>
            </div>
            <div class="donut-container"><div class="donut" id="donut" style="--p1:0%; --p2:0%;"></div></div>
            <div id="resultado"></div>
            <h3 style="margin-top:20px;">ÚLTIMOS VOTOS</h3>
            <div id="ultimos-votos"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
        // CREDENCIAIS ATUALIZADAS
        const SUPABASE_URL = "https://osofdmgokrxdzsxozsrf.supabase.co";
        const SUPABASE_KEY = "sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allVotes = [];
        let filtroAtual = 0;
        const nomes = ["Candidato A", "Candidato B", "Candidato C"];
        const estados = ["AC","AL","AP","AM","BA","CE","DF","ES","GO","MA","MT","MS","MG","PA","PB","PR","PE","PI","RJ","RN","RS","RO","RR","SC","SP","SE","TO"];

        function atualizarRelogio() { document.getElementById("relogio").innerText = new Date().toLocaleTimeString(); }
        setInterval(atualizarRelogio, 1000);

        function popularEstados() {
            const s = document.getElementById("estado");
            s.innerHTML = '<option value="">UF...</option>';
            estados.forEach(uf => s.innerHTML += `<option value="${uf}">${uf}</option>`);
        }

        async function carregarCidades() {
            const uf = document.getElementById("estado").value;
            const s = document.getElementById("cidade");
            if(!uf) return;
            const r = await fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`);
            const d = await r.json();
            s.innerHTML = d.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
        }

        async function loadVotes() {
            const { data, error } = await supabaseClient.from('votes').select('*').order('created_at', {ascending: false});
            if(!error) { allVotes = data; atualizarTela(); }
        }

        async function votar() {
            const uf = document.getElementById("estado").value;
            const cidade = document.getElementById("cidade").value;
            const cand = parseInt(document.getElementById("candidato").value);
            if(!uf || !cidade) return alert("Preencha tudo!");

            const { error } = await supabaseClient.from('votes').insert([{ uf, cidade, candidato: cand, device_id: 'web-user' }]);
            if(error) alert("Erro: " + error.message);
            else loadVotes();
        }

        async function zerarVotos() {
            if(!confirm("Limpar base de dados?")) return;
            await supabaseClient.from('votes').delete().neq('id', 0);
            loadVotes();
        }

        function mudarFiltro(f) {
            filtroAtual = f;
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === f));
            atualizarTela();
        }

        function atualizarTela() {
            const uf = document.getElementById("estado").value;
            const cid = document.getElementById("cidade").value;
            let filtered = allVotes;

            if(filtroAtual === 1 && uf) filtered = allVotes.filter(v => v.uf === uf);
            if(filtroAtual === 2 && cid) filtered = allVotes.filter(v => v.cidade === cid);

            let t = [0,0,0,0];
            filtered.forEach(v => t[v.candidato]++);
            const val = t[0]+t[1]+t[2];
            const total = val + t[3];

            document.getElementById("stats-gerais").innerHTML = `
                <div class="stat-card"><strong>${total}</strong> VOTOS</div>
                <div class="stat-card"><strong>${val}</strong> VÁLIDOS</div>
                <div class="stat-card"><strong>${t[3]}</strong> NULOS</div>`;

            if(val > 0) {
                const p1 = (t[0]/val)*100;
                const p2 = p1 + (t[1]/val)*100;
                document.getElementById("donut").style.setProperty('--p1', p1+'%');
                document.getElementById("donut").style.setProperty('--p2', p2+'%');
            }

            document.getElementById("resultado").innerHTML = nomes.map((n, i) => {
                const p = val ? ((t[i]/val)*100).toFixed(1) : 0;
                return `<div style="margin-top:10px">${n}: ${p}% (${t[i]}v)<div style="height:8px; background:#1a2a1a; border-radius:5px;"><div style="width:${p}%; height:100%; background:var(--matrix-green); border-radius:5px;"></div></div></div>`;
            }).join('');

            document.getElementById("ultimos-votos").innerHTML = allVotes.slice(0,5).map(v => `<div class="voto-item">${v.cidade} (${v.uf}) - ${v.candidato === 3 ? 'NULO' : nomes[v.candidato]}</div>`).join('');
        }

        window.onload = () => { popularEstados(); loadVotes(); };
    </script>
</body>
</html>
