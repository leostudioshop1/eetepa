<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APURAÇÃO ELEITORAL 2026 • TSE</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Roboto+Mono:wght@300;400;500;600&display=swap');

        :root {
            --matrix-green: #00ff41;
            --matrix-dark: #0a0f0a;
            --neon-glow: 0 0 20px rgba(0, 255, 65, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #050705;
            color: var(--matrix-green);
            font-family: 'Roboto Mono', monospace;
            background-image: 
                linear-gradient(rgba(0, 255, 65, 0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 65, 0.025) 1px, transparent 1px);
            background-size: 60px 60px;
            min-height: 100vh;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(transparent 0px, transparent 3px, rgba(0, 255, 65, 0.012) 3px, rgba(0, 255, 65, 0.012) 6px);
            pointer-events: none;
            z-index: -1;
            animation: matrix-rain 30s linear infinite;
        }

        @keyframes matrix-rain { 0% { background-position: 0 0; } 100% { background-position: 0 1500px; } }

        .topo {
            background: linear-gradient(to bottom, #0a0f0a, #111827);
            border-bottom: 4px solid var(--matrix-green);
            padding: 20px;
            text-align: center;
            box-shadow: var(--neon-glow);
        }

        .topo h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.4rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            text-shadow: 0 0 25px var(--matrix-green);
        }

        .relogio {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.9rem;
            margin-top: 10px;
            color: #00ff88;
        }

        .status {
            font-size: 0.95rem;
            color: #66ff99;
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .container {
            max-width: 1450px;
            margin: 30px auto;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 25px;
        }

        .painel {
            background: rgba(15, 23, 42, 0.96);
            border: 1px solid rgba(0, 255, 65, 0.35);
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 0 35px rgba(0, 255, 65, 0.18);
            backdrop-filter: blur(12px);
        }

        h3 {
            font-family: 'Orbitron', sans-serif;
            color: var(--matrix-green);
            margin-bottom: 22px;
            font-size: 1.45rem;
            text-shadow: 0 0 12px var(--matrix-green);
        }

        .tabs {
            display: flex;
            background: #0a140a;
            border: 1px solid rgba(0, 255, 65, 0.25);
            border-radius: 12px;
            padding: 6px;
            margin-bottom: 25px;
        }

        .tab {
            flex: 1;
            padding: 14px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .tab.active {
            background: var(--matrix-green);
            color: #000;
            box-shadow: var(--neon-glow);
        }

        label {
            display: block;
            margin: 16px 0 7px;
            color: #a3e6b0;
            font-size: 0.95rem;
        }

        select, button {
            width: 100%;
            padding: 15px 16px;
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 65, 0.4);
            background: #0a140a;
            color: white;
            font-family: inherit;
        }

        button {
            background: linear-gradient(90deg, #00ff41, #22c55e);
            color: #000;
            font-weight: 700;
            font-size: 1.1rem;
            margin-top: 25px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: all 0.3s;
        }

        button:hover { transform: translateY(-4px); box-shadow: 0 0 30px rgba(0, 255, 65, 0.95); }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: rgba(10, 20, 10, 0.7);
            padding: 14px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid rgba(0, 255, 65, 0.2);
        }

        .stat-card strong {
            font-size: 1.6rem;
            display: block;
            color: #00ff88;
        }

        .donut-container {
            width: 180px;
            height: 180px;
            margin: 20px auto;
            position: relative;
        }

        .donut {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(#00ff41 0% var(--p1), #22c55e var(--p1) var(--p2), #4ade80 var(--p2) 100%);
            position: relative;
        }

        .donut::after {
            content: "";
            position: absolute;
            inset: 25%;
            background: #0a140a;
            border-radius: 50%;
        }

        .ultimos-votos {
            max-height: 280px;
            overflow-y: auto;
            font-size: 0.9rem;
        }

        .voto-item {
            padding: 10px 12px;
            background: rgba(10, 20, 10, 0.5);
            margin-bottom: 8px;
            border-radius: 8px;
            border-left: 4px solid var(--matrix-green);
        }

        .reset-btn {
            background: #991b1b;
            margin-top: 15px;
            font-size: 0.95rem;
        }

        @media (max-width: 980px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="topo">
        <h1>🗳️ APURAÇÃO ELEITORAL 2026</h1>
        <div class="relogio" id="relogio"></div>
        <div class="status" id="status">● Atualizando em tempo real</div>
    </div>

    <div class="container">
        <!-- Painel de Voto -->
        <div class="painel">
            <h3>Registrar Voto</h3>
            <label>Estado (UF)</label>
            <select id="estado" onchange="carregarCidades()"></select>

            <label>Cidade / Município</label>
            <select id="cidade"></select>

            <label>Candidato</label>
            <select id="candidato">
                <option value="0">Candidato A</option>
                <option value="1">Candidato B</option>
                <option value="2">Candidato C</option>
                <option value="3">VOTO NULO</option>
            </select>

            <button onclick="votar()">✅ CONFIRMAR VOTO</button>
            <button class="reset-btn" onclick="zerarVotos()">🔄 Zerar todos os votos</button>
        </div>

        <!-- Painel Principal -->
        <div class="painel">
            <h3>📊 Apuração em Tempo Real</h3>
            <div class="stats" id="stats-gerais"></div>

            <div class="tabs">
                <div class="tab active" onclick="mudarFiltro(0)" id="tab0">GERAL</div>
                <div class="tab" onclick="mudarFiltro(1)" id="tab1">POR ESTADO</div>
                <div class="tab" onclick="mudarFiltro(2)" id="tab2">POR CIDADE</div>
            </div>

            <div class="donut-container">
                <div class="donut" id="donut"></div>
            </div>

            <div id="resultado"></div>

            <h3 style="margin-top:35px;">🕒 Últimos Votos Registrados</h3>
            <div class="ultimos-votos" id="ultimos-votos"></div>
        </div>
    </div>

    <!-- ====================== SCRIPTS ====================== -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="config.js"></script>

    <script>
        // ====================== SUPABASE CONFIG ======================
        if (typeof window.SUPABASE_CONFIG === 'undefined' || !window.SUPABASE_CONFIG.url || !window.SUPABASE_CONFIG.key) {
            console.error("❌ SUPABASE_CONFIG não encontrado. Verifique o arquivo config.js");
            document.body.innerHTML = `
                <div style="position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#111827; color:#ff4444; padding:40px; border:3px solid #ff4444; border-radius:16px; text-align:center; max-width:90%; font-family:monospace;">
                    <h2>Erro ao carregar a página</h2>
                    <p><strong>config.js</strong> não foi encontrado ou está incorreto.</p>
                    <p>Verifique se o arquivo config.js está na raiz do repositório e foi commitado.</p>
                    <small>Pressione F12 para ver mais detalhes no console.</small>
                </div>`;
        } else {
            const supabaseClient = supabase.createClient(
                window.SUPABASE_CONFIG.url,
                window.SUPABASE_CONFIG.key
            );

            // ====================== VARIÁVEIS GLOBAIS ======================
            let deviceId = '';
            let allVotes = [];
            let nomes = ["Candidato A", "Candidato B", "Candidato C"];
            let filtroAtual = 0;
            const estados = ["AC","AL","AP","AM","BA","CE","DF","ES","GO","MA","MT","MS","MG","PA","PB","PR","PE","PI","RJ","RN","RS","RO","RR","SC","SP","SE","TO"];

            // ====================== DEVICE ID ======================
            function initializeDevice() {
                if (!deviceId) {
                    deviceId = localStorage.getItem('device_id');
                    if (!deviceId) {
                        deviceId = crypto.randomUUID ? crypto.randomUUID() : `device-${Date.now()}-${Math.random().toString(36).slice(2)}`;
                        localStorage.setItem('device_id', deviceId);
                    }
                }
            }

            // ====================== RELÓGIO ======================
            function atualizarRelogio() {
                const agora = new Date();
                document.getElementById("relogio").innerText = agora.toLocaleTimeString('pt-BR', { hour12: false });
            }
            setInterval(atualizarRelogio, 1000);

            // ====================== ESTADOS E CIDADES ======================
            const selectEstado = document.getElementById("estado");
            estados.forEach(uf => {
                let op = document.createElement("option");
                op.value = uf; op.textContent = uf;
                selectEstado.appendChild(op);
            });

            function carregarCidades() {
                const uf = document.getElementById("estado").value;
                const selectCidade = document.getElementById("cidade");
                selectCidade.innerHTML = "<option value=''>Selecione a cidade...</option>";

                if (!uf) return;

                fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`)
                    .then(r => r.json())
                    .then(dados => {
                        dados.forEach(c => {
                            let op = document.createElement("option");
                            op.value = c.nome; op.textContent = c.nome;
                            selectCidade.appendChild(op);
                        });
                    });
            }

            // ====================== CARREGAR VOTOS ======================
            async function loadVotes() {
                const { data, error } = await supabaseClient
                    .from('votes')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) console.error('Erro ao carregar votos:', error);
                else allVotes = data || [];
            }

            // ====================== REALTIME ======================
            function setupRealtime() {
                supabaseClient
                    .channel('public:votes')
                    .on('postgres_changes', 
                        { event: 'INSERT', schema: 'public', table: 'votes' }, 
                        (payload) => {
                            const exists = allVotes.some(v => v.id === payload.new.id);
                            if (!exists) {
                                allVotes.unshift(payload.new);
                                atualizar();
                            }
                        })
                    .subscribe();
            }

            // ====================== VOTAR ======================
            async function votar() {
                const uf = document.getElementById("estado").value;
                const cidade = document.getElementById("cidade").value;
                const candIndex = parseInt(document.getElementById("candidato").value);

                if (!uf || !cidade) {
                    alert("Selecione Estado e Cidade!");
                    return;
                }

                const { error } = await supabaseClient
                    .from('votes')
                    .insert({ 
                        device_id: deviceId, 
                        uf: uf, 
                        cidade: cidade, 
                        candidato: candIndex 
                    });

                if (error) {
                    alert("Erro ao registrar voto: " + error.message);
                    console.error(error);
                    return;
                }

                await loadVotes();
                atualizar();
            }

            // ====================== ZERAR VOTOS ======================
            async function zerarVotos() {
                if (confirm("Tem certeza que deseja zerar TODOS os votos?")) {
                    const { error } = await supabaseClient
                        .from('votes')
                        .delete()
                        .neq('id', null);

                    if (error) alert("Erro ao zerar: " + error.message);
                    else {
                        allVotes = [];
                        atualizar();
                    }
                }
            }

            // ====================== FILTRO ======================
            function mudarFiltro(tipo) {
                filtroAtual = tipo;
                document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === tipo));
                atualizar();
            }

            // ====================== CALCULAR VOTOS ======================
            function calcularVotos() {
                let totais = [0, 0, 0, 0];
                const ufSel = document.getElementById("estado").value;
                const cidSel = document.getElementById("cidade").value;

                let filtered = allVotes;

                if (filtroAtual === 1 && ufSel) filtered = allVotes.filter(v => v.uf === ufSel);
                else if (filtroAtual === 2 && ufSel && cidSel) filtered = allVotes.filter(v => v.uf === ufSel && v.cidade === cidSel);

                filtered.forEach(v => {
                    if (v.candidato >= 0 && v.candidato <= 3) totais[v.candidato]++;
                });

                return totais;
            }

            // ====================== ATUALIZAR TELA ======================
            function atualizar() {
                const totais = calcularVotos();
                const validos = totais[0] + totais[1] + totais[2];
                const nulos = totais[3];
                const totalGeral = validos + nulos;

                // Stats rápidas
                const secoesApuradas = Math.min(100, Math.floor(totalGeral / 12) + 23);
                document.getElementById("stats-gerais").innerHTML = `
                    <div class="stat-card"><strong>${secoesApuradas}%</strong> Seções Apuradas</div>
                    <div class="stat-card"><strong>${totalGeral}</strong> Total de Votos</div>
                    <div class="stat-card"><strong>${validos}</strong> Válidos</div>
                    <div class="stat-card"><strong>${nulos}</strong> Nulos</div>
                `;

                // Donut Chart
                if (validos > 0) {
                    const p1 = (totais[0] / validos * 100).toFixed(1);
                    const p2 = (p1 * 1 + (totais[1] / validos * 100)).toFixed(1);
                    document.getElementById("donut").style.setProperty('--p1', p1 + '%');
                    document.getElementById("donut").style.setProperty('--p2', p2 + '%');
                }

                // Resultados em barras
                let html = "";
                const maior = Math.max(totais[0], totais[1], totais[2]);

                for (let i = 0; i < 3; i++) {
                    const perc = validos ? ((totais[i] / validos) * 100).toFixed(1) : 0;
                    html += `
                    <div style="margin-bottom:20px; padding:16px; border-radius:14px; background:rgba(10,20,10,0.6);">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                            <strong>${nomes[i]}</strong>
                            <span>${perc}% (${totais[i]} votos)</span>
                        </div>
                        <div style="height:24px; background:#1a2a1a; border-radius:999px; overflow:hidden;">
                            <div style="height:100%; width:${perc}%; background:linear-gradient(90deg,#00ff41,#4ade80);"></div>
                        </div>
                    </div>`;
                }

                if (nulos > 0) {
                    html += `<div style="text-align:center; padding:14px; background:rgba(80,80,80,0.2); border-radius:10px; margin-top:15px;">
                        ⚪ Votos Nulos: <strong>${nulos}</strong> (${totalGeral ? ((nulos/totalGeral)*100).toFixed(1) : 0}%)
                    </div>`;
                }

                document.getElementById("resultado").innerHTML = html || "<p style='text-align:center; padding:40px; color:#555;'>Nenhum voto registrado.</p>";

                // Últimos votos
                let feed = "";
                const recent = allVotes.slice(0, 8);
                recent.forEach(v => {
                    const tempo = new Date(v.created_at).toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
                    const tipo = v.candidato === 3 ? "NULO" : nomes[v.candidato];
                    feed += `<div class="voto-item"><strong>${tempo}</strong> — ${v.cidade} - ${v.uf}<br><span style="color:#a3e6b0">${tipo}</span></div>`;
                });
                document.getElementById("ultimos-votos").innerHTML = feed || "<p style='color:#555; text-align:center; padding:20px;'>Nenhum voto registrado ainda.</p>";
            }

            // ====================== INICIALIZAÇÃO ======================
            window.onload = async () => {
                initializeDevice();
                await loadVotes();
                setupRealtime();
                carregarCidades();
                atualizar();

                document.getElementById("estado").addEventListener("change", atualizar);
                document.getElementById("cidade").addEventListener("change", atualizar);
                setInterval(atualizar, 8000);
            };
        }
    </script>
</body>
</html>
