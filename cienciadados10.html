<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 Quiz Supremo - Informática 2026</title>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- Confetti -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

    <style>
        :root { --primary: #00ffcc; --danger: #ff3366; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: linear-gradient(135deg, #0a1428, #1e3c72); 
            color: #fff; 
            min-height: 100vh; 
        }
        .header {
            position: fixed; top: 0; left: 0; right: 0;
            background: rgba(10,20,40,0.95);
            padding: 15px 20px;
            display: flex; justify-content: space-between;
        }
        .card {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            margin: 120px auto;
            max-width: 600px;
        }
        .option {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 10px;
            margin: 10px 0;
            cursor: pointer;
        }
        .option:hover { background: rgba(255,255,255,0.2); }
        .next-btn {
            margin-top: 20px;
            padding: 15px;
            width: 100%;
            border: none;
            border-radius: 999px;
            background: #00ffcc;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header">
    <div>🚀 Quiz Supremo</div>
    <div>⭐ <span id="scoreDisplay">0</span></div>
</div>

<div id="quizContainer"></div>

<script type="module">

// 🔥 IMPORTANDO CONFIG
import SUPABASE_CONFIG from './config.js';

// 🔥 INICIALIZAÇÃO CORRETA SUPABASE V2
const supabaseClient = supabase.createClient(
    SUPABASE_CONFIG.URL,
    SUPABASE_CONFIG.ANON_KEY
);

// Dados simples
const questions = [
    {
        id:1,
        question:"SSD é melhor que HD por quê?",
        options:["Mais lento","Tem partes mecânicas","Mais rápido","Mais pesado"],
        correct:2
    },
    {
        id:2,
        question:"1 Byte equivale a:",
        options:["2 bits","4 bits","8 bits","16 bits"],
        correct:2
    }
];

let current = 0;
let score = 0;
let responses = [];

function renderQuestion() {
    const q = questions[current];

    let html = `
        <div class="card">
            <h2>${q.question}</h2>
    `;

    q.options.forEach((opt, i) => {
        html += `<div class="option" onclick="selectAnswer(${i})">${opt}</div>`;
    });

    html += `<button onclick="nextQuestion()" class="next-btn">Próxima</button></div>`;

    document.getElementById('quizContainer').innerHTML = html;
}

window.selectAnswer = function(i) {
    const correct = questions[current].correct;
    const isCorrect = i === correct;

    responses.push({
        pergunta: questions[current].question,
        resposta: i,
        correta: isCorrect
    });

    if (isCorrect) {
        score++;
        document.getElementById('scoreDisplay').textContent = score;
        alert("✅ Acertou!");
    } else {
        alert("❌ Errou!");
    }
}

window.nextQuestion = function() {
    current++;

    if (current < questions.length) {
        renderQuestion();
    } else {
        saveResults();
    }
}

// 🔥 SALVAR NO SUPABASE
async function saveResults() {
    const { error } = await supabaseClient
        .from('quiz_submissions')
        .insert({
            pontuacao: score,
            respostas: responses
        });

    if (error) {
        console.error(error);
        alert("Erro ao salvar!");
    } else {
        alert("✅ Salvo no Supabase!");
    }
}

renderQuestion();

</script>

</body>
</html>
