<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗳️ Eleição Divertida 2026</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Comic+Neue:wght@400;700&display=swap');

        :root {
            --amarelo: #ffeb3b;
            --laranja: #ff9800;
            --verde: #4caf50;
            --azul: #2196f3;
            --rosa: #e91e63;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #fff176, #ffccbc);
            color: #333;
            font-family: 'Fredoka', sans-serif;
            min-height: 100vh;
            line-height: 1.6;
        }

        .header {
            background: linear-gradient(90deg, var(--rosa), var(--azul));
            color: white;
            text-align: center;
            padding: 30px 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15);
        }

        .header h1 {
            font-size: 2.8rem;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0 #00000030;
        }

        .relogio {
            font-size: 1.6rem;
            font-weight: bold;
            color: white;
        }

        .container {
            max-width: 720px;
            margin: 30px auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .painel {
            background: white;
            border-radius: 30px;
            padding: 32px 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.12);
            border: 8px solid var(--amarelo);
        }

        h2 {
            font-size: 2rem;
            color: var(--rosa);
            text-align: center;
            margin-bottom: 25px;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 15px;
            background: #fff3e0;
            padding: 15px 20px;
            border-radius: 20px;
            margin: 20px 0;
            font-size: 1.4rem;
            font-weight: 600;
            color: #d84315;
        }

        label {
            display: block;
            font-size: 1.45rem;
            font-weight: 600;
            color: #333;
            margin: 20px 0 10px;
        }

        select {
            width: 100%;
            padding: 18px 20px;
            font-size: 1.4rem;
            border: 4px solid var(--azul);
            border-radius: 20px;
            background: white;
            color: #333;
            font-family: 'Fredoka', sans-serif;
        }

        select:focus {
            border-color: var(--verde);
            outline: none;
        }

        button {
            width: 100%;
            padding: 22px;
            margin-top: 25px;
            font-size: 1.5rem;
            font-weight: 700;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            transition: all 0.3s;
        }

        .btn-votar {
            background: linear-gradient(90deg, #4caf50, #8bc34a);
            color: white;
            box-shadow: 0 8px 0 #2e7d32;
        }

        .btn-votar:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #2e7d32;
        }

        .btn-reset {
            background: #ef5350;
            color: white;
            font-size: 1.2rem;
            padding: 16px;
        }

        button:disabled {
            background: #ccc;
            color: #666;
            cursor: not-allowed;
            box-shadow: none;
        }

        .tabs {
            display: flex;
            background: #f0f4c3;
            border-radius: 20px;
            padding: 8px;
            margin: 25px 0;
        }

        .tab {
            flex: 1;
            padding: 16px;
            text-align: center;
            border-radius: 16px;
            font-size: 1.25rem;
            font-weight: 600;
            cursor: pointer;
        }

        .tab.active {
            background: var(--verde);
            color: white;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 18px;
            margin: 25px 0;
        }

        .stat-card {
            background: #f0f4c3;
            padding: 20px 15px;
            border-radius: 20px;
            text-align: center;
            border: 5px solid var(--amarelo);
        }

        .stat-card strong {
            font-size: 2.2rem;
            color: var(--rosa);
            display: block;
        }

        .donut-container {
            width: 210px;
            height: 210px;
            margin: 30px auto;
            position: relative;
        }

        .donut {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(#4caf50 0% var(--p1), #ffeb3b var(--p1) var(--p2), #ff9800 var(--p2) 100%);
        }

        .donut::after {
            content: "🎉";
            position: absolute;
            inset: 25%;
            background: white;
            border-radius: 50%;
            font-size: 4rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .candidato-bar {
            margin: 22px 0;
            padding: 18px;
            background: #f0f4c3;
            border-radius: 20px;
        }

        .ultimos-votos {
            max-height: 320px;
            overflow-y: auto;
        }

        .voto-item {
            padding: 18px;
            background: white;
            margin-bottom: 14px;
            border-radius: 20px;
            font-size: 1.3rem;
            border-left: 10px solid var(--verde);
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        /* Ajustes para crianças */
        @media (max-width: 480px) {
            .header h1 { font-size: 2.3rem; }
            button { font-size: 1.6rem; padding: 24px; }
            select { font-size: 1.45rem; padding: 20px; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🗳️ Eleição Divertida 2026</h1>
        <div class="relogio" id="relogio">00:00:00</div>
    </div>

    <div class="container">

        <!-- Painel de Voto -->
        <div class="painel">
            <h2>✨ Vamos Votar!</h2>
            
            <div class="step">🌍 1. Escolha seu Estado</div>
            <select id="estado" onchange="carregarCidades()"></select>

            <div class="step">🏠 2. Escolha sua Cidade</div>
            <select id="cidade"></select>

            <div class="step">⭐ 3. Escolha seu Candidato</div>
            <select id="candidato">
                <option value="0">Candidato A 😊</option>
                <option value="1">Candidato B 🚀</option>
                <option value="2">Candidato C 🌈</option>
                <option value="3">Voto Nulo ⚪</option>
            </select>

            <button id="btnVotar" class="btn-votar" onclick="votar()">
                <i class="fas fa-heart"></i> CONFIRMAR VOTO
            </button>

            <button class="btn-reset" onclick="zerarVotos()">
                🔄 Zerar todos os votos (só para o professor)
            </button>
        </div>

        <!-- Painel de Resultados -->
        <div class="painel">
            <h2>📊 Quem está ganhando?</h2>

            <div class="stats" id="stats-gerais"></div>

            <div class="tabs">
                <div class="tab active" onclick="mudarFiltro(0)" id="tab0">Todo Mundo</div>
                <div class="tab" onclick="mudarFiltro(1)" id="tab1">Por Estado</div>
                <div class="tab" onclick="mudarFiltro(2)" id="tab2">Por Cidade</div>
            </div>

            <div class="donut-container">
                <div class="donut" id="donut" style="--p1:0%; --p2:0%;"></div>
            </div>

            <div id="resultado"></div>

            <h2 style="margin-top:35px;">🕒 Últimos Votinhos</h2>
            <div class="ultimos-votos" id="ultimos-votos"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
        const SUPABASE_URL = "https://osofdmgokrxdzsxozsrf.supabase.co";
        const SUPABASE_KEY = "sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allVotes = [];
        let filtroAtual = 0;
        let deviceUuid = "";
        const nomes = ["Candidato A", "Candidato B", "Candidato C"];
        const estados = ["AC","AL","AP","AM","BA","CE","DF","ES","GO","MA","MT","MS","MG","PA","PB","PR","PE","PI","RJ","RN","RS","RO","RR","SC","SP","SE","TO"];

        function getDeviceUuid() {
            let id = localStorage.getItem('voter_uuid');
            if (!id) {
                id = crypto.randomUUID ? crypto.randomUUID() : 'kid-' + Date.now();
                localStorage.setItem('voter_uuid', id);
            }
            return id;
        }

        function atualizarRelogio() {
            document.getElementById("relogio").innerText = new Date().toLocaleTimeString('pt-BR', { hour12: false });
        }
        setInterval(atualizarRelogio, 1000);

        function popularEstados() {
            const s = document.getElementById("estado");
            s.innerHTML = '<option value="">Escolha seu Estado 🌎</option>';
            estados.forEach(uf => s.innerHTML += `<option value="${uf}">${uf}</option>`);
        }

        async function carregarCidades() {
            const uf = document.getElementById("estado").value;
            const s = document.getElementById("cidade");
            s.innerHTML = '<option value="">Carregando cidades...</option>';
            if (!uf) return s.innerHTML = '<option value="">Escolha primeiro o estado</option>';

            try {
                const r = await fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`);
                const d = await r.json();
                s.innerHTML = d.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
            } catch (e) {
                s.innerHTML = '<option value="">Não consegui carregar 😕</option>';
            }
        }

        async function loadVotes() {
            const { data, error } = await supabaseClient.from('votes').select('*').order('created_at', { ascending: false });
            if (!error) {
                allVotes = data || [];
                verificarVotoExistente();
                atualizarTela();
            }
        }

        function verificarVotoExistente() {
            const jaVotou = allVotes.some(v => v.device_id === deviceUuid);
            const btn = document.getElementById("btnVotar");
            if (jaVotou) {
                btn.disabled = true;
                btn.innerHTML = `😊 Você já votou!`;
            } else {
                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-heart"></i> CONFIRMAR VOTO`;
            }
        }

        async function votar() {
            const uf = document.getElementById("estado").value;
            const cidade = document.getElementById("cidade").value;
            const cand = parseInt(document.getElementById("candidato").value);

            if (!uf || !cidade) {
                alert("Por favor, escolha seu estado e cidade primeiro! 🌟");
                return;
            }

            const { error } = await supabaseClient.from('votes').insert([{
                uf, cidade, candidato: cand, device_id: deviceUuid
            }]);

            if (error) alert("Ops! Deu um errinho... Tente novamente.");
            else {
                alert("🎉 Voto registrado com muito carinho! Obrigado!");
                await loadVotes();
            }
        }

        async function zerarVotos() {
            if (!confirm("Quer apagar todos os votos?")) return;
            await supabaseClient.from('votes').delete().neq('id', null);
            await loadVotes();
        }

        function mudarFiltro(f) {
            filtroAtual = f;
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === f));
            atualizarTela();
        }

        function atualizarTela() {
            const ufSel = document.getElementById("estado").value;
            const cidSel = document.getElementById("cidade").value;
            let filtered = allVotes;

            if (filtroAtual === 1 && ufSel) filtered = allVotes.filter(v => v.uf === ufSel);
            if (filtroAtual === 2 && cidSel) filtered = allVotes.filter(v => v.cidade === cidSel);

            let t = [0, 0, 0, 0];
            filtered.forEach(v => t[v.candidato]++);

            const validos = t[0] + t[1] + t[2];
            const total = validos + t[3];

            document.getElementById("stats-gerais").innerHTML = `
                <div class="stat-card"><strong>${total}</strong><small>Total de Votos</small></div>
                <div class="stat-card"><strong>${validos}</strong><small>Votos Válidos</small></div>
                <div class="stat-card"><strong>${t[3]}</strong><small>Votos Nulos</small></div>
            `;

            if (validos > 0) {
                const p1 = (t[0] / validos) * 100;
                const p2 = p1 + (t[1] / validos) * 100;
                document.getElementById("donut").style.setProperty('--p1', p1 + '%');
                document.getElementById("donut").style.setProperty('--p2', p2 + '%');
            }

            let html = nomes.map((nome, i) => {
                const perc = validos ? ((t[i] / validos) * 100).toFixed(1) : 0;
                return `
                    <div class="candidato-bar">
                        <div style="display:flex; justify-content:space-between; margin-bottom:10px; font-size:1.35rem;">
                            <span>${nome}</span>
                            <span>${perc}% (${t[i]})</span>
                        </div>
                        <div style="height:18px; background:#e0e0e0; border-radius:999px;">
                            <div style="height:100%; width:${perc}%; background:linear-gradient(90deg, #4caf50, #ffeb3b); border-radius:999px;"></div>
                        </div>
                    </div>`;
            }).join('');

            document.getElementById("resultado").innerHTML = html || "<p style='text-align:center; font-size:1.4rem; padding:40px;'>Ainda não tem votos... Vote você! 🎨</p>";

            let ult = allVotes.slice(0, 6).map(v => {
                const tipo = v.candidato === 3 ? 'Nulo' : nomes[v.candidato];
                return `<div class="voto-item">🏠 ${v.cidade} (${v.uf}) — <strong>${tipo}</strong></div>`;
            }).join('');
            document.getElementById("ultimos-votos").innerHTML = ult || "<p style='text-align:center; color:#777; padding:30px;'>Ninguém votou ainda... Seja o primeiro! 🌟</p>";
        }

        window.onload = async () => {
            deviceUuid = getDeviceUuid();
            popularEstados();
            await loadVotes();
            setInterval(loadVotes, 8000);
        };
    </script>
</body>
</html>
