<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apuração Eleitoral 2026</title>
    
    <style>
        :root {
            /* Cores de Alto Contraste */
            --bg-deep: #050505;
            --card-bg: #121212;
            --apple-blue: #0A84FF;
            --text-main: #FFFFFF;
            --text-secondary: #EBEBF5;
            --accent-green: #30D158;
            --border-color: #38383A;
            /* Fontes Aumentadas */
            --font-size-label: 1.5rem;
            --font-size-input: 1.8rem;
            --font-size-btn: 2rem;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at top, #1c1c1e, var(--bg-deep));
            color: var(--text-main);
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto;
            padding: 20px;
            line-height: 1.5;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 30px 0;
            margin-bottom: 30px;
            border-bottom: 2px solid var(--border-color);
        }

        header h1 { 
            font-size: 2.5rem; 
            font-weight: 800; 
            letter-spacing: -1px;
        }

        .relogio { 
            font-size: 1.8rem; 
            color: var(--apple-blue); 
            font-weight: 700;
            margin-top: 10px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: var(--card-bg);
            border: 2px solid var(--border-color);
            border-radius: 28px;
            padding: 40px;
            margin-bottom: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        h2 { 
            font-size: 2.2rem; 
            margin-bottom: 30px; 
            color: var(--apple-blue);
            border-left: 8px solid var(--apple-blue);
            padding-left: 15px;
        }

        .form-group { 
            margin-bottom: 35px; 
        }
        
        label { 
            display: block; 
            font-size: var(--font-size-label); 
            font-weight: 700; 
            color: var(--text-secondary); 
            margin-bottom: 15px;
        }

        select {
            width: 100%;
            padding: 25px;
            font-size: var(--font-size-input);
            background: #1C1C1E;
            border: 3px solid var(--border-color);
            border-radius: 18px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            outline: none;
        }

        select:focus {
            border-color: var(--apple-blue);
            box-shadow: 0 0 0 5px rgba(10, 132, 255, 0.3);
        }

        .btn-votar {
            width: 100%;
            padding: 30px;
            background: var(--apple-blue);
            color: white;
            border: none;
            border-radius: 22px;
            font-size: var(--font-size-btn);
            font-weight: 800;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(10, 132, 255, 0.4);
            transition: all 0.2s;
        }

        .btn-votar:active { transform: scale(0.96); }
        .btn-votar:disabled { 
            background: #2C2C2E; 
            color: #48484A;
            box-shadow: none;
        }

        /* Resultados e Estatísticas */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-item {
            background: #1C1C1E;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid var(--border-color);
        }

        .stat-item strong { font-size: 3rem; display: block; color: var(--accent-green); }
        .stat-item span { font-size: 1.4rem; color: var(--text-secondary); font-weight: 700; }

        .cand-row { margin-bottom: 30px; }
        .cand-info { 
            display: flex; 
            justify-content: space-between; 
            margin-bottom: 12px; 
            font-size: 1.6rem;
            font-weight: 700; 
        }
        
        .bar-bg { 
            height: 25px; 
            background: #2C2C2E; 
            border-radius: 12px; 
            overflow: hidden; 
            border: 1px solid var(--border-color);
        }
        .bar-fill { 
            height: 100%; 
            background: linear-gradient(90deg, var(--apple-blue), #5AC8FA); 
            transition: width 1s cubic-bezier(0.23, 1, 0.32, 1); 
        }

        .vote-card { 
            padding: 20px; 
            background: #1C1C1E;
            border-radius: 15px;
            margin-bottom: 15px;
            font-size: 1.4rem; 
            border-left: 10px solid var(--accent-green);
        }
        
        .reset-link { 
            display: block; 
            text-align: center; 
            color: #FF453A; 
            font-size: 1.2rem; 
            margin-top: 50px; 
            font-weight: 700;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <header>
        <h1>APURAÇÃO 2026</h1>
        <div id="relogio" class="relogio">00:00:00</div>
    </header>

    <div class="container">
        <div class="card">
            <h2>REGISTRAR VOTO</h2>
            
            <div class="form-group">
                <label for="estado">1. SELECIONE O ESTADO</label>
                <select id="estado" onchange="carregarCidades(); focar('cidade')"></select>
            </div>

            <div class="form-group">
                <label for="cidade">2. SELECIONE A CIDADE</label>
                <select id="cidade" onchange="focar('candidato')"></select>
            </div>

            <div class="form-group">
                <label for="candidato">3. ESCOLHA O CANDIDATO</label>
                <select id="candidato">
                    <option value="0">Candidato A</option>
                    <option value="1">Candidato B</option>
                    <option value="2">Candidato C</option>
                    <option value="3">VOTO NULO</option>
                </select>
            </div>

            <button id="btnVotar" class="btn-votar" onclick="votar()">CONFIRMAR VOTO</button>
        </div>

        <div class="card">
            <h2>RESULTADOS PARCIAIS</h2>
            <div class="stats-grid" id="stats-gerais"></div>
            <div id="resultado"></div>
            
            <h3 style="margin: 40px 0 20px; font-size: 1.8rem;">ÚLTIMOS VOTOS</h3>
            <div id="ultimos-votos"></div>
        </div>

        <a href="#" class="reset-link" onclick="zerarVotos()">ADMIN: ZERAR SISTEMA</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
        const SUPABASE_URL = "https://osofdmgokrxdzsxozsrf.supabase.co";
        const SUPABASE_KEY = "sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allVotes = [];
        let deviceUuid = "";
        const nomes = ["Candidato A", "Candidato B", "Candidato C"];
        const estados = ["AC","AL","AP","AM","BA","CE","DF","ES","GO","MA","MT","MS","MG","PA","PB","PR","PE","PI","RJ","RN","RS","RO","RR","SC","SP","SE","TO"];

        function getDeviceUuid() {
            let id = localStorage.getItem('voter_uuid');
            if (!id) {
                id = crypto.randomUUID ? crypto.randomUUID() : 'id-' + Date.now();
                localStorage.setItem('voter_uuid', id);
            }
            return id;
        }

        function focar(id) {
            setTimeout(() => {
                const el = document.getElementById(id);
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                el.classList.add('foco-ativo');
            }, 300);
        }

        async function carregarCidades() {
            const uf = document.getElementById("estado").value;
            const s = document.getElementById("cidade");
            if (!uf) return;
            const r = await fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`);
            const d = await r.json();
            s.innerHTML = d.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
        }

        async function loadVotes() {
            const { data, error } = await supabaseClient.from('votes').select('*').order('created_at', { ascending: false });
            if (!error) {
                allVotes = data || [];
                verificarStatus();
                atualizarTela();
            }
        }

        function verificarStatus() {
            const jaVotou = allVotes.some(v => v.device_id === deviceUuid);
            const btn = document.getElementById("btnVotar");
            if (jaVotou) {
                btn.disabled = true;
                btn.innerText = "VOTO JÁ REGISTRADO";
            }
        }

        async function votar() {
            const uf = document.getElementById("estado").value;
            const cidade = document.getElementById("cidade").value;
            const cand = parseInt(document.getElementById("candidato").value);

            if (!uf || !cidade) return alert("ERRO: Preencha Estado e Cidade");

            const { error } = await supabaseClient.from('votes').insert([{
                uf, cidade, candidato: cand, device_id: deviceUuid
            }]);

            if (error) alert("ERRO NO BANCO: " + error.message);
            else {
                alert("SUCESSO: Voto computado!");
                await loadVotes();
            }
        }

        function atualizarTela() {
            let t = [0, 0, 0, 0];
            allVotes.forEach(v => t[v.candidato]++);
            const validos = t[0] + t[1] + t[2];
            const total = validos + t[3];

            document.getElementById("stats-gerais").innerHTML = `
                <div class="stat-item"><strong>${total}</strong><span>TOTAL DE VOTOS</span></div>
                <div class="stat-item"><strong>${validos}</strong><span>VOTOS VÁLIDOS</span></div>
            `;

            let html = '';
            nomes.forEach((nome, i) => {
                const perc = validos ? ((t[i] / validos) * 100).toFixed(1) : 0;
                html += `
                    <div class="cand-row">
                        <div class="cand-info"><span>${nome}</span><span>${perc}%</span></div>
                        <div class="bar-bg"><div class="bar-fill" style="width:${perc}%"></div></div>
                    </div>`;
            });
            document.getElementById("resultado").innerHTML = html;

            document.getElementById("ultimos-votos").innerHTML = allVotes.slice(0, 4).map(v => `
                <div class="vote-card">
                    <b>${v.cidade} - ${v.uf}</b><br>
                    <span>Voto: ${v.candidato === 3 ? 'NULO' : nomes[v.candidato]}</span>
                </div>
            `).join('');
        }

        async function zerarVotos() {
            if (confirm("ATENÇÃO: Deseja realmente apagar todos os dados?")) {
                await supabaseClient.from('votes').delete().neq('id', 0);
                location.reload();
            }
        }

        setInterval(() => {
            document.getElementById("relogio").innerText = new Date().toLocaleTimeString('pt-BR');
        }, 1000);

        window.onload = () => {
            deviceUuid = getDeviceUuid();
            const s = document.getElementById("estado");
            s.innerHTML = '<option value="">SELECIONE</option>' + estados.map(uf => `<option value="${uf}">${uf}</option>`).join('');
            loadVotes();
        };
    </script>
</body>
</html>
