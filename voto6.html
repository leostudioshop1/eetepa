<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗳️ Apuração Eleitoral 2026 • Brasil</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Open+Sans:wght@400;600;700&display=swap');

        :root {
            --verde-brasil: #009c3b;
            --amarelo-brasil: #ffdf00;
            --azul-brasil: #002776;
            --fundo-escuro: #0a0f0a;
            --painel: #1a1f1a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--fundo-escuro);
            color: #e0f0e0;
            font-family: 'Open Sans', sans-serif;
            font-size: 1.1rem;
            line-height: 1.8;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(to bottom, var(--azul-brasil), #001a4d);
            color: white;
            text-align: center;
            padding: 35px 20px;
            border-bottom: 8px solid var(--verde-brasil);
        }

        .header h1 {
            font-family: 'Roboto', sans-serif;
            font-size: 2.4rem;
            font-weight: 700;
            letter-spacing: 3px;
        }

        .relogio {
            font-size: 1.7rem;
            margin-top: 12px;
            font-weight: 500;
            color: var(--amarelo-brasil);
        }

        .container {
            max-width: 760px;
            margin: 35px auto;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .painel {
            background: var(--painel);
            border: 3px solid var(--verde-brasil);
            border-radius: 20px;
            padding: 35px 28px;
            box-shadow: 0 8px 30px rgba(0, 156, 59, 0.3);
        }

        h2 {
            font-family: 'Roboto', sans-serif;
            color: var(--amarelo-brasil);
            font-size: 2rem;
            text-align: center;
            margin-bottom: 28px;
        }

        .step {
            display: flex;
            align-items: center;
            gap: 16px;
            background: rgba(0, 156, 59, 0.15);
            padding: 18px 22px;
            border-radius: 16px;
            margin: 22px 0;
            font-size: 1.45rem;
            font-weight: 600;
            color: #c0ffc0;
        }

        label {
            display: block;
            font-size: 1.5rem;
            font-weight: 700;
            color: #c0ffc0;
            margin: 22px 0 10px;
        }

        select {
            width: 100%;
            padding: 20px 18px;
            font-size: 1.45rem;
            background: #0f150f;
            color: white;
            border: 4px solid var(--verde-brasil);
            border-radius: 16px;
        }

        select:focus {
            border-color: var(--amarelo-brasil);
            outline: none;
            box-shadow: 0 0 0 6px rgba(255, 223, 0, 0.25);
        }

        button {
            width: 100%;
            padding: 24px;
            margin-top: 30px;
            font-size: 1.55rem;
            font-weight: 700;
            border: none;
            border-radius: 18px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-votar {
            background: linear-gradient(90deg, var(--verde-brasil), #00b050);
            color: white;
        }

        .btn-votar:hover:not(:disabled) {
            background: linear-gradient(90deg, #00b050, var(--verde-brasil));
            transform: translateY(-3px);
        }

        .btn-reset {
            background: #4a1f1f;
            color: #ff9999;
            font-size: 1.25rem;
            padding: 18px;
            margin-top: 15px;
        }

        button:disabled {
            background: #333;
            color: #888;
            cursor: not-allowed;
        }

        .tabs {
            display: flex;
            background: #0f150f;
            border: 3px solid var(--verde-brasil);
            border-radius: 16px;
            padding: 8px;
            margin: 25px 0;
        }

        .tab {
            flex: 1;
            padding: 18px;
            text-align: center;
            border-radius: 12px;
            font-size: 1.35rem;
            font-weight: 600;
            cursor: pointer;
        }

        .tab.active {
            background: var(--verde-brasil);
            color: white;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin: 30px 0;
        }

        .stat-card {
            background: #0f150f;
            padding: 22px 15px;
            border-radius: 16px;
            text-align: center;
            border: 3px solid var(--amarelo-brasil);
        }

        .stat-card strong {
            font-size: 2.4rem;
            color: var(--amarelo-brasil);
            display: block;
        }

        .donut-container {
            width: 220px;
            height: 220px;
            margin: 35px auto;
            position: relative;
        }

        .donut {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(#009c3b 0% var(--p1), #ffdf00 var(--p1) var(--p2), #002776 var(--p2) 100%);
        }

        .donut::after {
            content: "";
            position: absolute;
            inset: 22%;
            background: var(--painel);
            border-radius: 50%;
            border: 6px solid var(--verde-brasil);
        }

        .candidato-bar {
            margin: 22px 0;
            padding: 20px;
            background: #0f150f;
            border-radius: 16px;
            border-left: 8px solid var(--verde-brasil);
        }

        .ultimos-votos {
            max-height: 380px;
            overflow-y: auto;
        }

        .voto-item {
            padding: 20px;
            background: #0f150f;
            margin-bottom: 16px;
            border-radius: 16px;
            font-size: 1.4rem;
            border-left: 10px solid var(--amarelo-brasil);
        }

        /* Melhorias para baixa visão */
        @media (max-width: 480px) {
            .header h1 { font-size: 2.1rem; }
            button { font-size: 1.6rem; padding: 26px; }
            select { font-size: 1.5rem; padding: 22px; }
            label { font-size: 1.55rem; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>🗳️ APURAÇÃO ELEITORAL 2026</h1>
        <div class="relogio" id="relogio">00:00:00</div>
    </div>

    <div class="container">

        <!-- Painel de Voto -->
        <div class="painel">
            <h2>REGISTRAR SEU VOTO</h2>
            
            <div class="step">1️⃣ Escolha seu Estado</div>
            <select id="estado" onchange="carregarCidades()"></select>

            <div class="step">2️⃣ Escolha sua Cidade</div>
            <select id="cidade"></select>

            <div class="step">3️⃣ Escolha o Candidato</div>
            <select id="candidato">
                <option value="0">Candidato A</option>
                <option value="1">Candidato B</option>
                <option value="2">Candidato C</option>
                <option value="3">VOTO NULO</option>
            </select>

            <button id="btnVotar" class="btn-votar" onclick="votar()">
                ✅ CONFIRMAR VOTO
            </button>

            <button class="btn-reset" onclick="zerarVotos()">
                🔄 Zerar todos os votos (Administrador)
            </button>
        </div>

        <!-- Painel de Resultados -->
        <div class="painel">
            <h2>📊 RESULTADO DA APURAÇÃO</h2>

            <div class="stats" id="stats-gerais"></div>

            <div class="tabs">
                <div class="tab active" onclick="mudarFiltro(0)" id="tab0">GERAL</div>
                <div class="tab" onclick="mudarFiltro(1)" id="tab1">POR ESTADO</div>
                <div class="tab" onclick="mudarFiltro(2)" id="tab2">POR CIDADE</div>
            </div>

            <div class="donut-container">
                <div class="donut" id="donut" style="--p1:0%; --p2:0%;"></div>
            </div>

            <div id="resultado"></div>

            <h2 style="margin-top:40px;">🕒 Últimos Votos</h2>
            <div class="ultimos-votos" id="ultimos-votos"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
        const SUPABASE_URL = "https://osofdmgokrxdzsxozsrf.supabase.co";
        const SUPABASE_KEY = "sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allVotes = [];
        let filtroAtual = 0;
        let deviceUuid = "";
        const nomes = ["Candidato A", "Candidato B", "Candidato C"];
        const estados = ["AC","AL","AP","AM","BA","CE","DF","ES","GO","MA","MT","MS","MG","PA","PB","PR","PE","PI","RJ","RN","RS","RO","RR","SC","SP","SE","TO"];

        function getDeviceUuid() {
            let id = localStorage.getItem('voter_uuid');
            if (!id) {
                id = crypto.randomUUID ? crypto.randomUUID() : 'device-' + Date.now();
                localStorage.setItem('voter_uuid', id);
            }
            return id;
        }

        function atualizarRelogio() {
            document.getElementById("relogio").innerText = new Date().toLocaleTimeString('pt-BR', { hour12: false });
        }
        setInterval(atualizarRelogio, 1000);

        function popularEstados() {
            const s = document.getElementById("estado");
            s.innerHTML = '<option value="">Escolha seu Estado...</option>';
            estados.forEach(uf => s.innerHTML += `<option value="${uf}">${uf}</option>`);
        }

        async function carregarCidades() {
            const uf = document.getElementById("estado").value;
            const s = document.getElementById("cidade");
            s.innerHTML = '<option value="">Carregando...</option>';
            if (!uf) return s.innerHTML = '<option value="">Selecione primeiro o estado</option>';

            try {
                const r = await fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`);
                const d = await r.json();
                s.innerHTML = d.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
            } catch (e) {
                s.innerHTML = '<option value="">Erro ao carregar cidades</option>';
            }
        }

        async function loadVotes() {
            const { data, error } = await supabaseClient.from('votes').select('*').order('created_at', { ascending: false });
            if (!error) {
                allVotes = data || [];
                verificarVotoExistente();
                atualizarTela();
            }
        }

        function verificarVotoExistente() {
            const jaVotou = allVotes.some(v => v.device_id === deviceUuid);
            const btn = document.getElementById("btnVotar");
            if (jaVotou) {
                btn.disabled = true;
                btn.textContent = "✅ VOTO JÁ REGISTRADO";
            } else {
                btn.disabled = false;
                btn.textContent = "✅ CONFIRMAR VOTO";
            }
        }

        async function votar() {
            const uf = document.getElementById("estado").value;
            const cidade = document.getElementById("cidade").value;
            const cand = parseInt(document.getElementById("candidato").value);

            if (!uf || !cidade) {
                alert("Por favor, selecione Estado e Cidade.");
                return;
            }

            const { error } = await supabaseClient.from('votes').insert([{
                uf, cidade, candidato: cand, device_id: deviceUuid
            }]);

            if (error) alert("Erro ao registrar voto.");
            else {
                alert("Voto registrado com sucesso!");
                await loadVotes();
            }
        }

        async function zerarVotos() {
            if (!confirm("Deseja realmente zerar todos os votos?")) return;
            await supabaseClient.from('votes').delete().neq('id', null);
            await loadVotes();
        }

        function mudarFiltro(f) {
            filtroAtual = f;
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === f));
            atualizarTela();
        }

        function atualizarTela() {
            const ufSel = document.getElementById("estado").value;
            const cidSel = document.getElementById("cidade").value;
            let filtered = allVotes;

            if (filtroAtual === 1 && ufSel) filtered = allVotes.filter(v => v.uf === ufSel);
            if (filtroAtual === 2 && cidSel) filtered = allVotes.filter(v => v.cidade === cidSel);

            let t = [0, 0, 0, 0];
            filtered.forEach(v => t[v.candidato]++);

            const validos = t[0] + t[1] + t[2];
            const total = validos + t[3];

            document.getElementById("stats-gerais").innerHTML = `
                <div class="stat-card"><strong>${total}</strong><small>Total de Votos</small></div>
                <div class="stat-card"><strong>${validos}</strong><small>Votos Válidos</small></div>
                <div class="stat-card"><strong>${t[3]}</strong><small>Votos Nulos</small></div>
            `;

            if (validos > 0) {
                const p1 = (t[0] / validos) * 100;
                const p2 = p1 + (t[1] / validos) * 100;
                document.getElementById("donut").style.setProperty('--p1', p1 + '%');
                document.getElementById("donut").style.setProperty('--p2', p2 + '%');
            }

            let html = nomes.map((nome, i) => {
                const perc = validos ? ((t[i] / validos) * 100).toFixed(1) : 0;
                return `
                    <div class="candidato-bar">
                        <div style="display:flex; justify-content:space-between; margin-bottom:12px; font-size:1.45rem;">
                            <strong>${nome}</strong>
                            <span>${perc}% (${t[i]} votos)</span>
                        </div>
                        <div style="height:20px; background:#2a2f2a; border-radius:999px;">
                            <div style="height:100%; width:${perc}%; background: linear-gradient(to right, #009c3b, #ffdf00);"></div>
                        </div>
                    </div>`;
            }).join('');

            document.getElementById("resultado").innerHTML = html || "<p style='text-align:center; color:#888; padding:40px;'>Nenhum voto registrado ainda.</p>";

            let ult = allVotes.slice(0, 6).map(v => {
                const tipo = v.candidato === 3 ? 'NULO' : nomes[v.candidato];
                return `<div class="voto-item">${v.cidade} (${v.uf}) — <strong>${tipo}</strong></div>`;
            }).join('');
            document.getElementById("ultimos-votos").innerHTML = ult || "<p style='text-align:center; color:#777; padding:40px;'>Nenhum voto registrado ainda.</p>";
        }

        window.onload = async () => {
            deviceUuid = getDeviceUuid();
            popularEstados();
            await loadVotes();
            setInterval(loadVotes, 8000);
        };
    </script>
</body>
</html>
