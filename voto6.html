<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APURAÇÃO 2026 • TSE ARENA</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Press+Start+2P&display=swap');

        :root {
            --neon-green: #00ff41;
            --neon-cyan: #00f0ff;
            --neon-purple: #c026d3;
            --dark: #0a0f0a;
            --panel: rgba(15, 23, 42, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #050705;
            color: var(--neon-green);
            font-family: 'Orbitron', sans-serif;
            background-image: 
                linear-gradient(rgba(0, 255, 65, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 65, 0.04) 1px, transparent 1px);
            background-size: 40px 40px;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: "";
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(transparent 0px, transparent 3px, rgba(0, 255, 65, 0.025) 3px, rgba(0, 255, 65, 0.025) 6px);
            animation: scanline 8s linear infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes scanline {
            0% { background-position: 0 0; }
            100% { background-position: 0 800px; }
        }

        .header {
            background: linear-gradient(180deg, #0a0f0a, #1a1f2e);
            border-bottom: 6px solid var(--neon-green);
            padding: 20px;
            text-align: center;
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.6);
            position: relative;
        }

        .header::after {
            content: "LIVE";
            position: absolute;
            top: 15px;
            right: 20px;
            background: #ff0033;
            color: white;
            font-size: 0.9rem;
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        .header h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: clamp(1.8rem, 6vw, 2.8rem);
            letter-spacing: 6px;
            text-shadow: 
                0 0 10px var(--neon-green),
                0 0 30px var(--neon-green);
        }

        .relogio {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.4rem;
            color: var(--neon-cyan);
            margin-top: 10px;
            text-shadow: 0 0 15px var(--neon-cyan);
        }

        .container {
            max-width: 780px;
            margin: 30px auto;
            padding: 0 15px;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .painel {
            background: var(--panel);
            border: 2px solid var(--neon-green);
            border-radius: 16px;
            padding: 28px 22px;
            box-shadow: 0 0 35px rgba(0, 255, 65, 0.4);
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .painel::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 4px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(300%); }
        }

        h2 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.35rem;
            color: var(--neon-cyan);
            text-align: center;
            margin-bottom: 24px;
            text-shadow: 0 0 15px var(--neon-cyan);
        }

        .step {
            display: flex;
            align-items: center;
            gap: 14px;
            margin: 20px 0 10px;
            font-size: 1.15rem;
            color: var(--neon-green);
        }

        label {
            display: block;
            font-size: 1.2rem;
            margin: 16px 0 8px;
            color: #a3ffc0;
        }

        select {
            width: 100%;
            padding: 18px 16px;
            font-size: 1.25rem;
            background: #0a140a;
            color: white;
            border: 2px solid var(--neon-green);
            border-radius: 12px;
            font-family: 'Orbitron', sans-serif;
        }

        select:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.6);
            outline: none;
        }

        button {
            width: 100%;
            padding: 20px;
            margin-top: 25px;
            font-family: 'Press Start 2P', cursive;
            font-size: 1.25rem;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn-votar {
            background: linear-gradient(90deg, #00ff41, #39ff14);
            color: #000;
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.8);
        }

        .btn-votar:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 0 40px rgba(0, 255, 65, 1);
        }

        .btn-reset {
            background: #4c1d1d;
            color: #ff6666;
            font-size: 1rem;
            margin-top: 12px;
        }

        button:disabled {
            background: #222;
            color: #666;
            cursor: not-allowed;
            box-shadow: none;
        }

        .tabs {
            display: flex;
            background: #0a140a;
            border: 2px solid var(--neon-green);
            border-radius: 12px;
            padding: 6px;
            margin: 25px 0;
        }

        .tab {
            flex: 1;
            padding: 16px 10px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .tab.active {
            background: var(--neon-green);
            color: #000;
            box-shadow: 0 0 20px var(--neon-green);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 16px;
            margin: 25px 0;
        }

        .stat-card {
            background: rgba(10, 20, 10, 0.8);
            padding: 18px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--neon-green);
        }

        .stat-card strong {
            font-size: 1.9rem;
            color: var(--neon-cyan);
            display: block;
        }

        .donut-container {
            width: 200px;
            height: 200px;
            margin: 30px auto;
            position: relative;
        }

        .donut {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(#00ff41 0% var(--p1), #00f0ff var(--p1) var(--p2), #c026d3 var(--p2) 100%);
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.7);
        }

        .donut::after {
            content: "";
            position: absolute;
            inset: 22%;
            background: #0a0f0a;
            border-radius: 50%;
            border: 2px solid var(--neon-green);
        }

        .voto-item {
            padding: 16px;
            background: rgba(10, 20, 10, 0.7);
            margin-bottom: 12px;
            border-radius: 12px;
            border-left: 6px solid var(--neon-cyan);
            font-size: 1.1rem;
        }

        /* Efeitos game */
        .glow { text-shadow: 0 0 20px currentColor; }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="glow">APURAÇÃO 2026</h1>
        <div class="relogio" id="relogio">00:00:00</div>
    </div>

    <div class="container">

        <!-- Painel de Voto -->
        <div class="painel">
            <h2><i class="fas fa-gamepad"></i> VOTAR AGORA</h2>
            
            <div class="step"><i class="fas fa-map-marker-alt"></i> 01 • ESTADO</div>
            <select id="estado" onchange="carregarCidades()"></select>

            <div class="step"><i class="fas fa-city"></i> 02 • CIDADE</div>
            <select id="cidade"></select>

            <div class="step"><i class="fas fa-user-secret"></i> 03 • CANDIDATO</div>
            <select id="candidato">
                <option value="0">Candidato A</option>
                <option value="1">Candidato B</option>
                <option value="2">Candidato C</option>
                <option value="3">VOTO NULO</option>
            </select>

            <button id="btnVotar" class="btn-votar" onclick="votar()">
                <i class="fas fa-bolt"></i> CONFIRMAR VOTO
            </button>

            <button class="btn-reset" onclick="zerarVotos()">
                <i class="fas fa-skull-crossbones"></i> ZERAR SISTEMA
            </button>
        </div>

        <!-- Painel de Resultados -->
        <div class="painel">
            <h2><i class="fas fa-trophy"></i> RANKING DA ARENA</h2>

            <div class="stats" id="stats-gerais"></div>

            <div class="tabs">
                <div class="tab active" onclick="mudarFiltro(0)" id="tab0">GLOBAL</div>
                <div class="tab" onclick="mudarFiltro(1)" id="tab1">ESTADO</div>
                <div class="tab" onclick="mudarFiltro(2)" id="tab2">CIDADE</div>
            </div>

            <div class="donut-container">
                <div class="donut" id="donut" style="--p1:0%; --p2:0%;"></div>
            </div>

            <div id="resultado"></div>

            <h2 style="margin-top:35px;"><i class="fas fa-history"></i> LOG DE VOTOS</h2>
            <div class="ultimos-votos" id="ultimos-votos"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
        // Configuração Supabase
        const SUPABASE_URL = "https://osofdmgokrxdzsxozsrf.supabase.co";
        const SUPABASE_KEY = "sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allVotes = [];
        let filtroAtual = 0;
        let deviceUuid = "";
        const nomes = ["Candidato A", "Candidato B", "Candidato C"];
        const estados = ["AC","AL","AP","AM","BA","CE","DF","ES","GO","MA","MT","MS","MG","PA","PB","PR","PE","PI","RJ","RN","RS","RO","RR","SC","SP","SE","TO"];

        function getDeviceUuid() {
            let id = localStorage.getItem('voter_uuid');
            if (!id) {
                id = crypto.randomUUID ? crypto.randomUUID() : 'player-' + Date.now();
                localStorage.setItem('voter_uuid', id);
            }
            return id;
        }

        function atualizarRelogio() {
            document.getElementById("relogio").innerText = new Date().toLocaleTimeString('pt-BR', { hour12: false });
        }
        setInterval(atualizarRelogio, 1000);

        function popularEstados() {
            const s = document.getElementById("estado");
            s.innerHTML = '<option value="">SELECIONE ESTADO...</option>';
            estados.forEach(uf => s.innerHTML += `<option value="${uf}">${uf}</option>`);
        }

        async function carregarCidades() {
            const uf = document.getElementById("estado").value;
            const s = document.getElementById("cidade");
            s.innerHTML = '<option value="">CARREGANDO...</option>';
            if (!uf) return s.innerHTML = '<option value="">Escolha o estado primeiro</option>';

            try {
                const r = await fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`);
                const d = await r.json();
                s.innerHTML = d.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
            } catch (e) {
                s.innerHTML = '<option value="">Erro ao carregar cidades</option>';
            }
        }

        async function loadVotes() {
            const { data, error } = await supabaseClient.from('votes').select('*').order('created_at', { ascending: false });
            if (!error) {
                allVotes = data || [];
                verificarVotoExistente();
                atualizarTela();
            }
        }

        function verificarVotoExistente() {
            const jaVotou = allVotes.some(v => v.device_id === deviceUuid);
            const btn = document.getElementById("btnVotar");
            if (jaVotou) {
                btn.disabled = true;
                btn.innerHTML = `<i class="fas fa-shield-alt"></i> VOTO REGISTRADO`;
            } else {
                btn.disabled = false;
                btn.innerHTML = `<i class="fas fa-bolt"></i> CONFIRMAR VOTO`;
            }
        }

        async function votar() {
            const uf = document.getElementById("estado").value;
            const cidade = document.getElementById("cidade").value;
            const cand = parseInt(document.getElementById("candidato").value);

            if (!uf || !cidade) return alert("SELECIONE ESTADO E CIDADE!");

            const { error } = await supabaseClient.from('votes').insert([{
                uf, cidade, candidato: cand, device_id: deviceUuid
            }]);

            if (error) alert("ERRO NO SISTEMA: " + error.message);
            else {
                alert("✅ VOTO TRANSMITIDO COM SUCESSO!");
                await loadVotes();
            }
        }

        async function zerarVotos() {
            if (!confirm("RESETAR TODA A ARENA?")) return;
            await supabaseClient.from('votes').delete().neq('id', null);
            await loadVotes();
        }

        function mudarFiltro(f) {
            filtroAtual = f;
            document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === f));
            atualizarTela();
        }

        function atualizarTela() {
            const ufSel = document.getElementById("estado").value;
            const cidSel = document.getElementById("cidade").value;
            let filtered = allVotes;

            if (filtroAtual === 1 && ufSel) filtered = allVotes.filter(v => v.uf === ufSel);
            if (filtroAtual === 2 && cidSel) filtered = allVotes.filter(v => v.cidade === cidSel);

            let t = [0, 0, 0, 0];
            filtered.forEach(v => t[v.candidato]++);

            const validos = t[0] + t[1] + t[2];
            const total = validos + t[3];

            document.getElementById("stats-gerais").innerHTML = `
                <div class="stat-card"><strong>${total}</strong><small>TOTAL</small></div>
                <div class="stat-card"><strong>${validos}</strong><small>VÁLIDOS</small></div>
                <div class="stat-card"><strong>${t[3]}</strong><small>NULOS</small></div>
            `;

            if (validos > 0) {
                const p1 = (t[0] / validos) * 100;
                const p2 = p1 + (t[1] / validos) * 100;
                document.getElementById("donut").style.setProperty('--p1', p1 + '%');
                document.getElementById("donut").style.setProperty('--p2', p2 + '%');
            }

            let html = nomes.map((nome, i) => {
                const perc = validos ? ((t[i] / validos) * 100).toFixed(1) : 0;
                return `
                    <div style="margin:18px 0; padding:16px; background:rgba(10,20,10,0.6); border-radius:12px;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                            <strong>${nome}</strong>
                            <span>${perc}% (${t[i]})</span>
                        </div>
                        <div style="height:12px; background:#1a2a1a; border-radius:999px;">
                            <div style="height:100%; width:${perc}%; background:linear-gradient(90deg, #00ff41, #00f0ff);"></div>
                        </div>
                    </div>`;
            }).join('');

            document.getElementById("resultado").innerHTML = html || "<p style='text-align:center; padding:40px; color:#555;'>AGUARDANDO VOTOS...</p>";

            let ult = allVotes.slice(0, 7).map(v => {
                const tipo = v.candidato === 3 ? 'NULO' : nomes[v.candidato];
                return `<div class="voto-item">${v.cidade} (${v.uf}) → <strong>${tipo}</strong></div>`;
            }).join('');
            document.getElementById("ultimos-votos").innerHTML = ult || "<p style='text-align:center; color:#555; padding:30px;'>NENHUM VOTO REGISTRADO</p>";
        }

        window.onload = async () => {
            deviceUuid = getDeviceUuid();
            popularEstados();
            await loadVotes();
            setInterval(loadVotes, 7000);
        };
    </script>
</body>
</html>
