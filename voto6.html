<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apuração Eleitoral 2026 • Brasil</title>
    
    <style>
        :root {
            --brazil-green: #004225;
            --brazil-yellow: #FFDF00;
            --brazil-blue: #002776;
            --bg-dark: #020a05;
            --card-bg: #0a1a0f;
            --text-main: #ffffff;
            --text-dim: #a0a0a0;
            --border-glow: rgba(255, 223, 0, 0.2);
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 0%, #004225 0%, #020a05 70%);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            padding: 10px;
        }

        header {
            text-align: center;
            padding: 40px 15px;
        }

        header h1 {
            font-size: clamp(1.8rem, 8vw, 2.8rem);
            color: var(--brazil-yellow);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .relogio {
            font-size: 1.5rem;
            color: var(--text-dim);
            font-weight: 300;
            margin-top: 5px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-glow);
            border-radius: 24px;
            padding: clamp(20px, 5vw, 40px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 25px;
            color: var(--brazil-yellow);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group { margin-bottom: 25px; }

        label {
            display: block;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--text-dim);
        }

        select {
            width: 100%;
            padding: 20px;
            font-size: 1.4rem;
            background: #000000;
            border: 2px solid #1a3a25;
            border-radius: 16px;
            color: white;
            font-weight: 500;
            outline: none;
            transition: border 0.3s;
        }

        select:focus { border-color: var(--brazil-yellow); }

        .btn-votar {
            width: 100%;
            padding: 25px;
            background: linear-gradient(135deg, #004225, #006b3c);
            color: var(--brazil-yellow);
            border: 1px solid var(--brazil-yellow);
            border-radius: 18px;
            font-size: 1.6rem;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.2s;
        }

        .btn-votar:active { transform: scale(0.98); }
        .btn-votar:disabled {
            background: #1a1a1a;
            color: #444;
            border-color: #333;
            cursor: not-allowed;
        }

        /* Resultados */
        .stats-summary {
            display: flex;
            justify-content: space-around;
            margin-bottom: 30px;
            gap: 10px;
        }

        .stat-box { text-align: center; }
        .stat-box strong { font-size: 2.5rem; display: block; color: var(--brazil-yellow); }
        .stat-box span { font-size: 1rem; color: var(--text-dim); font-weight: bold; }

        .cand-row { margin-bottom: 25px; }
        .cand-info { 
            display: flex; 
            justify-content: space-between; 
            font-size: 1.3rem; 
            font-weight: 600;
            margin-bottom: 8px;
        }

        .bar-container {
            height: 20px;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #1a3a25;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #FFDF00, #c4a700);
            transition: width 1s ease-in-out;
        }

        .vote-item {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 10px;
            border-left: 5px solid var(--brazil-yellow);
        }

        @media (max-width: 600px) {
            header h1 { font-size: 1.6rem; }
            .card { padding: 20px; }
            select { font-size: 1.2rem; }
            .btn-votar { font-size: 1.3rem; padding: 20px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Apuração Eleitoral 2026</h1>
        <div id="relogio" class="relogio">00:00:00</div>
    </header>

    <div class="container">
        <div class="card">
            <h2>🇧🇷 REGISTRAR VOTO</h2>
            <div class="form-group">
                <label>ESTADO (UF)</label>
                <select id="estado" onchange="carregarCidades()"></select>
            </div>
            <div class="form-group">
                <label>CIDADE</label>
                <select id="cidade"></select>
            </div>
            <div class="form-group">
                <label>CANDIDATO</label>
                <select id="candidato">
                    <option value="0">Candidato A</option>
                    <option value="1">Candidato B</option>
                    <option value="2">Candidato C</option>
                    <option value="3">VOTO NULO</option>
                </select>
            </div>
            <button id="btnVotar" class="btn-votar" onclick="votar()">CONFIRMAR VOTO</button>
        </div>

        <div class="card">
            <h2>📊 RESULTADOS</h2>
            <div class="stats-summary" id="stats-gerais"></div>
            <div id="resultado"></div>
            
            <h3 style="margin: 30px 0 15px; font-size: 1.3rem; color: var(--text-dim);">ÚLTIMOS REGISTROS</h3>
            <div id="ultimos-votos"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
        const SUPABASE_URL = "https://osofdmgokrxdzsxozsrf.supabase.co";
        const SUPABASE_KEY = "sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allVotes = [];
        let deviceUuid = "";
        const nomes = ["Candidato A", "Candidato B", "Candidato C"];
        const estados = ["AC","AL","AP","AM","BA","CE","DF","ES","GO","MA","MT","MS","MG","PA","PB","PR","PE","PI","RJ","RN","RS","RO","RR","SC","SP","SE","TO"];

        function getDeviceUuid() {
            let id = localStorage.getItem('voter_uuid');
            if (!id) {
                id = crypto.randomUUID ? crypto.randomUUID() : 'id-' + Date.now();
                localStorage.setItem('voter_uuid', id);
            }
            return id;
        }

        async function carregarCidades() {
            const uf = document.getElementById("estado").value;
            const s = document.getElementById("cidade");
            if (!uf) return;
            s.innerHTML = '<option>Carregando...</option>';
            try {
                const r = await fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`);
                const d = await r.json();
                s.innerHTML = d.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
            } catch (e) { s.innerHTML = '<option>Erro ao carregar</option>'; }
        }

        async function loadVotes() {
            const { data, error } = await supabaseClient.from('votes').select('*').order('created_at', { ascending: false });
            if (!error) {
                allVotes = data || [];
                verificarStatus();
                atualizarTela();
            }
        }

        function verificarStatus() {
            const jaVotou = allVotes.some(v => v.device_id === deviceUuid);
            const btn = document.getElementById("btnVotar");
            if (jaVotou) {
                btn.disabled = true;
                btn.innerText = "VOTO JÁ ENVIADO";
            }
        }

        async function votar() {
            const uf = document.getElementById("estado").value;
            const cidade = document.getElementById("cidade").value;
            const cand = parseInt(document.getElementById("candidato").value);

            if (!uf || !cidade) return alert("Por favor, selecione UF e Cidade.");

            const { error } = await supabaseClient.from('votes').insert([{
                uf, cidade, candidato: cand, device_id: deviceUuid
            }]);

            if (error) alert("Erro ao votar: " + error.message);
            else {
                alert("Voto registrado com sucesso!");
                await loadVotes();
            }
        }

        function atualizarTela() {
            let t = [0, 0, 0, 0];
            allVotes.forEach(v => { if(t[v.candidato] !== undefined) t[v.candidato]++; });
            const validos = t[0] + t[1] + t[2];
            const total = validos + t[3];

            document.getElementById("stats-gerais").innerHTML = `
                <div class="stat-box"><strong>${total}</strong><span>VOTOS</span></div>
                <div class="stat-box"><strong>${validos}</strong><span>VÁLIDOS</span></div>
            `;

            let html = '';
            nomes.forEach((nome, i) => {
                const perc = validos ? ((t[i] / validos) * 100).toFixed(1) : 0;
                html += `
                    <div class="cand-row">
                        <div class="cand-info"><span>${nome}</span><span>${perc}%</span></div>
                        <div class="bar-container"><div class="bar-fill" style="width:${perc}%"></div></div>
                    </div>`;
            });
            document.getElementById("resultado").innerHTML = html;

            document.getElementById("ultimos-votos").innerHTML = allVotes.slice(0, 3).map(v => `
                <div class="vote-item">
                    <b>${v.cidade} (${v.uf})</b> • ${v.candidato === 3 ? 'Nulo' : nomes[v.candidato]}
                </div>
            `).join('');
        }

        setInterval(() => {
            document.getElementById("relogio").innerText = new Date().toLocaleTimeString('pt-BR');
        }, 1000);

        window.onload = () => {
            deviceUuid = getDeviceUuid();
            const s = document.getElementById("estado");
            s.innerHTML = '<option value="">UF</option>' + estados.map(uf => `<option value="${uf}">${uf}</option>`).join('');
            loadVotes();
            
            // Realtime update
            supabaseClient.channel('custom-all-channel')
            .on('postgres_changes', { event: '*', schema: 'public', table: 'votes' }, (payload) => {
                loadVotes();
            }).subscribe();
        };
    </script>
</body>
</html>
