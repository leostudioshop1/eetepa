<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA DE VOTAÇÃO 2026</title>
    
    <style>
        :root {
            --marinho: #001220; /* Azul Marinho Profundo */
            --marinho-claro: #00213b;
            --verde-esmeralda: #00f5a0; /* Verde Vibrante */
            --verde-escuro: #00a86b;
            --texto-branco: #ffffff;
            --texto-cinza: #ced4da;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--marinho);
            color: var(--texto-branco);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 3px solid var(--verde-esmeralda);
            margin-bottom: 40px;
        }

        header h1 { 
            font-size: clamp(2.5rem, 10vw, 3.5rem); 
            color: var(--verde-esmeralda);
            text-shadow: 0 0 15px rgba(0, 245, 160, 0.4);
            letter-spacing: -1px;
        }

        .container { 
            max-width: 850px; 
            margin: 0 auto; 
        }

        /* CARD DE VOTAÇÃO */
        .sessao-voto {
            background: var(--marinho-claro);
            border: 2px solid #003a66;
            border-radius: 30px;
            padding: clamp(25px, 6vw, 50px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .titulo-secao {
            font-size: 2.2rem;
            margin-bottom: 30px;
            color: var(--verde-esmeralda);
            border-left: 10px solid var(--verde-esmeralda);
            padding-left: 20px;
        }

        .item-form { margin-bottom: 40px; }

        label {
            display: block;
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--texto-cinza);
        }

        /* SELECTS GIGANTES */
        select {
            width: 100%;
            padding: 25px;
            font-size: 2rem; /* Fonte muito grande */
            background: #000a12;
            border: 3px solid #004d85;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            appearance: none; /* Remove seta padrão */
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2300f5a0' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 25px center;
            background-size: 30px;
        }

        select:focus {
            border-color: var(--verde-esmeralda);
            outline: none;
            box-shadow: 0 0 20px rgba(0, 245, 160, 0.2);
        }

        /* BOTÃO CONFIRMAR */
        .btn-confirmar {
            width: 100%;
            padding: 35px;
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--verde-escuro), var(--verde-esmeralda));
            color: var(--marinho);
            border: none;
            border-radius: 25px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(0, 168, 107, 0.4);
            margin-top: 20px;
            transition: all 0.2s;
        }

        .btn-confirmar:active { transform: scale(0.97); }
        .btn-confirmar:disabled {
            background: #223e35;
            color: #555;
            box-shadow: none;
            cursor: not-allowed;
        }

        /* RESULTADOS */
        .card-resultados {
            background: #000a12;
            border-radius: 30px;
            padding: 40px;
            margin-top: 50px;
            border: 2px solid #002d4d;
        }

        .cand-info {
            display: flex; 
            justify-content: space-between; 
            font-size: 2rem; 
            font-weight: 800;
            margin-bottom: 15px;
        }

        .barra-fundo {
            height: 45px;
            background: #001a2e;
            border-radius: 22px;
            overflow: hidden;
            margin-bottom: 35px;
            border: 1px solid #003a66;
        }

        .barra-progresso {
            height: 100%;
            background: linear-gradient(90deg, var(--verde-escuro), var(--verde-esmeralda));
            transition: width 1.2s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }

        .total-votos {
            text-align: center;
            font-size: 1.8rem;
            color: var(--verde-esmeralda);
            margin-top: 20px;
            font-weight: bold;
        }

        @media (max-width: 600px) {
            header h1 { font-size: 2.2rem; }
            .titulo-secao { font-size: 1.8rem; }
            select { font-size: 1.6rem; }
            .btn-confirmar { font-size: 1.8rem; padding: 25px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>ELEIÇÕES 2026</h1>
        <div id="relogio" style="font-size: 1.5rem; color: var(--texto-cinza); margin-top: 10px;">00:00:00</div>
    </header>

    <div class="container">
        
        <div class="sessao-voto">
            <h2 class="titulo-secao">REGISTRAR VOTO</h2>

            <div class="item-form">
                <label>1. SELECIONE O ESTADO:</label>
                <select id="estado" onchange="carregarCidades()">
                    <option value="">Aguardando escolha...</option>
                </select>
            </div>

            <div class="item-form">
                <label>2. SELECIONE A CIDADE:</label>
                <select id="cidade">
                    <option value="">Escolha o estado primeiro</option>
                </select>
            </div>

            <div class="item-form">
                <label>3. SELECIONE O CANDIDATO:</label>
                <select id="candidato">
                    <option value="0">Candidato A</option>
                    <option value="1">Candidato B</option>
                    <option value="2">Candidato C</option>
                    <option value="3">VOTO EM BRANCO / NULO</option>
                </select>
            </div>

            <button id="btnVotar" class="btn-confirmar" onclick="votar()">CONFIRMAR VOTO</button>
        </div>

        <div class="card-resultados">
            <h2 class="titulo-secao">APURAÇÃO NACIONAL</h2>
            <div id="lista-resultados"></div>
            <div id="contador-total" class="total-votos">Carregando dados...</div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
        const SUPABASE_URL = "https://osofdmgokrxdzsxozsrf.supabase.co";
        const SUPABASE_KEY = "sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allVotes = [];
        let deviceUuid = "";
        const nomes = ["Candidato A", "Candidato B", "Candidato C"];
        const estados = ["AC","AL","AP","AM","BA","CE","DF","ES","GO","MA","MT","MS","MG","PA","PB","PR","PE","PI","RJ","RN","RS","RO","RR","SC","SP","SE","TO"];

        function getDeviceUuid() {
            let id = localStorage.getItem('voter_uuid');
            if (!id) {
                id = crypto.randomUUID ? crypto.randomUUID() : 'id-' + Date.now();
                localStorage.setItem('voter_uuid', id);
            }
            return id;
        }

        async function carregarCidades() {
            const uf = document.getElementById("estado").value;
            const s = document.getElementById("cidade");
            if (!uf) return;
            s.innerHTML = '<option>Carregando cidades...</option>';
            const r = await fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`);
            const d = await r.json();
            s.innerHTML = d.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
        }

        async function loadVotes() {
            const { data, error } = await supabaseClient.from('votes').select('*');
            if (!error) {
                allVotes = data || [];
                atualizarInterface();
            }
        }

        async function votar() {
            const uf = document.getElementById("estado").value;
            const cidade = document.getElementById("cidade").value;
            const cand = parseInt(document.getElementById("candidato").value);

            if (!uf || !cidade) {
                alert("AVISO: Escolha o Estado e a Cidade primeiro!");
                return;
            }

            const { error } = await supabaseClient.from('votes').insert([{
                uf, cidade, candidato: cand, device_id: deviceUuid
            }]);

            if (error) {
                alert("Erro: " + error.message);
            } else {
                alert("VOTO COMPUTADO COM SUCESSO!");
                await loadVotes();
            }
        }

        function atualizarInterface() {
            let t = [0, 0, 0, 0];
            allVotes.forEach(v => t[v.candidato]++);
            const validos = t[0] + t[1] + t[2];

            let html = '';
            nomes.forEach((nome, i) => {
                const perc = validos ? ((t[i] / validos) * 100).toFixed(1) : 0;
                html += `
                    <div class="item-resultado">
                        <div class="cand-info"><span>${nome}</span><span>${perc}%</span></div>
                        <div class="barra-fundo"><div class="barra-progresso" style="width:${perc}%"></div></div>
                    </div>`;
            });

            document.getElementById("lista-resultados").innerHTML = html;
            document.getElementById("contador-total").innerText = "TOTAL DE VOTOS REGISTRADOS: " + allVotes.length;

            // Bloqueio se o dispositivo já votou
            if(allVotes.some(v => v.device_id === deviceUuid)) {
                const btn = document.getElementById("btnVotar");
                btn.disabled = true;
                btn.innerText = "VOTO JÁ ENVIADO";
            }
        }

        setInterval(() => {
            document.getElementById("relogio").innerText = new Date().toLocaleTimeString('pt-BR');
        }, 1000);

        window.onload = () => {
            deviceUuid = getDeviceUuid();
            const s = document.getElementById("estado");
            s.innerHTML = '<option value="">Escolha o Estado...</option>' + estados.map(uf => `<option value="${uf}">${uf}</option>`).join('');
            loadVotes();
            
            // Ouvinte em tempo real para novos votos
            supabaseClient.channel('realtime_votes').on('postgres_changes', { event: '*', schema: 'public', table: 'votes' }, loadVotes).subscribe();
        };
    </script>
</body>
</html>
