<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOTAÇÃO BRASIL 2026</title>
    
    <style>
        :root {
            --verde-brasil: #004724;
            --amarelo-brasil: #FFDF00;
            --azul-brasil: #002776;
            --branco: #FFFFFF;
            --bg-escuro: #010803;
        }

        * { 
            margin: 0; padding: 0; box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-escuro);
            color: var(--branco);
            font-family: Arial, sans-serif;
            padding: 15px;
            line-height: 1.4;
        }

        header {
            text-align: center;
            padding: 20px 0;
            border-bottom: 4px solid var(--amarelo-brasil);
            margin-bottom: 25px;
        }

        header h1 { font-size: 2.2rem; color: var(--amarelo-brasil); }

        .instrucao {
            background: #111;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 8px solid var(--amarelo-brasil);
            font-size: 1.4rem;
            font-weight: bold;
        }

        .container { max-width: 600px; margin: 0 auto; }

        /* Estilo dos Grupos de Escolha */
        .sessao { margin-bottom: 35px; }
        .titulo-sessao { 
            font-size: 1.6rem; 
            margin-bottom: 15px; 
            color: var(--amarelo-brasil);
            text-transform: uppercase;
        }

        /* Transformando Selects em botões grandes para facilitar o toque */
        .grande-seletor {
            width: 100%;
            padding: 25px;
            font-size: 1.8rem;
            background: #1a1a1a;
            border: 3px solid #333;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            margin-bottom: 15px;
            display: block;
            text-align: left;
        }

        select {
            width: 100%;
            padding: 25px;
            font-size: 1.8rem;
            border-radius: 20px;
            background: #fff;
            color: #000;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .btn-confirmar {
            width: 100%;
            padding: 35px;
            font-size: 2.2rem;
            background: #008000;
            color: white;
            border: 5px solid var(--amarelo-brasil);
            border-radius: 25px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 10px 0 #004d00;
            margin-top: 20px;
        }

        .btn-confirmar:active {
            transform: translateY(5px);
            box-shadow: 0 5px 0 #004d00;
        }

        .btn-confirmar:disabled {
            background: #444;
            border-color: #666;
            box-shadow: none;
            color: #888;
        }

        /* Resultados Maiores */
        .resultado-card {
            background: #fff;
            color: #000;
            border-radius: 25px;
            padding: 30px;
            margin-top: 40px;
        }

        .barra-progresso {
            height: 40px;
            background: #eee;
            border-radius: 20px;
            margin: 15px 0 25px;
            overflow: hidden;
            border: 2px solid #ccc;
        }

        .barra-preenchida {
            height: 100%;
            background: #008000;
            transition: width 1s;
        }

        .info-cand {
            display: flex;
            justify-content: space-between;
            font-size: 1.6rem;
            font-weight: bold;
        }

        .voto-registrado {
            background: #002776;
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            font-size: 1.5rem;
            margin-top: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>VOTAÇÃO 2026</h1>
        <div id="relogio" style="font-size: 1.2rem; opacity: 0.7;">00:00:00</div>
    </header>

    <div class="container">
        <div class="instrucao">
            Siga os passos abaixo para votar. Toque nas caixas brancas para escolher.
        </div>

        <div class="sessao">
            <p class="titulo-sessao">1. Escolha seu Estado (UF):</p>
            <select id="estado" onchange="carregarCidades()">
                <option value="">Clique aqui para escolher...</option>
            </select>
        </div>

        <div class="sessao">
            <p class="titulo-sessao">2. Escolha sua Cidade:</p>
            <select id="cidade">
                <option value="">Aguardando Estado...</option>
            </select>
        </div>

        <div class="sessao">
            <p class="titulo-sessao">3. Escolha seu Candidato:</p>
            <select id="candidato">
                <option value="0">Candidato A</option>
                <option value="1">Candidato B</option>
                <option value="2">Candidato C</option>
                <option value="3">VOTAR EM BRANCO / NULO</option>
            </select>
        </div>

        <button id="btnVotar" class="btn-confirmar" onclick="votar()">CONFIRMAR VOTO</button>
        <div id="msgSucesso" class="voto-registrado">✅ SEU VOTO FOI GRAVADO!</div>

        <div class="resultado-card">
            <h2 style="font-size: 2rem; border-bottom: 3px solid #000; padding-bottom: 10px; margin-bottom: 20px;">Apuração ao Vivo</h2>
            <div id="resultado-lista"></div>
            <div id="total-votos" style="font-size: 1.4rem; font-weight: bold; text-align: center; margin-top: 20px;"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
        const SUPABASE_URL = "https://osofdmgokrxdzsxozsrf.supabase.co";
        const SUPABASE_KEY = "sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allVotes = [];
        let deviceUuid = "";
        const nomes = ["Candidato A", "Candidato B", "Candidato C"];
        const estados = ["AC","AL","AP","AM","BA","CE","DF","ES","GO","MA","MT","MS","MG","PA","PB","PR","PE","PI","RJ","RN","RS","RO","RR","SC","SP","SE","TO"];

        function getDeviceUuid() {
            let id = localStorage.getItem('voter_uuid');
            if (!id) {
                id = crypto.randomUUID ? crypto.randomUUID() : 'user-' + Date.now();
                localStorage.setItem('voter_uuid', id);
            }
            return id;
        }

        async function carregarCidades() {
            const uf = document.getElementById("estado").value;
            const s = document.getElementById("cidade");
            if (!uf) return;
            s.innerHTML = '<option>Carregando cidades...</option>';
            const r = await fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`);
            const d = await r.json();
            s.innerHTML = d.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
        }

        async function loadVotes() {
            const { data, error } = await supabaseClient.from('votes').select('*');
            if (!error) {
                allVotes = data || [];
                atualizarTela();
            }
        }

        async function votar() {
            const uf = document.getElementById("estado").value;
            const cidade = document.getElementById("cidade").value;
            const cand = parseInt(document.getElementById("candidato").value);

            if (!uf || !cidade) {
                alert("ATENÇÃO: Você esqueceu de escolher o Estado ou a Cidade!");
                return;
            }

            // Bloqueio simples por localStorage para evitar múltiplos cliques
            if (localStorage.getItem('ja_votou_2026')) {
                alert("Você já votou nesta sessão!");
                return;
            }

            const { error } = await supabaseClient.from('votes').insert([{
                uf, cidade, candidato: cand, device_id: deviceUuid
            }]);

            if (error) {
                alert("Erro ao enviar: " + error.message);
            } else {
                localStorage.setItem('ja_votou_2026', 'true');
                document.getElementById("btnVotar").style.display = "none";
                document.getElementById("msgSucesso").style.display = "block";
                await loadVotes();
                alert("VOTO CONFIRMADO COM SUCESSO!");
            }
        }

        function atualizarTela() {
            let t = [0, 0, 0, 0];
            allVotes.forEach(v => t[v.candidato]++);
            const validos = t[0] + t[1] + t[2];

            let html = '';
            nomes.forEach((nome, i) => {
                const perc = validos ? ((t[i] / validos) * 100).toFixed(1) : 0;
                html += `
                    <div style="margin-bottom:20px;">
                        <div class="info-cand"><span>${nome}</span><span>${perc}%</span></div>
                        <div class="barra-progresso"><div class="barra-preenchida" style="width:${perc}%"></div></div>
                    </div>`;
            });
            document.getElementById("resultado-lista").innerHTML = html;
            document.getElementById("total-votos").innerText = "Total de Votos no Brasil: " + allVotes.length;
            
            // Verifica se o usuário já votou nesta máquina
            if(allVotes.some(v => v.device_id === deviceUuid) || localStorage.getItem('ja_votou_2026')) {
                document.getElementById("btnVotar").disabled = true;
                document.getElementById("btnVotar").innerText = "VOTO JÁ ENVIADO";
            }
        }

        setInterval(() => {
            document.getElementById("relogio").innerText = new Date().toLocaleTimeString('pt-BR');
        }, 1000);

        window.onload = () => {
            deviceUuid = getDeviceUuid();
            const s = document.getElementById("estado");
            s.innerHTML = '<option value="">Clique para Escolher</option>' + estados.map(uf => `<option value="${uf}">${uf}</option>`).join('');
            loadVotes();
            
            // Atualização em tempo real
            supabaseClient.channel('votes_realtime').on('postgres_changes', { event: '*', schema: 'public', table: 'votes' }, loadVotes).subscribe();
        };
    </script>
</body>
</html>
