<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eleições 2026 • Apuração</title>
    
    <style>
        :root {
            --apple-blue: #007AFF;
            --apple-gray: #F2F2F7;
            --apple-text: #1C1C1E;
            --apple-card: #FFFFFF;
            --success: #34C759;
            --danger: #FF3B30;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--apple-gray);
            color: var(--apple-text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            padding-bottom: 40px;
        }

        header {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 20px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #D1D1D6;
        }

        header h1 { font-size: 1.2rem; font-weight: 600; }
        .relogio { font-size: 0.9rem; color: #8E8E93; margin-top: 4px; }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 16px;
        }

        .card {
            background: var(--apple-card);
            border-radius: 20px;
            padding: 24px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        h2 { font-size: 1.5rem; margin-bottom: 20px; letter-spacing: -0.5px; }

        .form-group { margin-bottom: 24px; transition: all 0.3s; }
        
        label { 
            display: block; 
            font-size: 0.85rem; 
            font-weight: 600; 
            color: #8E8E93; 
            margin-bottom: 8px;
            text-transform: uppercase;
            padding-left: 4px;
        }

        select {
            width: 100%;
            padding: 18px;
            font-size: 1.1rem;
            background: #F9F9FB;
            border: 1px solid #E5E5EA;
            border-radius: 14px;
            appearance: none;
            color: var(--apple-text);
            font-weight: 500;
        }

        .btn-votar {
            width: 100%;
            padding: 20px;
            background: var(--apple-blue);
            color: white;
            border: none;
            border-radius: 16px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .btn-votar:active { transform: scale(0.97); background: #0062CC; }
        .btn-votar:disabled { background: #C7C7CC; cursor: not-allowed; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: #F9F9FB;
            padding: 16px;
            border-radius: 14px;
            text-align: center;
        }

        .stat-item strong { font-size: 1.4rem; display: block; }
        .stat-item span { font-size: 0.75rem; color: #8E8E93; font-weight: 600; }

        /* Barras de Progresso Apple Style */
        .cand-row { margin-bottom: 18px; }
        .cand-info { display: flex; justify-content: space-between; margin-bottom: 6px; font-weight: 500; }
        .bar-bg { height: 10px; background: #E5E5EA; border-radius: 5px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--apple-blue); transition: width 0.8s ease-out; }

        .last-votes { font-size: 0.9rem; color: #3A3A3C; }
        .vote-card { padding: 12px 0; border-bottom: 1px solid #F2F2F7; }
        
        .reset-link { 
            display: block; 
            text-align: center; 
            color: var(--danger); 
            font-size: 0.8rem; 
            margin-top: 30px; 
            text-decoration: none; 
        }
    </style>
</head>
<body>

    <header>
        <h1>Apuração Eleitoral 2026</h1>
        <div id="relogio" class="relogio">00:00:00</div>
    </header>

    <div class="container">
        <div class="card">
            <h2>Votar</h2>
            
            <div class="form-group" id="step1">
                <label>Estado</label>
                <select id="estado" onchange="proximoPasso('cidade', true)"></select>
            </div>

            <div class="form-group" id="step2">
                <label>Cidade</label>
                <select id="cidade" onchange="proximoPasso('candidato', false)"></select>
            </div>

            <div class="form-group" id="step3">
                <label>Candidato</label>
                <select id="candidato">
                    <option value="0">Candidato A</option>
                    <option value="1">Candidato B</option>
                    <option value="2">Candidato C</option>
                    <option value="3">VOTO NULO</option>
                </select>
            </div>

            <button id="btnVotar" class="btn-votar" onclick="votar()">Confirmar Voto</button>
        </div>

        <div class="card">
            <h2>Resultados</h2>
            <div class="stats-grid" id="stats-gerais"></div>
            <div id="resultado"></div>
            
            <h3 style="margin-top:24px; font-size:1.1rem;">Últimos Registros</h3>
            <div id="ultimos-votos" class="last-votes"></div>
        </div>

        <a href="#" class="reset-link" onclick="zerarVotos()">Zerar Banco de Dados</a>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
        const SUPABASE_URL = "https://osofdmgokrxdzsxozsrf.supabase.co";
        const SUPABASE_KEY = "sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allVotes = [];
        let deviceUuid = "";
        const nomes = ["Candidato A", "Candidato B", "Candidato C"];
        const estados = ["AC","AL","AP","AM","BA","CE","DF","ES","GO","MA","MT","MS","MG","PA","PB","PR","PE","PI","RJ","RN","RS","RO","RR","SC","SP","SE","TO"];

        function getDeviceUuid() {
            let id = localStorage.getItem('voter_uuid');
            if (!id) {
                id = crypto.randomUUID ? crypto.randomUUID() : 'id-' + Date.now();
                localStorage.setItem('voter_uuid', id);
            }
            return id;
        }

        // UX: Rola para o próximo campo automaticamente
        function proximoPasso(idAlvo, carregarCid) {
            if(carregarCid) carregarCidades();
            setTimeout(() => {
                document.getElementById(idAlvo).scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 300);
        }

        async function carregarCidades() {
            const uf = document.getElementById("estado").value;
            const s = document.getElementById("cidade");
            if (!uf) return;
            const r = await fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`);
            const d = await r.json();
            s.innerHTML = d.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
        }

        async function loadVotes() {
            const { data, error } = await supabaseClient.from('votes').select('*').order('created_at', { ascending: false });
            if (!error) {
                allVotes = data || [];
                verificarStatus();
                atualizarTela();
            }
        }

        function verificarStatus() {
            const jaVotou = allVotes.some(v => v.device_id === deviceUuid);
            const btn = document.getElementById("btnVotar");
            if (jaVotou) {
                btn.disabled = true;
                btn.innerText = "Voto já enviado";
                btn.style.background = "#8E8E93";
            }
        }

        async function votar() {
            const uf = document.getElementById("estado").value;
            const cidade = document.getElementById("cidade").value;
            const cand = parseInt(document.getElementById("candidato").value);

            if (!uf || !cidade) return alert("Selecione os campos obrigatórios");

            const { error } = await supabaseClient.from('votes').insert([{
                uf, cidade, candidato: cand, device_id: deviceUuid
            }]);

            if (error) alert(error.message);
            else {
                alert("Voto Confirmado!");
                await loadVotes();
            }
        }

        function atualizarTela() {
            let t = [0, 0, 0, 0];
            allVotes.forEach(v => t[v.candidato]++);
            const validos = t[0] + t[1] + t[2];

            document.getElementById("stats-gerais").innerHTML = `
                <div class="stat-item"><strong>${validos + t[3]}</strong><span>TOTAL</span></div>
                <div class="stat-item"><strong>${validos}</strong><span>VÁLIDOS</span></div>
            `;

            let html = '';
            nomes.forEach((nome, i) => {
                const perc = validos ? ((t[i] / validos) * 100).toFixed(1) : 0;
                html += `
                    <div class="cand-row">
                        <div class="cand-info"><span>${nome}</span><span>${perc}%</span></div>
                        <div class="bar-bg"><div class="bar-fill" style="width:${perc}%"></div></div>
                    </div>`;
            });
            document.getElementById("resultado").innerHTML = html;

            document.getElementById("ultimos-votos").innerHTML = allVotes.slice(0, 3).map(v => `
                <div class="vote-card">${v.cidade} (${v.uf}) — <b>${v.candidato === 3 ? 'Nulo' : nomes[v.candidato]}</b></div>
            `).join('');
        }

        async function zerarVotos() {
            if (confirm("Resetar sistema?")) {
                await supabaseClient.from('votes').delete().neq('id', 0);
                loadVotes();
            }
        }

        setInterval(() => {
            document.getElementById("relogio").innerText = new Date().toLocaleTimeString('pt-BR');
        }, 1000);

        window.onload = () => {
            deviceUuid = getDeviceUuid();
            const s = document.getElementById("estado");
            s.innerHTML = '<option value="">UF</option>' + estados.map(uf => `<option value="${uf}">${uf}</option>`).join('');
            loadVotes();
        };
    </script>
</body>
</html>
