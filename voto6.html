<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APURAÇÃO ELEITORAL 2026 • TSE</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;600;700&family=Roboto+Mono:wght@300;400;500;600&display=swap');

        :root {
            --primary: #0a2540;
            --accent: #00b4ff;
            --accent-dark: #0099dd;
            --bg: #05080f;
            --card: #0f1c2e;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: #a0d8ff;
            font-family: 'Roboto Mono', monospace;
            min-height: 100vh;
            padding: 15px 10px;
            line-height: 1.5;
        }

        .topo {
            background: linear-gradient(to bottom, #0a2540, #0f1c2e);
            border-bottom: 5px solid var(--accent);
            padding: 25px 15px;
            text-align: center;
            border-radius: 16px;
            margin-bottom: 20px;
            box-shadow: 0 0 30px rgba(0, 180, 255, 0.4);
        }

        .topo h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.8rem;           /* Dobrado */
            letter-spacing: 4px;
            text-transform: uppercase;
            text-shadow: 0 0 20px var(--accent);
        }

        .relogio {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;           /* Dobrado */
            margin-top: 12px;
            color: #66ddff;
        }

        .status {
            font-size: 1.3rem;
            color: #66ff99;
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
        }

        .painel {
            background: var(--card);
            border: 2px solid rgba(0, 180, 255, 0.4);
            border-radius: 18px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 0 25px rgba(0, 180, 255, 0.2);
        }

        h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.9rem;           /* Dobrado */
            color: var(--accent);
            margin-bottom: 20px;
            text-shadow: 0 0 15px var(--accent);
        }

        label {
            display: block;
            margin: 18px 0 8px;
            color: #a0d8ff;
            font-size: 1.35rem;          /* Dobrado */
            font-weight: 500;
        }

        select, button {
            width: 100%;
            padding: 18px 16px;
            border-radius: 12px;
            border: 2px solid rgba(0, 180, 255, 0.5);
            background: #0a1a2f;
            color: white;
            font-family: inherit;
            font-size: 1.4rem;           /* Dobrado */
        }

        select:focus, button:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(0, 180, 255, 0.3);
        }

        button {
            background: linear-gradient(90deg, #00b4ff, #0099dd);
            color: #000;
            font-weight: 700;
            font-size: 1.5rem;           /* Dobrado */
            margin-top: 25px;
            padding: 20px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 35px rgba(0, 180, 255, 0.9);
        }

        .reset-btn {
            background: #991b1b;
            margin-top: 12px;
            font-size: 1.3rem;
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 25px 0;
        }

        .stat-card {
            background: rgba(10, 30, 50, 0.8);
            padding: 18px 12px;
            border-radius: 14px;
            text-align: center;
            border: 1px solid rgba(0, 180, 255, 0.3);
        }

        .stat-card strong {
            font-size: 2.2rem;           /* Dobrado */
            display: block;
            color: #66ddff;
        }

        .donut-container {
            width: 240px;
            height: 240px;
            margin: 30px auto;
            position: relative;
        }

        .donut {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: conic-gradient(#00b4ff 0% var(--p1), #0099dd var(--p1) var(--p2), #66ddff var(--p2) 100%);
            position: relative;
        }

        .donut::after {
            content: "";
            position: absolute;
            inset: 22%;
            background: var(--card);
            border-radius: 50%;
        }

        .ultimos-votos {
            max-height: 320px;
            overflow-y: auto;
            font-size: 1.25rem;
        }

        .voto-item {
            padding: 16px;
            background: rgba(10, 30, 50, 0.6);
            margin-bottom: 12px;
            border-radius: 12px;
            border-left: 5px solid var(--accent);
            font-size: 1.25rem;
        }

        /* Esconde cidade inicialmente */
        #cidade-container {
            display: none;
        }

        @media (max-width: 768px) {
            .topo h1 { font-size: 2.4rem; }
            .relogio { font-size: 1.9rem; }
            .stats { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="topo">
        <h1>🗳️ APURAÇÃO ELEITORAL 2026</h1>
        <div class="relogio" id="relogio"></div>
        <div class="status" id="status">● Atualizando em tempo real</div>
    </div>

    <div class="container">

        <!-- Painel de Registro de Voto -->
        <div class="painel">
            <h3>Registrar Voto</h3>
            
            <label>Estado (UF)</label>
            <select id="estado" onchange="carregarCidades()"></select>

            <div id="cidade-container">
                <label>Cidade / Município</label>
                <select id="cidade"></select>
            </div>

            <label>Candidato</label>
            <select id="candidato">
                <option value="0">Candidato A</option>
                <option value="1">Candidato B</option>
                <option value="2">Candidato C</option>
                <option value="3">VOTO NULO</option>
            </select>

            <button onclick="votar()">✅ CONFIRMAR VOTO</button>
            <button class="reset-btn" onclick="zerarVotos()">🔄 Zerar todos os votos</button>
        </div>

        <!-- Painel de Apuração -->
        <div class="painel">
            <h3>📊 Apuração em Tempo Real</h3>
            <div class="stats" id="stats-gerais"></div>

            <div class="donut-container">
                <div class="donut" id="donut"></div>
            </div>

            <div id="resultado"></div>

            <h3 style="margin-top:35px;">🕒 Últimos Votos Registrados</h3>
            <div class="ultimos-votos" id="ultimos-votos"></div>
        </div>
    </div>

    <!-- Scripts (mantidos iguais) -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="config.js"></script>

    <script>
        // ... (todo o JavaScript permanece igual ao seu original, apenas adicionei a lógica de mostrar/esconder cidade)

        // Adicione esta função nova junto com as outras funções existentes
        function carregarCidades() {
            const uf = document.getElementById("estado").value;
            const cidadeContainer = document.getElementById("cidade-container");
            const selectCidade = document.getElementById("cidade");

            if (!uf) {
                cidadeContainer.style.display = "none";
                return;
            }

            cidadeContainer.style.display = "block";
            selectCidade.innerHTML = "<option value=''>Selecione a cidade...</option>";

            fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`)
                .then(r => r.json())
                .then(dados => {
                    dados.forEach(c => {
                        let op = document.createElement("option");
                        op.value = c.nome;
                        op.textContent = c.nome;
                        selectCidade.appendChild(op);
                    });
                });
        }

        // O restante do seu JavaScript original continua aqui (loadVotes, votar, atualizar, etc.)
        // Basta colar todo o <script> que você já tinha abaixo desta parte.
    </script>
</body>
</html>
