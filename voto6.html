<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA DE VOTAÇÃO 2026</title>
    
    <style>
        :root {
            --marinho: #001220;
            --marinho-claro: #00213b;
            --verde-esmeralda: #00f5a0;
            --verde-escuro: #00a86b;
            --texto-branco: #ffffff;
            --texto-cinza: #ced4da;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--marinho);
            color: var(--texto-branco);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 3px solid var(--verde-esmeralda);
            margin-bottom: 40px;
        }

        header h1 { 
            font-size: clamp(2.5rem, 10vw, 3.5rem); 
            color: var(--verde-esmeralda);
            text-shadow: 0 0 15px rgba(0, 245, 160, 0.4);
        }

        .container { max-width: 850px; margin: 0 auto; display: flex; flex-direction: column; gap: 40px; }

        .card {
            background: var(--marinho-claro);
            border: 2px solid #003a66;
            border-radius: 30px;
            padding: clamp(25px, 6vw, 50px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .titulo-secao {
            font-size: 2.2rem;
            margin-bottom: 30px;
            color: var(--verde-esmeralda);
            border-left: 10px solid var(--verde-esmeralda);
            padding-left: 20px;
            text-transform: uppercase;
        }

        .item-form { margin-bottom: 30px; }

        label {
            display: block;
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 12px;
            color: var(--texto-cinza);
        }

        select {
            width: 100%;
            padding: 22px;
            font-size: 1.8rem;
            background: #000a12;
            border: 3px solid #004d85;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2300f5a0' stroke-width='3' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 25px center;
            background-size: 30px;
        }

        .btn-confirmar {
            width: 100%;
            padding: 30px;
            font-size: 2.2rem;
            background: linear-gradient(135deg, var(--verde-escuro), var(--verde-esmeralda));
            color: var(--marinho);
            border: none;
            border-radius: 25px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(0, 168, 107, 0.4);
        }

        .btn-confirmar:disabled { background: #223e35; color: #555; cursor: not-allowed; box-shadow: none; }

        /* ESTILO DA APURAÇÃO */
        .filtro-apuracao {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .cand-info { display: flex; justify-content: space-between; font-size: 1.8rem; font-weight: 800; margin-bottom: 10px; }

        .barra-fundo {
            height: 40px;
            background: #001a2e;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 25px;
            border: 1px solid #003a66;
        }

        .barra-progresso {
            height: 100%;
            background: linear-gradient(90deg, var(--verde-escuro), var(--verde-esmeralda));
            transition: width 1s ease-in-out;
        }

        .total-votos {
            text-align: center;
            font-size: 1.6rem;
            color: var(--verde-esmeralda);
            margin-top: 20px;
            font-weight: bold;
            padding: 15px;
            border-top: 1px solid #003a66;
        }
    </style>
</head>
<body>

    <header>
        <h1>ELEIÇÕES 2026</h1>
        <div id="relogio" style="font-size: 1.4rem; color: var(--texto-cinza);">00:00:00</div>
    </header>

    <div class="container">
        
        <div class="card">
            <h2 class="titulo-secao">REGISTRAR MEU VOTO</h2>

            <div class="item-form">
                <label>ESTADO:</label>
                <select id="voto-estado" onchange="carregarCidades('voto-estado', 'voto-cidade')"></select>
            </div>

            <div class="item-form">
                <label>CIDADE:</label>
                <select id="voto-cidade">
                    <option value="">Selecione o estado</option>
                </select>
            </div>

            <div class="item-form">
                <label>CANDIDATO:</label>
                <select id="candidato">
                    <option value="0">Candidato A</option>
                    <option value="1">Candidato B</option>
                    <option value="2">Candidato C</option>
                    <option value="3">VOTO EM BRANCO / NULO</option>
                </select>
            </div>

            <button id="btnVotar" class="btn-confirmar" onclick="votar()">CONFIRMAR VOTO</button>
        </div>

        <div class="card">
            <h2 class="titulo-secao">📊 APURAÇÃO</h2>

            <div class="filtro-apuracao">
                <div style="flex: 1;">
                    <label style="font-size: 1.2rem;">FILTRAR POR ESTADO:</label>
                    <select id="filtro-estado" onchange="carregarCidades('filtro-estado', 'filtro-cidade'); filtrarApuracao()" style="padding: 15px; font-size: 1.4rem;">
                        <option value="BRASIL">TODO O BRASIL</option>
                    </select>
                </div>
                <div style="flex: 1;">
                    <label style="font-size: 1.2rem;">FILTRAR POR CIDADE:</label>
                    <select id="filtro-cidade" onchange="filtrarApuracao()" style="padding: 15px; font-size: 1.4rem;">
                        <option value="TODAS">TODAS AS CIDADES</option>
                    </select>
                </div>
            </div>

            <div id="lista-resultados"></div>
            <div id="contador-total" class="total-votos">Aguardando dados...</div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
        const SUPABASE_URL = "https://osofdmgokrxdzsxozsrf.supabase.co";
        const SUPABASE_KEY = "sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let allVotes = [];
        let deviceUuid = "";
        const nomes = ["Candidato A", "Candidato B", "Candidato C"];
        const estados = ["AC","AL","AP","AM","BA","CE","DF","ES","GO","MA","MT","MS","MG","PA","PB","PR","PE","PI","RJ","RN","RS","RO","RR","SC","SP","SE","TO"];

        function getDeviceUuid() {
            let id = localStorage.getItem('voter_uuid');
            if (!id) {
                id = crypto.randomUUID ? crypto.randomUUID() : 'id-' + Date.now();
                localStorage.setItem('voter_uuid', id);
            }
            return id;
        }

        async function carregarCidades(idEstado, idCidade) {
            const uf = document.getElementById(idEstado).value;
            const s = document.getElementById(idCidade);
            
            if (!uf || uf === "BRASIL") {
                s.innerHTML = '<option value="TODAS">TODAS AS CIDADES</option>';
                return;
            }

            s.innerHTML = '<option>Carregando...</option>';
            try {
                const r = await fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`);
                const d = await r.json();
                let options = idEstado === 'filtro-estado' ? '<option value="TODAS">TODAS AS CIDADES</option>' : '';
                s.innerHTML = options + d.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
            } catch (e) { s.innerHTML = '<option>Erro ao carregar</option>'; }
        }

        async function loadVotes() {
            const { data, error } = await supabaseClient.from('votes').select('*');
            if (!error) {
                allVotes = data || [];
                filtrarApuracao();
            }
        }

        async function votar() {
            const uf = document.getElementById("voto-estado").value;
            const cidade = document.getElementById("voto-cidade").value;
            const cand = parseInt(document.getElementById("candidato").value);

            if (!uf || !cidade || cidade === "Selecione o estado") {
                alert("ERRO: Escolha o Estado e a Cidade primeiro!");
                return;
            }

            const { error } = await supabaseClient.from('votes').insert([{
                uf, cidade, candidato: cand, device_id: deviceUuid
            }]);

            if (error) alert("Erro: " + error.message);
            else {
                alert("VOTO CONFIRMADO!");
                await loadVotes();
            }
        }

        function filtrarApuracao() {
            const ufFiltro = document.getElementById("filtro-estado").value;
            const cidFiltro = document.getElementById("filtro-cidade").value;

            let votosFiltrados = allVotes;

            if (ufFiltro !== "BRASIL") {
                votosFiltrados = votosFiltrados.filter(v => v.uf === ufFiltro);
            }
            if (cidFiltro !== "TODAS") {
                votosFiltrados = votosFiltrados.filter(v => v.cidade === cidFiltro);
            }

            atualizarGraficos(votosFiltrados);
        }

        function atualizarGraficos(votos) {
            let t = [0, 0, 0, 0];
            votos.forEach(v => t[v.candidato]++);
            const validos = t[0] + t[1] + t[2];

            let html = '';
            nomes.forEach((nome, i) => {
                const perc = validos ? ((t[i] / validos) * 100).toFixed(1) : 0;
                html += `
                    <div>
                        <div class="cand-info"><span>${nome}</span><span>${perc}%</span></div>
                        <div class="barra-fundo"><div class="barra-progresso" style="width:${perc}%"></div></div>
                    </div>`;
            });

            document.getElementById("lista-resultados").innerHTML = html;
            document.getElementById("contador-total").innerText = `TOTAL DE VOTOS NESTE FILTRO: ${votos.length}`;

            // Bloqueio se já votou
            if(allVotes.some(v => v.device_id === deviceUuid)) {
                const btn = document.getElementById("btnVotar");
                btn.disabled = true;
                btn.innerText = "VOTO JÁ ENVIADO";
            }
        }

        setInterval(() => {
            document.getElementById("relogio").innerText = new Date().toLocaleTimeString('pt-BR');
        }, 1000);

        window.onload = () => {
            deviceUuid = getDeviceUuid();
            const sVoto = document.getElementById("voto-estado");
            const sFiltro = document.getElementById("filtro-estado");
            
            const ops = estados.map(uf => `<option value="${uf}">${uf}</option>`).join('');
            sVoto.innerHTML = '<option value="">UF</option>' + ops;
            sFiltro.innerHTML = '<option value="BRASIL">TODO O BRASIL</option>' + ops;
            
            loadVotes();
            supabaseClient.channel('realtime_votes').on('postgres_changes', { event: '*', schema: 'public', table: 'votes' }, loadVotes).subscribe();
        };
    </script>
</body>
</html>
