<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SISTEMA DE VOTAÇÃO PRO 2026</title>
    
    <style>
        :root {
            --marinho: #050a0f;
            --marinho-claro: #0d161f;
            --verde-esmeralda: #00f5a0;
            --verde-escuro: #00a86b;
            --texto-branco: #ffffff;
            --texto-cinza: #a0aec0;
            --danger: #ff4d4d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--marinho);
            color: var(--texto-branco);
            font-family: 'Inter', system-ui, sans-serif;
            padding: 15px;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 20px 0;
            margin-bottom: 20px;
        }

        header h1 { 
            font-size: 2rem; 
            color: var(--verde-esmeralda);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .container { max-width: 900px; margin: 0 auto; }

        /* STEPPER (PASSOS) */
        .stepper {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            padding: 0 10px;
        }

        .step {
            flex: 1;
            text-align: center;
            font-size: 0.8rem;
            color: var(--texto-cinza);
            position: relative;
        }

        .step.active { color: var(--verde-esmeralda); font-weight: bold; }

        /* CARDS */
        .card {
            background: var(--marinho-claro);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid #1a2633;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        .titulo-secao {
            font-size: 1.4rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .titulo-secao::before {
            content: '';
            width: 4px;
            height: 24px;
            background: var(--verde-esmeralda);
            border-radius: 2px;
        }

        /* FORMULÁRIO */
        .grid-form {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        @media (max-width: 600px) { .grid-form { grid-template-columns: 1fr; } }

        .item-form { margin-bottom: 20px; }

        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 8px;
            color: var(--texto-cinza);
        }

        select {
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            background: #000;
            border: 2px solid #1e2d3d;
            border-radius: 12px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        select:focus { border-color: var(--verde-esmeralda); outline: none; }

        .btn-confirmar {
            width: 100%;
            padding: 20px;
            font-size: 1.3rem;
            background: linear-gradient(135deg, var(--verde-escuro), var(--verde-esmeralda));
            color: var(--marinho);
            border: none;
            border-radius: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-confirmar:hover { opacity: 0.9; transform: translateY(-2px); }
        .btn-confirmar:disabled { background: #2d3748; color: #718096; cursor: not-allowed; transform: none; }

        /* RELATÓRIOS */
        .filtros-relatorio {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-box {
            background: rgba(0,0,0,0.3);
            padding: 15px;
            border-radius: 12px;
            text-align: center;
        }

        .stat-val { font-size: 1.5rem; font-weight: bold; color: var(--verde-esmeralda); }
        .stat-label { font-size: 0.75rem; color: var(--texto-cinza); text-transform: uppercase; }

        /* BARRAS DE PROGRESSO */
        .resultado-item { margin-bottom: 20px; }
        .info-bar { display: flex; justify-content: space-between; margin-bottom: 8px; font-weight: 600; }
        .progress-bg { height: 12px; background: #1a2633; border-radius: 6px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--verde-esmeralda); transition: width 1s ease; }

        #relogio { font-family: monospace; font-size: 1.1rem; color: var(--verde-esmeralda); margin-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <div id="relogio">00:00:00</div>
        <h1>E-VOTO 2026</h1>
    </header>

    <div class="container">
        
        <div class="card">
            <div class="stepper">
                <div class="step active" id="step1">1. Localização</div>
                <div class="step" id="step2">2. Escolha</div>
                <div class="step" id="step3">3. Confirmação</div>
            </div>

            <h2 class="titulo-secao">Cédula Digital</h2>

            <div class="grid-form">
                <div class="item-form">
                    <label>Estado (UF)</label>
                    <select id="estado" onchange="carregarCidades(); atualizarStep(1)">
                        <option value="">Selecione...</option>
                    </select>
                </div>
                <div class="item-form">
                    <label>Município</label>
                    <select id="cidade" onchange="atualizarStep(2)">
                        <option value="">Selecione o estado</option>
                    </select>
                </div>
            </div>

            <div class="item-form">
                <label>Seu Candidato</label>
                <select id="candidato" onchange="atualizarStep(3)">
                    <option value="">Selecione uma opção...</option>
                    <option value="0">Candidato A</option>
                    <option value="1">Candidato B</option>
                    <option value="2">Candidato C</option>
                    <option value="3">VOTO EM BRANCO / NULO</option>
                </select>
            </div>

            <button id="btnVotar" class="btn-confirmar" onclick="votar()">CONFIRMAR VOTO</button>
        </div>

        <div class="card">
            <h2 class="titulo-secao">Painel de Apuração</h2>
            
            <div class="filtros-relatorio">
                <label style="margin:0">Filtrar por UF:</label>
                <select id="filtroEstado" style="width: auto; padding: 8px;" onchange="atualizarInterface()">
                    <option value="BR">Brasil (Geral)</option>
                </select>
            </div>

            <div class="stats-grid">
                <div class="stat-box">
                    <div id="total-geral" class="stat-val">0</div>
                    <div class="stat-label">Total Votos</div>
                </div>
                <div class="stat-box">
                    <div id="total-validos" class="stat-val">0</div>
                    <div class="stat-label">Votos Válidos</div>
                </div>
                <div class="stat-box">
                    <div id="total-nulos" class="stat-val">0</div>
                    <div class="stat-label">Brancos/Nulos</div>
                </div>
            </div>

            <div id="lista-resultados"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script>
        // Configuração Supabase (Suas chaves originais)
        const SUPABASE_URL = "https://osofdmgokrxdzsxozsrf.supabase.co";
        const SUPABASE_KEY = "sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const estados = ["AC","AL","AP","AM","BA","CE","DF","ES","GO","MA","MT","MS","MG","PA","PB","PR","PE","PI","RJ","RN","RS","RO","RR","SC","SP","SE","TO"];
        const nomesCandidatos = ["Candidato A", "Candidato B", "Candidato C"];
        let allVotes = [];
        let deviceUuid = localStorage.getItem('voter_uuid') || crypto.randomUUID();
        localStorage.setItem('voter_uuid', deviceUuid);

        // Inicialização
        window.onload = () => {
            popularSelects();
            loadVotes();
            setInterval(atualizarRelogio, 1000);
            supabaseClient.channel('votos_realtime').on('postgres_changes', { event: '*', schema: 'public', table: 'votes' }, loadVotes).subscribe();
        };

        function popularSelects() {
            const html = estados.map(uf => `<option value="${uf}">${uf}</option>`).join('');
            document.getElementById("estado").innerHTML += html;
            document.getElementById("filtroEstado").innerHTML += html;
        }

        async function carregarCidades() {
            const uf = document.getElementById("estado").value;
            const select = document.getElementById("cidade");
            if (!uf) return;
            select.innerHTML = '<option>Carregando...</option>';
            try {
                const r = await fetch(`https://servicodados.ibge.gov.br/api/v1/localidades/estados/${uf}/municipios`);
                const d = await r.json();
                select.innerHTML = d.map(c => `<option value="${c.nome}">${c.nome}</option>`).join('');
            } catch (e) { select.innerHTML = '<option>Erro ao carregar</option>'; }
        }

        function atualizarStep(step) {
            document.querySelectorAll('.step').forEach((s, idx) => {
                if(idx + 1 <= step) s.classList.add('active');
            });
        }

        async function loadVotes() {
            const { data, error } = await supabaseClient.from('votes').select('*');
            if (!error) {
                allVotes = data || [];
                atualizarInterface();
            }
        }

        async function votar() {
            const uf = document.getElementById("estado").value;
            const cidade = document.getElementById("cidade").value;
            const cand = document.getElementById("candidato").value;
            const btn = document.getElementById("btnVotar");

            if (!uf || !cidade || cand === "") {
                alert("Por favor, preencha todos os campos antes de confirmar.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "COMPUTANDO...";

            const { error } = await supabaseClient.from('votes').insert([{
                uf, cidade, candidato: parseInt(cand), device_id: deviceUuid
            }]);

            if (error) {
                alert("Erro ao votar: " + error.message);
                btn.disabled = false;
                btn.innerText = "CONFIRMAR VOTO";
            } else {
                alert("✅ VOTO CONFIRMADO COM SUCESSO!");
                loadVotes();
            }
        }

        function atualizarInterface() {
            const filtro = document.getElementById("filtroEstado").value;
            const votosFiltrados = filtro === "BR" ? allVotes : allVotes.filter(v => v.uf === filtro);
            
            let counts = [0, 0, 0, 0]; // A, B, C, Nulo
            votosFiltrados.forEach(v => counts[v.candidato]++);

            const total = votosFiltrados.length;
            const nulos = counts[3];
            const validos = total - nulos;

            document.getElementById("total-geral").innerText = total;
            document.getElementById("total-validos").innerText = validos;
            document.getElementById("total-nulos").innerText = nulos;

            let html = '';
            nomesCandidatos.forEach((nome, i) => {
                const perc = validos > 0 ? ((counts[i] / validos) * 100).toFixed(1) : 0;
                html += `
                    <div class="resultado-item">
                        <div class="info-bar">
                            <span>${nome}</span>
                            <span>${counts[i]} votos (${perc}%)</span>
                        </div>
                        <div class="progress-bg">
                            <div class="progress-fill" style="width: ${perc}%"></div>
                        </div>
                    </div>`;
            });

            document.getElementById("lista-resultados").innerHTML = html;

            // Bloqueio de re-votação
            if(allVotes.some(v => v.device_id === deviceUuid)) {
                const btn = document.getElementById("btnVotar");
                btn.disabled = true;
                btn.innerText = "VOTO JÁ REGISTRADO";
                document.querySelectorAll('.step').forEach(s => s.classList.add('active'));
            }
        }

        function atualizarRelogio() {
            document.getElementById("relogio").innerText = new Date().toLocaleTimeString('pt-BR');
        }
    </script>
</body>
</html>
