<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bater Ponto</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            color: #333;
            max-width: 460px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
            text-align: center;
        }
        .header { background: #27ae60; color: white; padding: 25px; }
        .content { padding: 35px 25px; }
        h1 { margin: 0 0 10px 0; font-size: 28px; }
        .device-info { font-size: 14px; margin-bottom: 20px; }
        .nome { font-size: 26px; font-weight: bold; margin: 15px 0 30px 0; color: #27ae60; min-height: 70px; }
        .btn {
            width: 100%;
            padding: 20px;
            margin: 12px 0;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        .btn-entrada { background: #27ae60; color: white; }
        .btn-saida   { background: #e74c3c; color: white; }
        .status { margin-top: 25px; min-height: 35px; font-weight: bold; font-size: 17px; }
        .info { font-size: 13px; color: #777; margin-top: 30px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>⏰ Bater Ponto</h1>
        </div>
        <div class="content">
            <div class="device-info" id="deviceInfo">Detectando dispositivo...</div>
            
            <p>Funcionário:</p>
            <div class="nome" id="nomeFuncionario">Aguardando identificação...</div>

            <button class="btn btn-entrada" onclick="baterPonto('Entrada')">✅ MARCAR ENTRADA</button>
            <button class="btn btn-saida" onclick="baterPonto('Saída')">⏹️ MARCAR SAÍDA</button>

            <div class="status" id="status"></div>
            <div class="info">Dispositivo vinculado automaticamente</div>
        </div>
    </div>

<script>
// ==================== CONFIG SUPABASE ====================
const supabaseClient = supabase.createClient(
    'https://osofdmgokrxdzsxozsrf.supabase.co',
    'sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe'
);
// =======================================================

let currentDeviceID = null;
let funcionarioAtual = null;

function gerarDeviceID() {
    const fingerprint = [
        navigator.userAgent,
        screen.width,
        screen.height,
        screen.colorDepth,
        navigator.platform,
        navigator.language
    ].join('|');
    
    let hash = 0;
    for (let i = 0; i < fingerprint.length; i++) {
        hash = (hash << 5) - hash + fingerprint.charCodeAt(i);
        hash = hash & hash;
    }
    return Math.abs(hash).toString(36).toUpperCase().substring(0, 14);
}

async function detectarDispositivo() {
    currentDeviceID = gerarDeviceID();
    document.getElementById('deviceInfo').innerHTML = `📱 Device ID: <strong>${currentDeviceID}</strong>`;

    const { data, error } = await supabaseClient
        .from('employees')
        .select('*')
        .eq('device_id', currentDeviceID)
        .single();

    const nomeEl = document.getElementById('nomeFuncionario');
    if (data) {
        funcionarioAtual = data;
        nomeEl.textContent = data.nome;
        nomeEl.style.color = "#27ae60";
    } else {
        funcionarioAtual = null;
        nomeEl.textContent = "❌ Dispositivo não cadastrado";
        nomeEl.style.color = "red";
    }
}

async function baterPonto(tipo) {
    if (!funcionarioAtual) {
        document.getElementById('status').innerHTML = '<span style="color:red;">❌ Dispositivo não vinculado</span>';
        return;
    }

    // === VERIFICAÇÃO DE PONTO CONSECUTIVO ===
    const { data: ultimoPonto, error: erroConsulta } = await supabaseClient
        .from('registros_ponto')
        .select('tipo, data_hora')
        .eq('employee_id', funcionarioAtual.id)
        .order('registrado_em', { ascending: false })
        .limit(1)
        .single();

    if (erroConsulta && erroConsulta.code !== 'PGRST116') { // PGRST116 = nenhum registro encontrado
        console.error(erroConsulta);
    }

    if (ultimoPonto) {
        if (ultimoPonto.tipo === tipo) {
            const msg = tipo === 'Entrada' 
                ? "❌ Você já marcou Entrada. Marque Saída primeiro!" 
                : "❌ Você já marcou Saída. Marque Entrada primeiro!";
            
            document.getElementById('status').innerHTML = `<span style="color:red;">${msg}</span>`;
            return;
        }
    }

    // === REGISTRA O PONTO ===
    const agora = new Date();
    const dataHora = agora.toLocaleString('pt-BR', {
        day: '2-digit', month: '2-digit', year: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
    const dataHoje = agora.toLocaleDateString('pt-BR');

    const { error } = await supabaseClient
        .from('registros_ponto')
        .insert([{
            employee_id: funcionarioAtual.id,
            nome: funcionarioAtual.nome,
            data_hora: dataHora,
            tipo: tipo,
            data: dataHoje,
            dispositivo: 'Mobile',
            device_id: currentDeviceID
        }]);

    const statusEl = document.getElementById('status');
    if (error) {
        statusEl.innerHTML = `<span style="color:red;">❌ Erro ao registrar</span>`;
    } else {
        statusEl.style.color = '#27ae60';
        statusEl.textContent = `✅ ${tipo} registrada com sucesso!`;
        setTimeout(() => statusEl.textContent = '', 4000);
    }
}

window.onload = detectarDispositivo;
</script>
</body>
</html>
