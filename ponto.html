<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bater Ponto</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            color: #333;
            max-width: 420px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        .header {
            background: #27ae60;
            color: white;
            padding: 25px;
            text-align: center;
        }
        .content {
            padding: 30px 25px;
            text-align: center;
        }
        h1 { margin: 0 0 10px 0; font-size: 28px; }
        .nome { font-size: 24px; font-weight: bold; margin: 15px 0; color: #27ae60; }
        .btn {
            width: 100%;
            padding: 18px;
            margin: 12px 0;
            font-size: 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
        }
        .entrada { background: #27ae60; color: white; }
        .saida { background: #e74c3c; color: white; }
        .status {
            margin-top: 20px;
            min-height: 30px;
            font-weight: bold;
        }
        .info { font-size: 14px; color: #777; margin-top: 25px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>⏰ Folha de Ponto</h1>
        </div>
        <div class="content">
            <p>Funcionário identificado:</p>
            <div class="nome" id="nomeFuncionario">Carregando...</div>

            <button class="btn entrada" onclick="baterPonto('Entrada')">✅ MARCAR ENTRADA</button>
            <button class="btn saida" onclick="baterPonto('Saída')">⏹️ MARCAR SAÍDA</button>

            <div class="status" id="status"></div>
            <div class="info">Todos os dados são salvos localmente no navegador</div>
        </div>
    </div>

    <script>
        let employees = JSON.parse(localStorage.getItem('employees')) || [];
        let registros = JSON.parse(localStorage.getItem('registrosPonto')) || [];

        function salvarRegistros() {
            localStorage.setItem('registrosPonto', JSON.stringify(registros));
        }

        function getFuncionario() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            
            if (id) {
                const func = employees.find(e => e.id === id);
                if (func) {
                    localStorage.setItem('lastEmployeeId', id);
                    return func;
                }
            }
            
            // Fallback para último usado
            const lastId = localStorage.getItem('lastEmployeeId');
            if (lastId) {
                return employees.find(e => e.id === lastId);
            }
            return null;
        }

        function baterPonto(tipo) {
            const func = getFuncionario();
            if (!func) {
                document.getElementById('status').innerHTML = 
                    '<span style="color:red;">❌ Funcionário não identificado</span>';
                return;
            }

            const agora = new Date();
            const dataHora = agora.toLocaleString('pt-BR', {
                day:'2-digit', month:'2-digit', year:'numeric',
                hour:'2-digit', minute:'2-digit', second:'2-digit'
            });
            const data = agora.toLocaleDateString('pt-BR');

            registros.push({
                employeeId: func.id,
                nome: func.nome,
                dataHora: dataHora,
                tipo: tipo,
                data: data
            });

            salvarRegistros();

            const statusEl = document.getElementById('status');
            statusEl.style.color = '#27ae60';
            statusEl.textContent = `✅ ${tipo} registrada com sucesso!`;

            setTimeout(() => {
                statusEl.textContent = '';
            }, 4000);
        }

        // Inicialização
        window.onload = function() {
            const func = getFuncionario();
            const nomeEl = document.getElementById('nomeFuncionario');

            if (func) {
                nomeEl.textContent = func.nome;
            } else {
                nomeEl.textContent = "Funcionário não encontrado";
                nomeEl.style.color = "red";
            }
        };
    </script>
</body>
</html>
