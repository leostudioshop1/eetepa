<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bater Ponto</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: white;
            color: #333;
            max-width: 420px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            overflow: hidden;
            text-align: center;
        }
        .header {
            background: #27ae60;
            color: white;
            padding: 25px;
        }
        .content {
            padding: 35px 25px;
        }
        h1 { margin: 0 0 10px 0; font-size: 28px; }
        .device-info {
            font-size: 14px;
            color: #27ae60;
            margin-bottom: 20px;
        }
        .nome {
            font-size: 26px;
            font-weight: bold;
            margin: 15px 0 30px 0;
            color: #27ae60;
            min-height: 70px;
        }
        .btn {
            width: 100%;
            padding: 20px;
            margin: 12px 0;
            font-size: 22px;
            font-weight: bold;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        .btn-entrada { background: #27ae60; color: white; }
        .btn-saida   { background: #e74c3c; color: white; }
        .status {
            margin-top: 25px;
            min-height: 30px;
            font-weight: bold;
            font-size: 17px;
        }
        .info {
            font-size: 13px;
            color: #777;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>⏰ Bater Ponto</h1>
        </div>
        <div class="content">
            <div class="device-info" id="deviceInfo">Detectando dispositivo...</div>
            
            <p>Funcionário:</p>
            <div class="nome" id="nomeFuncionario">Carregando...</div>

            <button class="btn btn-entrada" onclick="baterPonto('Entrada')">✅ MARCAR ENTRADA</button>
            <button class="btn btn-saida" onclick="baterPonto('Saída')">⏹️ MARCAR SAÍDA</button>

            <div class="status" id="status"></div>
            <div class="info">Escaneie o QR Code para bater o ponto rapidamente</div>
        </div>
    </div>

    <script>
        let employees = JSON.parse(localStorage.getItem('employees')) || [];
        let registros = JSON.parse(localStorage.getItem('registrosPonto')) || [];
        let funcionarioAtual = null;

        // Detecta tipo de dispositivo
        function detectarDispositivo() {
            const userAgent = navigator.userAgent || '';
            const isMobile = /Mobi|Android|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(userAgent) ||
                            (navigator.userAgentData && navigator.userAgentData.mobile);
            
            const deviceEl = document.getElementById('deviceInfo');
            deviceEl.textContent = isMobile ? '📱 Dispositivo: Celular / Tablet' : '💻 Dispositivo: Computador';
            deviceEl.style.color = isMobile ? '#27ae60' : '#e67e22';
            
            return isMobile;
        }

        function getFuncionario() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            
            if (id) {
                const func = employees.find(e => e.id === id);
                if (func) {
                    localStorage.setItem('lastEmployeeId', id);
                    return func;
                }
            }
            
            // Fallback: último funcionário usado
            const lastId = localStorage.getItem('lastEmployeeId');
            if (lastId) return employees.find(e => e.id === lastId);
            return null;
        }

        function baterPonto(tipo) {
            if (!funcionarioAtual) {
                document.getElementById('status').innerHTML = 
                    '<span style="color:red;">❌ Funcionário não identificado</span>';
                return;
            }

            const agora = new Date();
            const dataHora = agora.toLocaleString('pt-BR', {
                day: '2-digit', month: '2-digit', year: 'numeric',
                hour: '2-digit', minute: '2-digit', second: '2-digit'
            });
            const dataHoje = agora.toLocaleDateString('pt-BR');

            registros.push({
                employeeId: funcionarioAtual.id,
                nome: funcionarioAtual.nome,
                dataHora: dataHora,
                tipo: tipo,
                data: dataHoje,
                dispositivo: detectarDispositivo() ? 'Mobile' : 'Desktop'
            });

            localStorage.setItem('registrosPonto', JSON.stringify(registros));

            const statusEl = document.getElementById('status');
            statusEl.style.color = '#27ae60';
            statusEl.textContent = `✅ ${tipo} registrada com sucesso!`;

            setTimeout(() => statusEl.textContent = '', 4000);
        }

        // Inicialização
        window.onload = function() {
            detectarDispositivo();   // Mostra se é celular ou computador

            funcionarioAtual = getFuncionario();
            const nomeEl = document.getElementById('nomeFuncionario');

            if (funcionarioAtual) {
                nomeEl.textContent = funcionarioAtual.nome;
            } else {
                nomeEl.textContent = "Funcionário não encontrado";
                nomeEl.style.color = "red";
            }
        };
    </script>
</body>
</html>
