<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Votação Segura</title>
</head>

<body style="background:#001220;color:white;font-family:sans-serif;text-align:center;padding:40px">

<h1>ELEIÇÕES 2026</h1>

<select id="estado">
<option value="">Estado</option>
<option value="PA">PA</option>
<option value="SP">SP</option>
</select>

<select id="cidade">
<option value="">Cidade</option>
<option value="Rio Maria">Rio Maria</option>
<option value="São Paulo">São Paulo</option>
</select>

<select id="candidato">
<option value="0">Candidato A</option>
<option value="1">Candidato B</option>
<option value="2">Candidato C</option>
<option value="3">Branco/Nulo</option>
</select>

<br><br>
<button onclick="votar()" style="padding:20px;font-size:20px">VOTAR</button>

<div id="status" style="margin-top:20px;color:#00f5a0"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
let supabaseClient = null;

try {
    if (window.supabase) {
        supabaseClient = window.supabase.createClient(
            "https://osofdmgokrxdzsxozsrf.supabase.co",
            "SUA_PUBLIC_KEY_AQUI"
        );
    } else {
        document.getElementById("status").innerText = "Erro ao carregar Supabase.";
    }
} catch (e) {
    document.getElementById("status").innerText = "Erro crítico.";
}

// ================= SEGURANÇA =================
let deviceUuid = localStorage.getItem("voter_uuid");

if (!deviceUuid) {
    deviceUuid = crypto.randomUUID();
    localStorage.setItem("voter_uuid", deviceUuid);
}

let lastAction = 0;

function antiSpam() {
    const now = Date.now();
    if (now - lastAction < 5000) {
        alert("Aguarde...");
        return false;
    }
    lastAction = now;
    return true;
}

function validar(uf, cidade, candidato) {
    return uf && cidade && candidato >= 0 && candidato <= 3;
}

// ================= VOTAÇÃO =================
async function votar() {

    if (!supabaseClient) {
        alert("Sistema indisponível.");
        return;
    }

    if (!antiSpam()) return;

    const uf = document.getElementById("estado").value;
    const cidade = document.getElementById("cidade").value;
    const candidato = parseInt(document.getElementById("candidato").value);

    if (!validar(uf, cidade, candidato)) {
        alert("Preencha tudo corretamente!");
        return;
    }

    document.getElementById("status").innerText = "Enviando voto...";

    try {
        const { error } = await supabaseClient
            .from("votes")
            .insert([{
                uf,
                cidade,
                candidato,
                device_id: deviceUuid
            }]);

        if (error) {
            if (error.message.includes("duplicate")) {
                alert("Você já votou!");
            } else {
                alert("Erro: " + error.message);
            }
            return;
        }

        document.getElementById("status").innerText = "✅ Voto registrado!";
        
        setTimeout(() => {
            window.location.href = "https://www.uol.com.br";
        }, 1500);

    } catch (e) {
        document.getElementById("status").innerText = "Erro inesperado.";
    }
}

// ================= VERIFICAÇÃO =================
async function verificar() {
    if (!supabaseClient) return;

    const { data } = await supabaseClient
        .from("votes")
        .select("id")
        .eq("device_id", deviceUuid)
        .limit(1);

    if (data && data.length > 0) {
        document.getElementById("status").innerText = "Você já votou!";
    }
}

verificar();
</script>

</body>
</html>
