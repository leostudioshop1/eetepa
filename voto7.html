<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://osofdmgokrxdzsxozsrf.supabase.co";
const SUPABASE_KEY = "SUA_PUBLIC_KEY_AQUI";

const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let deviceUuid = "";
let lastVoteTime = 0;

// ================= SEGURANÇA =================

// gera ID único mais forte
function getDeviceUuid() {
    let id = localStorage.getItem('voter_uuid');

    if (!id) {
        id = crypto.randomUUID();
        localStorage.setItem('voter_uuid', id);
    }

    return id;
}

// anti spam (5 segundos entre ações)
function antiSpam() {
    const now = Date.now();
    if (now - lastVoteTime < 5000) {
        alert("Aguarde alguns segundos...");
        return false;
    }
    lastVoteTime = now;
    return true;
}

// valida dados antes de enviar
function validarDados(uf, cidade, candidato) {
    if (!uf || uf.length !== 2) return false;
    if (!cidade || cidade.length < 2) return false;
    if (isNaN(candidato) || candidato < 0 || candidato > 3) return false;
    return true;
}

// ================= VOTAÇÃO =================

async function votar() {
    if (!antiSpam()) return;

    const uf = document.getElementById("estado").value;
    const cidade = document.getElementById("cidade").value;
    const candidato = parseInt(document.getElementById("candidato").value);

    if (!validarDados(uf, cidade, candidato)) {
        alert("Dados inválidos!");
        return;
    }

    try {
        const { error } = await supabaseClient
            .from('votes')
            .insert([{
                uf,
                cidade,
                candidato,
                device_id: deviceUuid
            }]);

        if (error) {
            if (error.message.includes("duplicate")) {
                alert("Você já votou!");
            } else {
                alert("Erro ao votar.");
            }
            return;
        }

        alert("✅ Voto registrado com sucesso!");
        window.location.href = "https://www.uol.com.br";

    } catch (e) {
        alert("Erro inesperado.");
    }
}

// ================= FILA =================

async function enviarHeartbeat() {
    await supabaseClient.from('online_users').upsert({
        device_id: deviceUuid,
        last_active: new Date().toISOString(),
        entered_at: new Date().toISOString()
    }, { onConflict: 'device_id' });
}

async function atualizarFila() {
    const limiteTempo = new Date(Date.now() - 60000).toISOString();

    const { data } = await supabaseClient
        .from('online_users')
        .select('*')
        .gt('last_active', limiteTempo)
        .order('entered_at', { ascending: true });

    if (!data) return;

    const pos = data.findIndex(u => u.device_id === deviceUuid) + 1;

    if (pos > 2) {
        document.getElementById("area-votacao").style.display = "none";
        document.getElementById("fila-espera").style.display = "block";
    } else {
        document.getElementById("area-votacao").style.display = "block";
        document.getElementById("fila-espera").style.display = "none";
    }
}

// ================= INIT =================

window.onload = async () => {
    deviceUuid = getDeviceUuid();

    // verifica se já votou
    const { data } = await supabaseClient
        .from('votes')
        .select('id')
        .eq('device_id', deviceUuid)
        .limit(1);

    if (data && data.length > 0) {
        alert("Você já votou!");
        window.location.href = "https://www.uol.com.br";
        return;
    }

    await enviarHeartbeat();
    setInterval(enviarHeartbeat, 20000);
    setInterval(atualizarFila, 10000);
};
</script>
