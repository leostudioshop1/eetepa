<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle da Sala Inteligente</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), 
                  url('https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=1920') center/cover no-repeat;
      height: 100vh;
      font-family: system-ui;
    }
    .device {
      transition: all 0.3s;
      cursor: pointer;
    }
    .device:hover {
      transform: scale(1.12);
      filter: brightness(1.15);
    }
    .status-on { color: #22c55e; }
    .status-off { color: #ef4444; }
    #ping-result {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.92);
      padding: 14px 20px;
      border-radius: 12px;
      max-width: 340px;
      font-size: 0.95rem;
      box-shadow: 0 10px 15px rgba(0,0,0,0.5);
      z-index: 50;
    }
    .warning {
      position: fixed;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: #f59e0b;
      color: black;
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      z-index: 100;
      max-width: 90%;
      text-align: center;
    }
  </style>
</head>
<body class="text-white flex items-center justify-center">

  <!-- Aviso importante -->
  <div class="warning">
    ⚠️ Para ping funcionar na rede local, abra este arquivo localmente ou use um servidor local (não GitHub Pages)
  </div>

  <div class="relative w-full max-w-5xl h-[90vh] border-8 border-amber-900 rounded-3xl overflow-hidden shadow-2xl">

    <div class="absolute top-4 left-1/2 transform -translate-x-1/2 bg-black/70 px-8 py-2 rounded-full text-xl font-bold z-10">
      🏠 Controle da Sala
    </div>

    <!-- TV - Com Ping -->
    <div onclick="pingTV()" class="device absolute top-[25%] left-[12%] text-center" id="tv-device">
      <i class="fa-solid fa-tv text-7xl text-gray-300"></i>
      <p class="mt-2 font-semibold">TV</p>
      <p class="text-xs status-off" id="tv-status">Clique para testar conexão</p>
    </div>

    <!-- Outros dispositivos -->
    <div onclick="toggleDevice(this)" class="device absolute top-[18%] right-[15%] text-center" data-status="off">
      <i class="fa-solid fa-snowflake text-6xl text-sky-400"></i>
      <p class="mt-2 font-semibold">Ar Condicionado</p>
      <p class="text-xs status-off">Desligado</p>
    </div>

    <div onclick="toggleDevice(this)" class="device absolute top-[12%] left-[45%] text-center" data-status="off">
      <i class="fa-solid fa-lightbulb text-6xl text-yellow-400"></i>
      <p class="mt-2 font-semibold">Luz Principal</p>
      <p class="text-xs status-off">Desligada</p>
    </div>

    <div onclick="toggleDevice(this)" class="device absolute bottom-[28%] left-[18%] text-center" data-status="off">
      <i class="fa-solid fa-lamp text-5xl text-amber-400"></i>
      <p class="mt-2 font-semibold">Abajur</p>
      <p class="text-xs status-off">Desligado</p>
    </div>

    <!-- Resultado do Ping -->
    <div id="ping-result" class="hidden"></div>
  </div>

  <script>
    const ipTV = '10.0.0.100';

    async function pingTV() {
      const resultDiv = document.getElementById('ping-result');
      const statusText = document.getElementById('tv-status');
      
      resultDiv.classList.remove('hidden');
      resultDiv.innerHTML = `🔄 Testando conexão com TV (${ipTV})...`;
      resultDiv.style.color = '#eab308';

      const startTime = Date.now();

      try {
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);

        await fetch(`http://${ipTV}`, { 
          mode: 'no-cors',
          signal: controller.signal,
          cache: 'no-store'
        });

        clearTimeout(timeoutId);
        const latency = Date.now() - startTime;

        resultDiv.innerHTML = `✅ <strong>TV Online</strong><br>Resposta em ${latency}ms`;
        resultDiv.style.color = '#22c55e';
        statusText.textContent = 'Online';
        statusText.classList.add('status-on');
        statusText.classList.remove('status-off');

      } catch (error) {
        resultDiv.innerHTML = `❌ <strong>TV Offline ou inacessível</strong><br>IP: ${ipTV}<br><small>Verifique se a TV está ligada e na mesma rede</small>`;
        resultDiv.style.color = '#ef4444';
        statusText.textContent = 'Offline';
        statusText.classList.add('status-off');
        statusText.classList.remove('status-on');
      }

      setTimeout(() => {
        resultDiv.classList.add('hidden');
      }, 7000);
    }

    function toggleDevice(element) {
      const status = element.getAttribute('data-status');
      const statusText = element.querySelector('.text-xs');

      if (status === 'off') {
        element.setAttribute('data-status', 'on');
        statusText.classList.remove('status-off');
        statusText.classList.add('status-on');
        statusText.textContent = 'Ligado';
      } else {
        element.setAttribute('data-status', 'off');
        statusText.classList.remove('status-on');
        statusText.classList.add('status-off');
        statusText.textContent = 'Desligado';
      }
    }

    // Dica no console
    console.log("%cPágina de Controle da Sala carregada! Use o IP 10.0.0.100 para a TV.", "color: #22c55e; font-weight: bold");
  </script>
</body>
</html>
