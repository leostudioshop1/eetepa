<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Controle da Sala Inteligente</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body {
      background: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), 
                  url('https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=1920') center/cover no-repeat;
      height: 100vh;
      font-family: system-ui;
    }
    .device {
      transition: all 0.3s;
      cursor: pointer;
    }
    .device:hover {
      transform: scale(1.12);
      filter: brightness(1.15);
    }
    .status-on { color: #22c55e; }
    .status-off { color: #ef4444; }
    #ping-result {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: rgba(0,0,0,0.9);
      padding: 12px 20px;
      border-radius: 12px;
      max-width: 320px;
      font-size: 0.95rem;
      display: none;
    }
  </style>
</head>
<body class="text-white flex items-center justify-center">

  <div class="relative w-full max-w-5xl h-[90vh] border-8 border-amber-900 rounded-3xl overflow-hidden shadow-2xl">

    <div class="absolute top-4 left-1/2 transform -translate-x-1/2 bg-black/70 px-8 py-2 rounded-full text-xl font-bold z-10">
      🏠 Controle da Sala
    </div>

    <!-- TV - Com Ping -->
    <div onclick="pingTV()" class="device absolute top-[25%] left-[12%] text-center" id="tv-device">
      <i class="fa-solid fa-tv text-7xl text-gray-300"></i>
      <p class="mt-2 font-semibold">TV</p>
      <p class="text-xs status-off" id="tv-status">Desligada</p>
    </div>

    <!-- Outros dispositivos (exemplo) -->
    <div onclick="toggleDevice(this)" class="device absolute top-[18%] right-[15%] text-center" data-status="off">
      <i class="fa-solid fa-snowflake text-6xl text-sky-400"></i>
      <p class="mt-2 font-semibold">Ar Condicionado</p>
      <p class="text-xs status-off">Desligado</p>
    </div>

    <div onclick="toggleDevice(this)" class="device absolute top-[12%] left-[45%] text-center" data-status="off">
      <i class="fa-solid fa-lightbulb text-6xl text-yellow-400"></i>
      <p class="mt-2 font-semibold">Luz Principal</p>
      <p class="text-xs status-off">Desligada</p>
    </div>

    <!-- Resultado do Ping -->
    <div id="ping-result" class="text-sm"></div>
  </div>

  <script>
    // Função para fazer ping na TV
    async function pingTV() {
      const resultDiv = document.getElementById('ping-result');
      const statusText = document.getElementById('tv-status');
      const ip = '10.0.0.100';

      resultDiv.style.display = 'block';
      resultDiv.innerHTML = `🔄 Testando conexão com TV (${ip})...`;

      const startTime = Date.now();

      try {
        // Tenta conectar na TV (timeout de 4 segundos)
        const controller = new AbortController();
        const timeout = setTimeout(() => controller.abort(), 4000);

        const response = await fetch(`http://${ip}`, { 
          mode: 'no-cors',
          signal: controller.signal,
          cache: 'no-store'
        });

        clearTimeout(timeout);
        const time = Date.now() - startTime;

        resultDiv.innerHTML = `✅ <strong>TV Online</strong><br>Tempo de resposta: ${time}ms`;
        resultDiv.style.color = '#22c55e';
        statusText.textContent = 'Online';
        statusText.classList.add('status-on');
        statusText.classList.remove('status-off');

      } catch (error) {
        const time = Date.now() - startTime;
        resultDiv.innerHTML = `❌ <strong>TV Offline</strong><br>Não foi possível conectar em ${ip}`;
        resultDiv.style.color = '#ef4444';
        statusText.textContent = 'Offline';
        statusText.classList.add('status-off');
        statusText.classList.remove('status-on');
      }

      // Esconde o resultado após 6 segundos
      setTimeout(() => {
        resultDiv.style.display = 'none';
      }, 6000);
    }

    // Função para outros dispositivos
    function toggleDevice(element) {
      const status = element.getAttribute('data-status');
      const statusText = element.querySelector('.text-xs');

      if (status === 'off') {
        element.setAttribute('data-status', 'on');
        statusText.classList.remove('status-off');
        statusText.classList.add('status-on');
        statusText.textContent = 'Ligado';
      } else {
        element.setAttribute('data-status', 'off');
        statusText.classList.remove('status-on');
        statusText.classList.add('status-off');
        statusText.textContent = 'Desligado';
      }
    }
  </script>
</body>
</html>
