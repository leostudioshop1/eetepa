<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QUIZZ AULA 01 A 04</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root{
            --bg:#020617;
            --card:#0f172a;
            --neon:#00ff88;
            --danger:#ff4655;
            --accent:#7000ff;
            --text:#f8fafc;
            --border:#1e293b;
        }

        body{
            font-family:'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            background-image: 
                linear-gradient(rgba(112, 0, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(112, 0, 255, 0.05) 1px, transparent 1px);
            background-size: 30px 30px;
            display:flex;
            flex-direction:column;
            align-items:center;
            padding:20px;
            color:var(--text);
            min-height: 100vh;
            margin: 0;
        }

        #setup, #quiz-container, #leaderboard, #result-container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 700px;
            margin-bottom: 30px;
            border: 2px solid var(--border);
            position: relative;
        }

        /* Barra de Tempo (Item 4) */
        #timer-bar-container {
            width: 100%;
            height: 6px;
            background: #1e293b;
            margin-bottom: 20px;
            border-radius: 10px;
            overflow: hidden;
        }
        #timer-bar {
            width: 100%;
            height: 100%;
            background: var(--neon);
            transition: width 0.1s linear;
        }

        h2 { color: var(--neon); text-transform: uppercase; letter-spacing: 2px; border-bottom: 2px solid var(--border); padding-bottom: 15px; }
        .question { font-size: 1.3rem; margin-bottom: 25px; color: #fff; }
        .options { display: grid; gap: 12px; }
        
        button {
            padding: 15px;
            cursor: pointer;
            border: 1px solid var(--border);
            border-radius: 4px;
            background: rgba(30, 41, 59, 0.5);
            color: var(--text);
            transition: all 0.2s ease;
            text-align: left;
        }

        button:hover:not(:disabled) { background: var(--accent); border-color: var(--neon); transform: translateX(5px); }
        .btn-submit { background: var(--neon); color: #000; border: none; margin-top: 25px; width: 100%; font-weight: 900; font-size: 1.2rem; clip-path: polygon(5% 0%, 100% 0%, 95% 100%, 0% 100%); }
        input[type="text"] { padding: 15px; width: 100%; border: 1px solid var(--border); background: #000; color: var(--neon); margin-bottom: 15px; }

        footer { margin-top: 40px; font-size: 0.9rem; color: var(--neon); opacity: 0.7; letter-spacing: 3px; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="setup">
    <h2>QUIZZ AULA 01 A 04</h2>
    <input type="text" id="username" placeholder="PLAYER NAME..." maxlength="25">
    <button class="btn-submit" onclick="startQuiz()">START GAME</button>
</div>

<div id="quiz-container" class="hidden">
    <div id="timer-bar-container"><div id="timer-bar"></div></div>
    <div id="progress" style="color:var(--accent); font-weight: bold; margin-bottom: 10px;"></div>
    <div class="question" id="question-text"></div>
    <div class="options" id="options-container"></div>
    <button id="next-btn" class="btn-submit" onclick="nextQuestion()" disabled>NEXT LEVEL</button>
</div>

<div id="result-container" class="hidden">
    <h2 style="text-align:center">GAME OVER</h2>
    <canvas id="performanceChart"></canvas>
    <p id="final-score-text" style="text-align:center; font-size:1.4rem; margin: 20px 0; font-weight: bold;"></p>
    <button class="btn-submit" onclick="location.reload()">RETRY</button>
</div>

<div id="leaderboard">
    <h2>🏆 HALL OF FAME</h2>
    <table style="width:100%; color: var(--text);">
        <tbody id="ranking-body"></tbody>
    </table>
</div>

<footer>DESENVOLVIDO POR = LÉO CRUZ - ENGENHEIRO DE SOFTWARE</footer>

<script>
const SUPABASE_URL="https://osofdmgokrxdzsxozsrf.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9zb2ZkbWdva3J4ZHpzeG96c3JmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwMzk4ODMsImV4cCI6MjA4ODYxNTg4M30.lALjkQ65DPLFiLboHNH4mKzwoNZPFyGjwRLW-IrMH4c";
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Sons (Item 2)
const audioCorrect = new Audio('https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3');
const audioWrong = new Audio('https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3');

let currentQuestion = 0;
let score = 0;
let user = "";
let timerInterval;
let timeLeft;
const TIME_LIMIT = 15; // 15 segundos por questão

const rawQuestions = [
    {q:"O que o operador && faz?", o:["Ambos verdadeiros","Apenas um verdadeiro"], a:0},
    {q:"Símbolo do operador OU (OR)?", o:["&&","||","!"], a:1},
    {q:"O que o operador ! faz?", o:["Soma","Inverte o valor"], a:1},
    {q:"O que significa NTFS?", o:["New Technology File System","Network System"], a:0},
    {q:"SSD é mais silencioso que HD?", o:["Sim","Não"], a:0},
    // Adicione aqui as demais questões mantendo o formato...
];

// Item 1: Embaralhar questões (Fisher-Yates)
function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[array[j]]] = [array[array[j]], array[i]];
    }
    return array;
}

const questions = shuffle([...rawQuestions]);

function startQuiz(){
    user = document.getElementById('username').value.trim();
    if(!user) return alert("PLAYER! ENTER YOUR NAME!");
    document.getElementById('setup').classList.add('hidden');
    document.getElementById('quiz-container').classList.remove('hidden');
    showQuestion();
}

function startTimer() {
    timeLeft = TIME_LIMIT;
    document.getElementById('timer-bar').style.width = "100%";
    document.getElementById('timer-bar').style.background = "var(--neon)";
    
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft -= 0.1;
        let percentage = (timeLeft / TIME_LIMIT) * 100;
        document.getElementById('timer-bar').style.width = percentage + "%";
        
        if(timeLeft <= 5) document.getElementById('timer-bar').style.background = "var(--danger)";
        
        if(timeLeft <= 0) {
            clearInterval(timerInterval);
            autoWrong();
        }
    }, 100);
}

function showQuestion(){
    const q = questions[currentQuestion];
    document.getElementById('progress').innerText = `LEVEL ${currentQuestion + 1} / ${questions.length}`;
    document.getElementById('question-text').innerText = q.q;

    const container = document.getElementById('options-container');
    container.innerHTML = "";
    q.o.forEach((opt, i) => {
        const btn = document.createElement('button');
        btn.innerText = opt;
        btn.onclick = () => selectOption(btn, i);
        container.appendChild(btn);
    });

    document.getElementById('next-btn').disabled = true;
    startTimer(); // Item 4: Inicia cronômetro
}

function selectOption(clickedBtn, index){
    clearInterval(timerInterval);
    const q = questions[currentQuestion];
    const allBtns = document.querySelectorAll('#options-container button');
    allBtns.forEach(btn => btn.disabled = true);

    if(index === q.a){
        score++;
        audioCorrect.play(); // Item 2: Som de acerto
        clickedBtn.style.background = "var(--neon)";
        clickedBtn.style.color = "#000";
    } else {
        audioWrong.play(); // Item 2: Som de erro
        clickedBtn.style.background = "var(--danger)";
    }
    document.getElementById('next-btn').disabled = false;
}

function autoWrong() {
    audioWrong.play();
    const allBtns = document.querySelectorAll('#options-container button');
    allBtns.forEach(btn => btn.disabled = true);
    document.getElementById('next-btn').disabled = false;
}

async function nextQuestion(){
    currentQuestion++;
    if(currentQuestion < questions.length) showQuestion();
    else await finishQuiz();
}

async function finishQuiz(){
    document.getElementById('quiz-container').classList.add('hidden');
    document.getElementById('result-container').classList.remove('hidden');
    document.getElementById('final-score-text').innerHTML = `SCORE: ${score} / ${questions.length}`;
    renderChart();
    await _supabase.from('ranking').insert([{ username: user, score: score }]);
}

function renderChart() {
    const ctx = document.getElementById('performanceChart').getContext('2d');
    new Chart(ctx, {
        type: 'doughnut',
        data: {
            labels: ['ACERTOS', 'ERROS'],
            datasets: [{ data: [score, questions.length - score], backgroundColor: ['#00ff88', '#ff4655'], borderWidth: 0 }]
        },
        options: { plugins: { legend: { position: 'bottom', labels: { color: '#f8fafc' } } } }
    });
}

async function fetchRanking(){
    const { data } = await _supabase.from('ranking').select('username,score').order('score', {ascending:false}).limit(10);
    if(data) document.getElementById('ranking-body').innerHTML = data.map(row => `<tr><td style="padding:10px; border-bottom:1px solid #1e293b;">${row.username}</td><td style="text-align:right; font-weight:bold; color:var(--neon);">${row.score} PTS</td></tr>`).join('');
}

fetchRanking();
</script>
</body>
</html>
