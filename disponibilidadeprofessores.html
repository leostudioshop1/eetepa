<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciador de Disponibilidade - Professores</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>
    .tag { @apply text-xs px-3 py-1 rounded-full bg-indigo-100 text-indigo-700; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="max-w-6xl mx-auto p-6">
    <h1 class="text-4xl font-bold text-center text-indigo-700 mb-8">Gerenciador de Disponibilidade dos Professores</h1>

    <!-- Formulário de Cadastro -->
    <div class="bg-white rounded-2xl shadow-lg p-8 mb-10">
      <h2 class="text-2xl font-semibold mb-6">Cadastrar Professor</h2>
      <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <div>
          <label class="block text-sm font-medium mb-2">Nome do Professor</label>
          <input id="nome" type="text" class="w-full border border-gray-300 rounded-lg px-4 py-3 focus:outline-none focus:border-indigo-500" placeholder="Ex: Maria Silva">
        </div>
        <div>
          <label class="block text-sm font-medium mb-2">Cor (opcional)</label>
          <input id="cor" type="color" value="#4f46e5" class="w-full h-12 border border-gray-300 rounded-lg p-1">
        </div>
      </div>

      <div class="mt-8">
        <label class="block text-sm font-medium mb-3">Dias da Semana Disponíveis</label>
        <div id="dias-container" class="grid grid-cols-5 gap-3"></div>
      </div>

      <div class="mt-8">
        <label class="block text-sm font-medium mb-3">Horários Disponíveis</label>
        <div id="horarios-container" class="grid grid-cols-2 md:grid-cols-3 gap-3 max-h-80 overflow-y-auto"></div>
      </div>

      <button onclick="cadastrarProfessor()" class="mt-10 w-full bg-emerald-600 hover:bg-emerald-700 text-white font-medium py-4 rounded-xl text-lg">
        <i class="fas fa-save mr-2"></i> Cadastrar Professor
      </button>
    </div>

    <!-- Lista de Professores -->
    <div class="bg-white rounded-2xl shadow-lg p-8">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-2xl font-semibold">Professores Cadastrados</h2>
        <button onclick="gerarRelatorioPDF()" class="flex items-center gap-2 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl">
          <i class="fas fa-file-pdf"></i> Gerar Relatório PDF
        </button>
      </div>
      <div id="lista-professores" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
    </div>
  </div>

  <script>
    const supabaseClient = supabase.createClient(window.SUPABASE_CONFIG.url, window.SUPABASE_CONFIG.key);

    const diasSemana = ["segunda", "terca", "quarta", "quinta", "sexta"];
    const horariosFixos = [
      "07:00 - 07:45", "07:45 - 08:30", "08:30 - 09:15", "09:30 - 10:15", "10:15 - 11:00", "11:00 - 11:45",
      "13:00 - 13:45", "13:45 - 14:30", "14:30 - 15:15", "15:30 - 16:15", "16:15 - 17:00",
      "19:00 - 19:45", "19:45 - 20:30", "20:30 - 21:15", "21:30 - 22:15"
    ];

    // Renderizar checkboxes
    function renderDias() {
      const container = document.getElementById("dias-container");
      container.innerHTML = diasSemana.map(dia => `
        <label class="flex items-center gap-2 cursor-pointer bg-gray-50 hover:bg-gray-100 p-3 rounded-xl">
          <input type="checkbox" value="${dia}" class="w-5 h-5 accent-indigo-600" checked>
          <span class="font-medium">${dia.charAt(0).toUpperCase() + dia.slice(1)}</span>
        </label>
      `).join('');
    }

    function renderHorarios() {
      const container = document.getElementById("horarios-container");
      container.innerHTML = horariosFixos.map(h => `
        <label class="flex items-center gap-3 cursor-pointer bg-gray-50 hover:bg-gray-100 p-3 rounded-xl">
          <input type="checkbox" value="${h}" class="w-5 h-5 accent-indigo-600" checked>
          <span>${h}</span>
        </label>
      `).join('');
    }

    async function cadastrarProfessor() {
      const nome = document.getElementById("nome").value.trim();
      const cor = document.getElementById("cor").value;

      if (!nome) return alert("❌ Digite o nome do professor");

      const diasSelecionados = Array.from(document.querySelectorAll('#dias-container input:checked')).map(cb => cb.value);
      const horariosSelecionados = Array.from(document.querySelectorAll('#horarios-container input:checked')).map(cb => cb.value);

      if (diasSelecionados.length === 0 || horariosSelecionados.length === 0) {
        return alert("❌ Selecione pelo menos um dia e um horário");
      }

      const professor = {
        nome,
        cor,
        disponibilidade: {
          dias: diasSelecionados,
          horarios: horariosSelecionados
        },
        criado_em: new Date().toISOString()
      };

      const { error } = await supabaseClient.from('professores').insert([professor]);

      if (error) {
        alert("Erro ao cadastrar: " + error.message);
      } else {
        alert(`✅ Professor ${nome} cadastrado com sucesso!`);
        document.getElementById("nome").value = "";
        carregarProfessores();
      }
    }

    async function carregarProfessores() {
      const { data, error } = await supabaseClient.from('professores').select('*').order('nome');
      const container = document.getElementById("lista-professores");

      if (error) {
        container.innerHTML = `<p class="text-red-500">Erro ao carregar professores</p>`;
        return;
      }

      if (!data || data.length === 0) {
        container.innerHTML = `<p class="text-gray-500 text-center py-10">Nenhum professor cadastrado ainda.</p>`;
        return;
      }

      container.innerHTML = data.map(p => `
        <div class="border border-gray-200 rounded-2xl p-6">
          <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-full" style="background-color: ${p.cor || '#4f46e5'}"></div>
            <div class="flex-1">
              <h3 class="font-bold text-lg">${p.nome}</h3>
              <div class="flex flex-wrap gap-2 mt-3">
                ${p.disponibilidade?.dias?.map(d => `<span class="tag">${d.substring(0,3).toUpperCase()}</span>`).join('') || ''}
              </div>
              <div class="mt-4 text-sm text-gray-600">
                <strong>Horários:</strong><br>
                ${p.disponibilidade?.horarios?.join(" • ") || 'Não informado'}
              </div>
            </div>
          </div>
        </div>
      `).join('');
    }

    async function gerarRelatorioPDF() {
      const { data: professores, error } = await supabaseClient.from('professores').select('*').order('nome');
      if (error || !professores || professores.length === 0) {
        return alert("Nenhum professor encontrado para gerar o relatório.");
      }

      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF('portrait', 'pt', 'a4');
      const pageWidth = pdf.internal.pageSize.getWidth();

      pdf.setFont("helvetica", "bold");
      pdf.setFontSize(22);
      pdf.text("RELATÓRIO DE DISPONIBILIDADE", pageWidth / 2, 50, { align: "center" });
      pdf.setFontSize(12);
      pdf.text(`Gerado em: ${new Date().toLocaleDateString('pt-BR')}`, pageWidth / 2, 75, { align: "center" });

      let y = 110;

      professores.forEach((prof, index) => {
        if (y > 700) {
          pdf.addPage();
          y = 60;
        }

        pdf.setFontSize(16);
        pdf.text(prof.nome, 50, y);
        y += 25;

        pdf.setFontSize(11);
        pdf.text("Dias disponíveis:", 50, y);
        y += 18;
        pdf.text(prof.disponibilidade?.dias?.join(", ") || "Nenhum", 70, y);
        y += 25;

        pdf.text("Horários disponíveis:", 50, y);
        y += 18;
        const horarios = prof.disponibilidade?.horarios || [];
        const linhas = [];
        for (let i = 0; i < horarios.length; i += 3) {
          linhas.push(horarios.slice(i, i + 3).join("  •  "));
        }
        linhas.forEach(linha => {
          pdf.text(linha, 70, y);
          y += 18;
        });

        y += 30;
      });

      pdf.save("Relatorio_Disponibilidade_Professores.pdf");
    }

    // Inicialização
    window.onload = () => {
      renderDias();
      renderHorarios();
      carregarProfessores();
    };
  </script>
</body>
</html>
