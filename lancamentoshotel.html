<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel dos Viajantes • Lançamento de Gastos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        :root { font-family: 'Inter', system_ui, sans-serif; }
        .card-hover { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .card-hover:hover { transform: translateY(-4px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">
    <nav class="bg-slate-900 border-b border-slate-800 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-amber-500 rounded-2xl flex items-center justify-center text-white font-bold text-xl">🏨</div>
                <h1 class="text-2xl font-semibold tracking-tight">Hotel dos Viajantes</h1>
                <span class="text-amber-400 text-sm font-medium px-3 py-1 bg-amber-500/10 rounded-full">Gestão de Gastos</span>
            </div>
            <div class="flex items-center gap-x-8 text-sm font-medium">
                <a href="index.html" class="flex items-center gap-x-2 text-amber-400">
                    <i class="fa-solid fa-plus"></i> Lançamento
                </a>
                <a href="relatorio.html" class="flex items-center gap-x-2 hover:text-slate-100 transition-colors">
                    <i class="fa-solid fa-chart-bar"></i> Relatório
                </a>
            </div>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-6 py-10">
        <div class="flex justify-between items-end mb-8">
            <div>
                <h2 class="text-4xl font-semibold tracking-tight">Lançamento de Gastos</h2>
                <p class="text-slate-400 mt-1">Registre todos os gastos do hotel em tempo real</p>
            </div>
            <div class="flex items-center gap-x-2 text-sm bg-slate-800 px-4 h-9 rounded-3xl">
                <i class="fa-solid fa-clock"></i>
                <span id="current-date" class="font-medium"></span>
            </div>
        </div>

        <div class="bg-slate-900 rounded-3xl p-8 shadow-2xl card-hover">
            <form id="expense-form" class="space-y-8">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-slate-400 mb-2">Descrição do gasto</label>
                        <input type="text" id="descricao" required placeholder="Ex: Compra de produtos de limpeza - 12 unidades" 
                               class="w-full bg-slate-800 border border-slate-700 focus:border-amber-500 rounded-2xl px-5 py-4 text-lg outline-none transition-colors">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-2">Valor (R$)</label>
                        <div class="relative">
                            <span class="absolute left-5 top-1/2 -translate-y-1/2 text-2xl text-slate-400">R$</span>
                            <input type="number" id="valor" step="0.01" min="0.01" required placeholder="0,00"
                                   class="w-full bg-slate-800 border border-slate-700 focus:border-amber-500 rounded-2xl pl-12 pr-5 py-4 text-2xl font-semibold outline-none">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-2">Categoria</label>
                        <select id="categoria" required class="w-full bg-slate-800 border border-slate-700 focus:border-amber-500 rounded-2xl px-5 py-4 text-lg outline-none">
                            <option value="">Selecione a categoria</option>
                            <option value="Alimentação e Bebidas">Alimentação e Bebidas</option>
                            <option value="Limpeza e Higiene">Limpeza e Higiene</option>
                            <option value="Manutenção e Reparos">Manutenção e Reparos</option>
                            <option value="Utilidades (água, luz, internet)">Utilidades (água, luz, internet)</option>
                            <option value="Fornecedores e Insumos">Fornecedores e Insumos</option>
                            <option value="Marketing e Publicidade">Marketing e Publicidade</option>
                            <option value="Salários e Equipe">Salários e Equipe</option>
                            <option value="Equipamentos">Equipamentos</option>
                            <option value="Outros">Outros</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-2">Responsável</label>
                        <input type="text" id="responsavel" required placeholder="Nome do colaborador"
                               class="w-full bg-slate-800 border border-slate-700 focus:border-amber-500 rounded-2xl px-5 py-4 text-lg outline-none">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-2">Origem do dinheiro</label>
                        <select id="origem" required class="w-full bg-slate-800 border border-slate-700 focus:border-amber-500 rounded-2xl px-5 py-4 text-lg outline-none">
                            <option value="">Selecione</option>
                            <option value="Caixa do Hotel">Caixa do Hotel</option>
                            <option value="Conta Bancária">Conta Bancária</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-slate-400 mb-2">Forma de pagamento</label>
                        <select id="forma_pagamento" required class="w-full bg-slate-800 border border-slate-700 focus:border-amber-500 rounded-2xl px-5 py-4 text-lg outline-none">
                            <option value="">Selecione</option>
                            <option value="Pix">Pix</option>
                            <option value="Dinheiro">Dinheiro</option>
                            <option value="Cartão de Crédito">Cartão de Crédito</option>
                            <option value="Cartão de Débito">Cartão de Débito</option>
                            <option value="Transferência">Transferência</option>
                        </select>
                    </div>
                </div>

                <button type="submit" id="btn-registrar"
                        class="w-full bg-gradient-to-r from-amber-500 to-yellow-500 hover:from-amber-600 hover:to-yellow-600 text-slate-950 font-semibold text-xl py-6 rounded-3xl flex items-center justify-center gap-x-3 transition-all active:scale-95">
                    <i class="fa-solid fa-circle-check"></i>
                    REGISTRAR GASTO
                </button>
            </form>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://osofdmgokrxdzsxozsrf.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe';

        const supabaseClient = Supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function updateCurrentDate() {
            const dateEl = document.getElementById('current-date');
            setInterval(() => {
                const now = new Date();
                dateEl.textContent = now.toLocaleDateString('pt-BR', {
                    weekday: 'long', 
                    day: '2-digit', 
                    month: 'long', 
                    hour: '2-digit', 
                    minute: '2-digit'
                });
            }, 1000);
        }

        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `fixed bottom-6 right-6 px-6 py-4 rounded-3xl shadow-2xl flex items-center gap-x-3 text-white z-50 ${
                type === 'success' ? 'bg-emerald-500' : 'bg-red-500'
            }`;
            toast.innerHTML = `${type === 'success' ? '<i class="fa-solid fa-circle-check"></i>' : '<i class="fa-solid fa-triangle-exclamation"></i>'} <span class="font-medium">${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 4500);
        }

        async function registrarGasto(e) {
            e.preventDefault();
            const btn = document.getElementById('btn-registrar');
            const originalText = btn.innerHTML;

            btn.disabled = true;
            btn.innerHTML = `<i class="fa-solid fa-spinner fa-spin"></i> REGISTRANDO...`;

            const descricao = document.getElementById('descricao').value.trim();
            const valor = parseFloat(document.getElementById('valor').value);
            const categoria = document.getElementById('categoria').value;
            const responsavel = document.getElementById('responsavel').value.trim();
            const origem = document.getElementById('origem').value;
            const forma_pagamento = document.getElementById('forma_pagamento').value;

            if (!descricao || !valor || !categoria || !responsavel || !origem || !forma_pagamento) {
                showToast('Preencha todos os campos obrigatórios!', 'error');
                btn.disabled = false;
                btn.innerHTML = originalText;
                return;
            }

            try {
                const { error } = await supabaseClient
                    .from('gastos')
                    .insert([{ 
                        descricao, 
                        valor, 
                        categoria, 
                        origem, 
                        forma_pagamento, 
                        responsavel 
                    }]);

                if (error) throw error;

                showToast('✅ Gasto registrado com sucesso!', 'success');
                document.getElementById('expense-form').reset();
            } catch (err) {
                console.error(err);
                showToast(`❌ Erro: ${err.message || 'Não foi possível registrar o gasto.'}`, 'error');
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        function initialize() {
            updateCurrentDate();
            document.getElementById('expense-form').addEventListener('submit', registrarGasto);
            console.log('%c🚀 Sistema de Lançamento do Hotel dos Viajantes iniciado com sucesso!', 'color:#fbbf24; font-size:14px');
        }

        window.onload = initialize;
    </script>
</body>
</html>
