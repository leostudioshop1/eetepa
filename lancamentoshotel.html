<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel dos Viajantes • Lançamento</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

</head>

<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center">

<div class="bg-slate-900 p-8 rounded-2xl w-full max-w-md shadow-2xl">
<h2 class="text-2xl font-bold mb-6 text-center">Registrar Gasto</h2>

<input id="descricao" placeholder="Descrição" class="w-full mb-3 p-3 rounded text-black">
<input id="valor" type="number" step="0.01" placeholder="Valor" class="w-full mb-3 p-3 rounded text-black">
<input id="categoria" placeholder="Categoria" class="w-full mb-3 p-3 rounded text-black">
<input id="responsavel" placeholder="Responsável" class="w-full mb-3 p-3 rounded text-black">

<select id="origem" class="w-full mb-3 p-3 rounded text-black">
<option value="">Origem do dinheiro</option>
<option>Caixa do Hotel</option>
<option>Conta Bancária</option>
</select>

<select id="forma" class="w-full mb-4 p-3 rounded text-black">
<option value="">Forma de pagamento</option>
<option>Pix</option>
<option>Dinheiro</option>
<option>Cartão de Crédito</option>
<option>Cartão de Débito</option>
<option>Transferência</option>
</select>

<button onclick="salvar()" class="w-full bg-green-500 hover:bg-green-600 p-3 rounded font-bold transition">
Registrar Gasto
</button>

<p id="msg" class="mt-4 text-center"></p>
</div>

<script>
const supabase = Supabase.createClient(
'https://osofdmgokrxdzsxozsrf.supabase.co',
'sb_publishable_KTboch_e9KyCmMNZBlTM9w_V_XhY6Xe'
);

async function salvar() {
const descricao = document.getElementById("descricao").value;
const valor = document.getElementById("valor").value;
const categoria = document.getElementById("categoria").value;
const responsavel = document.getElementById("responsavel").value;
const origem = document.getElementById("origem").value;
const forma = document.getElementById("forma").value;
const msg = document.getElementById("msg");

if (!descricao || !valor || !categoria || !responsavel || !origem || !forma) {
msg.innerText = "⚠️ Preencha todos os campos!";
return;
}

const { error } = await supabase.from('gastos').insert([{
descricao,
valor,
categoria,
responsavel,
origem,
forma_pagamento: forma,
data_hora: new Date().toISOString()
}]);

if (error) {
msg.innerText = "❌ Erro ao salvar!";
} else {
msg.innerText = "✅ Gasto registrado!";
document.querySelectorAll("input").forEach(i=>i.value="");
document.getElementById("origem").value="";
document.getElementById("forma").value="";
}
}
</script>

</body>
</html>
