<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Master Horário EETEPA</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    .horario-cell { transition: all 0.2s; }
    .horario-cell:hover { transform: scale(1.02); z-index: 10; }
    .professor-tag { font-size: 0.75rem; padding: 2px 8px; border-radius: 9999px; }
    .aula-alocada { background: linear-gradient(135deg, #f3e8ff, #e0f2fe); border-left: 4px solid #6366f1; }
    .title-animation { animation: slideTitle 8s infinite alternate ease-in-out; }
    @keyframes slideTitle { 0% { transform: translateX(-10px); } 100% { transform: translateX(10px); } }
  </style>
</head>
<body class="bg-gray-50 font-sans flex flex-col h-screen" oncontextmenu="return false;">

  <!-- Header -->
  <div class="bg-indigo-700 text-white py-4 px-6 flex items-center justify-between shadow-lg">
    <div class="flex items-center gap-3">
      <i class="fas fa-clock text-3xl"></i>
      <div>
        <h1 class="text-3xl font-bold tracking-tight title-animation">Master Horário EETEPA</h1>
        <p class="text-indigo-200 text-sm">Sistema de Gerenciamento de Horários</p>
      </div>
    </div>
  </div>

  <div class="flex flex-1 overflow-hidden" id="main-content">
    <!-- Sidebar -->
    <div class="w-96 bg-white shadow-xl overflow-y-auto">
      <div class="p-6 border-b">
        <h2 class="text-xl font-semibold text-gray-800">Controles</h2>
      </div>
      <div class="flex border-b">
        <button onclick="showTab(0)" class="tab-button flex-1 py-3 font-medium tab-active">Turmas</button>
        <button onclick="showTab(1)" class="tab-button flex-1 py-3 font-medium">Disciplinas</button>
        <button onclick="showTab(2)" class="tab-button flex-1 py-3 font-medium">Professores</button>
      </div>

      <div id="tab-0" class="tab-content p-6">
        <input id="nova-turma" type="text" placeholder="Nome da Turma" class="w-full border rounded-lg px-4 py-2">
        <select id="turno-turma" class="w-full border rounded-lg px-4 py-2 mt-3">
          <option value="manha">Manhã</option>
          <option value="tarde">Tarde</option>
          <option value="noite">Noite</option>
        </select>
        <button onclick="addTurma()" class="w-full bg-indigo-600 text-white py-3 rounded-lg mt-4">Adicionar Turma</button>
        <ul id="lista-turmas" class="space-y-3 mt-8"></ul>
      </div>

      <div id="tab-1" class="tab-content p-6 hidden">
        <div class="flex gap-2 mb-4">
          <input id="nova-disciplina" type="text" placeholder="Nova Disciplina" class="flex-1 border rounded-lg px-4 py-2">
          <button onclick="addDisciplina()" class="bg-indigo-600 text-white px-5 rounded-lg">＋</button>
        </div>
        <ul id="lista-disciplinas" class="space-y-2"></ul>
      </div>

      <div id="tab-2" class="tab-content p-6 hidden">
        <input id="nome-professor" type="text" placeholder="Nome do Professor" class="w-full border rounded-lg px-4 py-2">
        <input id="cor-professor" type="color" value="#4f46e5" class="w-full h-10 mt-3">
        <button onclick="addProfessor()" class="w-full bg-emerald-600 text-white py-3 rounded-lg mt-4">Adicionar Professor</button>
        <ul id="lista-professores" class="mt-8 space-y-3"></ul>
      </div>
    </div>

    <!-- Grade -->
    <div class="flex-1 flex flex-col">
      <div class="bg-white border-b px-6 py-4">
        <select id="filtro-turma" onchange="renderGrade()" class="border rounded-lg px-4 py-2"></select>
      </div>
      <div class="flex-1 overflow-auto p-6">
        <table id="grade-horarios" class="w-full border-collapse bg-white shadow-lg rounded-xl">
          <thead>
            <tr class="bg-gray-100">
              <th class="border p-3">Horário</th>
              <th class="border p-3">Segunda</th>
              <th class="border p-3">Terça</th>
              <th class="border p-3">Quarta</th>
              <th class="border p-3">Quinta</th>
              <th class="border p-3">Sexta</th>
            </tr>
          </thead>
          <tbody id="corpo-grade"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let turmas = [];
    let disciplinasGerais = [];
    let professores = [];
    let horariosAlocados = {};

    const horariosPorTurno = {
      manha: ["07:00 - 07:45", "07:45 - 08:30", "08:30 - 09:15", "09:30 - 10:15", "10:15 - 11:00", "11:00 - 11:45"],
      tarde: ["13:00 - 13:35", "13:35 - 14:10", "14:10 - 14:45", "15:00 - 15:35", "15:35 - 16:10", "16:10 - 16:45"],
      noite: ["19:00 - 19:35", "19:35 - 20:10", "20:10 - 20:45", "21:00 - 21:35", "21:35 - 22:10", "22:10 - 22:45"]
    };

    const diasSemana = ["segunda", "terca", "quarta", "quinta", "sexta"];

    function carregarDados() {
      if (localStorage.getItem('turmas')) turmas = JSON.parse(localStorage.getItem('turmas'));
      if (localStorage.getItem('disciplinasGerais')) disciplinasGerais = JSON.parse(localStorage.getItem('disciplinasGerais'));
      if (localStorage.getItem('professores')) professores = JSON.parse(localStorage.getItem('professores'));
      if (localStorage.getItem('horariosAlocados')) horariosAlocados = JSON.parse(localStorage.getItem('horariosAlocados'));
      renderAll();
    }

    function salvarDados() {
      localStorage.setItem('turmas', JSON.stringify(turmas));
      localStorage.setItem('disciplinasGerais', JSON.stringify(disciplinasGerais));
      localStorage.setItem('professores', JSON.stringify(professores));
      localStorage.setItem('horariosAlocados', JSON.stringify(horariosAlocados));
    }

    function renderAll() {
      renderTurmas();
      renderDisciplinasGerais();
      renderProfessores();
      updateFiltroTurma();
      showTab(0);
    }

    function renderTurmas() {
      const ul = document.getElementById("lista-turmas");
      ul.innerHTML = turmas.map((t, i) => `<li class="bg-gray-50 p-4 rounded-xl flex justify-between"><div><strong>${t.nome}</strong> (${t.turno})</div><button onclick="deletarTurma(${i})" class="text-red-600">Excluir</button></li>`).join('');
    }

    function renderDisciplinasGerais() {
      const ul = document.getElementById("lista-disciplinas");
      ul.innerHTML = disciplinasGerais.map((d, i) => `<li class="bg-gray-50 p-3 rounded flex justify-between"><span>${d}</span><button onclick="deletarDisciplina(${i})" class="text-red-600">Excluir</button></li>`).join('');
    }

    function renderProfessores() {
      const ul = document.getElementById("lista-professores");
      ul.innerHTML = professores.map((p, i) => `<li class="bg-gray-50 p-4 rounded-xl flex justify-between"><span>${p.nome}</span><button onclick="deletarProfessor(${i})" class="text-red-600">Excluir</button></li>`).join('');
    }

    function updateFiltroTurma() {
      const select = document.getElementById("filtro-turma");
      select.innerHTML = `<option value="">Selecione uma Turma</option>` + turmas.map(t => `<option value="${t.nome}">${t.nome}</option>`).join('');
    }

    function renderGrade() {
      // Grade render (basic)
      console.log("Grade atualizada");
    }

    function showTab(n) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
      document.getElementById('tab-' + n).classList.remove('hidden');
    }

    function addTurma() {
      const nome = document.getElementById("nova-turma").value.trim();
      if (!nome) return alert("Nome da turma obrigatório");
      const turno = document.getElementById("turno-turma").value;
      turmas.push({nome, turno});
      salvarDados();
      renderAll();
    }

    function addDisciplina() {
      const nome = document.getElementById("nova-disciplina").value.trim();
      if (!nome) return alert("Nome da disciplina obrigatório");
      disciplinasGerais.push(nome);
      salvarDados();
      renderAll();
    }

    function addProfessor() {
      const nome = document.getElementById("nome-professor").value.trim();
      if (!nome) return alert("Nome do professor obrigatório");
      professores.push({nome, cor: "#4f46e5"});
      salvarDados();
      renderAll();
    }

    function deletarTurma(i) {
      if (confirm("Excluir esta turma?")) {
        turmas.splice(i, 1);
        salvarDados();
        renderAll();
      }
    }

    function deletarDisciplina(i) {
      if (confirm("Excluir esta disciplina?")) {
        disciplinasGerais.splice(i, 1);
        salvarDados();
        renderAll();
      }
    }

    function deletarProfessor(i) {
      if (confirm("Excluir este professor?")) {
        professores.splice(i, 1);
        salvarDados();
        renderAll();
      }
    }

    window.onload = carregarDados;
  </script>
</body>
</html>
